    ansHtml:`<div class="answer-val">ARP 스푸핑 (ARP Spoofing)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>ARP 스푸핑</b>은 위조된 ARP 응답을 보내서 피해자의 ARP 캐시 테이블을 오염시키는 공격이에요. "게이트웨이 MAC 주소가 내 MAC이야"라고 거짓말해서 트래픽을 가로채요(중간자 공격).<br><br>📎 <b>같이 알아두면 좋은 키워드</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>ARP 스푸핑 원리</b></td><td style="text-align:left;vertical-align:middle">위조된 ARP 응답으로 피해자의 ARP 캐시에 잘못된 IP-MAC 매핑을 심어요. 피해자의 트래픽이 공격자를 거쳐 전달돼요. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>중간자 공격(MITM)</b></td><td style="text-align:left;vertical-align:middle">Man-in-the-Middle Attack. 공격자가 두 통신 당사자 사이에 끼어들어 트래픽을 가로채거나 변조해요. ARP 스푸핑이 대표적인 MITM 기법이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>ARP 캐시 포이즈닝</b></td><td style="text-align:left;vertical-align:middle">ARP 스푸핑의 결과로 ARP 캐시가 오염된 상태예요. Poison(독)이라는 표현처럼 잘못된 정보로 오염시켜요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>방어 방법</b></td><td style="text-align:left;vertical-align:middle">동적 ARP 검사(DAI), 정적 ARP 항목 설정, 암호화(HTTPS/TLS)로 방어할 수 있어요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Gratuitous ARP</b></td><td style="text-align:left;vertical-align:middle">자신의 IP-MAC을 네트워크에 자발적으로 알리는 ARP예요. 공격자가 이를 악용해 ARP 캐시를 오염시키기도 해요.</td></tr></table></div></div>` },
  { id:'21_3_3', year:'2021', round:'3회', cat:'SW 개발/계획',
    qHtml:`<div class="q-text">아래에서 설명하는 소프트웨어 모듈 결합도(Coupling) 유형을 영문으로 쓰시오.<br><br>한 모듈이 다른 모듈의 내부 논리 흐름을 제어하기 위한 목적으로 제어 신호를 이용하여 통신하는 결합도로, 하위 모듈에서 상위 모듈로 제어 신호가 이동하여 처리 명령이 부여되는 권리 전도 현상이 발생한다.</div>`,
    ansHtml:`<div class="answer-val">Control Coupling (제어 결합도)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>제어 결합도(Control Coupling)</b>는 한 모듈이 다른 모듈에 제어 신호(플래그, true/false 등)를 전달해서 내부 처리 흐름을 통제하는 방식이에요. "mode=1이면 이렇게, mode=2이면 저렇게"처럼요.<br><br>📎 <b>결합도 7종 (강→약)</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>내용(Content)</b></td><td style="text-align:left;vertical-align:middle">다른 모듈 내부 변수·코드를 직접 접근해요. 가장 나쁜 결합도예요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>공통(Common)</b></td><td style="text-align:left;vertical-align:middle">전역 변수를 여러 모듈이 공유해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>외부(External)</b></td><td style="text-align:left;vertical-align:middle">외부 환경(파일, 하드웨어)을 공유해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>제어(Control)</b></td><td style="text-align:left;vertical-align:middle">제어 신호(플래그)를 전달해서 다른 모듈의 내부 동작을 통제해요. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>스탬프(Stamp)</b></td><td style="text-align:left;vertical-align:middle">구조체를 통째로 전달하지만 일부만 사용해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>자료(Data)</b></td><td style="text-align:left;vertical-align:middle">순수 데이터(매개변수)만 전달해요. 가장 좋아요.</td></tr><tr><td colspan="2" style="color:var(--c-text2);font-style:italic;border-top:1px dashed var(--c-border2)">📝 암기법: 내공외제스자비</td></tr></table></div></div>` },
  { id:'21_3_4', year:'2021', round:'3회', cat:'네트워크',
    qHtml:`<div class="q-text">OSI 7계층에 대한 설명이다. 각 설명에 해당하는 계층의 명칭을 쓰시오.<br><br>1. 물리 계층을 통해 송수신되는 정보의 오류와 흐름을 관리하여 안전한 정보 전달을 도와주는 계층 (MAC 주소 기반)<br>2. 데이터를 목적지까지 가장 안전하고 빠르게 전달하는 계층 (IP 주소, 라우팅)<br>3. 데이터의 인코딩·디코딩, 압축·복원을 담당하는 계층 (JPEG, MPEG)</div>`,
    ansHtml:`<div class="answer-val">1. 데이터링크 계층 (Layer 2) &nbsp;&nbsp; 2. 네트워크 계층 (Layer 3) &nbsp;&nbsp; 3. 표현 계층 (Layer 6)</div><div class="keyword-detail">📌 <b>풀이</b><br>OSI 7계층 중 3가지예요. <b>데이터링크</b>는 오류·흐름 제어(Frame), <b>네트워크</b>는 경로 설정·패킷 전달(Packet), <b>표현</b>은 데이터 형식 변환·암호화(Syntax)예요.<br><br>📎 <b>OSI 7계층 전체 정리</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>1계층 물리(Physical)</b></td><td style="text-align:left;vertical-align:middle">비트 단위 전송. 케이블·리피터·허브. 신호 변환.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>2계층 데이터링크(Data Link)</b></td><td style="text-align:left;vertical-align:middle">Frame 단위. MAC 주소. 오류·흐름 제어. 스위치·브리지. ← <u>정답1</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>3계층 네트워크(Network)</b></td><td style="text-align:left;vertical-align:middle">Packet 단위. IP 주소. 경로 설정(라우팅). 라우터. ← <u>정답2</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>4계층 전송(Transport)</b></td><td style="text-align:left;vertical-align:middle">Segment 단위. TCP/UDP. 단말 간 신뢰성 있는 전송.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>5계층 세션(Session)</b></td><td style="text-align:left;vertical-align:middle">세션 연결·유지·종료 관리.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>6계층 표현(Presentation)</b></td><td style="text-align:left;vertical-align:middle">데이터 형식 변환·암호화·압축. JPEG·MPEG·ASCII. ← <u>정답3</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>7계층 응용(Application)</b></td><td style="text-align:left;vertical-align:middle">사용자 인터페이스. HTTP·FTP·SMTP·DNS.</td></tr></table></div></div>` },
  { id:'21_3_5', year:'2021', round:'3회', cat:'SW 개발/계획',
    qHtml:`<div class="q-text">UML 클래스 다이어그램의 관계에 대한 설명이다. 각 설명에 해당하는 관계를 쓰시오.<br><br>(1) 클래스들 사이의 전체 또는 부분(Part-of) 관계를 나타내며 객체의 생명 주기가 독립적인 관계<br>(2) 한 클래스가 다른 클래스의 상위 개념일 때 IS-A 관계를 나타내는 일반화(상속) 관계</div>`,
    ansHtml:`<div class="answer-val">(1) Aggregation (집약 관계) &nbsp;&nbsp; (2) Generalization (일반화 관계)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>집약(Aggregation)</b>은 "부분은 전체와 독립적으로 존재할 수 있는" Part-of 관계예요. <b>일반화(Generalization)</b>는 상속(IS-A) 관계예요.<br><br>📎 <b>UML 클래스 다이어그램 관계 5가지</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>연관(Association)</b></td><td style="text-align:left;vertical-align:middle">한 클래스가 다른 클래스를 참조하는 지속적 관계예요. 실선+화살표.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>집약(Aggregation)</b></td><td style="text-align:left;vertical-align:middle">Part-of 관계지만 각 객체가 독립적 생명주기를 가져요. 빈 마름모(◇). 예) 팀에 선수가 소속되지만 팀 해체 후에도 선수는 존재. ← <u>정답1</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>합성(Composition)</b></td><td style="text-align:left;vertical-align:middle">Part-of 관계이며 부분 객체의 생명주기가 전체에 종속돼요. 채워진 마름모(◆). 예) 집이 없어지면 방도 없어짐.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>일반화(Generalization)</b></td><td style="text-align:left;vertical-align:middle">상속(IS-A) 관계예요. 실선+속이 빈 삼각형. 자동차 IS-A 탈것. ← <u>정답2</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>의존(Dependency)</b></td><td style="text-align:left;vertical-align:middle">일시적 사용 관계예요. 점선+화살표. 매개변수나 지역 변수로 일시적으로 사용해요.</td></tr></table></div></div>` },
  { id:'21_3_6', year:'2021', round:'3회', cat:'SW 개발/계획',
    qHtml:`<div class="q-text">아래 테스트케이스 구성요소 표의 빈칸 ①②③에 들어갈 항목을 쓰시오.<br><br><div class="tbl-wrap"><table class="db-table" style="min-width:360px"><tr><th>구성요소</th><th>역할</th></tr><tr><td>식별자(ID)</td><td>각 테스트케이스를 구분하는 고유 번호</td></tr><tr class="info-row"><td>① ( )</td><td>테스트 대상 기능, 입력 범위, 실행 상황 등을 명시</td></tr><tr class="info-row"><td>② ( )</td><td>테스트 실행 시 실제로 입력하는 값</td></tr><tr class="info-row"><td>③ ( )</td><td>시스템이 정상 동작할 때 출력되어야 하는 결과값</td></tr><tr><td>수행 단계</td><td>테스트 진행 절차 및 순서</td></tr></table></div>`,
    ansHtml:`<div class="answer-val">① 테스트 조건 &nbsp;&nbsp; ② 테스트 데이터 &nbsp;&nbsp; ③ 예상 결과</div><div class="keyword-detail">📌 <b>풀이</b><br>테스트케이스는 "이런 상황에서(조건) → 이 값을 넣었을 때(데이터) → 이런 결과가 나와야 한다(예상 결과)"는 3요소로 구성돼요. 마치 수학 시험에서 조건→계산→정답 확인과 같아요.<br><br>📎 <b>테스트케이스 구성요소</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>테스트 조건(Test Condition)</b></td><td style="text-align:left;vertical-align:middle">무엇을 테스트할지 정의해요. "로그인 기능이 올바르게 동작하는가"처럼 테스트 목적과 범위를 명시해요. ← <u>정답①</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>테스트 데이터(Test Data)</b></td><td style="text-align:left;vertical-align:middle">테스트 실행 시 입력할 실제 값이에요. 유효한 값, 경계값, 잘못된 값 등 다양하게 준비해요. ← <u>정답②</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>예상 결과(Expected Result)</b></td><td style="text-align:left;vertical-align:middle">테스트를 올바르게 실행했을 때 나와야 하는 결과예요. 실제 결과와 비교해서 성공·실패를 판단해요. ← <u>정답③</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>테스트 오라클</b></td><td style="text-align:left;vertical-align:middle">예상 결과가 맞는지 판단하는 기준이에요. 참·샘플링·휴리스틱·일관성 오라클 4가지로 분류해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>테스트 케이스 vs 테스트 시나리오</b></td><td style="text-align:left;vertical-align:middle">테스트 케이스: 단일 테스트 항목. 테스트 시나리오: 여러 테스트 케이스를 연결한 흐름이에요.</td></tr></table></div></div>` },
  { id:'21_3_7', year:'2021', round:'3회', cat:'SW 개발/계획',
    qHtml:`<div class="q-text">아래에서 설명하는 소프트웨어 테스트 기법의 명칭을 쓰시오.<br><br>요구사항 명세를 입력 조건(원인, Cause)과 출력 조건(결과, Effect) 간의 논리적 관계로 표현하고 이를 기반으로 테스트 케이스를 도출하는 기법이다. AND, OR, NOT과 같은 Boolean 연산자로 원인-결과 관계를 그래프로 표현한다.</div>`,
    ansHtml:`<div class="answer-val">원인-결과 그래프 기법 (Cause-Effect Graph)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>원인-결과 그래프 기법</b>은 입력 조건(원인, Cause)과 출력 결과(결과, Effect) 간의 관계를 논리 그래프로 표현하고, 이를 결정 테이블로 변환해서 테스트 케이스를 도출하는 블랙박스 테스트 기법이에요.<br><br>📎 <b>블랙박스 테스트 기법 비교</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>원인-결과 그래프</b></td><td style="text-align:left;vertical-align:middle">입력 조건과 출력의 논리적 관계를 그래프로 표현해요. 결정 테이블로 변환해 테스트 케이스를 도출해요. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>동치 분할(Equivalence Partitioning)</b></td><td style="text-align:left;vertical-align:middle">유사한 결과를 내는 입력을 그룹으로 나눠 대표값만 테스트해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>경계값 분석(Boundary Value Analysis)</b></td><td style="text-align:left;vertical-align:middle">입력 구간 경계 부근을 집중 테스트해요. 오류가 경계에서 많이 발생해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>오류 예측(Error Guessing)</b></td><td style="text-align:left;vertical-align:middle">경험과 직관으로 오류 발생 가능 부분을 테스트해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>결정 테이블(Decision Table)</b></td><td style="text-align:left;vertical-align:middle">원인-결과 그래프에서 도출한 조건 조합을 표로 정리해요. 복잡한 비즈니스 로직 테스트에 유용해요.</td></tr></table></div></div>` },
  { id:'21_3_8', year:'2021', round:'3회', cat:'정보보안',
    qHtml:`<div class="q-text">아래에서 설명하는 암호화 알고리즘의 명칭을 쓰시오.<br><br>· 미국 NBS(현 NIST)에서 국가 표준으로 정한 대칭키 블록 암호 알고리즘이다.<br>· 64비트 평문을 64비트 암호문으로 암호화하며, 실질적으로 56비트 키를 사용한다.<br>· 현재는 키 길이 부족으로 취약하며 AES로 대체되었다.</div>`,
    ansHtml:`<div class="answer-val">DES (Data Encryption Standard)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>DES</b>는 미국 NBS(현 NIST)에서 국가 표준으로 지정한 대칭키 블록 암호 알고리즘이에요. 64비트 블록, 56비트 키를 사용해요. 현재는 키 길이가 너무 짧아 취약하여 AES로 대체됐어요.<br><br>📎 <b>대칭키 암호화 알고리즘 비교</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>DES (Data Encryption Standard)</b></td><td style="text-align:left;vertical-align:middle">64비트 블록, 56비트 키 대칭키 암호. 현재 브루트포스로 해독 가능하여 취약해요. 현재 사용 권장하지 않아요. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>3DES (Triple DES)</b></td><td style="text-align:left;vertical-align:middle">DES를 3번 적용해서 보완한 것이에요. 112비트 또는 168비트 보안 강도. AES보다 느려서 현재 권장하지 않아요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>AES (Advanced Encryption Standard)</b></td><td style="text-align:left;vertical-align:middle">DES의 후계자. Rijndael 알고리즘 기반. 128/192/256비트 키. 현재 표준이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>SEED</b></td><td style="text-align:left;vertical-align:middle">한국 표준 대칭키 암호. 128비트 키·블록. 금융·공공 분야에서 사용해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>ARIA</b></td><td style="text-align:left;vertical-align:middle">국가보안기술연구소(NSRI) 개발 한국 표준 대칭키 암호예요. 128/192/256비트 키를 지원해요.</td></tr></table></div></div>` },

  // ─── 2021년 2회 ───
  { id:'21_2_1', year:'2021', round:'2회', cat:'네트워크',
    qHtml:`<div class="q-text">아래에서 설명하는 네트워크의 명칭을 쓰시오.<br><br>· 네트워크 장치(중앙 서버 등)를 필요로 하지 않으며 토폴로지가 동적으로 변화한다.<br>· 모든 단말이 동등한 자격으로 망을 구성하며, 긴급 구조·군사 네트워크 등 고정 인프라가 없는 환경에서 활용된다.</div>`,
    ansHtml:`<div class="answer-val">Ad-hoc Network (애드혹 네트워크)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>Ad-hoc Network</b>는 라우터·기지국 같은 고정 인프라 없이 노드들이 직접 연결하는 임시 네트워크예요. 재난 현장·군사 작전처럼 인프라가 없는 환경에서 유용해요. 라틴어로 "임시방편"이에요.<br><br>📎 <b>같이 알아두면 좋은 키워드</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Ad-hoc Network</b></td><td style="text-align:left;vertical-align:middle">고정 인프라 없이 노드들이 직접 연결하는 자기 구성 네트워크예요. 토폴로지가 동적으로 변화해요. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>인프라스트럭처 모드</b></td><td style="text-align:left;vertical-align:middle">AP(공유기)를 통해 연결하는 일반적인 WiFi 방식이에요. Ad-hoc의 반대 개념이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>MANET (Mobile Ad-hoc NETwork)</b></td><td style="text-align:left;vertical-align:middle">이동성이 있는 Ad-hoc 네트워크예요. 노드가 이동하면서 네트워크 토폴로지가 동적으로 변해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>메시 네트워크(Mesh Network)</b></td><td style="text-align:left;vertical-align:middle">Ad-hoc의 발전형이에요. 각 노드가 라우터 역할도 해서 다중 경로 통신이 가능해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>활용 분야</b></td><td style="text-align:left;vertical-align:middle">재난 현장, 군사 작전, IoT 센서 네트워크, 임시 회의 네트워크 등에서 사용해요.</td></tr></table></div></div>` },
  { id:'21_2_2', year:'2021', round:'2회', cat:'기타 용어',
    qHtml:`<div class="q-text">아래 각 설명에 해당하는 용어를 쓰시오.<br><br>(1) 사용자가 제품·서비스를 이용하면서 느끼는 총체적 경험을 나타내는 개념<br>(2) 사용자가 시스템과 상호작용하는 인터페이스로, CLI(Command Line Interface)가 대표적인 예</div>`,
    ansHtml:`<div class="answer-val">(1) UX (User Experience) &nbsp;&nbsp; (2) UI (User Interface)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>UX</b>는 사용자가 제품을 사용하면서 느끼는 총체적 경험이고, <b>UI</b>는 사용자가 시스템과 상호작용하는 화면·버튼 등의 인터페이스예요. UX가 더 넓은 개념이에요.<br><br>📎 <b>UX vs UI 비교</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>UX (User Experience)</b></td><td style="text-align:left;vertical-align:middle">사용자가 제품을 사용하면서 느끼는 총체적 경험이에요. "이 앱이 편리하고 즐거웠다"처럼 감정·태도·행동 전반을 다뤄요. ← <u>정답1</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>UI (User Interface)</b></td><td style="text-align:left;vertical-align:middle">사용자가 시스템과 상호작용하는 인터페이스예요. 화면 레이아웃·버튼·색상·폰트 등 시각적 요소를 다뤄요. ← <u>정답2</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>UI 설계 4원칙</b></td><td style="text-align:left;vertical-align:middle">직관성(쉽게 이해), 유효성(목표 달성), 학습성(쉽게 배움), 유연성(다양한 방식 허용)이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>UX 디자인</b></td><td style="text-align:left;vertical-align:middle">사용자 조사·페르소나·사용자 여정 지도를 통해 사용자 경험을 설계해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>GUI</b></td><td style="text-align:left;vertical-align:middle">Graphical User Interface. 현재 가장 많이 쓰이는 UI 유형이에요. 아이콘·창·버튼 등 그래픽 요소를 사용해요.</td></tr></table></div></div>` },
  { id:'21_2_3', year:'2021', round:'2회', cat:'데이터베이스',
    qHtml:`<div class="q-text">트랜잭션의 특성 중 원자성(Atomicity)에 대해 약술하시오.</div>`,
    ansHtml:`<div class="answer-val">트랜잭션의 연산은 DB에 모두 반영되거나 전혀 반영되지 않아야 한다 (All or Nothing)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>원자성(Atomicity)</b>은 트랜잭션의 모든 연산이 완전히 실행되거나(Commit), 하나라도 실패하면 전혀 실행되지 않은 상태(Rollback)로 돌아가야 한다는 성질이에요. "All or Nothing"으로 기억해요.<br><br>📎 <b>트랜잭션 ACID 4가지 특성</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>원자성(Atomicity)</b></td><td style="text-align:left;vertical-align:middle">All or Nothing. 트랜잭션의 모든 연산이 완전히 실행되거나 전혀 실행되지 않아야 해요. ← <u>이번 문제</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>일관성(Consistency)</b></td><td style="text-align:left;vertical-align:middle">트랜잭션 완료 후에도 DB가 일관된 상태를 유지해야 해요. 무결성 제약조건이 항상 만족되어야 해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>격리성/독립성(Isolation)</b></td><td style="text-align:left;vertical-align:middle">동시에 실행되는 트랜잭션들이 서로 영향을 주지 않아야 해요. 마치 순서대로 실행된 것처럼 보여야 해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>지속성(Durability)</b></td><td style="text-align:left;vertical-align:middle">성공적으로 완료(Commit)된 트랜잭션의 결과는 시스템 장애가 발생해도 영구적으로 보존돼야 해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Commit / Rollback</b></td><td style="text-align:left;vertical-align:middle">Commit: 트랜잭션을 영구적으로 DB에 반영. Rollback: 트랜잭션을 취소하고 이전 상태로 복원.</td></tr></table></div></div>` },
  { id:'21_2_4', year:'2021', round:'2회', cat:'데이터베이스',
    qHtml:`<div class="q-text">아래 릴레이션에서 나타나는 문제는 부분 함수 종속성이다. 이를 제거하여 완전 함수 종속을 만족시키는 정규형은 제 몇 정규형인지 쓰시오.<br><br><div class="tbl-wrap"><table class="db-table"><tr><th>주문번호(PK)</th><th>제품번호(PK)</th><th>제품명</th><th>수량</th></tr><tr><td>O001</td><td>P001</td><td>노트북</td><td>2</td></tr><tr><td>O001</td><td>P002</td><td>마우스</td><td>1</td></tr></table></div><div class="q-text" style="margin-top:8px">※ '제품명'이 '제품번호'(기본키 일부)만으로 결정 가능 → 부분 함수 종속 발생</div>`,
    ansHtml:`<div class="answer-val">제 2 정규형 (2NF)</div><div class="keyword-detail">📌 <b>풀이</b><br>이 릴레이션은 복합 기본키({주문번호+제품코드})에서 일부 속성이 기본키의 <b>부분 집합에만 종속</b>되는 <b>부분 함수 종속</b>이 있어요. 이를 제거한 상태가 <b>2NF</b>예요.<br><br>📎 <b>정규형 단계 정리</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>1NF (제1정규형)</b></td><td style="text-align:left;vertical-align:middle">모든 속성값이 원자값(더 쪼갤 수 없음)이어야 해요. 반복 그룹이나 다중값 속성이 없어야 해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>2NF (제2정규형)</b></td><td style="text-align:left;vertical-align:middle">1NF를 만족하고 부분 함수 종속을 제거해요. 모든 비기본 속성이 기본키 전체에 완전 함수 종속해야 해요. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>3NF (제3정규형)</b></td><td style="text-align:left;vertical-align:middle">2NF를 만족하고 이행적 함수 종속(A→B→C)을 제거해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>BCNF</b></td><td style="text-align:left;vertical-align:middle">3NF를 만족하고 모든 결정자가 후보키여야 해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>부분 함수 종속</b></td><td style="text-align:left;vertical-align:middle">복합 기본키의 일부에만 종속되는 것이에요. 주문번호+제품코드가 기본키인데, 제품명이 제품코드만으로 결정되는 경우예요.</td></tr></table></div></div>` },
  { id:'21_2_5', year:'2021', round:'2회', cat:'SQL문',
    qHtml:`<div class="q-text">테이블의 특정 컬럼 값을 수정할 때 사용하는 SQL 문의 빈칸 ①②를 채우시오.<br><br><div class="sql-box">( ① ) 테이블명 ( ② ) 컬럼 = 값 WHERE 점수 >= 90;</div>`,
    ansHtml:`<div class="answer-val">① UPDATE &nbsp;&nbsp; ② SET</div><div class="keyword-detail">📌 <b>풀이</b><br><b>UPDATE</b>는 테이블의 기존 데이터를 수정하는 DML 명령어예요. <b>SET</b>으로 변경할 컬럼과 값을 지정하고, WHERE로 조건을 명시해요. WHERE 없으면 전체 행이 수정돼요.<br><br>📎 <b>DML 4가지 비교</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>SELECT</b></td><td style="text-align:left;vertical-align:middle">데이터를 조회해요. SELECT 컬럼 FROM 테이블 WHERE 조건.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>INSERT INTO...VALUES</b></td><td style="text-align:left;vertical-align:middle">새 데이터를 삽입해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>UPDATE...SET</b></td><td style="text-align:left;vertical-align:middle">기존 데이터를 수정해요. SET으로 컬럼=값을 지정하고 WHERE로 조건을 명시해요. ← <u>이번 문제</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>DELETE FROM...WHERE</b></td><td style="text-align:left;vertical-align:middle">조건에 맞는 행을 삭제해요. WHERE 없으면 전체 삭제.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>UPDATE 주의사항</b></td><td style="text-align:left;vertical-align:middle">WHERE 절 없이 UPDATE 실행 시 전체 행이 수정돼요. ROLLBACK으로 되돌릴 수 있어요(COMMIT 전에).</td></tr></table></div></div>` },
  { id:'21_2_6', year:'2021', round:'2회', cat:'SQL문',
    qHtml:`<div class="q-text">아래 SQL의 빈칸 ①②를 채우시오.<br><br><div class="sql-box">SELECT ... FROM 학생정보 a JOIN 학과정보 b ( ① ) a.학과 = b.( ② )</div>`,
    ansHtml:`<div class="answer-val">① ON &nbsp;&nbsp; ② 학과</div><div class="keyword-detail">📌 <b>풀이</b><br>JOIN...ON 구문에서 <b>ON</b>은 조인 조건을 명시하는 키워드예요. 두 테이블(a.학과 = b.학과)에서 같은 이름의 컬럼이면 NATURAL JOIN도 가능하지만, 명시적으로 ON을 쓰는 것이 더 명확해요.<br><br>📎 <b>SQL JOIN 구문 정리</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>JOIN...ON</b></td><td style="text-align:left;vertical-align:middle">ON 뒤에 조인 조건을 명시해요. FROM A JOIN B ON A.컬럼 = B.컬럼 형태예요. ← <u>이번 문제</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>NATURAL JOIN</b></td><td style="text-align:left;vertical-align:middle">같은 이름의 컬럼을 자동으로 조인 조건으로 사용해요. ON 절 없이 간결하게 쓸 수 있어요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>USING</b></td><td style="text-align:left;vertical-align:middle">조인에 사용할 컬럼명을 직접 지정해요. JOIN B USING(학과) 형태예요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>INNER JOIN vs OUTER JOIN</b></td><td style="text-align:left;vertical-align:middle">INNER JOIN: 조건 일치 행만 반환. LEFT OUTER JOIN: 왼쪽 테이블 전체 + 오른쪽 NULL 포함.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>CROSS JOIN</b></td><td style="text-align:left;vertical-align:middle">두 테이블의 모든 행 조합을 반환해요(카티션 곱). ON 조건 없어요.</td></tr></table></div></div>` },
  { id:'21_2_7', year:'2021', round:'2회', cat:'정보보안',
    qHtml:`<div class="q-text">아래에서 설명하는 암호화 알고리즘의 명칭을 쓰시오.<br><br>· NIST가 DES를 대체하기 위해 선정한 대칭키 암호화 알고리즘이다.<br>· 128비트 블록 크기와 128·192·256비트 키 크기를 지원한다.<br>· 현재 전 세계적으로 가장 널리 사용되는 표준 대칭키 암호화 알고리즘이다.</div>`,
    ansHtml:`<div class="answer-val">AES (Advanced Encryption Standard)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>AES</b>는 현재 가장 널리 사용되는 대칭키 암호화 알고리즘이에요. DES의 취약한 56비트 키를 대체하기 위해 NIST가 2001년 Rijndael 알고리즘을 선정했어요. 128/192/256비트 키를 지원해요.<br><br>📎 <b>대칭키 암호화 알고리즘 비교</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>DES</b></td><td style="text-align:left;vertical-align:middle">56비트 키 블록 암호. 현재 브루트포스로 해독 가능하여 취약해요. AES로 대체됐어요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>3DES</b></td><td style="text-align:left;vertical-align:middle">DES를 3번 적용한 과도기적 보완책이에요. AES보다 느리고 현재 권장하지 않아요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>AES</b></td><td style="text-align:left;vertical-align:middle">Rijndael 알고리즘 기반. 128/192/256비트 키. 현재 대칭키 암호의 국제 표준이에요. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>SEED</b></td><td style="text-align:left;vertical-align:middle">한국 표준 대칭키 암호. 128비트 키·블록. 금융·공공 분야에서 사용해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>ARIA</b></td><td style="text-align:left;vertical-align:middle">국가보안기술연구소(NSRI) 개발 한국 표준 대칭키 암호예요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>RSA</b></td><td style="text-align:left;vertical-align:middle">대표적 비대칭키(공개키) 암호. 소인수분해의 어려움 기반. 대칭키보다 느리지만 키 교환에 안전해요.</td></tr></table></div></div>` },
  { id:'21_2_8', year:'2021', round:'2회', cat:'SW 개발/계획',
    qHtml:`<div class="q-text">화이트박스 테스트 커버리지에 대한 설명이다. 각 설명에 해당하는 커버리지를 쓰시오.<br><br>1. 최소 한 번 모든 문장(Statement)을 실행하는 커버리지<br>2. 결정(Decision) 검증 기준이라고도 하며, 조건별 참/거짓을 모두 수행하는 커버리지<br>3. (2)와 달리 전체 조건식과 무관하게 개별 조건식의 참/거짓을 각각 수행하는 커버리지</div>`,
    ansHtml:`<div class="answer-val">1. 문장(Statement) 커버리지 &nbsp;&nbsp; 2. 결정(Decision) 커버리지 &nbsp;&nbsp; 3. 조건(Condition) 커버리지</div><div class="keyword-detail">📌 <b>풀이</b><br>커버리지는 테스트가 얼마나 코드를 실행했는지 측정하는 기준이에요. <b>문장</b>은 모든 줄 실행, <b>결정</b>은 if의 T/F 양방향, <b>조건</b>은 개별 조건식의 T/F 각각을 보장해요.<br><br>📎 <b>커버리지 종류 비교 (약→강)</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>문장(Statement) 커버리지</b></td><td style="text-align:left;vertical-align:middle">모든 실행 가능한 코드 줄을 최소 1번 실행해요. 가장 기본적이고 약한 기준이에요. ← <u>정답1</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>결정(Decision) 커버리지</b></td><td style="text-align:left;vertical-align:middle">각 결정문의 결과가 T와 F를 각각 최소 1번씩 가져야 해요. 분기(Branch) 커버리지라고도 해요. ← <u>정답2</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>조건(Condition) 커버리지</b></td><td style="text-align:left;vertical-align:middle">결정문 안의 개별 원자 조건식 각각이 T/F를 최소 1번씩 가져야 해요. 결정문 전체의 T/F는 보장하지 않는 함정이 있어요. ← <u>정답3</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>조건/결정 커버리지</b></td><td style="text-align:left;vertical-align:middle">결정 + 조건 커버리지를 동시에 만족해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>MC/DC</b></td><td style="text-align:left;vertical-align:middle">각 조건이 독립적으로 전체 결정에 영향을 미치는 경우만 선별해요. 항공·자동차 안전 시스템 필수예요.</td></tr><tr><td colspan="2" style="color:var(--c-text2);font-style:italic;border-top:1px dashed var(--c-border2)">📝 강도 순서: 문장 &lt; 결정 &lt; 조건 &lt; 조건/결정 &lt; 다중 조건 &lt; MC/DC</td></tr></table></div></div>` },
  { id:'21_2_9', year:'2021', round:'2회', cat:'SW 개발/계획',
    qHtml:`<div class="q-text">모듈 응집도(Cohesion) 유형에 대한 설명이다. 각 설명에 해당하는 응집도를 쓰시오.<br><br>1. 입출력 간 연관성은 없으나 반드시 순서에 따라 수행되어야 하는 기능의 응집도<br>2. 동일한 입력과 출력을 사용하는 기능을 모아놓은 응집도<br>3. 하나의 기능에 모두 기여하고 밀접하게 연관된 응집도</div>`,
    ansHtml:`<div class="answer-val">1. 절차적(Procedural) 응집도 &nbsp;&nbsp; 2. 교환적(Communication) 응집도 &nbsp;&nbsp; 3. 기능적(Functional) 응집도</div><div class="keyword-detail">📌 <b>풀이</b><br>응집도는 모듈 내부 요소들의 관련성이에요. 높을수록 좋아요. <b>절차적</b>은 순서만 있고 데이터 연관 없음, <b>교환적</b>은 같은 데이터 사용, <b>기능적</b>은 단일 기능만 수행(최고)이에요.<br><br>📎 <b>응집도 7종 (높음→낮음)</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>기능적(Functional)</b></td><td style="text-align:left;vertical-align:middle">단일 기능만 수행해요. 가장 이상적인 응집도예요. ← <u>정답3(최고)</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>순차적(Sequential)</b></td><td style="text-align:left;vertical-align:middle">한 기능의 출력이 다음 기능의 입력이 되는 파이프라인 구조예요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>교환적/통신적(Communication)</b></td><td style="text-align:left;vertical-align:middle">같은 데이터를 사용하거나 같은 결과물을 만드는 기능들의 묶음이에요. ← <u>정답2</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>절차적(Procedural)</b></td><td style="text-align:left;vertical-align:middle">반드시 특정 순서대로 수행해야 하는 기능들의 묶음이에요. 데이터 연관은 없어요. ← <u>정답1</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>시간적(Temporal)</b></td><td style="text-align:left;vertical-align:middle">같은 시간대에 실행되는 기능들이에요. 초기화 모듈이 예시예요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>논리적(Logical)</b></td><td style="text-align:left;vertical-align:middle">비슷한 종류의 기능 묶음이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>우연적(Coincidental)</b></td><td style="text-align:left;vertical-align:middle">관련 없는 기능의 묶음. 최악의 응집도예요.</td></tr><tr><td colspan="2" style="color:var(--c-text2);font-style:italic;border-top:1px dashed var(--c-border2)">📝 암기법: 기순교절시논우 (기능→순차→교환→절차→시간→논리→우연)</td></tr></table></div></div>` },
  { id:'21_2_10', year:'2021', round:'2회', cat:'네트워크',
    qHtml:`<div class="q-text">패킷 교환 방식에서 아래 두 가지 방식에 해당하는 명칭을 쓰시오.<br><br>1. 목적지 호스트와 미리 논리적 연결을 수립한 후 통신하는 연결 지향형 교환 방식<br>2. 헤더에 목적지 정보를 첨부하여 각 패킷이 독립적으로 전달되는 비연결형 교환 방식</div>`,
    ansHtml:`<div class="answer-val">1. 가상회선 (Virtual Circuit) &nbsp;&nbsp; 2. 데이터그램 (Datagram)</div><div class="keyword-detail">📌 <b>풀이</b><br>패킷 교환의 두 방식이에요. <b>가상회선</b>은 전화처럼 경로를 먼저 확보(순서 보장), <b>데이터그램</b>은 우편처럼 각 패킷이 독립적으로 이동(순서 미보장)해요.<br><br>📎 <b>패킷 교환 방식 비교</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>가상회선(Virtual Circuit)</b></td><td style="text-align:left;vertical-align:middle">전송 전 논리적 경로를 설정하고 모든 패킷이 같은 경로로 이동해요. 연결 지향, 순서 보장. TCP와 유사해요. ← <u>정답1</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>데이터그램(Datagram)</b></td><td style="text-align:left;vertical-align:middle">각 패킷이 독립적으로 최적 경로를 찾아 이동해요. 비연결, 순서 미보장. UDP와 유사해요. ← <u>정답2</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>회선 교환</b></td><td style="text-align:left;vertical-align:middle">통신 전에 전용 회선을 확보해요. 전화망이 대표예요. 회선이 비어있어도 다른 사람이 사용 불가해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>TCP</b></td><td style="text-align:left;vertical-align:middle">가상회선 개념 기반. 연결 지향, 신뢰성 보장. 3-way Handshake로 연결을 수립해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>UDP</b></td><td style="text-align:left;vertical-align:middle">데이터그램 개념 기반. 비연결, 빠르지만 신뢰성 없어요. 스트리밍·게임에 적합해요.</td></tr></table></div></div>` },
  { id:'21_2_11', year:'2021', round:'2회', cat:'SW 개발/계획',
    qHtml:`<div class="q-text">아래에서 설명하는 GoF 디자인 패턴의 분류 명칭을 쓰시오.<br><br>반복적으로 사용되는 객체들의 상호작용을 패턴화한 것으로, 클래스나 객체들이 상호작용하는 방법을 정의한다. Interpreter, Observer, Command 등이 이에 속한다.</div>`,
    ansHtml:`<div class="answer-val">행위(Behavioral) 패턴</div><div class="keyword-detail">📌 <b>풀이</b><br>GoF 디자인 패턴은 3가지로 분류돼요. <b>행위(Behavioral) 패턴</b>은 클래스나 객체들이 서로 어떻게 상호작용하고 책임을 분배하는지에 관한 패턴이에요. 11가지가 있어요.<br><br>📎 <b>GoF 패턴 3분류</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>생성(Creational) 패턴</b></td><td style="text-align:left;vertical-align:middle">객체를 어떻게 만들까? 5가지: Singleton, Factory Method, Abstract Factory, Builder, Prototype.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>구조(Structural) 패턴</b></td><td style="text-align:left;vertical-align:middle">객체를 어떻게 조합할까? 7가지: Adapter, Bridge, Composite, Decorator, Facade, Flyweight, Proxy.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>행위(Behavioral) 패턴</b></td><td style="text-align:left;vertical-align:middle">객체가 어떻게 협력할까? 11가지: Observer, Strategy, Command, Iterator, Template Method, Chain of Responsibility, Visitor, State, Mediator, Memento, Interpreter. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Observer</b></td><td style="text-align:left;vertical-align:middle">상태 변화를 여러 객체에 자동 통지해요. 이벤트 시스템, MVC에 사용해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Strategy</b></td><td style="text-align:left;vertical-align:middle">알고리즘을 캡슐화해서 런타임에 교체 가능하게 해요.</td></tr></table></div></div>` },
  { id:'21_2_12', year:'2021', round:'2회', cat:'데이터베이스',
    qHtml:`<div class="q-text">아래에서 설명하는 데이터베이스 병행 제어 기법의 명칭을 쓰시오.<br><br>트랜잭션이 접근한 데이터에 대한 연산을 모두 마칠 때까지 다른 트랜잭션이 접근하지 못하도록 상호 배제(Mutual Exclusion)하는 기법이다.</div>`,
    ansHtml:`<div class="answer-val">로킹 (Locking)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>로킹(Locking)</b>은 트랜잭션이 데이터에 접근하기 전 Lock을 획득하고, 작업 완료 후 Unlock하여 다른 트랜잭션의 동시 접근을 제어하는 병행 제어 기법이에요.<br><br>📎 <b>병행 제어 기법 비교</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>로킹(Locking)</b></td><td style="text-align:left;vertical-align:middle">트랜잭션이 데이터 접근 전 Lock을 획득하고 완료 후 Unlock해요. 교착 상태(Deadlock) 발생 가능성이 있어요. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>공유 Lock vs 배타 Lock</b></td><td style="text-align:left;vertical-align:middle">공유(Share) Lock: 읽기 가능, 쓰기 불가. 배타(Exclusive) Lock: 읽기·쓰기 모두 불가(다른 트랜잭션이).</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>교착 상태(Deadlock)</b></td><td style="text-align:left;vertical-align:middle">두 트랜잭션이 서로 상대방의 Lock을 기다리며 무한 대기하는 상태예요. 타임아웃·사이클 감지로 해결해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>2단계 로킹 프로토콜</b></td><td style="text-align:left;vertical-align:middle">확장 단계(Lock만 획득)와 수축 단계(Unlock만 수행)로 나눠요. 직렬가능성을 보장해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>타임스탬프(Timestamp)</b></td><td style="text-align:left;vertical-align:middle">트랜잭션에 타임스탬프를 부여해서 순서를 결정하는 병행 제어 기법이에요. 교착 상태가 발생하지 않아요.</td></tr></table></div></div>` },
  { id:'21_2_13', year:'2021', round:'2회', cat:'SW 개발/계획',
    qHtml:`<div class="q-text">럼바우(Rumbaugh) 데이터 모델링 기법에 대한 설명이다. 각 설명에 해당하는 모델링 명칭을 쓰시오.<br><br>1. 데이터 흐름도(DFD)를 사용하여 입력값이 출력값이 되는 과정을 표현<br>2. 상태 다이어그램을 사용하여 시간에 따라 변하는 동적 측면을 표현<br>3. E-R 다이어그램을 사용하여 객체들 간의 관계를 정의</div>`,
    ansHtml:`<div class="answer-val">1. 기능 모델링 &nbsp;&nbsp; 2. 동적 모델링 &nbsp;&nbsp; 3. 객체 모델링</div><div class="keyword-detail">📌 <b>풀이</b><br><b>럼바우(Rumbaugh)</b>의 OMT(Object Modeling Technique) 기법은 객체·동적·기능 3가지 모델링으로 구성돼요. DFD=기능, STD=동적, E-R/객체=객체 모델링이에요.<br><br>📎 <b>럼바우 OMT 3가지 모델링</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>기능 모델링(Function Modeling)</b></td><td style="text-align:left;vertical-align:middle">데이터 흐름도(DFD, Data Flow Diagram)를 사용해서 데이터가 어떻게 처리되는지 표현해요. ← <u>정답1</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>동적 모델링(Dynamic Modeling)</b></td><td style="text-align:left;vertical-align:middle">상태 전이도(STD, State Transition Diagram)를 사용해서 시간에 따른 객체의 상태 변화를 표현해요. ← <u>정답2</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>객체 모델링(Object Modeling)</b></td><td style="text-align:left;vertical-align:middle">E-R 다이어그램과 유사한 객체 다이어그램으로 시스템의 정적 구조(객체·속성·관계)를 표현해요. 가장 먼저 수행해요. ← <u>정답3</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>OMT vs UML</b></td><td style="text-align:left;vertical-align:middle">OMT는 UML의 전신이에요. 럼바우, 부치, 야콥슨이 OMT 등을 통합해 UML을 만들었어요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>DFD 구성요소</b></td><td style="text-align:left;vertical-align:middle">프로세스(원), 데이터 저장소(평행선), 단말(사각형), 데이터 흐름(화살표) 4가지예요.</td></tr></table></div></div>` },
  { id:'21_2_14', year:'2021', round:'2회', cat:'SW 개발/계획',
    qHtml:`<div class="q-text">테스트 하네스(Test Harness) 구성 요소 중, 하향식(Top-Down) 통합 테스트 시 아직 구현되지 않은 하위 모듈의 역할을 대신하는 임시 모듈의 명칭을 쓰시오.</div>`,
    ansHtml:`<div class="answer-val">테스트 스텁 (Test Stub)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>테스트 스텁(Stub)</b>은 하향식(Top-Down) 통합 테스트에서 아직 구현되지 않은 하위 모듈을 임시로 대체하는 가짜 모듈이에요. 최소한의 기능만 구현해서 상위 모듈 테스트를 가능하게 해요.<br><br>📎 <b>스텁 vs 드라이버 비교</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>테스트 스텁(Test Stub)</b></td><td style="text-align:left;vertical-align:middle">하향식 통합 테스트에서 하위 모듈을 임시 대체해요. 상위 모듈이 호출할 때 미리 정해진 응답을 반환해요. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>테스트 드라이버(Test Driver)</b></td><td style="text-align:left;vertical-align:middle">상향식 통합 테스트에서 상위 모듈을 임시 대체해요. 하위 모듈을 호출해서 테스트를 실행해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>하향식 통합 테스트</b></td><td style="text-align:left;vertical-align:middle">최상위 모듈부터 하위 방향으로 테스트해요. 스텁이 필요해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>상향식 통합 테스트</b></td><td style="text-align:left;vertical-align:middle">최하위 모듈부터 상위 방향으로 테스트해요. 드라이버가 필요해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>모의 객체(Mock Object)</b></td><td style="text-align:left;vertical-align:middle">스텁보다 발전된 형태예요. 기대 동작을 미리 설정하고 검증할 수 있어요. JUnit의 Mockito가 대표 프레임워크예요.</td></tr></table></div></div>` },

  // ─── 2021년 1회 ───
  { id:'21_1_1', year:'2021', round:'1회', cat:'네트워크',
    qHtml:`<div class="q-text">물리적 네트워크 주소(MAC 주소)를 알고 있을 때, 이에 대응하는 IP 주소를 알려주는 역순 주소 결정 프로토콜의 명칭을 쓰시오.</div>`,
    ansHtml:`<div class="answer-val">RARP (Reverse Address Resolution Protocol)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>RARP</b>는 MAC 주소는 알고 있지만 IP 주소를 모를 때 사용하는 프로토콜이에요. ARP의 반대 방향이에요. 현재는 DHCP로 대체됐어요.<br><br>📎 <b>주소 변환 프로토콜 비교</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>ARP (Address Resolution Protocol)</b></td><td style="text-align:left;vertical-align:middle">IP 주소 → MAC 주소 변환이에요. 동일 네트워크에서 통신 시 반드시 필요해요. 브로드캐스트로 요청하고 유니캐스트로 응답받아요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>RARP (Reverse ARP)</b></td><td style="text-align:left;vertical-align:middle">MAC 주소 → IP 주소 역변환이에요. 디스크 없는 워크스테이션이 부팅 시 자신의 IP를 알아내기 위해 사용했어요. 현재는 DHCP로 완전히 대체됐어요. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>DHCP (Dynamic Host Configuration Protocol)</b></td><td style="text-align:left;vertical-align:middle">네트워크 접속 시 IP·서브넷 마스크·기본 게이트웨이·DNS 등을 자동 할당해요. RARP보다 훨씬 많은 정보를 제공해서 RARP를 대체했어요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>ARP 캐시(ARP Table)</b></td><td style="text-align:left;vertical-align:middle">한 번 조회한 IP-MAC 매핑을 임시 저장해요. 매번 ARP 요청을 보내지 않아도 돼서 효율적이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>ARP 스푸핑</b></td><td style="text-align:left;vertical-align:middle">위조된 ARP 응답으로 피해자의 ARP 테이블을 오염시키는 공격이에요. 트래픽을 가로채는 중간자 공격(MITM)에 사용해요.</td></tr></table></div></div>` },
  { id:'21_1_2', year:'2021', round:'1회', cat:'데이터베이스',
    qHtml:`<div class="q-text">데이터베이스(DB) 설계 절차에 대한 설명이다. 각 설명에 해당하는 단계를 보기에서 골라 쓰시오.<br><br>(1) 특정 DBMS의 특성 및 성능을 고려하여 데이터베이스 저장 구조로 변환. 주요 산출물: 테이블 정의서<br>(2) 현실 세계를 추상적·개념적으로 표현하여 개념적 구조를 도출. 주요 산출물: E-R 다이어그램<br>(3) 목표 DBMS에 맞는 스키마 설계와 트랜잭션 인터페이스를 설계하는 정규화 과정<br><br>[보기] &nbsp; 구현 / 개념적 설계 / 논리적 설계 / 요구사항 분석 / 물리적 설계</div>`,
    ansHtml:`<div class="answer-val">(1) 물리적 설계 &nbsp;&nbsp; (2) 개념적 설계 &nbsp;&nbsp; (3) 논리적 설계</div><div class="keyword-detail">📌 <b>풀이</b><br>DB 설계 5단계를 기억해요. 요구분석→개념적 설계(ERD)→논리적 설계(릴레이션)→물리적 설계(DBMS 최적화)→구현(DDL) 순이에요. 문제에서 DBMS 특성 고려=물리적, ERD 작성=개념적, 릴레이션 스키마=논리적이에요.<br><br>📎 <b>DB 설계 5단계 상세</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>요구사항 분석</b></td><td style="text-align:left;vertical-align:middle">무엇이 필요한지 파악하고 요구명세서를 작성해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>개념적 설계</b></td><td style="text-align:left;vertical-align:middle">E-R 다이어그램(ERD)을 작성해요. DBMS에 독립적인 개념 스키마예요. ← <u>정답2</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>논리적 설계</b></td><td style="text-align:left;vertical-align:middle">ERD를 테이블(릴레이션) 스키마로 변환해요. 정규화를 수행하고 특정 DBMS 유형에 맞게 설계해요. ← <u>정답3</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>물리적 설계</b></td><td style="text-align:left;vertical-align:middle">특정 DBMS의 특성·성능을 고려해 최적화해요. 인덱스·파티션·접근 경로 등을 설계해요. ← <u>정답1</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>구현</b></td><td style="text-align:left;vertical-align:middle">DDL(CREATE TABLE 등)로 실제 DB를 생성해요.</td></tr></table></div></div>` },
  { id:'21_1_3', year:'2021', round:'1회', cat:'SW 개발/계획',
    qHtml:`<div class="q-text">소프트웨어 요구사항의 분류에 대한 설명이다. 각 빈칸에 해당하는 요구사항 유형을 쓰시오.<br><br>(1) ( ) 요구사항: 시스템이 제공하는 기능·서비스에 대한 요구사항<br>(2) ( ) 요구사항: 시스템이 수행하는 기능 이외의 사항, 제약 사항에 관한 요구사항</div>`,
    ansHtml:`<div class="answer-val">(1) 기능적(Functional) 요구사항 &nbsp;&nbsp; (2) 비기능적(Non-functional) 요구사항</div><div class="keyword-detail">📌 <b>풀이</b><br>요구사항은 <b>기능적</b>(무엇을 해야 하는가)과 <b>비기능적</b>(어떻게 잘 해야 하는가)으로 나뉘어요. 로그인 기능=기능적, 응답 시간 1초 이내=비기능적이에요.<br><br>📎 <b>요구사항 유형 비교</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>기능적 요구사항</b></td><td style="text-align:left;vertical-align:middle">시스템이 제공해야 하는 기능·서비스를 정의해요. "로그인 기능 제공", "주문 처리 기능" 등이에요. ← <u>정답1</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>비기능적 요구사항</b></td><td style="text-align:left;vertical-align:middle">시스템의 품질·제약 조건을 정의해요. 성능·보안·신뢰성·유지보수성·이식성 등이에요. ← <u>정답2</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>성능 요구사항</b></td><td style="text-align:left;vertical-align:middle">비기능적 요구사항의 하나예요. "응답 시간 1초 이내", "동시 접속 1000명 지원" 등이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>보안 요구사항</b></td><td style="text-align:left;vertical-align:middle">비기능적 요구사항의 하나예요. "모든 통신 TLS 암호화", "비밀번호 해시 저장" 등이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>요구사항 명세서(SRS)</b></td><td style="text-align:left;vertical-align:middle">Software Requirements Specification. 기능적·비기능적 요구사항을 문서화한 것이에요.</td></tr></table></div></div>` },
  { id:'21_1_4', year:'2021', round:'1회', cat:'기타 용어',
    qHtml:`<div class="q-text">아래에서 설명하는 기술의 명칭을 쓰시오.<br><br>웹 서비스명, 제공 위치, 메시지 포맷, 프로토콜 정보 등 웹 서비스에 대한 상세 정보가 기술된 XML 형식의 언어로, W3C에서 개발하였다. 서비스 제공 장소·메시지 포맷·프로토콜 등을 기술하는 웹 서비스 기술 언어이다.</div>`,
    ansHtml:`<div class="answer-val">WSDL (Web Services Description Language)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>WSDL</b>은 웹 서비스의 인터페이스(어떤 기능을 제공하고, 어떻게 호출하는지)를 XML로 기술하는 언어예요. SOAP 기반 웹 서비스에서 사용해요.<br><br>📎 <b>웹 서비스 관련 기술</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>WSDL (Web Services Description Language)</b></td><td style="text-align:left;vertical-align:middle">웹 서비스 인터페이스를 XML로 기술해요. 서비스 위치(URL), 메시지 형식, 프로토콜을 정의해요. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>SOAP (Simple Object Access Protocol)</b></td><td style="text-align:left;vertical-align:middle">XML 기반 메시지 프로토콜이에요. HTTP·HTTPS·SMTP를 통해 전송해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>UDDI (Universal Description, Discovery, Integration)</b></td><td style="text-align:left;vertical-align:middle">웹 서비스를 등록·검색하는 디렉토리 서비스예요. 서비스 제공자와 사용자를 연결해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>REST API</b></td><td style="text-align:left;vertical-align:middle">SOAP보다 단순하고 가벼운 웹 서비스 방식이에요. HTTP 메서드(GET·POST·PUT·DELETE)로 자원을 조작해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>XML (eXtensible Markup Language)</b></td><td style="text-align:left;vertical-align:middle">WSDL·SOAP에서 데이터 형식으로 사용해요. 사용자 정의 태그로 계층적 데이터를 표현해요.</td></tr></table></div></div>` },
  { id:'21_1_5', year:'2021', round:'1회', cat:'SQL문',
    qHtml:`<div class="q-text">아래 SQL의 실행 결과(COUNT 값)를 쓰시오.<br><br><div class="tbl-wrap"><table class="db-table"><tr><th>EMPNO</th><th>SAL</th></tr><tr><td>100</td><td>1000</td></tr><tr><td>200</td><td>3000</td></tr><tr><td>300</td><td>1500</td></tr></table></div><div class="sql-box">SELECT COUNT(*) FROM 급여
WHERE EMPNO > 100 AND SAL >= 3000 OR EMPNO = 200;</div>`,
    ansHtml:`<div class="answer-val">1</div><div class="keyword-detail">📌 <b>풀이</b><br>SQL에서 <b>AND가 OR보다 먼저 계산</b>돼요. <code>(EMPNO&gt;100 AND SAL&gt;=3000) OR EMPNO=200</code>으로 해석해요. EMPNO=200인 행(SAL=3000)이 두 번째 조건을 만족해서 COUNT=1이에요.<br><br>📎 <b>SQL 연산자 우선순위</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>AND vs OR 우선순위</b></td><td style="text-align:left;vertical-align:middle">AND가 OR보다 먼저 계산돼요. 수학의 ×가 +보다 먼저인 것과 같아요. 헷갈리면 괄호()로 명시해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>NOT &gt; AND &gt; OR</b></td><td style="text-align:left;vertical-align:middle">우선순위 순서예요. NOT이 가장 먼저, OR가 가장 나중에 계산돼요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>COUNT(*)</b></td><td style="text-align:left;vertical-align:middle">NULL 포함 모든 행을 세요. 조건을 만족하는 행이 1개이므로 COUNT=1이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>WHERE 조건 분석</b></td><td style="text-align:left;vertical-align:middle">EMPNO&gt;100 AND SAL&gt;=3000 → EMPNO=200(SAL=3000)만 해당. EMPNO=200 → 같은 행. 합치면 1행이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>HAVING vs WHERE</b></td><td style="text-align:left;vertical-align:middle">WHERE는 GROUP BY 전 행 필터링. HAVING은 GROUP BY 후 그룹 결과 필터링이에요.</td></tr></table></div></div>` },
  { id:'21_1_6', year:'2021', round:'1회', cat:'데이터베이스',
    qHtml:`<div class="q-text">아래 릴레이션의 Cardinality와 Degree를 구하시오.<br><br><div class="tbl-wrap"><table class="db-table"><tr><th>학번</th><th>이름</th><th>학년</th><th>학과</th></tr><tr><td>20202020</td><td>김제원</td><td>3</td><td>무역과</td></tr><tr><td>20202021</td><td>김한국</td><td>1</td><td>통신과</td></tr><tr><td>20202022</td><td>허달력</td><td>4</td><td>영어과</td></tr><tr><td>20202023</td><td>이소파</td><td>2</td><td>영어과</td></tr><tr><td>20202024</td><td>장가위</td><td>3</td><td>중국어과</td></tr></table></div>`,
    ansHtml:`<div class="answer-val">Cardinality: 5 &nbsp;&nbsp; Degree: 4</div><div class="keyword-detail">📌 <b>풀이</b><br>학생 릴레이션에 학번·이름·학년·학과 4개 열, 5명 데이터가 있어요. <b>카디널리티(Cardinality)</b>=행(튜플) 수=5, <b>차수(Degree)</b>=열(속성) 수=4예요.<br><br>📎 <b>DB 기본 용어 정리</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>카디널리티(Cardinality)</b></td><td style="text-align:left;vertical-align:middle">릴레이션의 튜플(행) 개수예요. 데이터가 추가·삭제되면 변해요. ← <u>정답: 5</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>차수(Degree)</b></td><td style="text-align:left;vertical-align:middle">릴레이션의 속성(열) 개수예요. 스키마가 바뀌지 않으면 고정돼요. ← <u>정답: 4</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>튜플(Tuple)</b></td><td style="text-align:left;vertical-align:middle">릴레이션의 행(Row), 레코드(Record)에 해당해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>속성(Attribute)</b></td><td style="text-align:left;vertical-align:middle">릴레이션의 열(Column), 필드(Field)에 해당해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>도메인(Domain)</b></td><td style="text-align:left;vertical-align:middle">각 속성이 가질 수 있는 원자값의 집합이에요. 학년의 도메인은 {1,2,3,4}예요.</td></tr></table></div></div>` },
  { id:'21_1_7', year:'2021', round:'1회', cat:'기타 용어',
    qHtml:`<div class="q-text">아래에서 설명하는 기업 통합 솔루션의 영문 약자를 쓰시오.<br><br>· 기업에서 운영되는 서로 다른 플랫폼 및 애플리케이션 간의 정보를 전달·연계·통합할 수 있도록 해주는 솔루션이다.<br>· 구축 유형: Point-to-Point, Hub &amp; Spoke, Message Bus, Hybrid</div>`,
    ansHtml:`<div class="answer-val">EAI (Enterprise Application Integration)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>EAI(기업 애플리케이션 통합)</b>는 기업 내 서로 다른 플랫폼·애플리케이션 간 정보를 전달·연계·통합하는 솔루션이에요. 서로 다른 시스템을 중간에서 연결해주는 "브릿지" 역할이에요.<br><br>📎 <b>EAI 구축 유형 4가지</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Point-to-Point (포인트 투 포인트)</b></td><td style="text-align:left;vertical-align:middle">애플리케이션 간 1:1로 직접 연결해요. 연결이 늘어날수록 관리가 복잡해지고 변경이 어려워요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Hub & Spoke (허브 앤 스포크)</b></td><td style="text-align:left;vertical-align:middle">중앙 허브를 통해 모든 연결을 관리해요. 허브가 단일 장애점(SPOF)이 될 수 있어요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Message Bus (메시지 버스)</b></td><td style="text-align:left;vertical-align:middle">메시지 버스(공유 채널)를 통해 느슨하게 연결해요. 확장성이 좋고 허브 의존성이 없어요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Hybrid (하이브리드)</b></td><td style="text-align:left;vertical-align:middle">Hub&Spoke와 Message Bus를 혼합해요. 유연성과 중앙 관리를 모두 확보해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>ESB (Enterprise Service Bus)</b></td><td style="text-align:left;vertical-align:middle">EAI의 발전형이에요. 서비스 지향 아키텍처(SOA)를 지원하며 더 유연한 통합을 제공해요.</td></tr></table></div></div>` },
  { id:'21_1_8', year:'2021', round:'1회', cat:'정보보안',
    qHtml:`<div class="q-text">아래에서 설명하는 접근 통제 방식의 명칭을 쓰시오.<br><br>시스템 객체에 대한 접근을 사용자나 그룹의 신분(Identity)에 기반하여 제한하는 방법으로, 자원의 소유자가 접근 권한을 자유롭게 부여하거나 회수할 수 있다.</div>`,
    ansHtml:`<div class="answer-val">DAC (Discretionary Access Control, 임의적 접근 통제)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>DAC(임의적 접근 통제)</b>는 파일이나 자원의 소유자가 직접 다른 사람에게 접근 권한을 부여·취소할 수 있는 방식이에요. "내 파일은 내가 관리"하는 방식이에요.<br><br>📎 <b>접근 통제 모델 비교</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>DAC (Discretionary)</b></td><td style="text-align:left;vertical-align:middle">소유자가 재량으로 권한을 설정해요. 유연하지만 소유자 실수로 보안이 약해질 수 있어요. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>MAC (Mandatory)</b></td><td style="text-align:left;vertical-align:middle">시스템 관리자가 설정한 보안 등급으로 강제 통제해요. 개인이 권한을 변경할 수 없어요. 군대·정부기관에서 사용해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>RBAC (Role-Based)</b></td><td style="text-align:left;vertical-align:middle">역할(직무)에 따라 접근 권한을 부여해요. 역할 변경 시 권한이 자동으로 갱신돼요. 기업 환경에 적합해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>ABAC (Attribute-Based)</b></td><td style="text-align:left;vertical-align:middle">사용자·자원·환경 속성을 조합해서 동적으로 접근을 제어해요. 가장 유연한 모델이에요.</td></tr><tr><td colspan="2" style="color:var(--c-text2);font-style:italic;border-top:1px dashed var(--c-border2)">📝 암기법: MAC=군대(강제), RBAC=회사(역할), DAC=내 파일은 내가(임의)</td></tr></table></div></div>` },
  { id:'21_1_9', year:'2021', round:'1회', cat:'SW 개발/계획',
    qHtml:`<div class="q-text">소프트웨어 결합도(Coupling) 유형에 대한 설명이다. 각 설명에 해당하는 결합도를 보기에서 골라 쓰시오.<br><br>(1) 다른 모듈 내부의 변수나 기능에 직접 접근하는 경우<br>(2) 모듈 간 인터페이스로 배열이나 객체·구조체가 전달되는 경우<br>(3) 모듈 밖에 선언된 전역 변수를 참조하고 갱신하는 경우<br><br>[보기] &nbsp; 자료 결합도 / 스탬프 결합도 / 제어 결합도 / 공통 결합도 / 내용 결합도 / 외부 결합도</div>`,
    ansHtml:`<div class="answer-val">(1) 내용 결합도 &nbsp;&nbsp; (2) 스탬프 결합도 &nbsp;&nbsp; (3) 공통 결합도</div><div class="keyword-detail">📌 <b>풀이</b><br>결합도는 모듈 간 의존도예요. 낮을수록 좋은 설계예요. <b>내용 결합도</b>는 다른 모듈 내부 직접 접근(최악), <b>스탬프 결합도</b>는 구조체 통째로 전달, <b>공통 결합도</b>는 전역 변수 공유예요.<br><br>📎 <b>결합도 7종 (강→약)</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>내용(Content)</b></td><td style="text-align:left;vertical-align:middle">다른 모듈의 내부 변수·코드를 직접 접근·수정해요. 가장 나쁜 결합도예요. ← <u>정답1</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>공통(Common)</b></td><td style="text-align:left;vertical-align:middle">전역 변수를 여러 모듈이 공유해요. 한 모듈 변경이 다른 모듈에 예기치 않게 영향을 줘요. ← <u>정답3</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>외부(External)</b></td><td style="text-align:left;vertical-align:middle">외부 환경(파일, 하드웨어, 프로토콜)을 공유해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>제어(Control)</b></td><td style="text-align:left;vertical-align:middle">제어 신호(플래그)를 전달해서 다른 모듈의 내부 동작을 통제해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>스탬프(Stamp)</b></td><td style="text-align:left;vertical-align:middle">구조체를 통째로 전달하지만 일부만 사용해요. ← <u>정답2</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>자료(Data)</b></td><td style="text-align:left;vertical-align:middle">순수 데이터(매개변수)만 전달해요. 가장 좋아요.</td></tr><tr><td colspan="2" style="color:var(--c-text2);font-style:italic;border-top:1px dashed var(--c-border2)">📝 암기법: 내공외제스자비 (내용→공통→외부→제어→스탬프→자료→비직접)</td></tr></table></div></div>` },
  { id:'21_1_10', year:'2021', round:'1회', cat:'정보보안',
    qHtml:`<div class="q-text">아래에서 설명하는 네트워크 공격 기법의 명칭을 쓰시오.<br><br>정상적인 TCP 연결을 RST 패킷으로 강제 종료시킨 후 재연결 시 공격자에게 연결되도록 하는 기법이다. 세션 관리 취약점을 이용하며 '세션을 가로채다'라는 의미를 가진다.</div>`,
    ansHtml:`<div class="answer-val">세션 하이재킹 (Session Hijacking)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>세션 하이재킹</b>은 이미 인증된 세션을 공격자가 가로채는 공격이에요. RST 패킷으로 기존 연결을 끊은 뒤 재연결 시 공격자 쪽으로 유도하거나, TCP 시퀀스 번호를 예측해서 세션을 탈취해요.<br><br>📎 <b>같이 알아두면 좋은 키워드</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>RST 패킷 활용</b></td><td style="text-align:left;vertical-align:middle">TCP RST 패킷으로 정상 연결을 강제 종료해요. 재연결 시 시퀀스 번호를 예측해서 공격자 쪽으로 세션을 빼앗아요. ← <u>이번 문제</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>TCP 시퀀스 번호 예측</b></td><td style="text-align:left;vertical-align:middle">TCP 연결에서 시퀀스 번호를 예측하면 정상 사용자인 척 패킷을 보낼 수 있어요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>쿠키 탈취</b></td><td style="text-align:left;vertical-align:middle">XSS 공격으로 세션 쿠키를 훔치면 재로그인 없이도 세션을 탈취할 수 있어요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>HTTPS/TLS</b></td><td style="text-align:left;vertical-align:middle">통신 암호화로 시퀀스 번호·쿠키 탈취를 방어해요. 세션 하이재킹의 가장 효과적인 방어책이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>세션 타임아웃</b></td><td style="text-align:left;vertical-align:middle">일정 시간 미사용 세션을 자동 만료시켜 탈취된 세션의 악용을 제한해요.</td></tr></table></div></div>` },
  { id:'21_1_11', year:'2021', round:'1회', cat:'네트워크',
    qHtml:`<div class="q-text">아래 빈칸에 들어갈 알맞은 값을 쓰시오.<br><br>· IPv6는 ( ① ) 비트 길이를 가진다.<br>· IPv4는 총 32비트이며, ( ② ) 비트씩 네 부분으로 나눈다.</div>`,
    ansHtml:`<div class="answer-val">① 128비트 &nbsp;&nbsp; ② 8비트</div><div class="keyword-detail">📌 <b>풀이</b><br><b>IPv6</b>는 128비트 주소 체계로, 16비트씩 8그룹을 콜론(:)으로 구분해요. <b>IPv4</b>는 32비트로, 8비트씩 4그룹을 점(.)으로 구분해요.<br><br>📎 <b>IPv4 vs IPv6 비교</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>IPv4</b></td><td style="text-align:left;vertical-align:middle">32비트 주소 체계. 8비트씩 4옥텟을 점(.)으로 구분해요. 약 43억 개 주소. 주소 고갈 문제가 있어요. ← <u>정답②: 8비트</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>IPv6</b></td><td style="text-align:left;vertical-align:middle">128비트 주소 체계. 16비트씩 8그룹을 콜론(:)으로 구분해요. 사실상 무한한 주소를 제공해요. ← <u>정답①: 128비트</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>IPv6 표기법</b></td><td style="text-align:left;vertical-align:middle">2001:0db8:85a3:0000:0000:8a2e:0370:7334처럼 16진수로 표기해요. 연속된 0은 ::로 생략 가능해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>IPv6 도입 이유</b></td><td style="text-align:left;vertical-align:middle">IPv4 주소 고갈, 보안(IPSec 기본 내장), 이동성, QoS 향상을 위해 개발됐어요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>듀얼 스택</b></td><td style="text-align:left;vertical-align:middle">IPv4와 IPv6를 동시에 운용하는 전환 방법이에요. 현재 많은 시스템이 듀얼 스택을 사용해요.</td></tr></table></div></div>` },
  { id:'21_1_12', year:'2021', round:'1회', cat:'네트워크',
    qHtml:`<div class="q-text">공유 메모리, 소켓, 세마포어, 메시지 큐 등을 이용하여 프로세스 간 데이터를 주고받는 통신 기술의 영문 약자를 쓰시오.</div>`,
    ansHtml:`<div class="answer-val">IPC (Inter-Process Communication)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>IPC(프로세스 간 통신)</b>는 서로 다른 프로세스가 데이터를 주고받는 기법이에요. 운영체제에서 제공하는 파이프·소켓·공유 메모리·메시지 큐·세마포어 등을 통해 구현해요.<br><br>📎 <b>IPC 방법 비교</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>파이프(Pipe)</b></td><td style="text-align:left;vertical-align:middle">단방향 통신이에요. 부모-자식 프로세스 간 통신에 주로 사용해요. Named Pipe는 관련 없는 프로세스 간 통신도 가능해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>소켓(Socket)</b></td><td style="text-align:left;vertical-align:middle">네트워크를 통한 프로세스 간 통신이에요. 다른 컴퓨터의 프로세스와도 통신 가능해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>공유 메모리(Shared Memory)</b></td><td style="text-align:left;vertical-align:middle">여러 프로세스가 동일한 메모리 영역을 공유해요. 가장 빠른 IPC 방법이에요. 동기화를 위해 세마포어와 함께 사용해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>메시지 큐(Message Queue)</b></td><td style="text-align:left;vertical-align:middle">메시지를 큐에 넣고 다른 프로세스가 꺼내는 방식이에요. 비동기 통신이 가능해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>세마포어(Semaphore)</b></td><td style="text-align:left;vertical-align:middle">프로세스 간 동기화·상호 배제를 위한 신호 메커니즘이에요. 공유 자원 접근을 제어해요.</td></tr></table></div></div>` },
  { id:'21_1_13', year:'2021', round:'1회', cat:'SW 개발/계획',
    qHtml:`<div class="q-text">소프트웨어 테스트 유형에 대한 설명이다. 각 설명에 해당하는 테스트 명칭을 보기에서 골라 쓰시오.<br><br>(1) 개별 모듈·서브루틴이 정상적으로 실행되는지 확인하는 테스트<br>(2) 인터페이스 간 시스템이 정상적으로 실행되는지 확인하는 테스트<br><br>[보기] &nbsp; 시스템 / 인수 / 알파 / 단위 / 통합 / 회귀 테스트</div>`,
    ansHtml:`<div class="answer-val">(1) 단위(Unit) 테스트 &nbsp;&nbsp; (2) 통합(Integration) 테스트</div><div class="keyword-detail">📌 <b>풀이</b><br>소프트웨어 테스트는 단위→통합→시스템→인수 순으로 진행돼요. <b>단위 테스트</b>는 개별 모듈, <b>통합 테스트</b>는 여러 모듈을 연결해서 테스트해요.<br><br>📎 <b>테스트 단계 상세</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>단위(Unit) 테스트</b></td><td style="text-align:left;vertical-align:middle">개별 모듈·함수·클래스가 올바르게 동작하는지 테스트해요. 세부 설계서와 대응돼요. 스텁·드라이버를 사용할 수 있어요. ← <u>정답1</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>통합(Integration) 테스트</b></td><td style="text-align:left;vertical-align:middle">여러 모듈을 결합해서 인터페이스가 올바르게 동작하는지 테스트해요. 개략 설계서와 대응돼요. ← <u>정답2</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>시스템(System) 테스트</b></td><td style="text-align:left;vertical-align:middle">완성된 시스템이 요구사항을 만족하는지 테스트해요. 성능·보안·신뢰성 등 비기능 요구사항도 포함해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>인수(Acceptance) 테스트</b></td><td style="text-align:left;vertical-align:middle">실제 사용자가 시스템을 최종 검증해요. 알파(내부)·베타(외부) 테스트가 포함돼요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>V-모델</b></td><td style="text-align:left;vertical-align:middle">개발 단계와 테스트 단계를 1:1로 대응시킨 모델이에요. 세부설계↔단위, 개략설계↔통합, 시스템정의↔시스템, 요구분석↔인수.</td></tr></table></div></div>` },

  // ─── 2020년 4회 ───
  { id:'20_4_1', year:'2020', round:'4회', cat:'네트워크',
    qHtml:`<div class="q-text">아래에서 설명하는 인터넷 프로토콜의 명칭을 쓰시오.<br><br>· IPv4의 주소 고갈·보안성·이동성 지원 등의 문제점을 해결하기 위해 개발된 차세대 인터넷 프로토콜이다.<br>· 128비트 주소 체계를 사용한다.</div>`,
    ansHtml:`<div class="answer-val">IPv6 (Internet Protocol version 6)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>IPv6</b>는 IPv4의 주소 고갈·보안성·이동성 문제를 해결하기 위해 개발된 차세대 인터넷 프로토콜이에요. 128비트 주소로 사실상 무한한 주소 공간을 제공해요.<br><br>📎 <b>IPv4 vs IPv6 비교</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>IPv6 주소 체계</b></td><td style="text-align:left;vertical-align:middle">128비트. 16진수로 16비트씩 8그룹을 콜론(:)으로 구분해요. 연속된 0은 ::로 생략 가능해요. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>IPv4 주소 고갈</b></td><td style="text-align:left;vertical-align:middle">IPv6 개발의 핵심 이유예요. IPv4는 약 43억 개 주소인데, IoT 기기 급증으로 고갈됐어요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>IPv6 장점</b></td><td style="text-align:left;vertical-align:middle">주소 공간 무한, IPSec 기본 내장, 이동성 향상, QoS 지원, NAT 불필요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>듀얼 스택</b></td><td style="text-align:left;vertical-align:middle">IPv4와 IPv6를 동시에 운용하는 전환 방법이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>터널링</b></td><td style="text-align:left;vertical-align:middle">IPv6 패킷을 IPv4 패킷 안에 캡슐화해서 IPv4 네트워크를 통해 전송하는 방법이에요.</td></tr></table></div></div>` },
  { id:'20_4_2', year:'2020', round:'4회', cat:'SW 개발/계획',
    qHtml:`<div class="q-text">GoF 디자인 패턴을 목적에 따라 분류하면 생성·구조·( )의 세 가지 유형이 있다. 괄호 안에 알맞은 유형을 쓰시오.</div>`,
    ansHtml:`<div class="answer-val">행위(Behavioral)</div><div class="keyword-detail">📌 <b>풀이</b><br>GoF 디자인 패턴 23개를 생성·구조·<b>행위</b> 3가지로 분류해요. <b>행위 패턴</b>은 클래스나 객체들이 서로 어떻게 상호작용하고 책임을 분배하는지를 다루는 11가지 패턴이에요.<br><br>📎 <b>GoF 패턴 3분류</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>생성(Creational) 패턴 5가지</b></td><td style="text-align:left;vertical-align:middle">객체 생성 방법 정의. Singleton, Factory Method, Abstract Factory, Builder, Prototype.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>구조(Structural) 패턴 7가지</b></td><td style="text-align:left;vertical-align:middle">객체 조합 방법 정의. Adapter, Bridge, Composite, Decorator, Facade, Flyweight, Proxy.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>행위(Behavioral) 패턴 11가지</b></td><td style="text-align:left;vertical-align:middle">객체 협력·책임 분배 정의. Observer, Strategy, Command, Iterator, Template Method, Chain of Responsibility, Visitor, State, Mediator, Memento, Interpreter. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Observer 패턴</b></td><td style="text-align:left;vertical-align:middle">상태 변화를 여러 객체에 자동 통지해요. 이벤트 시스템, MVC의 Model-View 관계에 사용해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Strategy 패턴</b></td><td style="text-align:left;vertical-align:middle">알고리즘을 캡슐화해서 런타임에 교체 가능하게 해요. 결제 수단 선택, 정렬 알고리즘 교체에 사용해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Command 패턴</b></td><td style="text-align:left;vertical-align:middle">요청을 객체로 캡슐화해요. Undo/Redo, 매크로 기능 구현에 유용해요.</td></tr></table></div></div>` },
  { id:'20_4_3', year:'2020', round:'4회', cat:'SW 개발/계획',
    qHtml:`<div class="q-text">시스템을 폴더 모양의 패키지 단위로 구분하고, 패키지 간 의존 관계를 «import»·«access»·«merge» 등의 스테레오타입으로 표현하는 UML 다이어그램의 명칭을 쓰시오.</div>`,
    ansHtml:`<div class="answer-val">패키지 다이어그램 (Package Diagram)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>패키지 다이어그램</b>은 시스템을 폴더 모양의 패키지 단위로 구분하고 패키지 간 의존 관계를 표현하는 UML 구조 다이어그램이에요. &lt;&lt;import&gt;&gt;·&lt;&lt;access&gt;&gt;·&lt;&lt;merge&gt;&gt; 스테레오타입으로 관계를 명시해요.<br><br>📎 <b>UML 구조 다이어그램 6종</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>패키지 다이어그램</b></td><td style="text-align:left;vertical-align:middle">폴더 모양 패키지 단위로 시스템 구분. 의존 관계 표현. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>클래스 다이어그램</b></td><td style="text-align:left;vertical-align:middle">클래스·속성·메서드·관계 표현. 가장 많이 출제.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>컴포넌트 다이어그램</b></td><td style="text-align:left;vertical-align:middle">소프트웨어 컴포넌트 간 의존 관계 표현.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>배치 다이어그램</b></td><td style="text-align:left;vertical-align:middle">소프트웨어가 배포되는 하드웨어 구성 표현.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>객체 다이어그램</b></td><td style="text-align:left;vertical-align:middle">특정 시점의 객체 인스턴스 상태 표현.</td></tr></table></div></div>` },
  { id:'20_4_4', year:'2020', round:'4회', cat:'데이터베이스',
    qHtml:`<div class="q-text">데이터베이스 회복 기법 중, Rollback 시 Redo와 Undo가 모두 실행되며 트랜잭션 수행 중 갱신 결과를 즉시 데이터베이스에 반영하는 기법의 명칭을 쓰시오.</div>`,
    ansHtml:`<div class="answer-val">즉각 갱신 회복 기법 (Immediate Update)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>즉각 갱신(Immediate Update)</b>은 트랜잭션 완료 전에도 변경 내용을 즉시 DB에 반영하는 회복 기법이에요. 장애 시 미완료 트랜잭션을 Undo로 되돌려야 해요.<br><br>📎 <b>DB 회복 기법 비교</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>즉각 갱신(Immediate Update)</b></td><td style="text-align:left;vertical-align:middle">트랜잭션 완료 전 DB 즉시 반영. 장애 시 Undo 필요. Redo도 필요할 수 있어요. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>지연 갱신(Deferred Update)</b></td><td style="text-align:left;vertical-align:middle">트랜잭션 완료(Commit) 후 DB에 반영. 완료 전 장애 시 Undo 불필요(아직 반영 안 됨). Redo만 필요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Redo (재실행)</b></td><td style="text-align:left;vertical-align:middle">커밋됐지만 DB에 미반영된 트랜잭션을 재적용해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Undo (취소)</b></td><td style="text-align:left;vertical-align:middle">미완료 트랜잭션의 변경을 되돌려요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>WAL (Write-Ahead Logging)</b></td><td style="text-align:left;vertical-align:middle">로그를 먼저 쓰고 DB에 반영하는 원칙이에요. 장애 시 로그로 복구할 수 있어요.</td></tr></table></div></div>` },
  { id:'20_4_5', year:'2020', round:'4회', cat:'정보보안',
    qHtml:`<div class="q-text">네트워크상에서 암호화되지 않은 패킷들을 수집하여 재조합한 후 ID·비밀번호와 같은 중요 정보를 유출하는 수동적 형태의 공격의 명칭을 약술하시오.</div>`,
    ansHtml:`<div class="answer-val">스니핑 (Sniffing)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>스니핑(Sniffing)</b>은 네트워크를 지나다니는 패킷을 캡처·분석해서 ID·비밀번호 같은 중요 정보를 탈취하는 수동적 형태의 공격이에요.<br><br>📎 <b>같이 알아두면 좋은 키워드</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>스니핑(Sniffing)</b></td><td style="text-align:left;vertical-align:middle">패킷 도청 공격이에요. 수동적 공격으로 네트워크 트래픽을 엿들어요. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>스푸핑(Spoofing)</b></td><td style="text-align:left;vertical-align:middle">신분을 위조하는 공격이에요. IP 스푸핑·ARP 스푸핑·DNS 스푸핑 등이 있어요. 스니핑은 수동적, 스푸핑은 능동적 공격이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Wireshark</b></td><td style="text-align:left;vertical-align:middle">대표적인 패킷 분석 도구예요. 네트워크 트래픽을 캡처·분석해요. 정당한 목적으로 사용하면 네트워크 관리·디버깅에 유용해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>방어 방법</b></td><td style="text-align:left;vertical-align:middle">HTTPS(TLS) 암호화로 패킷을 암호화해요. 스위치 환경에서는 허브보다 스니핑이 어려워요. VLAN으로 네트워크를 분리해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>허브 vs 스위치</b></td><td style="text-align:left;vertical-align:middle">허브: 모든 포트에 패킷 전송 → 스니핑 쉬움. 스위치: 목적지 포트에만 전송 → 스니핑 어려움.</td></tr></table></div></div>` },
  { id:'20_4_6', year:'2020', round:'4회', cat:'네트워크',
    qHtml:`<div class="q-text">IP 패킷에서 외부 공인 IP 주소·포트를 내부 사설 IP 주소로 재기록하여 라우터를 통해 네트워크 트래픽을 주고받는 기술의 명칭을 쓰시오.</div>`,

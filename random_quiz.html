    ansHtml:`<div class="answer-val">개발 기간: 20개월 / 계산식: (30,000 ÷ 300) ÷ 5 = 20개월</div><div class="keyword-detail">📌 <b>풀이</b><br><b>LoC(Lines of Code) 기법</b>으로 개발 기간을 구해요. 생산성=300라인/인월이면 총 인월=30,000÷300=100인월. 개발자 5명이면 기간=100÷5=20개월이에요.<br><br>📎 <b>소프트웨어 규모 산정 기법</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>LoC (Lines of Code) 기법</b></td><td style="text-align:left;vertical-align:middle">소스 코드 라인 수를 기준으로 공수·기간·비용을 산정해요. 단순하지만 언어·개발자마다 편차가 커요. ← <u>이번 문제</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>인월(Person-Month)</b></td><td style="text-align:left;vertical-align:middle">한 명이 한 달 동안 수행하는 작업량이에요. 총 인월 = 코드 라인 수 ÷ 개인 생산성.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>기능 점수(Function Point) 기법</b></td><td style="text-align:left;vertical-align:middle">입력·출력·조회·내부 파일·인터페이스를 계산해서 기능 점수로 규모를 산정해요. 언어에 독립적이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>COCOMO 모형</b></td><td style="text-align:left;vertical-align:middle">Boehm이 제안한 비용 산정 모형이에요. Basic·Intermediate·Detailed 3단계가 있어요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>전문가 판단법</b></td><td style="text-align:left;vertical-align:middle">경험 많은 전문가의 판단으로 공수를 산정해요. 빠르지만 주관적이에요.</td></tr></table></div></div>` },

  { id:'20_1_14', year:'2020', round:'1회', cat:'데이터베이스',
    qHtml:`<div class="q-text">아래에서 설명하는 데이터 모델링 기법의 명칭을 쓰시오.<br><br>· 정규화된 엔티티·속성·관계에 대해 성능 향상과 개발·운영의 단순화를 위해 중복·통합·분리 등을 수행하는 기법이다.<br>· 조회 성능은 향상되지만 데이터 무결성 위험이 증가할 수 있다.</div>`,
    ansHtml:`<div class="answer-val">비정규화 (De-Normalization) 또는 반정규화</div><div class="keyword-detail">📌 <b>풀이</b><br><b>비정규화</b>는 성능 향상을 위해 정규화된 DB를 의도적으로 역행시키는 기법이에요. 조회 속도를 높이지만 데이터 중복과 이상현상이 발생할 수 있어요.<br><br>📎 <b>비정규화 기법과 트레이드오프</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>테이블 통합</b></td><td style="text-align:left;vertical-align:middle">자주 조인되는 테이블을 하나로 합쳐요. JOIN 없이 한 번의 쿼리로 데이터를 가져올 수 있어요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>테이블 분할</b></td><td style="text-align:left;vertical-align:middle">자주 사용하는 컬럼만 별도 테이블로 분리해요. 수직 분할(컬럼)·수평 분할(행) 2가지가 있어요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>중복 테이블 추가</b></td><td style="text-align:left;vertical-align:middle">여러 시스템에서 같은 테이블을 공유할 때 복사본을 추가해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>중복 속성 추가</b></td><td style="text-align:left;vertical-align:middle">자주 조회되는 컬럼을 다른 테이블에도 중복 저장해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>파생 컬럼 추가</b></td><td style="text-align:left;vertical-align:middle">계산이 자주 필요한 값(합계·평균)을 미리 계산해서 저장해요.</td></tr></table></div></div>` },

  { id:'20_1_15', year:'2020', round:'1회', cat:'네트워크',
    qHtml:`<div class="q-text">OSI 7계층 중, 0과 1의 비트(bit) 데이터를 전기·광·무선 신호로 변환하여 전송하는 계층의 명칭을 쓰시오.</div>`,
    ansHtml:`<div class="answer-val">물리 계층 (Physical Layer, 1계층)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>물리 계층(Physical Layer)</b>은 OSI 7계층 중 1계층으로, 비트(0과 1)를 전기·빛·무선 신호로 변환해서 전송하는 계층이에요. 케이블·리피터·허브 등의 장비를 사용해요.<br><br>📎 <b>OSI 7계층 전체 정리</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>1계층 물리(Physical)</b></td><td style="text-align:left;vertical-align:middle">비트 단위 전송. 케이블·리피터·허브 사용. 신호 변환·전송 속도·커넥터 규격 정의. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>2계층 데이터링크</b></td><td style="text-align:left;vertical-align:middle">Frame 단위. MAC 주소. 오류·흐름 제어. 스위치·브리지.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>3계층 네트워크</b></td><td style="text-align:left;vertical-align:middle">Packet 단위. IP 주소. 경로 설정(라우팅). 라우터.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>4계층 전송</b></td><td style="text-align:left;vertical-align:middle">Segment 단위. TCP/UDP. 단말 간 신뢰성 있는 전송.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>5~7계층 세션·표현·응용</b></td><td style="text-align:left;vertical-align:middle">5계층: 세션 연결·유지. 6계층: 암호화·압축·형식 변환. 7계층: 사용자 인터페이스(HTTP·FTP·SMTP).</td></tr></table></div></div>` },

  { id:'20_1_16', year:'2020', round:'1회', cat:'SW 개발/계획',
    qHtml:`<div class="q-text">아래 표는 애플리케이션 성능 측정 지표이다. (1)~(3)에 해당하는 지표명을 쓰시오.<br><br><div class="tbl-wrap"><table class="db-table" style="min-width:400px"><tr><th>지표</th><th>설명</th></tr><tr class="info-row"><td>( ① )</td><td>애플리케이션이 주어진 시간 내에 처리할 수 있는 트랜잭션의 수. 웹 애플리케이션의 경우 시간당 페이지 수로 표현</td></tr><tr class="info-row"><td>( ② )</td><td>사용자 입력이 끝난 후 애플리케이션의 응답 출력이 개시될 때까지의 시간. 메뉴 클릭 시 화면이 나타나기까지 걸리는 시간</td></tr><tr class="info-row"><td>( ③ )</td><td>사용자가 요구를 입력한 시점부터 트랜잭션 처리 후 결과 출력이 완료될 때까지 걸리는 시간</td></tr><tr><td>자원 사용률</td><td>트랜잭션 처리 동안 사용하는 CPU·메모리·네트워크 사용량</td></tr></table></div>`,
    ansHtml:`<div class="answer-val">① 처리량(Throughput) &nbsp;&nbsp; ② 응답 시간(Response Time) &nbsp;&nbsp; ③ 경과 시간(Turnaround Time)</div><div class="keyword-detail">📌 <b>풀이</b><br>애플리케이션 성능 측정 지표 3가지예요. <b>처리량</b>은 단위 시간당 처리량, <b>응답 시간</b>은 요청→첫 응답 시간, <b>경과 시간</b>은 요청→처리 완료 시간이에요.<br><br>📎 <b>애플리케이션 성능 지표</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>처리량(Throughput)</b></td><td style="text-align:left;vertical-align:middle">단위 시간당 처리할 수 있는 작업 수예요. TPS(Transactions Per Second)로 측정해요. ← <u>정답①</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>응답 시간(Response Time)</b></td><td style="text-align:left;vertical-align:middle">요청을 보낸 후 첫 번째 응답을 받을 때까지 걸린 시간이에요. ← <u>정답②</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>경과 시간(Turnaround Time)</b></td><td style="text-align:left;vertical-align:middle">요청을 보낸 후 처리가 완전히 완료될 때까지의 총 시간이에요. ← <u>정답③</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>자원 사용률(Resource Utilization)</b></td><td style="text-align:left;vertical-align:middle">CPU·메모리·디스크·네트워크 등의 사용 비율이에요. 병목 지점 파악에 활용해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>성능 테스트 종류</b></td><td style="text-align:left;vertical-align:middle">부하 테스트(Load): 일정 부하에서 성능 측정. 스트레스 테스트(Stress): 임계점까지 부하 증가. 스파이크 테스트: 갑작스러운 부하 증가 대응 확인.</td></tr></table></div></div>` },

  { id:'20_1_17', year:'2020', round:'1회', cat:'SW 개발/계획',
    qHtml:`<div class="q-text">아래 모듈 관계 다이어그램에서 Fan-in 수가 2 이상인 모듈의 명칭을 모두 쓰시오.<br><br><div class="tbl-wrap"><table class="db-table" style="min-width:380px"><tr><th colspan="2">모듈 호출 관계</th></tr><tr><td colspan="2" style="text-align:left;line-height:2">· A → D, A → E, A → F<br>· B → F, B → G<br>· C → F, C → H<br>· D → H<br>· F → H (F도 H를 호출)</td></tr></table></div><div class="q-text" style="margin-top:8px">※ Fan-in: 해당 모듈을 호출하는 상위 모듈의 수</div>`,
    ansHtml:`<div class="answer-val">F, H</div><div class="keyword-detail">📌 <b>풀이</b><br>Fan-in은 해당 모듈을 호출하는 상위 모듈의 수예요. 모듈 구조에서 <b>F</b>는 A·B·C에서 호출(Fan-in=3), <b>H</b>는 C·D·F에서 호출(Fan-in=3)으로, 두 모듈의 Fan-in이 2 이상이에요.<br><br>📎 <b>Fan-in / Fan-out 상세</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Fan-in</b></td><td style="text-align:left;vertical-align:middle">해당 모듈을 호출하는 상위 모듈의 수예요. Fan-in이 높을수록 재사용성이 높아요. F(Fan-in=3), H(Fan-in=3). ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Fan-out</b></td><td style="text-align:left;vertical-align:middle">해당 모듈이 호출하는 하위 모듈의 수예요. Fan-out이 높으면 복잡성이 높아서 분리를 고려해야 해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>재사용성</b></td><td style="text-align:left;vertical-align:middle">Fan-in이 높은 모듈은 여러 곳에서 사용되는 공통 모듈이에요. 잘 설계된 유틸리티·공통 라이브러리가 높은 Fan-in을 가져요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>복잡도 관리</b></td><td style="text-align:left;vertical-align:middle">Fan-out이 7±2를 초과하면 모듈 분리를 고려해야 해요. 너무 많은 모듈을 호출하면 응집도가 낮아져요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>구조 차트(Structure Chart)</b></td><td style="text-align:left;vertical-align:middle">모듈의 계층 구조와 Fan-in/Fan-out을 시각적으로 표현해요.</td></tr></table></div></div>` },

  // ─── 2021년 3회 누락 ───
  { id:'21_3_9', year:'2021', round:'3회', cat:'SQL문',
    qHtml:`<div class="q-text">데이터베이스에서 사용자에게 접속 권한, 객체 생성 권한, DBA 권한 등을 부여할 때 사용하는 DCL 명령어의 명칭과 기능을 약술하시오.</div>`,
    ansHtml:`<div class="answer-val">GRANT: 사용자에게 접속 권한, 오브젝트 생성 권한, DBA 권한 등을 부여하는 명령어</div><div class="keyword-detail">📌 <b>풀이</b><br><b>GRANT</b>는 사용자에게 DB 권한을 부여하는 DCL(Data Control Language) 명령어예요. <b>REVOKE</b>는 부여한 권한을 취소해요.<br><br>📎 <b>DCL(데이터 제어어) 명령어</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>GRANT</b></td><td style="text-align:left;vertical-align:middle">사용자에게 권한을 부여해요. GRANT SELECT ON 테이블 TO 사용자 형태로 사용해요. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>REVOKE</b></td><td style="text-align:left;vertical-align:middle">사용자에게 부여된 권한을 취소해요. REVOKE SELECT ON 테이블 FROM 사용자 형태로 사용해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>DCL vs DDL vs DML</b></td><td style="text-align:left;vertical-align:middle">DDL(CREATE·ALTER·DROP): 구조 정의. DML(SELECT·INSERT·UPDATE·DELETE): 데이터 조작. DCL(GRANT·REVOKE): 권한 제어.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>WITH GRANT OPTION</b></td><td style="text-align:left;vertical-align:middle">GRANT 시 이 옵션을 주면 받은 사람이 다시 다른 사람에게 같은 권한을 부여할 수 있어요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>CASCADE 옵션</b></td><td style="text-align:left;vertical-align:middle">REVOKE 시 CASCADE를 사용하면 WITH GRANT OPTION으로 전파된 권한도 함께 취소돼요.</td></tr></table></div></div>` },

  // ─── 2021년 2회 누락 ───
  { id:'21_2_15', year:'2021', round:'2회', cat:'SQL문',
    qHtml:`<div class="q-text">아래 SQL의 빈칸 ①②를 채우시오.<br><br>· '이름' 컬럼에서 '이'로 시작하는 문자열을 조회하고 결과를 내림차순으로 정렬하는 쿼리이다.<br><br><div class="sql-box">SELECT ... FROM ... WHERE 이름 LIKE ( ① ) ORDER BY 컬럼명 ( ② )</div>`,
    ansHtml:`<div class="answer-val">① 이% &nbsp;&nbsp; ② DESC</div><div class="keyword-detail">📌 <b>풀이</b><br>LIKE 패턴에서 <b>%</b>는 0개 이상의 임의 문자열을 의미해요. <b>이%</b>는 "이"로 시작하는 모든 문자열이에요. ORDER BY ... DESC는 내림차순 정렬이에요.<br><br>📎 <b>LIKE 와일드카드와 ORDER BY</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>이% (LIKE 패턴)</b></td><td style="text-align:left;vertical-align:middle">%는 0개 이상의 임의 문자열과 일치해요. "이%"는 "이"로 시작하는 모든 문자열이에요. "이순신", "이영희" 등이 해당해요. ← <u>정답①</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>% (퍼센트 와일드카드)</b></td><td style="text-align:left;vertical-align:middle">0개 이상의 임의 문자열이에요. %이%는 "이"가 포함된 문자열. %이는 "이"로 끝나는 문자열이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>_ (언더스코어 와일드카드)</b></td><td style="text-align:left;vertical-align:middle">정확히 1글자와 일치해요. "이_"는 "이"로 시작하는 2글자 문자열이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>DESC (내림차순)</b></td><td style="text-align:left;vertical-align:middle">DESCending. 큰 값→작은 값 순으로 정렬해요. ← <u>정답②</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>ESCAPE 문자</b></td><td style="text-align:left;vertical-align:middle">LIKE 패턴에서 %나 _를 문자 그대로 사용하려면 ESCAPE 문자를 지정해요. <code>LIKE '50\_%%' ESCAPE '\'</code>처럼 사용해요.</td></tr></table></div></div>` },

  // ─── 2021년 1회 누락 ───
  { id:'21_1_14', year:'2021', round:'1회', cat:'데이터베이스',
    qHtml:`<div class="q-text">아래에서 설명하는 데이터 모델링 기법의 명칭을 쓰시오.<br><br>· 정규화된 엔티티·속성·관계에 대해 성능 향상과 개발·운영의 단순화를 위해 중복·통합·분리 등을 수행하는 기법이다.<br>· 방법으로는 테이블 통합, 테이블 분할, 중복 테이블 추가, 중복 속성 추가 등이 있다.</div>`,
    ansHtml:`<div class="answer-val">비정규화 (De-Normalization) 또는 반정규화</div><div class="keyword-detail">📌 <b>풀이</b><br><b>비정규화(반정규화)</b>는 정규화된 DB를 성능 향상을 위해 의도적으로 역행시키는 기법이에요. JOIN 횟수를 줄여 조회 속도를 높이지만, 중복 데이터로 인한 이상현상이 발생할 수 있어요.<br><br>📎 <b>같이 알아두면 좋은 키워드</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>비정규화 목적</b></td><td style="text-align:left;vertical-align:middle">조회 성능 향상이에요. 정규화로 분리된 테이블을 합치면 JOIN이 줄어서 조회가 빨라져요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>비정규화 기법</b></td><td style="text-align:left;vertical-align:middle">테이블 병합·분할, 중복 컬럼 추가, 파생 컬럼(미리 계산된 값) 추가, 중복 테이블 추가 등이 있어요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>비정규화의 단점</b></td><td style="text-align:left;vertical-align:middle">데이터 중복으로 삽입·삭제·갱신 이상이 발생할 수 있어요. 저장 공간도 더 필요해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>정규화와의 트레이드오프</b></td><td style="text-align:left;vertical-align:middle">정규화: 중복 제거·일관성 유지, 조회 시 JOIN 많음. 반정규화: 중복 허용·조회 빠름·갱신 이상 가능.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>OLTP vs OLAP</b></td><td style="text-align:left;vertical-align:middle">OLTP(트랜잭션 처리): 정규화 중시. OLAP(분석 처리): 반정규화로 조회 성능 최적화해요.</td></tr></table></div></div>` },

  { id:'21_1_15', year:'2021', round:'1회', cat:'SW 개발/계획',
    qHtml:`<div class="q-text">블랙박스 테스트 기법에 대한 아래 두 가지 예시를 보고, 해당하는 테스트 기법의 명칭을 각각 쓰시오.<br><br>1. 입력 범위 0 ≤ x ≤ 10일 때 -1, 0, 10, 11 등 경계에 위치한 값을 테스트 케이스로 선정<br>2. 입력 데이터 영역을 유사한 도메인별로 유효값·무효값으로 그룹핑하여 각 그룹의 대표값으로 검사</div>`,
    ansHtml:`<div class="answer-val">1. 경계값 분석 (Boundary Value Analysis) &nbsp;&nbsp; 2. 동등 분할 (Equivalence Partitioning)</div><div class="keyword-detail">📌 <b>풀이</b><br>경계값 분석은 입력 구간의 경계 부근을 테스트하고, 동등 분할은 유사한 결과를 내는 그룹으로 나눠 대표값만 테스트해요. 두 기법은 블랙박스 테스트에서 보완적으로 사용해요.<br><br>📎 <b>블랙박스 테스트 기법 비교</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>경계값 분석</b></td><td style="text-align:left;vertical-align:middle">구간 경계(최솟값-1, 최솟값, 최솟값+1 등)를 집중 테스트해요. 오류가 경계 부근에서 많이 발생하기 때문이에요. 0≤x≤10에서 -1, 0, 1, 9, 10, 11을 테스트해요. ← <u>정답1</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>동등 분할</b></td><td style="text-align:left;vertical-align:middle">유사한 결과를 내는 입력을 그룹으로 나눠 대표값만 테스트해요. 입력 범위 0≤x≤10에서 5 하나만 테스트해요. ← <u>정답2</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>원인-결과 그래프</b></td><td style="text-align:left;vertical-align:middle">입력 조건(원인)과 출력(결과)의 관계를 논리 그래프로 표현해요. 결정 테이블로 변환해 테스트 케이스를 도출해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>오류 예측</b></td><td style="text-align:left;vertical-align:middle">경험과 직관으로 오류 발생 가능 부분을 테스트해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>블랙박스 vs 화이트박스</b></td><td style="text-align:left;vertical-align:middle">블랙박스: 내부 구조 모르고 입출력 명세 기반. 화이트박스: 내부 코드 보고 경로·분기 테스트.</td></tr></table></div></div>` },

  { id:'21_1_16', year:'2021', round:'1회', cat:'데이터베이스',
    qHtml:`<div class="q-text">아래는 데이터 모델의 구성요소에 대한 설명이다. 각 빈칸에 해당하는 구성요소를 쓰시오.<br><br>· ( ① ): 데이터베이스에 저장된 실제 데이터를 처리하는 작업에 대한 명세로, 데이터베이스를 조작하는 기본 도구<br>· ( ② ): 논리 데이터 모델에서 ①을 어떻게 나타낼 것인지 표현하는 요소<br>· ( ③ ): 데이터 무결성 유지를 위한 DB의 보편적 방법으로, 릴레이션의 특정 컬럼에 설정하는 제약 (개체 무결성, 참조 무결성 등)</div>`,
    ansHtml:`<div class="answer-val">① 연산(Operation) &nbsp;&nbsp; ② 구조(Structure) &nbsp;&nbsp; ③ 제약조건(Constraint)</div><div class="keyword-detail">📌 <b>풀이</b><br>데이터 모델의 3가지 구성요소예요. <b>연산</b>은 데이터를 처리하는 방법, <b>구조</b>는 데이터를 표현하는 틀, <b>제약조건</b>은 데이터가 지켜야 할 규칙이에요.<br><br>📎 <b>데이터 모델 3구성 요소</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>연산(Operation)</b></td><td style="text-align:left;vertical-align:middle">DB에 저장된 데이터를 처리하는 작업이에요. 검색·삽입·수정·삭제 등의 조작 방법을 정의해요. ← <u>정답①</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>구조(Structure)</b></td><td style="text-align:left;vertical-align:middle">DB에 저장될 데이터의 논리적 구조예요. 릴레이션, 속성, 도메인, 키 등의 구조를 정의해요. ← <u>정답②</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>제약조건(Constraint)</b></td><td style="text-align:left;vertical-align:middle">데이터가 지켜야 할 규칙이에요. 무결성 제약조건(개체·참조·도메인 무결성)을 정의해요. ← <u>정답③</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>데이터 모델 종류</b></td><td style="text-align:left;vertical-align:middle">계층형(트리), 네트워크형(그래프), 관계형(테이블), 객체지향형, 객체관계형 등이 있어요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>관계형 데이터 모델</b></td><td style="text-align:left;vertical-align:middle">현재 가장 많이 사용해요. 데이터를 테이블(릴레이션) 형태로 표현해요. SQL로 조작해요.</td></tr></table></div></div>` },

  // ─── 2020년 4회 누락 ───
  { id:'20_4_13', year:'2020', round:'4회', cat:'기타 용어',
    qHtml:`<div class="q-text">아래에서 설명하는 분산 컴퓨팅 플랫폼의 명칭을 쓰시오.<br><br>· 오픈 소스 기반의 분산 컴퓨팅 플랫폼으로, 일반 PC급 컴퓨터들로 가상화된 대형 스토리지를 형성한다.<br>· 저장된 대용량 데이터 세트를 병렬로 처리할 수 있도록 개발된 자바 소프트웨어 프레임워크이다.<br>· Google, Yahoo 등에 적용된 기술이다.</div>`,
    ansHtml:`<div class="answer-val">하둡 (Hadoop)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>Hadoop</b>은 대용량 데이터를 분산 저장·처리하는 오픈소스 플랫폼이에요. HDFS(분산 파일 시스템)로 저장하고 MapReduce로 처리해요. 일반 PC급 서버들로 가상화된 대형 스토리지·컴퓨팅 파워를 제공해요.<br><br>📎 <b>빅데이터 처리 플랫폼</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>HDFS (Hadoop Distributed File System)</b></td><td style="text-align:left;vertical-align:middle">여러 서버에 데이터를 분산 저장하는 파일 시스템이에요. 대용량 파일을 블록 단위로 나눠 저장해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>MapReduce</b></td><td style="text-align:left;vertical-align:middle">대용량 데이터를 Map(분산 처리)과 Reduce(결과 집합)로 나눠 병렬 처리하는 프레임워크예요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Apache Spark</b></td><td style="text-align:left;vertical-align:middle">Hadoop MapReduce의 느린 디스크 I/O를 개선한 인메모리 처리 프레임워크예요. 훨씬 빠른 처리 속도를 제공해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>YARN</b></td><td style="text-align:left;vertical-align:middle">Hadoop의 자원 관리자예요. 클러스터의 CPU·메모리를 효율적으로 할당해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>빅데이터 3V</b></td><td style="text-align:left;vertical-align:middle">Volume(대용량)·Velocity(빠른 생성 속도)·Variety(다양한 형태). Hadoop은 이 3V를 처리하는 플랫폼이에요.</td></tr></table></div></div>` },

  { id:'20_4_14', year:'2020', round:'4회', cat:'SW 개발/계획',
    qHtml:`<div class="q-text">테스트 오라클(Test Oracle)의 유형 중, 특정 몇 개의 입력값에 대해서만 기대하는 결과를 제공하는 오라클의 명칭을 쓰시오.<br><br>· 모든 입력값이 아닌 일부 케이스에 대해서만 결과를 검증하는 방식이다.</div>`,
    ansHtml:`<div class="answer-val">샘플링 오라클 (Sampling Oracle)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>샘플링 오라클</b>은 테스트 오라클 유형 중 하나로, 모든 입력이 아닌 특정 몇 개의 입력값에 대해서만 기대 결과를 제공하는 방식이에요.<br><br>📎 <b>테스트 오라클 유형</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>참(True) 오라클</b></td><td style="text-align:left;vertical-align:middle">모든 입력 데이터에 대해 기대하는 결과를 제공해요. 가장 완전하지만 구현 비용이 높아요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>샘플링(Sampling) 오라클</b></td><td style="text-align:left;vertical-align:middle">특정 몇 개의 입력값에 대해서만 기대 결과를 제공해요. 일부만 검증해서 효율적이에요. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>휴리스틱(Heuristic) 오라클</b></td><td style="text-align:left;vertical-align:middle">경험과 직관으로 기대 결과를 추정해요. 구현이 쉽지만 정확성이 낮아요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>일관성(Consistent) 오라클</b></td><td style="text-align:left;vertical-align:middle">기존 버전의 실행 결과와 새 버전의 결과를 비교해요. 회귀 테스트에 활용해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>테스트 오라클 목적</b></td><td style="text-align:left;vertical-align:middle">테스트 결과가 올바른지 판단하는 기준이에요. 예상 결과와 실제 결과를 비교해요.</td></tr></table></div></div>` },

  { id:'20_4_15', year:'2020', round:'4회', cat:'SW 개발/계획',
    qHtml:`<div class="q-text">아래 표와 같이 점수 구간별로 성적이 부여될 때 테스트를 수행하고자 한다. 테스트 값 [-10점, 30점, 65점, 75점, 85점, 95점, 110점]을 사용하여 각 구간을 대표하는 값으로 테스트하는 기법의 명칭을 쓰시오.<br><br><div class="tbl-wrap"><table class="db-table"><tr><th>점수</th><th>성적</th></tr><tr><td>0 ~ 59</td><td>가</td></tr><tr><td>60 ~ 69</td><td>양</td></tr><tr><td>70 ~ 79</td><td>미</td></tr><tr><td>80 ~ 89</td><td>우</td></tr><tr><td>90 ~ 100</td><td>수</td></tr></table></div>`,
    ansHtml:`<div class="answer-val">동등 분할 테스트 (Equivalence Partitioning Test)</div><div class="keyword-detail">📌 <b>풀이</b><br>점수 구간별로 성적이 부여될 때 [-10점, 30점, 65점, 75점, 85점, 95점, 105점]은 각 구간의 대표값 + 경계 밖 값이에요. 각 동치 클래스(구간)의 대표값만 테스트하는 <b>동등 분할 기법</b>이에요.<br><br>📎 <b>블랙박스 테스트 기법 비교</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>동등 분할(Equivalence Partitioning)</b></td><td style="text-align:left;vertical-align:middle">유사한 결과를 내는 입력을 그룹으로 나눠 대표값만 테스트해요. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>경계값 분석(Boundary Value Analysis)</b></td><td style="text-align:left;vertical-align:middle">구간 경계(최솟값-1, 최솟값, 최솟값+1 등)를 집중 테스트해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>동등 분할 클래스</b></td><td style="text-align:left;vertical-align:middle">유효 클래스(정상 입력 구간)와 무효 클래스(정상 외 입력 구간) 2가지로 나눠요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>두 기법의 관계</b></td><td style="text-align:left;vertical-align:middle">동등 분할 후 경계값 분석으로 보완해요. 함께 사용하면 더 효과적이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>블랙박스 기법 종류</b></td><td style="text-align:left;vertical-align:middle">동등 분할, 경계값 분석, 원인-결과 그래프, 오류 예측, 비교 검사.</td></tr></table></div></div>` },

  // ─── 2020년 3회 누락 ───
  { id:'20_3_12', year:'2020', round:'3회', cat:'SW 개발/계획',
    qHtml:`<div class="q-text">동치 분할 테스트, 경계값 분석 테스트 등의 종류가 있으며 소프트웨어가 수행할 특정 기능을 알기 위해 각 기능이 완전히 작동되는 것을 입증하는 테스트 기법의 명칭을 쓰시오.</div>`,
    ansHtml:`<div class="answer-val">블랙박스 테스트 (Black Box Test) 또는 명세 기반 테스트</div><div class="keyword-detail">📌 <b>풀이</b><br><b>블랙박스 테스트</b>는 소프트웨어 내부 구현을 모르고 입출력 명세만으로 테스트하는 기법이에요. 동치 분할·경계값 분석·원인-결과 그래프·오류 예측·비교 검사가 대표 기법이에요.<br><br>📎 <b>블랙박스 vs 화이트박스</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>블랙박스 테스트</b></td><td style="text-align:left;vertical-align:middle">내부 구조 모르고 입출력 명세 기반으로 테스트해요. 기능 테스트라고도 해요. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>화이트박스 테스트</b></td><td style="text-align:left;vertical-align:middle">내부 코드 구조를 보고 경로·분기를 테스트해요. 구조 테스트라고도 해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>블랙박스 기법</b></td><td style="text-align:left;vertical-align:middle">동치 분할, 경계값 분석, 원인-결과 그래프, 오류 예측, 비교 검사.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>화이트박스 기법</b></td><td style="text-align:left;vertical-align:middle">기초 경로 검사, 루프 검사, 조건 검사, 데이터 흐름 검사.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>그레이박스 테스트</b></td><td style="text-align:left;vertical-align:middle">블랙박스+화이트박스 혼합이에요. 내부 구조를 어느 정도 알지만 전체를 아는 것은 아니에요.</td></tr></table></div></div>` },

  { id:'20_3_13', year:'2020', round:'3회', cat:'데이터베이스',
    qHtml:`<div class="q-text">데이터베이스의 구조·제약조건 등의 정보를 담고 있는 기본적인 구조로, 데이터베이스에 어떤 데이터가 어떤 형태로 저장되는지를 정의한 것의 명칭과 개념을 약술하시오.</div>`,
    ansHtml:`<div class="answer-val">스키마(Schema): DB의 구조, 제약조건 등의 정보를 담고 있는 기본적인 구조</div><div class="keyword-detail">📌 <b>풀이</b><br><b>스키마(Schema)</b>는 데이터베이스의 구조·제약조건 등을 정의한 것이에요. 외부·개념·내부 3단계 스키마로 나뉘어요.<br><br>📎 <b>DB 스키마 3단계</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>외부(External) 스키마</b></td><td style="text-align:left;vertical-align:middle">사용자 관점의 스키마예요. 전체 DB 중 특정 사용자가 보는 부분(뷰)이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>개념(Conceptual) 스키마</b></td><td style="text-align:left;vertical-align:middle">조직 전체의 논리적 구조예요. 개체·속성·관계·제약조건을 정의해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>내부(Internal) 스키마</b></td><td style="text-align:left;vertical-align:middle">물리적 저장 구조예요. 데이터가 실제로 어떻게 저장되는지(파일 구조·인덱스·접근 경로)를 정의해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>데이터 독립성</b></td><td style="text-align:left;vertical-align:middle">3단계 스키마의 핵심 목적이에요. 논리적 독립성(개념↔외부), 물리적 독립성(개념↔내부)을 제공해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>스키마 vs 인스턴스</b></td><td style="text-align:left;vertical-align:middle">스키마: DB의 구조 정의(변하지 않음). 인스턴스: 현재 저장된 실제 데이터(변함).</td></tr></table></div></div>` },

  { id:'20_3_14', year:'2020', round:'3회', cat:'SW 개발/계획',
    qHtml:`<div class="q-text">아래는 UI 설계 원칙의 4가지 특성이다. 빈칸에 들어갈 특성을 쓰시오.<br><br><div class="tbl-wrap"><table class="db-table"><tr><th>특성</th><th>설명</th></tr><tr><td>직관성</td><td>누구나 쉽게 이해하고 사용할 수 있어야 한다</td></tr><tr><td>학습성</td><td>누구나 쉽게 배우고 익힐 수 있어야 한다</td></tr><tr><td>유연성</td><td>사용자의 요구사항을 최대한 수용하며 오류를 최소화해야 한다</td></tr><tr class="info-row"><td>( ? )</td><td>사용자의 목적을 정확하고 완벽하게 달성할 수 있도록 제작해야 한다</td></tr></table></div>`,
    ansHtml:`<div class="answer-val">유효성 (Effectiveness)</div><div class="keyword-detail">📌 <b>풀이</b><br>UI 설계 4원칙 중 <b>유효성(Effectiveness)</b>은 사용자가 원하는 목표를 정확하고 완벽하게 달성할 수 있도록 지원하는 원칙이에요.<br><br>📎 <b>UI 설계 4원칙</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>직관성(Intuitiveness)</b></td><td style="text-align:left;vertical-align:middle">누구나 쉽게 이해하고 사용할 수 있어야 해요. 학습 없이도 사용 가능한 인터페이스를 설계해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>유효성(Effectiveness)</b></td><td style="text-align:left;vertical-align:middle">사용자가 원하는 목표를 정확하고 완벽하게 달성할 수 있어야 해요. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>학습성(Learnability)</b></td><td style="text-align:left;vertical-align:middle">누구나 쉽게 배우고 익힐 수 있어야 해요. 일관된 패턴·규칙으로 학습 비용을 낮춰요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>유연성(Flexibility)</b></td><td style="text-align:left;vertical-align:middle">다양한 사용자·상황에 맞게 조절할 수 있어야 해요. 단축키·커스터마이징 기능 제공이 예시예요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>오류 방지와 복구</b></td><td style="text-align:left;vertical-align:middle">좋은 UI는 사용자 실수를 방지하고, 실수 시 쉽게 복구할 수 있도록 해요.</td></tr><tr><td colspan="2" style="color:var(--c-text2);font-style:italic;border-top:1px dashed var(--c-border2)">📝 암기법: 직유학유 (직관성·유효성·학습성·유연성)</td></tr></table></div></div>` },

  { id:'20_3_15', year:'2020', round:'3회', cat:'기타 용어',
    qHtml:`<div class="q-text">아래는 기업 내·외부 애플리케이션 통합 솔루션(EAI)의 구축 유형에 대한 설명이다. 빈칸 ①②에 해당하는 유형명을 쓰시오.<br><br><div class="tbl-wrap"><table class="db-table" style="min-width:360px"><tr><th>유형</th><th>설명</th></tr><tr class="info-row"><td>( ① )</td><td>애플리케이션 사이에 미들웨어를 두어 연계하는 방식. 뛰어난 확장성과 대용량 데이터 처리 가능</td></tr><tr class="info-row"><td>( ② )</td><td>그룹 내에서는 허브 앤 스포크 방식을, 그룹 간에는 메시지 버스 방식을 혼용하는 통합 방식</td></tr><tr><td>포인트 투 포인트</td><td>1:1 단순 통합 방법</td></tr><tr><td>허브 앤 스포크</td><td>단일 허브를 통해 데이터를 전송하는 중앙 집중 방식</td></tr></table></div>`,
    ansHtml:`<div class="answer-val">① 메시지 버스 (Message Bus) &nbsp;&nbsp; ② 하이브리드 (Hybrid)</div><div class="keyword-detail">📌 <b>풀이</b><br>EAI(기업 애플리케이션 통합) 구축 유형 4가지 중 <b>메시지 버스</b>는 공유 채널로 느슨하게 연결하고, <b>하이브리드</b>는 Hub&Spoke와 Message Bus를 혼합한 유형이에요.<br><br>📎 <b>EAI 구축 유형 4가지</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Point-to-Point</b></td><td style="text-align:left;vertical-align:middle">애플리케이션 간 1:1로 직접 연결해요. 연결 수 증가 시 관리 복잡.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Hub & Spoke</b></td><td style="text-align:left;vertical-align:middle">중앙 허브를 통해 모든 연결 관리. 허브가 단일 장애점(SPOF).</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>메시지 버스(Message Bus)</b></td><td style="text-align:left;vertical-align:middle">공유 채널(버스)로 느슨하게 연결해요. 확장성 좋고 허브 의존성 없어요. ← <u>정답①</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>하이브리드(Hybrid)</b></td><td style="text-align:left;vertical-align:middle">Hub&Spoke + Message Bus 혼합. 유연성과 중앙 관리를 모두 확보해요. ← <u>정답②</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>ESB (Enterprise Service Bus)</b></td><td style="text-align:left;vertical-align:middle">EAI의 발전형. SOA 지원, 더 유연한 통합 제공.</td></tr></table></div></div>` },

  { id:'20_3_16', year:'2020', round:'3회', cat:'SW 개발/계획',
    qHtml:`<div class="q-text">아래에서 설명하는 프로그래밍 개념의 명칭을 쓰시오.<br><br>· C++ 등 객체지향 언어에서 해당 클래스의 객체가 생성될 때 자동으로 호출되는 특수한 종류의 메서드이다.<br>· 객체의 초기화(멤버 변수 설정 등)를 담당하며, 클래스 이름과 동일한 이름을 가진다.</div>`,
    ansHtml:`<div class="answer-val">생성자 (Constructor)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>생성자(Constructor)</b>는 객체가 생성될 때 자동으로 호출되는 특수한 메서드예요. 클래스 이름과 동일하고, 반환값이 없으며, 객체의 초기화를 담당해요.<br><br>📎 <b>생성자 관련 키워드</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>생성자(Constructor)</b></td><td style="text-align:left;vertical-align:middle">객체 생성 시 자동 호출. 클래스명과 동일. 반환값 없음. 객체 초기화 담당. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>소멸자(Destructor)</b></td><td style="text-align:left;vertical-align:middle">객체가 소멸할 때 자동 호출돼요. C++에서는 ~클래스명() 형태. Java는 GC가 처리해서 명시적 소멸자 없어요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>오버로딩(Overloading)</b></td><td style="text-align:left;vertical-align:middle">같은 이름의 생성자를 매개변수만 다르게 여러 개 정의할 수 있어요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>기본 생성자</b></td><td style="text-align:left;vertical-align:middle">매개변수가 없는 생성자예요. 명시적으로 정의하지 않으면 컴파일러가 자동 생성해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>this() 호출</b></td><td style="text-align:left;vertical-align:middle">생성자 내에서 다른 생성자를 호출해요. 코드 중복을 줄여요.</td></tr></table></div></div>` },

  // ─── 2020년 2회 누락 ───
  { id:'20_2_12', year:'2020', round:'2회', cat:'SW 개발/계획',
    qHtml:`<div class="q-text">소스 코드를 실행하지 않고, 코딩 표준·코딩 스타일·코드 복잡도 및 잠재 결함을 발견하기 위해 사용하는 소프트웨어 분석 도구의 명칭을 쓰시오.</div>`,
    ansHtml:`<div class="answer-val">정적 분석 도구 (Static Analysis Tool)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>정적 분석 도구</b>는 소스 코드를 실행하지 않고 코드 자체를 검사해서 버그·보안 취약점·코딩 규칙 위반을 찾는 도구예요.<br><br>📎 <b>정적 분석 도구 비교</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>SonarQube</b></td><td style="text-align:left;vertical-align:middle">가장 널리 사용되는 오픈소스 정적 분석 플랫폼이에요. 다양한 언어 지원, CI/CD 파이프라인 연동이 가능해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>PMD</b></td><td style="text-align:left;vertical-align:middle">Java 코드의 잠재적 버그·불필요한 코드·복잡한 표현을 찾아줘요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>FindBugs / SpotBugs</b></td><td style="text-align:left;vertical-align:middle">Java 바이트코드를 분석해서 버그 패턴을 찾아줘요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>정적 분석 vs 동적 분석</b></td><td style="text-align:left;vertical-align:middle">정적: 실행 없이 코드 검사, 초기 오류 발견 가능. 동적: 실행하면서 런타임 오류 검사.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>SAST (Static Application Security Testing)</b></td><td style="text-align:left;vertical-align:middle">보안 관점의 정적 분석이에요. SQL Injection·XSS 등 보안 취약점을 코드에서 찾아요.</td></tr></table></div></div>` },

  { id:'20_2_13', year:'2020', round:'2회', cat:'운영체제',
    qHtml:`<div class="q-text">아래에서 설명하는 모바일 운영체제의 명칭을 쓰시오.<br><br>· Linux 운영체제 위에서 구동하는 모바일 운영체제이다.<br>· 휴대폰을 비롯한 휴대용 장치를 위한 OS·미들웨어·UI·표준 애플리케이션을 포함하는 소프트웨어 스택이다.<br>· 개발자가 Java·Kotlin으로 앱을 개발할 수 있으며, 컴파일된 바이트 코드를 구동하는 런타임 라이브러리를 제공한다.</div>`,
    ansHtml:`<div class="answer-val">안드로이드 (Android)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>Android</b>는 Linux 커널 기반의 오픈소스 모바일 운영체제예요. Google이 주도하고 Apache 라이선스로 공개돼 있어요. 스마트폰·태블릿·스마트TV 등 다양한 기기에서 사용해요.<br><br>📎 <b>모바일 OS 비교</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Android</b></td><td style="text-align:left;vertical-align:middle">Linux 기반 오픈소스 모바일 OS. Google 주도. Java·Kotlin으로 앱 개발. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>iOS</b></td><td style="text-align:left;vertical-align:middle">Apple의 모바일 OS. Darwin(Unix 기반) 커널. Swift·Objective-C로 앱 개발. 폐쇄적이지만 보안성이 높아요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Dalvik VM → ART</b></td><td style="text-align:left;vertical-align:middle">안드로이드 초기에는 Dalvik VM을 사용했지만 현재는 ART(Android Runtime)로 교체됐어요. 앱 설치 시 미리 컴파일해서 실행 속도가 빨라요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>안드로이드 앱 구성요소</b></td><td style="text-align:left;vertical-align:middle">Activity(화면), Service(백그라운드), BroadcastReceiver(시스템 알림), ContentProvider(데이터 공유) 4가지예요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>APK (Android Package)</b></td><td style="text-align:left;vertical-align:middle">안드로이드 앱 배포 파일 형식이에요. .apk 확장자를 사용해요.</td></tr></table></div></div>` },

  { id:'20_2_14', year:'2020', round:'2회', cat:'네트워크',
    qHtml:`<div class="q-text">아래에서 설명하는 웹 서비스 프로토콜의 명칭을 쓰시오.<br><br>· HTTP, HTTPS, SMTP를 통해 XML 기반의 데이터를 주고받는 프로토콜이다.<br>· 웹 서비스 방식에서 HTTP 기반으로 사용되어 송수신하며, RESTful 프로토콜로 대체할 수 있다.</div>`,
    ansHtml:`<div class="answer-val">SOAP (Simple Object Access Protocol)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>SOAP</b>는 XML 기반의 메시지 프로토콜이에요. HTTP·HTTPS·SMTP를 통해 전송하고, WSDL로 인터페이스를 기술하며, UDDI로 서비스를 검색해요.<br><br>📎 <b>웹 서비스 기술 비교</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>SOAP</b></td><td style="text-align:left;vertical-align:middle">XML 기반 메시지 프로토콜. HTTP·HTTPS·SMTP로 전송. WSDL로 인터페이스 기술. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>WSDL (Web Services Description Language)</b></td><td style="text-align:left;vertical-align:middle">SOAP 웹 서비스의 인터페이스를 XML로 기술해요. 서비스 위치·메시지 형식·프로토콜을 정의해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>UDDI (Universal Description, Discovery, Integration)</b></td><td style="text-align:left;vertical-align:middle">웹 서비스를 등록·검색하는 디렉토리 서비스예요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>REST vs SOAP</b></td><td style="text-align:left;vertical-align:middle">SOAP: 표준화, 보안 강함, 무겁고 복잡. REST: 가볍고 단순, HTTP 메서드 활용. 현재 REST가 주류예요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>JSON vs XML</b></td><td style="text-align:left;vertical-align:middle">SOAP은 XML만 사용. REST는 JSON·XML·텍스트 등 유연하게 사용해요.</td></tr></table></div></div>` },

  { id:'20_2_15', year:'2020', round:'2회', cat:'SW 개발/계획',
    qHtml:`<div class="q-text">아래는 UI 설계 원칙의 특성이다. 빈칸에 들어갈 특성을 쓰시오.<br><br>· 직관성: 누구나 쉽게 이해하고 사용할 수 있어야 한다<br>· 학습성: 누구나 쉽게 배우고 익힐 수 있어야 한다<br>· 유연성: 사용자의 요구사항을 최대한 수용하며 오류를 최소화해야 한다<br>· ( ? ): 정확하고 완벽하게 사용자의 목표가 달성될 수 있도록 제작되어야 한다</div>`,
    ansHtml:`<div class="answer-val">유효성 (Effectiveness)</div><div class="keyword-detail">📌 <b>풀이</b><br>UI 설계 4원칙 중 <b>유효성(Effectiveness)</b>은 사용자가 정확하고 완벽하게 원하는 목표를 달성할 수 있도록 하는 원칙이에요.<br><br>📎 <b>UI 설계 4원칙</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>직관성(Intuitiveness)</b></td><td style="text-align:left;vertical-align:middle">누구나 쉽게 이해하고 사용할 수 있어야 해요. 학습 없이도 사용 가능한 인터페이스를 설계해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>유효성(Effectiveness)</b></td><td style="text-align:left;vertical-align:middle">사용자가 정확하고 완벽하게 원하는 목표를 달성할 수 있도록 해요. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>학습성(Learnability)</b></td><td style="text-align:left;vertical-align:middle">누구나 쉽게 배우고 익힐 수 있어야 해요. 일관된 패턴·규칙으로 학습 비용을 낮춰요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>유연성(Flexibility)</b></td><td style="text-align:left;vertical-align:middle">다양한 사용자와 상황에 맞게 조절할 수 있어야 해요. 단축키·커스터마이징 기능 제공이 예시예요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>오류 방지와 복구</b></td><td style="text-align:left;vertical-align:middle">좋은 UI는 사용자 실수를 방지하고, 실수 시 쉽게 복구할 수 있도록 해요.</td></tr></table></div></div>` },

  { id:'20_2_16', year:'2020', round:'2회', cat:'기타 용어',
    qHtml:`<div class="q-text">아래에서 설명하는 기술의 명칭을 영문 약자로 쓰시오.<br><br>· Link Data(링크 데이터)와 Open Data(공개 데이터)의 합성어이다.<br>· 전 세계에 공개된 정보를 하나로 묶어 누구나 활용할 수 있도록 연결하는 방식이다.</div>`,
    ansHtml:`<div class="answer-val">LOD (Linked Open Data)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>LOD(링크드 오픈 데이터)</b>는 웹에 공개된 데이터를 URI로 식별하고 RDF 형식으로 연결하는 시맨틱 웹 기술이에요. Link Data(링크 데이터)와 Open Data(공개 데이터)의 합성어예요.<br><br>📎 <b>같이 알아두면 좋은 키워드</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>LOD (Linked Open Data)</b></td><td style="text-align:left;vertical-align:middle">웹에 공개된 데이터를 URI로 식별하고 RDF로 연결해요. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>시맨틱 웹(Semantic Web)</b></td><td style="text-align:left;vertical-align:middle">기계가 이해할 수 있는 의미 있는 웹이에요. LOD가 시맨틱 웹의 핵심 구현 방식이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>RDF (Resource Description Framework)</b></td><td style="text-align:left;vertical-align:middle">자원을 주어-서술어-목적어 트리플로 표현하는 표준이에요. LOD의 기반이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>SPARQL</b></td><td style="text-align:left;vertical-align:middle">RDF 데이터를 쿼리하는 언어예요. SQL과 유사하지만 그래프 구조를 다뤄요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>DBpedia</b></td><td style="text-align:left;vertical-align:middle">Wikipedia를 LOD 형식으로 변환한 대표적인 오픈 데이터 프로젝트예요.</td></tr></table></div></div>` },

  { id:'20_2_17', year:'2020', round:'2회', cat:'데이터베이스',
    qHtml:`<div class="q-text">아래는 데이터 모델링 절차이다. 보기에서 알맞은 단계를 골라 빈칸을 채우시오.<br><br>요구사항 분석 → ( ① ) → ( ② ) → ( ③ )<br><br>[보기] &nbsp; 물리적 데이터 모델링 &nbsp; 개념적 데이터 모델링 &nbsp; 논리적 데이터 모델링</div>`,
    ansHtml:`<div class="answer-val">① 개념적 데이터 모델링 &nbsp;&nbsp; ② 논리적 데이터 모델링 &nbsp;&nbsp; ③ 물리적 데이터 모델링</div><div class="keyword-detail">📌 <b>풀이</b><br>DB 설계 절차에서 요구사항 분석 이후 3단계 모델링이에요. <b>개념적</b>(ERD 작성)→<b>논리적</b>(릴레이션 스키마)→<b>물리적</b>(DBMS 최적화) 순이에요.<br><br>📎 <b>DB 설계 3단계 모델링</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>개념적 데이터 모델링</b></td><td style="text-align:left;vertical-align:middle">현실 세계를 ERD(E-R 다이어그램)로 추상화해요. DBMS에 독립적이에요. ← <u>정답①</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>논리적 데이터 모델링</b></td><td style="text-align:left;vertical-align:middle">ERD를 특정 데이터 모델(관계형)에 맞는 스키마로 변환해요. 정규화를 수행해요. ← <u>정답②</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>물리적 데이터 모델링</b></td><td style="text-align:left;vertical-align:middle">특정 DBMS에 맞게 최적화해요. 인덱스·파티션·테이블스페이스 등을 설계해요. ← <u>정답③</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>ERD (Entity-Relationship Diagram)</b></td><td style="text-align:left;vertical-align:middle">개념적 모델링의 결과물이에요. 개체·속성·관계를 시각적으로 표현해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>정규화</b></td><td style="text-align:left;vertical-align:middle">논리적 모델링에서 수행해요. 1NF→2NF→3NF→BCNF 단계로 이상현상을 제거해요.</td></tr></table></div></div>` },

  // ─── 2023년 1회 누락 ───
  { id:'23_1_11', year:'2023', round:'1회', cat:'네트워크',
    qHtml:`<div class="q-text">아래에서 설명하는 프로토콜의 영문 약자를 쓰시오.<br><br>· TCP/IP에서 IP 패킷을 처리할 때 발생하는 문제를 알려주는 프로토콜이다.<br>· 다른 호스트나 게이트웨이 연결에 문제가 있는지 확인하는 목적으로 주로 사용된다.<br>· 이 프로토콜을 이용한 공격으로 ping 명령을 통해 패킷을 연속으로 보내 서버를 마비시키는 Flooding 공격이 있다.</div>`,
    ansHtml:`<div class="answer-val">ICMP (Internet Control Message Protocol)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>ICMP</b>는 IP 통신 중 발생하는 오류를 알리거나 네트워크 상태를 진단하는 프로토콜이에요. <code>ping</code> 명령이 ICMP를 사용해요. IP의 신뢰성 없는 특성을 보완해요.<br><br>📎 <b>같이 알아두면 좋은 키워드</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>ping 명령</b></td><td style="text-align:left;vertical-align:middle">ICMP Echo Request를 보내고 Echo Reply를 받아 호스트의 생존 여부와 응답 시간을 확인해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>traceroute/tracert</b></td><td style="text-align:left;vertical-align:middle">ICMP를 이용해 목적지까지 거치는 라우터 경로를 추적해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>ICMP Flood 공격</b></td><td style="text-align:left;vertical-align:middle">ICMP 패킷을 대량으로 전송해 네트워크를 마비시키는 DoS 공격이에요. Ping of Death(비정상적으로 큰 ICMP 패킷)도 ICMP 공격이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>스머프 공격(Smurf)</b></td><td style="text-align:left;vertical-align:middle">IP 스푸핑 + ICMP 브로드캐스트를 결합한 증폭 공격이에요. ICMP를 악용한 대표적인 공격이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>IP vs ICMP</b></td><td style="text-align:left;vertical-align:middle">IP: 패킷 전송 담당, 신뢰성 없음. ICMP: IP의 오류 보고·진단 담당. ICMP도 IP 패킷에 캡슐화되어 전송돼요.</td></tr></table></div></div>` },

  { id:'23_1_12', year:'2023', round:'1회', cat:'SW 개발/계획',
    qHtml:`<div class="q-text">아래 제어 흐름 그래프에서 분기 커버리지(Branch Coverage)를 만족하기 위한 테스팅 순서를 두 가지 쓰시오.<br><br><div style="display:flex;justify-content:center;margin:12px 0"><svg viewBox="0 0 400 590" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:340px">
<defs>
  <marker id="arr2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
    <path d="M0,0 L0,6 L8,3 z" fill="#4a7eba"/>
  </marker>
</defs>

<!-- 엣지 스타일 -->
<!-- ① POINTER=FALSE -->
<rect x="115" y="22" width="145" height="38" rx="5" fill="#5b9bd5"/>
<text x="187" y="36" text-anchor="middle" fill="white" font-size="11" font-family="monospace" font-weight="bold">POINTER =</text>
<text x="187" y="51" text-anchor="middle" fill="white" font-size="11" font-family="monospace" font-weight="bold">FALSE</text>
<!-- ① 번호 원: 흰색 원 + 진한 숫자 -->
<circle cx="270" cy="30" r="12" fill="white" stroke="#2e75b6" stroke-width="2"/>
<text x="270" y="35" text-anchor="middle" fill="#1a5fa8" font-size="12" font-weight="bold">1</text>

<!-- ①→② -->
<line x1="187" y1="60" x2="187" y2="92" stroke="#4a7eba" stroke-width="1.8" marker-end="url(#arr2)"/>

<!-- ② X>K? 마름모 -->
<polygon points="187,96 255,128 187,160 119,128" fill="#5b9bd5"/>
<text x="187" y="123" text-anchor="middle" fill="white" font-size="11" font-family="monospace" font-weight="bold">X &gt; K ?</text>
<circle cx="270" cy="105" r="12" fill="white" stroke="#2e75b6" stroke-width="2"/>
<text x="270" y="110" text-anchor="middle" fill="#1a5fa8" font-size="12" font-weight="bold">2</text>

<!-- YES: ②→③ -->
<line x1="255" y1="128" x2="315" y2="128" stroke="#4a7eba" stroke-width="1.8" marker-end="url(#arr2)"/>
<text x="283" y="120" text-anchor="middle" fill="#333" font-size="10">YES</text>

<!-- ③ POINTER=TRUE -->
<rect x="315" y="109" width="72" height="38" rx="5" fill="#5b9bd5"/>
<text x="351" y="124" text-anchor="middle" fill="white" font-size="10" font-family="monospace" font-weight="bold">POINTER</text>
<text x="351" y="139" text-anchor="middle" fill="white" font-size="10" font-family="monospace" font-weight="bold">= TRUE</text>
<circle cx="315" cy="100" r="12" fill="white" stroke="#2e75b6" stroke-width="2"/>
<text x="315" y="105" text-anchor="middle" fill="#1a5fa8" font-size="12" font-weight="bold">3</text>

<!-- ③→② 위로 루프백 -->
<path d="M351,109 L351,80 L255,80 L255,112" stroke="#4a7eba" stroke-width="1.8" fill="none" marker-end="url(#arr2)"/>

<!-- NO: ②→④ -->
<line x1="187" y1="160" x2="187" y2="198" stroke="#4a7eba" stroke-width="1.8" marker-end="url(#arr2)"/>

<!-- ④ X=X+2 -->
<rect x="115" y="200" width="145" height="38" rx="5" fill="#5b9bd5"/>
<text x="187" y="224" text-anchor="middle" fill="white" font-size="11" font-family="monospace" font-weight="bold">X = X + 2</text>
<circle cx="270" cy="208" r="12" fill="white" stroke="#2e75b6" stroke-width="2"/>
<text x="270" y="213" text-anchor="middle" fill="#1a5fa8" font-size="12" font-weight="bold">4</text>

<!-- ④→⑤ -->
<line x1="187" y1="238" x2="187" y2="278" stroke="#4a7eba" stroke-width="1.8" marker-end="url(#arr2)"/>

<!-- ⑤ CALL SUB -->
<rect x="115" y="280" width="145" height="48" rx="5" fill="#5b9bd5"/>
<text x="187" y="300" text-anchor="middle" fill="white" font-size="10" font-family="monospace" font-weight="bold">CALL SUB(X,</text>
<text x="187" y="318" text-anchor="middle" fill="white" font-size="10" font-family="monospace" font-weight="bold">POINTER, RESULT)</text>
<circle cx="270" cy="288" r="12" fill="white" stroke="#2e75b6" stroke-width="2"/>
<text x="270" y="293" text-anchor="middle" fill="#1a5fa8" font-size="12" font-weight="bold">5</text>

<!-- ⑤→⑥ -->
<line x1="187" y1="328" x2="187" y2="368" stroke="#4a7eba" stroke-width="1.8" marker-end="url(#arr2)"/>

<!-- ⑥ RESULT>1? 마름모 -->
<polygon points="187,372 255,404 187,436 119,404" fill="#5b9bd5"/>
<text x="187" y="399" text-anchor="middle" fill="white" font-size="11" font-family="monospace" font-weight="bold">RESULT</text>
<text x="187" y="414" text-anchor="middle" fill="white" font-size="11" font-family="monospace" font-weight="bold">&gt; 1 ?</text>
<circle cx="270" cy="381" r="12" fill="white" stroke="#2e75b6" stroke-width="2"/>
<text x="270" y="386" text-anchor="middle" fill="#1a5fa8" font-size="12" font-weight="bold">6</text>

<!-- NO: ⑥→⑦ -->
<line x1="255" y1="404" x2="315" y2="404" stroke="#4a7eba" stroke-width="1.8" marker-end="url(#arr2)"/>
<text x="283" y="396" text-anchor="middle" fill="#333" font-size="10">NO</text>

<!-- ⑦ PRINT RESULT -->
<rect x="315" y="385" width="72" height="38" rx="5" fill="#5b9bd5"/>
<text x="351" y="400" text-anchor="middle" fill="white" font-size="10" font-family="monospace" font-weight="bold">PRINT</text>
<text x="351" y="415" text-anchor="middle" fill="white" font-size="10" font-family="monospace" font-weight="bold">RESULT</text>
<circle cx="315" cy="376" r="12" fill="white" stroke="#2e75b6" stroke-width="2"/>
<text x="315" y="381" text-anchor="middle" fill="#1a5fa8" font-size="12" font-weight="bold">7</text>

<!-- YES: ⑥→① 왼쪽 루프백 -->
<path d="M119,404 L55,404 L55,41 L113,41" stroke="#4a7eba" stroke-width="1.8" fill="none" marker-end="url(#arr2)"/>
<text x="76" y="470" text-anchor="middle" fill="#333" font-size="10">YES</text>
</svg></div>`,
    ansHtml:`<div class="answer-val">경로1: 1→2→3→4→5→6→1 &nbsp;&nbsp; 경로2: 1→2→4→5→6→7</div><div class="keyword-detail">📌 <b>풀이</b><br>분기 커버리지는 제어 흐름도의 모든 분기(참/거짓)를 최소 1번씩 통과해야 해요. 분기점 ②(X&gt;K?)와 ⑥(RESULT&gt;1?)의 T/F 4가지를 모두 통과해야 해요.<br><br>📎 <b>커버리지 종류 비교 (약→강)</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>문장(Statement) 커버리지</b></td><td style="text-align:left;vertical-align:middle">모든 실행 가능한 코드 줄을 최소 1번 실행하면 충족돼요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>결정(Decision)/분기(Branch) 커버리지</b></td><td style="text-align:left;vertical-align:middle">각 결정문의 T/F를 각각 최소 1번씩 실행해야 해요. ← <u>이번 문제</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>조건(Condition) 커버리지</b></td><td style="text-align:left;vertical-align:middle">결정문 안의 개별 조건식 각각이 T/F를 최소 1번씩 가져야 해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>MC/DC</b></td><td style="text-align:left;vertical-align:middle">각 조건이 독립적으로 전체 결정에 영향을 미치는 경우만 선별해요. 항공·자동차 안전 시스템 필수예요.</td></tr><tr><td colspan="2" style="color:var(--c-text2);font-style:italic;border-top:1px dashed var(--c-border2)">📝 강도 순서: 문장 &lt; 분기 &lt; 조건 &lt; 조건/결정 &lt; 다중 조건 &lt; MC/DC</td></tr></table></div></div>` },

  { id:'23_1_13', year:'2023', round:'1회', cat:'데이터베이스',
    qHtml:`<div class="q-text">아래에서 설명하는 데이터 모델링 기법의 명칭을 쓰시오.<br><br>· 정규화된 엔티티·속성·관계에 대해 성능 향상과 개발·운영의 단순화를 위해 중복·통합·분리 등을 수행하는 기법이다.<br>· 조회 성능은 향상되나, 데이터 중복으로 무결성 위험이 증가할 수 있다.</div>`,
    ansHtml:`<div class="answer-val">비정규화 (De-Normalization) 또는 반정규화</div><div class="keyword-detail">📌 <b>풀이</b><br><b>비정규화(반정규화)</b>는 정규화된 DB를 성능 향상을 위해 의도적으로 역행시키는 기법이에요. JOIN 횟수를 줄여 조회 속도를 높이지만, 중복 데이터로 인한 이상현상이 발생할 수 있어요.<br><br>📎 <b>같이 알아두면 좋은 키워드</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>비정규화 기법</b></td><td style="text-align:left;vertical-align:middle">테이블 병합(조인 감소), 테이블 분할(행·열 기준), 중복 컬럼 추가, 파생 컬럼(미리 계산된 값) 추가, 중복 테이블 추가 등이 있어요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>정규화와의 트레이드오프</b></td><td style="text-align:left;vertical-align:middle">정규화: 중복 제거·일관성 유지, 조회 시 JOIN 많음. 반정규화: 중복 허용, 조회 빠름·갱신 시 이상 발생 가능.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>이상현상(Anomaly)</b></td><td style="text-align:left;vertical-align:middle">삽입 이상(불필요한 데이터 강제 삽입), 삭제 이상(원치 않는 데이터 삭제), 갱신 이상(일부만 수정되어 불일치 발생) 3가지예요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>OLTP vs OLAP</b></td><td style="text-align:left;vertical-align:middle">OLTP(트랜잭션 처리): 정규화 중시. OLAP(분석 처리): 반정규화로 조회 성능 최적화해요.</td></tr></table></div></div>` },

  // ─── 2022년 3회 누락 ───
  { id:'22_3_11', year:'2022', round:'3회', cat:'SW 개발/계획',
    qHtml:`<div class="q-text">아래 표를 확인하여 해당하는 테스트 기법을 보기에서 고르시오.<br><br><div class="tbl-wrap"><table class="db-table" style="min-width:360px"><tr><th>입력 구간</th><th>테스트 케이스 (경계 포함)</th></tr><tr><td>구간 A (0~10)</td><td>-1, 0, 1, 9, 10, 11</td></tr><tr><td>구간 B (11~20)</td><td>10, 11, 12, 19, 20, 21</td></tr></table></div><div class="q-text" style="margin-top:8px">· 입력 조건의 중간값보다 경계값에서 오류가 발생될 확률이 높다는 점을 이용하여 경계값을 테스트 케이스로 선정<br>[보기] &nbsp; 동등 분할 테스트 &nbsp; 결정 테이블 테스트 &nbsp; 경곗값 분석 테스트 &nbsp; 분류 트리 테스트 &nbsp; 상태 전이 테스트 &nbsp; 오류 예측 테스트 &nbsp; 유스케이스 테스트</div>`,
    ansHtml:`<div class="answer-val">경계값 분석 테스트 (Boundary Value Analysis)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>경계값 분석</b>은 입력 구간의 경계 부근에서 오류가 많이 발생한다는 경험에 기반한 블랙박스 테스트 기법이에요. 각 구간의 최솟값-1, 최솟값, 최솟값+1, 최댓값-1, 최댓값, 최댓값+1을 테스트해요.<br><br>📎 <b>같이 알아두면 좋은 키워드</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>경계값 분석(Boundary Value Analysis)</b></td><td style="text-align:left;vertical-align:middle">입력 구간 경계(최솟값-1, 최솟값, 최솟값+1 등)를 집중 테스트해요. 오류가 경계 부근에서 많이 발생해요. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>동치 분할(Equivalence Partitioning)</b></td><td style="text-align:left;vertical-align:middle">유사한 결과를 내는 입력을 그룹으로 나눠 대표값만 테스트해요. 경계값 분석의 보완 기법이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>2-point vs 3-point 경계값</b></td><td style="text-align:left;vertical-align:middle">2-point: 최솟값·최댓값만 테스트. 3-point: 최솟값-1·최솟값·최솟값+1 등 3개씩 테스트.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>블랙박스 vs 화이트박스</b></td><td style="text-align:left;vertical-align:middle">블랙박스: 내부 구조 모르고 입출력 명세 기반. 경계값 분석은 블랙박스 기법.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>오류 예측(Error Guessing)</b></td><td style="text-align:left;vertical-align:middle">경험과 직관으로 오류 발생 가능 부분을 테스트해요. 경계값 분석과 함께 자주 사용해요.</td></tr></table></div></div>` },

  { id:'22_3_12', year:'2022', round:'3회', cat:'정보보안',
    qHtml:`<div class="q-text">아래에서 설명하는 두 가지 보안 기술의 명칭을 각각 쓰시오.<br><br>(1) 프로세서(Processor) 내부에 독립적인 보안 구역을 별도로 두어 중요한 정보를 보호하는 ARM사에서 개발한 하드웨어 기반의 보안 기술<br><br>(2) 사용자들이 사이트에 접속할 때 주소를 잘못 입력하거나 철자를 빠뜨리는 실수를 이용하기 위해 유사한 유명 도메인을 미리 등록하는 행위로, URL 하이재킹(URL Hijacking)이라고도 함</div>`,
    ansHtml:`<div class="answer-val">(1) Trustzone &nbsp;&nbsp; (2) 타이포스쿼팅 (Typosquatting)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>Trustzone</b>은 ARM CPU에서 일반 영역(Normal World)과 보안 영역(Secure World)을 하드웨어로 분리해 중요한 데이터를 보호하는 기술이에요. <b>타이포스쿼팅</b>은 URL 오타를 이용한 사이버 공격이에요.<br><br>📎 <b>같이 알아두면 좋은 키워드</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Trustzone</b></td><td style="text-align:left;vertical-align:middle">ARM의 하드웨어 보안 기술이에요. 일반 영역(Normal World)과 보안 영역(Secure World)을 분리해 암호화 키·생체인증 데이터 등을 보호해요. ← <u>정답1</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>TEE (Trusted Execution Environment)</b></td><td style="text-align:left;vertical-align:middle">Trustzone을 기반으로 구현된 보안 실행 환경이에요. 결제, 생체인증, DRM 등에 활용돼요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>타이포스쿼팅(Typosquatting)</b></td><td style="text-align:left;vertical-align:middle">사용자가 URL 입력 시 오타를 이용해 가짜 사이트로 유도하는 공격이에요. gooogle.com, paypa1.com 같은 유사 도메인을 등록해요. ← <u>정답2</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>URL 하이재킹</b></td><td style="text-align:left;vertical-align:middle">타이포스쿼팅의 다른 이름이에요. 유명 브랜드의 유사 도메인으로 피싱 사이트를 만들어요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>도메인 스쿼팅</b></td><td style="text-align:left;vertical-align:middle">상표·브랜드 이름으로 도메인을 먼저 선점해 판매하거나 악용하는 행위예요. 타이포스쿼팅과 유사한 개념이에요.</td></tr></table></div></div>` },

  { id:'22_3_13', year:'2022', round:'3회', cat:'데이터베이스',
    qHtml:`<div class="q-text">아래는 E-R 다이어그램(개체-관계 다이어그램) 기호에 대한 설명이다. 각 설명에 해당하는 항목의 명칭을 쓰시오.<br><br><div class="tbl-wrap"><table class="db-table" style="min-width:360px"><tr><th>기호/관계</th><th>설명</th></tr><tr class="info-row"><td>( ① )</td><td>개체집합-관계집합 연결에 사용하는 선</td></tr><tr class="info-row"><td>( ② )</td><td>개체 집합과의 연결에 사용하는 요소</td></tr><tr class="info-row"><td>( ③ )</td><td>관계집합-관계집합의 속성 연결에 사용하는 선</td></tr><tr class="info-row"><td>( ④ )</td><td>두 개체집합 관계에서 생성되는 값을 저장하는 속성</td></tr><tr class="info-row"><td>( ⑤ )</td><td>같은 속성을 공유하는 개체들의 모임</td></tr></table></div>`,
    ansHtml:`<div class="answer-val">① 실선 &nbsp;&nbsp; ② 관계집합 &nbsp;&nbsp; ③ 점선 &nbsp;&nbsp; ④ 관계집합의 속성 &nbsp;&nbsp; ⑤ 복수값 속성</div><div class="keyword-detail">📌 <b>풀이</b><br>E-R 다이어그램은 개체(Entity), 속성(Attribute), 관계(Relationship)를 기호로 표현해요. 사각형=개체집합, 마름모=관계집합, 타원=속성, 실선=연결, 점선=약한 개체 관련이에요.<br><br>📎 <b>E-R 다이어그램 기호 정리</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>실선(Solid Line)</b></td><td style="text-align:left;vertical-align:middle">개체집합과 관계집합을 연결해요. 참여 관계를 표현해요. ← <u>정답①</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>마름모(관계집합)</b></td><td style="text-align:left;vertical-align:middle">개체 간의 관계를 나타내요. "수강한다", "속한다" 같은 관계예요. ← <u>정답②</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>점선(Dotted Line)</b></td><td style="text-align:left;vertical-align:middle">약한 개체(Weak Entity)와 구분자 속성을 연결하거나 관계집합의 속성을 연결해요. ← <u>정답③</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>관계집합의 속성</b></td><td style="text-align:left;vertical-align:middle">관계 자체가 가지는 속성이에요. "수강" 관계의 "성적" 속성처럼 관계집합에 점선으로 연결돼요. ← <u>정답④</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>복수값 속성(이중 타원)</b></td><td style="text-align:left;vertical-align:middle">여러 값을 가질 수 있는 속성이에요. 전화번호처럼 여러 개를 가질 수 있는 경우 이중 타원으로 표현해요. ← <u>정답⑤</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>사각형 vs 이중 사각형</b></td><td style="text-align:left;vertical-align:middle">사각형=일반 개체집합. 이중 사각형=약한 개체집합(자체 기본키 없고 다른 개체에 의존).</td></tr></table></div></div>` },

  // ─── 2022년 2회 누락 ───
  { id:'22_2_10', year:'2022', round:'2회', cat:'SQL문',
    qHtml:`<div class="q-text">아래 [제품] 테이블에서 H회사의 전체 제품 단가보다 큰 제품을 출력하고자 한다. 괄호 안에 들어갈 알맞은 키워드를 쓰시오.<br><br><div class="tbl-wrap"><div class="tbl-label">[제품] 테이블</div><table class="db-table"><tr><th>제조사</th><th>제품명</th><th>단가</th></tr><tr><td>A</td><td>과자</td><td>1,000</td></tr><tr><td>B</td><td>초콜릿</td><td>6,000</td></tr><tr><td>H</td><td>사탕</td><td>2,000</td></tr><tr><td>C</td><td>아이스크림</td><td>5,000</td></tr><tr><td>H</td><td>사탕</td><td>3,000</td></tr></table></div><div class="sql-box" style="margin-top:12px">SELECT 제조사, 제품명, 단가
FROM 제품
WHERE 단가 > ( ) (SELECT 단가 FROM 제품 WHERE 제조사 = 'H');</div><div class="q-text" style="margin-top:8px">※ H회사 제품이 여러 개이고, 그 중 가장 큰 단가보다 큰 제품을 모두 출력해야 한다.</div>`,
    ansHtml:`<div class="answer-val">ALL</div><div class="keyword-detail">📌 <b>풀이</b><br><code>&gt; ALL(서브쿼리)</code>는 서브쿼리의 <b>모든 결과값보다 크다</b>는 조건이에요. H회사의 전체 제품 단가보다 큰 제품을 찾으려면 모든 H회사 단가보다 커야 하므로 <b>ALL</b>을 사용해요.<br><br>📎 <b>서브쿼리 비교 연산자</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>ALL</b></td><td style="text-align:left;vertical-align:middle">서브쿼리의 모든 결과값과 비교 조건이 모두 참이어야 해요. &gt;ALL은 최댓값보다 크다는 것과 같아요. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>ANY / SOME</b></td><td style="text-align:left;vertical-align:middle">서브쿼리 결과 중 하나라도 비교 조건을 만족하면 참이에요. &gt;ANY는 최솟값보다 크다는 것과 같아요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>IN</b></td><td style="text-align:left;vertical-align:middle">서브쿼리 결과 목록 중 하나와 일치하면 참이에요. = ANY와 동일해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>EXISTS</b></td><td style="text-align:left;vertical-align:middle">서브쿼리 결과가 하나라도 존재하면 참이에요. 대용량 데이터에서 IN보다 효율적일 수 있어요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>&gt;ALL vs &gt;MAX()</b></td><td style="text-align:left;vertical-align:middle"><code>&gt; ALL(서브쿼리)</code>는 <code>&gt; (SELECT MAX(...) ...)</code>와 동일해요. ALL이 더 간결해요.</td></tr></table></div></div>` },

  { id:'22_2_11', year:'2022', round:'2회', cat:'SW 개발/계획',
    qHtml:`<div class="q-text">아래에서 설명하는 객체지향 설계 원칙(SOLID)의 명칭을 쓰시오.<br><br>· 클라이언트가 자신이 이용하지 않는 메서드에 의존하지 않아야 한다는 원칙이다.<br>· 큰 덩어리의 인터페이스를 구체적이고 작은 단위들로 분리시킴으로써 클라이언트들이 꼭 필요한 메서드만 이용할 수 있게 한다.<br>· 예: 복합기의 프린터·복사기·팩스 기능을 하나의 인터페이스로 묶으면, 일부 기능만 변경 시 전체 재컴파일이 필요해지는 문제 발생 → 이 원칙으로 해결</div>`,
    ansHtml:`<div class="answer-val">ISP (Interface Segregation Principle, 인터페이스 분리 원칙)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>ISP(인터페이스 분리 원칙)</b>은 클라이언트가 자신이 사용하지 않는 메서드에 의존하면 안 된다는 원칙이에요. 뚱뚱한 인터페이스를 여러 개의 작은 전용 인터페이스로 분리해야 해요.<br><br>📎 <b>SOLID 5원칙 정리</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>SRP (단일 책임 원칙)</b></td><td style="text-align:left;vertical-align:middle">Single Responsibility Principle. 클래스는 하나의 책임만 가져야 해요. 변경 이유가 하나여야 해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>OCP (개방-폐쇄 원칙)</b></td><td style="text-align:left;vertical-align:middle">Open-Closed Principle. 확장에는 열려 있고, 수정에는 닫혀 있어야 해요. 기존 코드 수정 없이 기능 확장이 가능해야 해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>LSP (리스코프 치환 원칙)</b></td><td style="text-align:left;vertical-align:middle">Liskov Substitution Principle. 서브클래스는 부모 클래스를 대체할 수 있어야 해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>ISP (인터페이스 분리 원칙)</b></td><td style="text-align:left;vertical-align:middle">클라이언트가 사용하지 않는 메서드에 의존하면 안 돼요. 인터페이스를 작게 분리해요. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>DIP (의존 역전 원칙)</b></td><td style="text-align:left;vertical-align:middle">Dependency Inversion Principle. 고수준 모듈이 저수준 모듈에 의존하면 안 돼요. 둘 다 추상화에 의존해야 해요.</td></tr><tr><td colspan="2" style="color:var(--c-text2);font-style:italic;border-top:1px dashed var(--c-border2)">📝 암기법: S-O-L-I-D (솔리드) 각 앞글자</td></tr></table></div></div>` },

  { id:'22_2_12', year:'2022', round:'2회', cat:'네트워크',
    qHtml:`<div class="q-text">아래 조건에서 각 답을 구하시오.<br><br>· IP 주소: 139.127.19.132<br>· 서브넷 마스크: 255.255.255.192<br><br>(1) 네트워크 주소: 139.127.19.( ? ) (10진수 표기)<br>(2) 해당 네트워크에서 네트워크 주소와 브로드캐스트 주소를 제외한 사용 가능한 호스트 개수</div>`,
    ansHtml:`<div class="answer-val">(1) 128 &nbsp;&nbsp; (2) 62개</div><div class="keyword-detail">📌 <b>풀이</b><br>서브넷 마스크 255.255.255.192=/26이에요. 마지막 옥텟 192=11000000, 블록 크기=64. IP 139.127.19.132를 AND 연산하면 마지막 옥텟 132 AND 192=128 → 네트워크 주소 .128. 사용 가능 호스트=64-2=62개예요.<br><br>📎 <b>서브네팅 핵심 공식</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>AND 연산 원리</b></td><td style="text-align:left;vertical-align:middle">IP 주소와 서브넷 마스크를 2진수로 AND 연산하면 네트워크 주소가 나와요. 132=10000100, 192=11000000, AND=10000000=128이에요. ← <u>정답1</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>블록 크기 계산</b></td><td style="text-align:left;vertical-align:middle">256 - 서브넷 마스크 마지막 옥텟 = 256 - 192 = 64. 이 네트워크는 .128~.191(64개 주소)를 가져요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>사용 가능 호스트 수</b></td><td style="text-align:left;vertical-align:middle">블록 크기 - 2 = 64 - 2 = 62개. -2는 네트워크 주소(.128)와 브로드캐스트(.191)를 제외해요. ← <u>정답2</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>CIDR /26 표기</b></td><td style="text-align:left;vertical-align:middle">255.255.255.192 = 26개의 1 = /26이에요. 2^6 = 64개 주소. 6비트가 호스트 부분이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>브로드캐스트 주소</b></td><td style="text-align:left;vertical-align:middle">네트워크 주소 + 블록 크기 - 1 = 128 + 64 - 1 = 191. 즉 139.127.19.191이에요.</td></tr></table></div></div>` },

  { id:'22_2_13', year:'2022', round:'2회', cat:'데이터베이스',
    qHtml:`<div class="q-text">아래 [employee] 테이블에서 πTTL(employee) 연산을 실행한 결과를 작성하시오.<br><br><div class="tbl-wrap"><table class="db-table"><tr><th>이름</th><th>TTL</th><th>부서</th></tr><tr><td>홍길동</td><td>부장</td><td>영업</td></tr><tr><td>이순신</td><td>대리</td><td>개발</td></tr><tr><td>김철수</td><td>과장</td><td>영업</td></tr><tr><td>박영희</td><td>차장</td><td>개발</td></tr><tr><td>최민준</td><td>부장</td><td>인사</td></tr></table></div>`,
    ansHtml:`<div class="answer-val">TTL: 부장 / 대리 / 과장 / 차장</div><div class="keyword-detail">📌 <b>풀이</b><br>π(파이)는 <b>프로젝션(Projection)</b> 연산이에요. πTTL(employee)는 employee 테이블에서 TTL 컬럼만 추출하고 <b>중복을 제거</b>해요. 부장이 2명이어도 결과에는 1번만 나와요. SQL의 SELECT DISTINCT TTL FROM employee와 같아요.<br><br>📎 <b>관계 대수 연산자 정리</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>π(파이) - Project</b></td><td style="text-align:left;vertical-align:middle">지정한 열(속성)만 추출하고 중복을 제거해요. SQL의 SELECT DISTINCT에 해당해요. ← <u>이번 문제</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>σ(시그마) - Select</b></td><td style="text-align:left;vertical-align:middle">조건을 만족하는 행(튜플)만 선택해요. SQL의 WHERE에 해당해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>⋈(보타이) - Join</b></td><td style="text-align:left;vertical-align:middle">두 릴레이션을 공통 속성으로 연결해요. SQL의 JOIN에 해당해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>÷(나누기) - Division</b></td><td style="text-align:left;vertical-align:middle">S의 모든 튜플과 쌍이 이루어지는 R의 튜플만 추출해요. "모든 과목을 수강한 학생" 같은 조건에 사용해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>중복 제거 시점</b></td><td style="text-align:left;vertical-align:middle">π 연산은 자동으로 중복 제거를 수행해요. 부장이 2명이어도 결과는 "부장" 1행만 나와요.</td></tr></table></div></div>` },

  // ─── 2022년 1회 누락 ───
  { id:'22_1_10', year:'2022', round:'1회', cat:'기타 용어',
    qHtml:`<div class="q-text">아래는 Python 리스트 메서드에 대한 설명이다. 각 설명에 해당하는 메서드명을 쓰시오.<br><br>1. 모든 항목을 하나의 요소로 추가하는 메서드 (iterable의 각 항목을 개별 추가)<br>2. 리스트 내부 요소를 꺼내 반환하고, 해당 요소를 리스트에서 삭제하는 메서드<br>3. 리스트 내부 요소의 순서를 뒤집는 메서드</div>`,
    ansHtml:`<div class="answer-val">1. extend &nbsp;&nbsp; 2. pop &nbsp;&nbsp; 3. reverse</div><div class="keyword-detail">📌 <b>풀이</b><br>Python 리스트 메서드는 리스트를 직접 수정(in-place)해요. <b>extend</b>는 여러 요소를 한꺼번에 추가, <b>pop</b>은 지정 위치 요소를 꺼내면서 삭제, <b>reverse</b>는 순서를 뒤집어요.<br><br>📎 <b>Python 리스트 주요 메서드</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>extend(iterable)</b></td><td style="text-align:left;vertical-align:middle">이터러블(리스트, 튜플 등)의 모든 요소를 리스트 끝에 추가해요. <code>a.extend([4,5])</code> ← <u>정답1</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>pop(index=-1)</b></td><td style="text-align:left;vertical-align:middle">지정 인덱스의 요소를 꺼내고(반환) 리스트에서 제거해요. 인덱스 생략 시 마지막 요소를 꺼내요. ← <u>정답2</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>reverse()</b></td><td style="text-align:left;vertical-align:middle">리스트의 순서를 제자리에서 뒤집어요. 새 리스트를 반환하지 않아요(in-place). ← <u>정답3</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>append(item)</b></td><td style="text-align:left;vertical-align:middle">요소 하나를 리스트 끝에 추가해요. extend와 달리 리스트를 넣으면 리스트 자체가 원소로 들어가요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>sort() vs sorted()</b></td><td style="text-align:left;vertical-align:middle">sort()는 원본 리스트를 정렬(in-place, 반환값 None). sorted()는 정렬된 새 리스트를 반환해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>remove(value)</b></td><td style="text-align:left;vertical-align:middle">첫 번째로 나타나는 해당 값을 삭제해요. pop()은 인덱스로, remove()는 값으로 삭제해요.</td></tr></table></div></div>` },

  { id:'22_1_11', year:'2022', round:'1회', cat:'정보보안',
    qHtml:`<div class="q-text">아래에서 설명하는 암호화 프로토콜의 영문 약자를 쓰시오.<br><br>· 임시 키 무결성 프로토콜(Temporal Key Integrity Protocol)의 약자이다.<br>· WEP의 취약점을 보완하기 위해 개발된 무선 LAN 보안 프로토콜로, 매 패킷마다 새로운 암호화 키를 동적으로 생성한다.</div>`,
    ansHtml:`<div class="answer-val">TKIP (Temporal Key Integrity Protocol)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>TKIP</b>는 기존 WEP의 보안 취약점을 보완하기 위해 도입된 무선 보안 프로토콜이에요. 패킷마다 키를 동적으로 변경해서 WEP의 고정 키 문제를 해결했어요. 현재는 AES 기반의 CCMP로 대체됐어요.<br><br>📎 <b>무선 보안 프로토콜 비교</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>WEP (Wired Equivalent Privacy)</b></td><td style="text-align:left;vertical-align:middle">최초의 무선 보안 표준이에요. RC4 알고리즘과 고정 키를 사용해서 현재는 매우 취약해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>TKIP (Temporal Key Integrity Protocol)</b></td><td style="text-align:left;vertical-align:middle">WEP를 대체하기 위해 IEEE 802.11i에서 도입했어요. 패킷마다 키를 동적으로 변경해요. WPA에서 사용했지만 지금은 취약하여 권장하지 않아요. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>CCMP (Counter Mode CBC-MAC Protocol)</b></td><td style="text-align:left;vertical-align:middle">AES 암호화 기반의 무선 보안 프로토콜이에요. TKIP보다 훨씬 안전하고 WPA2에서 사용해요. 현재 표준이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>WPA / WPA2 / WPA3</b></td><td style="text-align:left;vertical-align:middle">WPA: TKIP 사용. WPA2: CCMP/AES 사용 (현재 주력). WPA3: WPA2를 개선한 최신 표준.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>IEEE 802.11i</b></td><td style="text-align:left;vertical-align:middle">무선 LAN 보안 표준이에요. TKIP과 CCMP를 정의했어요.</td></tr></table></div></div>` },

  { id:'22_1_12', year:'2022', round:'1회', cat:'기타 용어',
    qHtml:`<div class="q-text">아래에서 설명하는 기술의 영문 약자를 쓰시오.<br><br>· 키보드나 마우스와 같은 장치 없이 말·행동·감정과 같은 인간의 자연스러운 표현으로 컴퓨터나 장치를 제어할 수 있는 환경 또는 인터페이스이다.</div>`,

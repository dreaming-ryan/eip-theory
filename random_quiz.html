    ansHtml:`<div class="answer-val">L2TP (Layer 2 Tunneling Protocol)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>L2TP</b>는 2계층(데이터링크)에서 VPN 터널을 만드는 프로토콜이에요. MS의 PPTP와 Cisco의 L2F를 결합해서 만들었어요. 자체 암호화 기능이 없어서 IPSec과 함께 사용해요(L2TP/IPSec).<br><br>📎 <b>VPN 프로토콜 계층별 비교</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>L2TP (2계층)</b></td><td style="text-align:left;vertical-align:middle">PPTP(MS)+L2F(Cisco) 결합. 자체 암호화 없어서 IPSec과 함께 사용해요. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>PPTP (2계층)</b></td><td style="text-align:left;vertical-align:middle">Microsoft가 개발한 VPN 프로토콜이에요. 현재는 보안 취약점이 발견되어 사용을 권장하지 않아요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>IPSec (3계층)</b></td><td style="text-align:left;vertical-align:middle">네트워크 계층에서 IP 패킷 자체를 암호화·인증해요. 기업 VPN에 주로 사용해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>SSL/TLS VPN (응용 계층)</b></td><td style="text-align:left;vertical-align:middle">웹 브라우저로 접근 가능한 VPN이에요. 원격 근무 환경에 편리해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>터널링(Tunneling)</b></td><td style="text-align:left;vertical-align:middle">데이터를 캡슐화해서 보호된 통로로 전송하는 기법이에요. VPN의 핵심 기술이에요.</td></tr></table></div></div>` },
  { id:'23_1_4', year:'2023', round:'1회', cat:'정보보안',
    qHtml:`<div class="q-text">아래 표의 악성 소프트웨어 유형에 해당하는 명칭을 각각 쓰시오.<br><br><div class="tbl-wrap"><table class="db-table" style="min-width:360px"><tr><th>구분</th><th>내용</th></tr><tr><td class="info-row">( ① )</td><td>감염된 시스템에서 스스로 복제하여 네트워크를 통해 다른 시스템으로 전파. 독자적으로 실행되며 다른 프로그램 불필요.</td></tr><tr><td class="info-row">( ② )</td><td>정상 프로그램으로 위장하여 백도어를 생성하거나 시스템을 파괴. 스스로 복제하는 능력은 없음.</td></tr><tr><td class="info-row">( ③ )</td><td>정상 파일에 기생하며 실행. 감염시킬 대상 파일이 없으면 동작하지 않으며 네트워크 전파 기능 없음.</td></tr></table></div>`,
    ansHtml:`<div class="answer-val">① 웜(Worm) &nbsp;&nbsp; ② 트로이 목마(Trojan Horse) &nbsp;&nbsp; ③ 바이러스(Virus)</div><div class="keyword-detail">📌 <b>풀이</b><br>악성 소프트웨어 3종 구별 핵심은 <b>독립성</b>이에요. <b>웜</b>은 혼자 네트워크로 전파(독립), <b>트로이 목마</b>는 정상 프로그램으로 위장(복제 없음), <b>바이러스</b>는 다른 파일에 기생(숙주 필요)해요.<br><br>📎 <b>악성 소프트웨어 종류 비교</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>웜(Worm)</b></td><td style="text-align:left;vertical-align:middle">독립 실행. 숙주 없이 네트워크를 통해 스스로 복제·전파해요. 빠른 전파 속도가 특징이에요. ← <u>정답①</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>트로이 목마</b></td><td style="text-align:left;vertical-align:middle">정상 프로그램(게임·유틸리티)으로 위장해 설치를 유도해요. 설치 후 백도어 생성·정보 탈취를 수행해요. 자가 복제 능력은 없어요. ← <u>정답②</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>바이러스(Virus)</b></td><td style="text-align:left;vertical-align:middle">다른 파일에 기생해요. 감염된 파일이 실행될 때 함께 실행되어 다른 파일로 감염을 퍼뜨려요. ← <u>정답③</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>랜섬웨어</b></td><td style="text-align:left;vertical-align:middle">파일을 암호화한 후 금전을 요구해요. 2017년 WannaCry가 대표적이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>스파이웨어</b></td><td style="text-align:left;vertical-align:middle">사용자 정보(키보드 입력, 브라우저 이력 등)를 몰래 수집·전송해요.</td></tr></table></div></div>` },
  { id:'23_1_5', year:'2023', round:'1회', cat:'정보보안',
    qHtml:`<div class="q-text">아래에서 설명하는 보안 프로토콜의 명칭을 쓰시오.<br><br>· 원격 시스템에 로그인하거나 명령을 실행하고 파일을 복사할 수 있도록 해주는 응용 프로토콜이다.<br>· rsh, rcp, rlogin, telnet, ftp 등의 보안 접속을 제공하며 IP 스푸핑 방지 기능도 포함된다.<br>· 기본 포트는 22번이다.</div>`,
    ansHtml:`<div class="answer-val">SSH (Secure Shell)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>SSH</b>는 Telnet의 보안 취약점을 해결한 원격 접속 프로토콜이에요. 모든 통신 내용을 암호화하고 공개키 기반으로 인증해요. 기본 포트는 22번이에요.<br><br>📎 <b>원격 접속 프로토콜 비교</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Telnet</b></td><td style="text-align:left;vertical-align:middle">포트 23번. 텍스트 기반 원격 접속. 데이터가 평문으로 전송되어 도청 위험이 있어요. 현재는 SSH로 대체됐어요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>SSH (Secure Shell)</b></td><td style="text-align:left;vertical-align:middle">포트 22번. 암호화 + 공개키 인증. Telnet의 보안 대안이에요. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>공개키 인증</b></td><td style="text-align:left;vertical-align:middle">클라이언트는 개인키, 서버에는 공개키를 등록해요. 비밀번호 없이 키 파일로 로그인해요. 비밀번호 인증보다 안전해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>SCP / SFTP</b></td><td style="text-align:left;vertical-align:middle">SSH 기반 파일 전송 프로토콜이에요. SCP는 파일 복사, SFTP는 FTP의 보안 버전이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>SSH 터널링</b></td><td style="text-align:left;vertical-align:middle">SSH를 이용해 다른 프로토콜의 통신도 암호화된 터널로 전송하는 기법이에요.</td></tr></table></div></div>` },
  { id:'23_1_6', year:'2023', round:'1회', cat:'SW 개발/계획',
    qHtml:`<div class="q-text">아래는 디자인 패턴에 대한 설명이다. 해당하는 패턴의 명칭을 쓰시오.<br><br>· 실제 객체 호출 시 행위를 중간에 가로채서 다른 동작을 수행하는 대리 객체를 사용하는 패턴이다.<br>· 객체를 정교하게 제어해야 하거나 객체 참조가 필요한 경우 사용한다.<br>· 분리된 객체를 위임하여 대리 작업을 중간에 삽입하거나, 객체의 실행 시점을 관리하는 데 활용된다.</div>`,
    ansHtml:`<div class="answer-val">Proxy (프록시) 패턴</div><div class="keyword-detail">📌 <b>풀이</b><br><b>Proxy 패턴</b>은 실제 객체 앞에 대리 객체(Proxy)를 두는 패턴이에요. 연예인 매니저처럼 모든 요청을 먼저 받아서 접근 제어·캐싱·로깅 등을 처리한 뒤 실제 객체에 전달해요.<br><br>📎 <b>Proxy 패턴 유형 상세</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>가상(Virtual) Proxy</b></td><td style="text-align:left;vertical-align:middle">생성 비용이 큰 객체의 생성을 실제 필요할 때까지 지연해요(Lazy Loading). 고해상도 이미지를 처음에는 썸네일로 보여주는 것이 예시예요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>보호(Protection) Proxy</b></td><td style="text-align:left;vertical-align:middle">사용자의 권한에 따라 실제 객체에 대한 접근을 허용하거나 차단해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>원격(Remote) Proxy</b></td><td style="text-align:left;vertical-align:middle">원격 서버에 있는 객체를 로컬처럼 사용할 수 있게 해줘요. RPC 구현에 사용해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>캐싱(Caching) Proxy</b></td><td style="text-align:left;vertical-align:middle">동일한 요청 결과를 캐시에 저장해두고 반복 요청 시 빠르게 응답해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>GoF 구조 패턴 7가지</b></td><td style="text-align:left;vertical-align:middle">Adapter·Bridge·Composite·Decorator·Facade·Flyweight·Proxy이에요.</td></tr></table></div></div>` },
  { id:'23_1_7', year:'2023', round:'1회', cat:'데이터베이스',
    qHtml:`<div class="q-text">아래는 데이터베이스 기본 개념에 대한 설명이다. 각 설명에 해당하는 용어를 쓰시오.<br><br><div class="tbl-wrap"><table class="db-table" style="min-width:360px"><tr><th>구분</th><th>내용</th></tr><tr><td class="info-row">( ① )</td><td>셀 수 있는 수량의 순서 있는 열거로, 테이블의 행(Row)을 의미하며 중복이 허용될 수 있음</td></tr><tr><td class="info-row">( ② )</td><td>어느 한 시점의 릴레이션 내용(상태), 즉 저장된 데이터 전체</td></tr><tr><td class="info-row">( ③ )</td><td>특정 데이터 집합의 유니크한 값의 개수로, 전체 행에 대한 특정 컬럼의 중복 수치를 나타냄</td></tr></table></div>`,
    ansHtml:`<div class="answer-val">① 튜플(Tuple) &nbsp;&nbsp; ② 릴레이션 인스턴스 &nbsp;&nbsp; ③ 카디널리티(Cardinality)</div><div class="keyword-detail">📌 <b>풀이</b><br>DB 용어 실생활 비유: 학생 명단에서 학생 한 명의 정보 한 줄이 <b>튜플</b>, 지금 이 순간 테이블에 담긴 전체 데이터가 <b>릴레이션 인스턴스</b>, 학생 수(행 수)가 <b>카디널리티</b>예요.<br><br>📎 <b>DB 기본 용어 정리</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>튜플(Tuple)</b></td><td style="text-align:left;vertical-align:middle">셀 수 있는 순서 있는 열거로, 테이블의 한 행(Row)이에요. 레코드(Record)라고도 해요. ← <u>정답①</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>릴레이션 인스턴스</b></td><td style="text-align:left;vertical-align:middle">특정 시점에 릴레이션에 실제로 저장된 튜플들의 집합이에요. 스키마(구조)는 변하지 않아도 인스턴스(데이터)는 계속 변해요. ← <u>정답②</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>카디널리티(Cardinality)</b></td><td style="text-align:left;vertical-align:middle">릴레이션에 포함된 튜플(행)의 개수예요. ← <u>정답③</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>차수(Degree)</b></td><td style="text-align:left;vertical-align:middle">릴레이션에 포함된 속성(열)의 개수예요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>스키마 vs 인스턴스</b></td><td style="text-align:left;vertical-align:middle">스키마: 테이블의 구조 정의(변하지 않음). 인스턴스: 현재 저장된 실제 데이터(변함).</td></tr></table></div></div>` },
  { id:'23_1_8', year:'2023', round:'1회', cat:'SQL문',
    qHtml:`<div class="q-text">[학생] 테이블에서 이름이 '민수'인 튜플을 삭제하는 SQL 문을 작성하시오. (문자열은 작은따옴표 사용)<br><br><div class="tbl-wrap"><table class="db-table"><tr><th>학번</th><th>이름</th><th>학과</th></tr><tr><td>20230001</td><td>민수</td><td>컴퓨터공학</td></tr><tr><td>20230002</td><td>영희</td><td>정보통신</td></tr></table></div>`,
    ansHtml:`<div class="answer-val">DELETE FROM 학생 WHERE 이름 = '민수';</div><div class="keyword-detail">📌 <b>풀이</b><br><b>DELETE</b>는 조건에 맞는 행을 삭제하는 DML 명령어예요. WHERE 절로 삭제 조건을 지정해요. 문자열은 작은따옴표로 감싸요. WHERE 절이 없으면 전체 행이 삭제되니 주의해요.<br><br>📎 <b>데이터 삭제 관련 SQL 비교</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>DELETE FROM...WHERE</b></td><td style="text-align:left;vertical-align:middle">DML 명령어예요. 조건 행만 삭제하고 롤백(ROLLBACK)이 가능해요. ← <u>이번 문제</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>TRUNCATE TABLE</b></td><td style="text-align:left;vertical-align:middle">DDL 명령어예요. 테이블의 전체 행을 삭제하고 롤백 불가해요. DELETE보다 빠르지만 WHERE 조건을 사용할 수 없어요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>DROP TABLE</b></td><td style="text-align:left;vertical-align:middle">DDL 명령어예요. 테이블 자체(구조+데이터)를 삭제해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>ROLLBACK</b></td><td style="text-align:left;vertical-align:middle">DELETE는 트랜잭션 내에서 실행되므로 COMMIT 전에 ROLLBACK으로 취소할 수 있어요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>문자열 비교</b></td><td style="text-align:left;vertical-align:middle">SQL에서 문자열은 작은따옴표('')로 감싸요. 큰따옴표는 컬럼명·테이블명 식별자에 사용해요(DBMS마다 다름).</td></tr></table></div></div>` },
  { id:'23_1_9', year:'2023', round:'1회', cat:'SQL문',
    qHtml:`<div class="q-text">아래 성적 테이블에서 과목별 점수 평균이 90점 이상인 '과목이름', '최소점수', '최대점수'를 검색하는 SQL 문을 완성하시오.<br><br>조건: WHERE 사용 금지 · SELECT절에 별칭 사용 · GROUP BY와 HAVING 필수 · 집계함수 사용<br><br><div class="tbl-wrap"><table class="db-table"><tr><th>과목이름</th><th>학생이름</th><th>점수</th></tr><tr><td>수학</td><td>김철수</td><td>95</td></tr><tr><td>수학</td><td>이영희</td><td>88</td></tr><tr><td>영어</td><td>박민준</td><td>92</td></tr><tr><td>영어</td><td>최수진</td><td>91</td></tr></table></div>`,
    ansHtml:`<div class="answer-val">SELECT 과목이름, MIN(점수) AS 최소점수, MAX(점수) AS 최대점수 FROM 성적 GROUP BY 과목이름 HAVING AVG(점수) &gt;= 90</div><div class="keyword-detail">📌 <b>풀이</b><br>GROUP BY로 과목별 그룹화한 뒤, HAVING으로 그룹 평균이 90점 이상인 그룹만 필터링해요. <b>WHERE</b>는 행 필터, <b>HAVING</b>은 그룹 함수 결과 필터예요.<br><br>📎 <b>GROUP BY / HAVING 관련 키워드</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>GROUP BY</b></td><td style="text-align:left;vertical-align:middle">지정한 컬럼을 기준으로 같은 값끼리 그룹화해요. 집계 함수(COUNT, SUM, AVG, MAX, MIN)와 함께 사용해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>HAVING</b></td><td style="text-align:left;vertical-align:middle">GROUP BY로 그룹화된 결과에 조건을 걸어요. AVG(점수) &gt;= 90처럼 집계 함수 결과를 필터링해요. ← <u>이번 문제 핵심</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>WHERE vs HAVING</b></td><td style="text-align:left;vertical-align:middle">WHERE: GROUP BY 전 개별 행 필터링. HAVING: GROUP BY 후 그룹 결과 필터링. WHERE에는 집계 함수 사용 불가해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>AS (별칭)</b></td><td style="text-align:left;vertical-align:middle">AS 키워드로 컬럼이나 테이블에 별칭(Alias)을 붙여요. 출력 컬럼명을 보기 좋게 만들어요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>집계 함수 NULL 처리</b></td><td style="text-align:left;vertical-align:middle">COUNT(*)는 NULL 포함, COUNT(컬럼)·SUM·AVG·MAX·MIN은 NULL 제외하고 계산해요.</td></tr></table></div></div>` },
  { id:'23_1_10', year:'2023', round:'1회', cat:'데이터베이스',
    qHtml:`<div class="q-text">아래는 데이터베이스 스키마(Schema)의 3가지 유형에 대한 설명이다. 각 설명에 해당하는 스키마 유형을 쓰시오.<br><br><div class="tbl-wrap"><table class="db-table" style="min-width:360px"><tr><th>구분</th><th>내용</th></tr><tr><td class="info-row">( ① ) 스키마</td><td>사용자나 응용 프로그래머 개인의 관점에서 필요한 DB 논리적 구조 정의. 서브 스키마라고도 함. 여러 개 존재 가능.</td></tr><tr><td class="info-row">( ② ) 스키마</td><td>모든 응용 프로그램이 필요로 하는 데이터를 종합한 조직 전체의 DB. 하나만 존재. 개체 간 관계와 제약조건 포함.</td></tr><tr><td class="info-row">( ③ ) 스키마</td><td>물리적 저장장치 관점에서 데이터 저장 방법 기술. 레코드의 물리적 구조, 인덱스 유무 등 포함. 시스템 설계자가 관리.</td></tr></table></div>`,
    ansHtml:`<div class="answer-val">① 외부(External) 스키마 &nbsp;&nbsp; ② 개념(Conceptual) 스키마 &nbsp;&nbsp; ③ 내부(Internal) 스키마</div><div class="keyword-detail">📌 <b>풀이</b><br>DB 스키마는 3단계로 나뉘어요. <b>외부 스키마</b>는 사용자 관점(뷰), <b>개념 스키마</b>는 논리적 전체 구조(전역 스키마), <b>내부 스키마</b>는 물리적 저장 구조예요.<br><br>📎 <b>DB 3단계 스키마 구조</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>외부(External) 스키마</b></td><td style="text-align:left;vertical-align:middle">사용자 관점의 스키마예요. 전체 DB 중 특정 사용자가 보는 부분(뷰, View)이에요. 사용자마다 다른 외부 스키마를 가질 수 있어요. ← <u>정답①</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>개념(Conceptual) 스키마</b></td><td style="text-align:left;vertical-align:middle">조직 전체 관점의 논리적 구조예요. 개체·속성·관계·제약조건을 정의해요. 가장 중심이 되는 스키마예요. ← <u>정답②</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>내부(Internal) 스키마</b></td><td style="text-align:left;vertical-align:middle">물리적 저장 구조예요. 데이터가 실제로 어떻게 저장되는지(파일 구조, 인덱스, 접근 경로 등)를 정의해요. ← <u>정답③</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>데이터 독립성</b></td><td style="text-align:left;vertical-align:middle">3단계 스키마의 목적이에요. 논리적 독립성(개념↔외부), 물리적 독립성(개념↔내부)을 제공해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>뷰(View)</b></td><td style="text-align:left;vertical-align:middle">외부 스키마의 구현체예요. 실제 테이블을 기반으로 만든 가상 테이블이에요.</td></tr></table></div></div>` },

  // ─── 2022년 3회 ───
  { id:'22_3_1', year:'2022', round:'3회', cat:'데이터베이스',
    qHtml:`<div class="q-text">아래는 관계 대수 기호들을 나열한 보기이다. 해당 기호들이 나타내는 연산의 종류를 순서대로 쓰시오. (U, -, ×, π, ⋈ 각각의 의미를 쓰시오.)</div>`,
    ansHtml:`<div class="answer-val">U=합집합, -=차집합, ×=카티션 곱, π=프로젝션, ⋈=조인</div><div class="keyword-detail">📌 <b>풀이</b><br>관계 대수 기호 5개예요. <b>U(합집합)</b>은 두 릴레이션 합치기, <b>-(차집합)</b>은 첫 번째에만 있는 것, <b>×(카티션 곱)</b>은 모든 조합, <b>π(프로젝션)</b>은 열 선택, <b>⋈(조인)</b>은 두 테이블 연결이에요.<br><br>📎 <b>관계 대수 연산자 전체 정리</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>U (합집합, Union)</b></td><td style="text-align:left;vertical-align:middle">두 릴레이션의 모든 튜플을 합치고 중복을 제거해요. SQL의 UNION에 해당해요. 두 릴레이션의 차수(Degree)가 같아야 해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>− (차집합, Difference)</b></td><td style="text-align:left;vertical-align:middle">첫 번째 릴레이션에는 있지만 두 번째에는 없는 튜플만 반환해요. SQL의 EXCEPT/MINUS에 해당해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>× (카티션 곱, Cartesian Product)</b></td><td style="text-align:left;vertical-align:middle">두 릴레이션의 모든 행 조합을 만들어요. R이 m행, S가 n행이면 m×n행이에요. SQL의 CROSS JOIN에 해당해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>π (프로젝션, Projection)</b></td><td style="text-align:left;vertical-align:middle">지정한 열만 추출하고 중복을 제거해요. SQL의 SELECT DISTINCT에 해당해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>⋈ (조인, Join)</b></td><td style="text-align:left;vertical-align:middle">두 릴레이션을 공통 속성으로 연결해요. 세타 조인⊇동등 조인⊇자연 조인 순으로 포함 관계예요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>σ (셀렉트, Select)</b></td><td style="text-align:left;vertical-align:middle">조건을 만족하는 행만 선택해요. SQL의 WHERE에 해당해요.</td></tr></table></div></div>` },
  { id:'22_3_2', year:'2022', round:'3회', cat:'SW 개발/계획',
    qHtml:`<div class="q-text">아래 두 가지 설명에 해당하는 GoF 디자인 패턴을 각각 쓰시오.<br><br>(1) 기능을 처리하는 클래스와 구현을 담당하는 추상 클래스를 구별하는 패턴으로, 추상화와 구현 모두 독립적 변경이 필요할 때 사용한다. 새로운 인터페이스를 정의하여 기존 프로그램의 변경 없이 기능을 확장한다.<br><br>(2) 한 객체의 상태가 변화하면 해당 객체에 연결된 다른 객체들에게 변화된 상태를 자동으로 전달하는 패턴. 일대다 관계를 가지며, 분산 시스템 간 이벤트 발행(Publish)·구독(Subscribe)에 주로 사용된다.</div>`,
    ansHtml:`<div class="answer-val">(1) Bridge 패턴 &nbsp;&nbsp; (2) Observer 패턴</div><div class="keyword-detail">📌 <b>풀이</b><br><b>Bridge</b>는 추상화와 구현을 분리해서 각각 독립적으로 확장할 수 있는 구조 패턴이에요. <b>Observer</b>는 한 객체의 상태 변화를 다수 객체에 자동으로 통지하는 행위 패턴이에요.<br><br>📎 <b>GoF 패턴 상세 비교</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Bridge (구조 패턴)</b></td><td style="text-align:left;vertical-align:middle">추상화(Abstraction)와 구현(Implementation)을 분리해서 각각 독립적으로 확장해요. 플랫폼(Windows/Mac)과 기능(그리기/조작)을 분리하는 것이 예시예요. ← <u>정답1</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Observer (행위 패턴)</b></td><td style="text-align:left;vertical-align:middle">한 객체(Subject)의 상태가 바뀌면 의존하는 모든 객체(Observer)에게 자동으로 알려요. 이벤트 시스템, MVC의 Model-View 관계에 사용해요. ← <u>정답2</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Bridge vs Adapter 차이</b></td><td style="text-align:left;vertical-align:middle">Adapter: 기존 인터페이스를 다른 인터페이스로 변환(기존 코드 재사용). Bridge: 처음부터 추상화와 구현을 분리해서 설계.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Observer의 Pub-Sub 모델</b></td><td style="text-align:left;vertical-align:middle">발행(Publish)-구독(Subscribe) 모델이에요. 느슨한 결합으로 Subject와 Observer가 서로 독립적이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>GoF 3분류</b></td><td style="text-align:left;vertical-align:middle">생성(Creational) 5개, 구조(Structural) 7개, 행위(Behavioral) 11개. Bridge=구조, Observer=행위.</td></tr></table></div></div>` },
  { id:'22_3_3', year:'2022', round:'3회', cat:'네트워크',
    qHtml:`<div class="q-text">첫 번째 네트워크 주소가 192.168.1.0/24일 때, FLSM 방식으로 3개의 서브넷으로 균등 분할하면 두 번째 네트워크의 브로드캐스트 IP 주소는 무엇인지 10진수로 작성하시오.</div>`,
    ansHtml:`<div class="answer-val">192.168.1.127</div><div class="keyword-detail">📌 <b>풀이</b><br>FLSM으로 /24(192.168.1.0)를 3개 서브넷으로 분할하면 각 서브넷이 64개 주소(/26)를 가져요. 1번:.0~.63, 2번:.64~.127, 3번:.128~.191. 2번 서브넷의 마지막 주소(브로드캐스트)가 192.168.1.127이에요.<br><br>📎 <b>서브네팅 계산 상세</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>FLSM (Fixed Length Subnet Mask)</b></td><td style="text-align:left;vertical-align:middle">모든 서브넷에 동일한 크기를 부여해요. /24를 3분할하려면 2^2=4개를 지원하는 /26으로 분할해요. ← <u>이번 문제</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>/26 서브넷 구조</b></td><td style="text-align:left;vertical-align:middle">256÷4=64개 주소씩. 1번:.0~.63, 2번:.64~.127, 3번:.128~.191, 4번:.192~.255예요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>브로드캐스트 주소</b></td><td style="text-align:left;vertical-align:middle">각 서브넷의 마지막 IP 주소예요. 2번 서브넷(.64~.127)의 브로드캐스트는 .127이에요. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>VLSM (Variable Length Subnet Mask)</b></td><td style="text-align:left;vertical-align:middle">서브넷마다 다른 크기를 부여해요. IP 낭비를 줄일 수 있지만 설계가 복잡해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>서브넷 마스크 /26</b></td><td style="text-align:left;vertical-align:middle">255.255.255.192. 마지막 옥텟 192=11000000. 블록 크기=256-192=64예요.</td></tr></table></div></div>` },
  { id:'22_3_4', year:'2022', round:'3회', cat:'정보보안',
    qHtml:`<div class="q-text">아래에서 설명하는 두 가지 보안 개념의 명칭을 각각 쓰시오.<br><br>(1) 기술적 방법이 아닌 사람 간의 기본적인 신뢰를 기반으로 사람을 속여 비밀 정보를 획득하는 기법<br><br>(2) 수집·저장 후 분석이나 특별한 목적으로 활용되지 않는 '죽은' 데이터를 의미하며, 저장 공간만 차지하고 심각한 보안 위험을 초래할 수 있는 데이터</div>`,
    ansHtml:`<div class="answer-val">(1) 사회공학 (Social Engineering) &nbsp;&nbsp; (2) 다크 데이터 (Dark Data)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>사회공학</b>은 기술적 해킹이 아닌 인간의 심리와 신뢰를 악용해서 정보를 탈취하는 공격이에요. <b>다크 데이터</b>는 수집됐지만 분석·활용되지 않고 방치된 데이터예요.<br><br>📎 <b>같이 알아두면 좋은 키워드</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>사회공학(Social Engineering)</b></td><td style="text-align:left;vertical-align:middle">기술적 방법이 아닌 사람 간의 신뢰를 악용해서 비밀 정보를 탈취해요. 피싱·스피어피싱·보이스피싱·사칭 전화 등이 해당해요. ← <u>정답1</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>피싱(Phishing)</b></td><td style="text-align:left;vertical-align:middle">가짜 이메일·웹사이트로 개인정보를 탈취해요. 스피어피싱은 특정 대상을 겨냥한 맞춤형 피싱이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>다크 데이터(Dark Data)</b></td><td style="text-align:left;vertical-align:middle">수집됐지만 분석·활용되지 않고 방치된 데이터예요. 스토리지를 차지하면서 잠재적 가치는 활용 못 해요. ← <u>정답2</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>빅데이터 3V</b></td><td style="text-align:left;vertical-align:middle">Volume(양), Velocity(속도), Variety(다양성). 다크 데이터는 이 중 Volume에 기여하지만 가치(Value)가 없는 상태예요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>프리텍스팅(Pretexting)</b></td><td style="text-align:left;vertical-align:middle">가짜 신분이나 시나리오를 만들어 신뢰를 쌓은 후 정보를 탈취하는 사회공학 기법이에요.</td></tr></table></div></div>` },
  { id:'22_3_5', year:'2022', round:'3회', cat:'정보보안',
    qHtml:`<div class="q-text">아래에서 설명하는 보안 솔루션의 명칭을 영문 약자로 쓰시오.<br><br>· 머신러닝 기술을 이용하여 IT 시스템에서 발생하는 대량의 로그를 통합 관리·분석하여 사전에 위협에 대응하는 보안 솔루션이다.<br>· 서로 다른 기종의 보안 솔루션 로그 및 이벤트를 중앙에서 통합 수집하여 분석하고, 이상 징후를 미리 감지한다.<br>· 이벤트·로그의 이상 패턴을 인식해 잠재적 위협 발생 시 알림 기능을 제공한다.</div>`,
    ansHtml:`<div class="answer-val">SIEM (Security Information and Event Management)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>SIEM(보안 정보 및 이벤트 관리)</b>는 IT 시스템 전체의 보안 로그를 통합 수집·분석해서 위협을 탐지하는 보안 솔루션이에요. 머신러닝으로 비정상 패턴을 실시간으로 탐지해요.<br><br>📎 <b>같이 알아두면 좋은 키워드</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>SIEM</b></td><td style="text-align:left;vertical-align:middle">다양한 시스템에서 발생하는 보안 이벤트 로그를 통합 수집·분석·상관관계 분석으로 위협을 탐지해요. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>ESM (Enterprise Security Management)</b></td><td style="text-align:left;vertical-align:middle">기업 전체의 보안 관리 체계예요. SIEM이 ESM의 핵심 구성 요소예요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>IDS (Intrusion Detection System)</b></td><td style="text-align:left;vertical-align:middle">침입 탐지 시스템. 네트워크 트래픽을 분석해서 공격을 감지해요. IPS는 탐지 + 차단까지 해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>SOC (Security Operations Center)</b></td><td style="text-align:left;vertical-align:middle">보안 운영 센터. 24시간 보안 모니터링을 담당해요. SIEM이 SOC의 핵심 도구예요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>로그 관리(Log Management)</b></td><td style="text-align:left;vertical-align:middle">SIEM의 기본 기능이에요. 다양한 시스템의 로그를 중앙에 수집·보관·분석해요.</td></tr></table></div></div>` },
  { id:'22_3_6', year:'2022', round:'3회', cat:'SW 개발/계획',
    qHtml:`<div class="q-text">아래는 형상관리(Configuration Management) 도구들이다. 보기에서 형상관리 항목에 해당하는 도구를 모두 고르시오.<br><br>[보기] &nbsp; CVS &nbsp; SVN &nbsp; GIT &nbsp; Docker &nbsp; Jenkins &nbsp; Maven &nbsp; Ant</div>`,
    ansHtml:`<div class="answer-val">CVS, SVN, GIT</div><div class="keyword-detail">📌 <b>풀이</b><br>형상 관리(SCM, Software Configuration Management) 도구는 소프트웨어의 변경 이력을 관리하고 버전을 추적해요. CVS(구버전), SVN(중앙집중식), Git(분산식)이 대표적이에요.<br><br>📎 <b>형상 관리 도구 비교</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>CVS (Concurrent Versions System)</b></td><td style="text-align:left;vertical-align:middle">초기 형상 관리 도구예요. 중앙 서버에 코드를 저장해요. 현재는 거의 사용하지 않아요. ← <u>정답1</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>SVN (Subversion)</b></td><td style="text-align:left;vertical-align:middle">중앙 집중식 형상 관리 도구예요. 단일 중앙 서버에서 버전을 관리해요. ← <u>정답2</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Git</b></td><td style="text-align:left;vertical-align:middle">분산식 형상 관리 도구예요. 로컬에도 전체 저장소를 가져요. 브랜치 전략이 강력하고 GitHub/GitLab과 함께 사용해요. ← <u>정답3</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>형상 관리 절차</b></td><td style="text-align:left;vertical-align:middle">형상 식별 → 형상 통제(변경 관리) → 형상 감사(무결성 평가) → 형상 기록(상태 기록) 순이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>CI/CD와 Git</b></td><td style="text-align:left;vertical-align:middle">Git의 커밋·푸시를 트리거로 CI/CD 파이프라인이 자동 빌드·테스트·배포를 수행해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>중앙 집중식 vs 분산식</b></td><td style="text-align:left;vertical-align:middle">중앙 집중식(SVN): 서버가 다운되면 작업 불가. 분산식(Git): 오프라인에서도 로컬 저장소로 작업 가능.</td></tr></table></div></div>` },
  { id:'22_3_7', year:'2022', round:'3회', cat:'SQL문',
    qHtml:`<div class="q-text">아래 STUDENT 테이블에는 컴퓨터과 50명, 전기과 100명, 인터넷과 50명의 정보가 저장되어 있다. 다음 각 SQL 실행 결과의 튜플 수를 작성하시오. (DEPT 컬럼: 학과명)<br><br><div class="sql-box">1) SELECT DEPT FROM STUDENT;
2) SELECT DISTINCT DEPT FROM STUDENT;
3) SELECT COUNT(DISTINCT DEPT) FROM STUDENT WHERE DEPT = '인터넷과';</div>`,
    ansHtml:`<div class="answer-val">1) 200 &nbsp;&nbsp; 2) 3 &nbsp;&nbsp; 3) 1</div><div class="keyword-detail">📌 <b>풀이</b><br>컴퓨터과 50명, 전기과 100명, 인터넷과 50명. <b>1)</b> 전체=200. <b>2)</b> DISTINCT로 중복 학과 제거 → 3개 학과. <b>3)</b> COUNT(DISTINCT 학과) = 3이지만, <code>1=1</code>처럼 집계 결과 전체를 다시 COUNT → 1.<br><br>📎 <b>SQL COUNT 함수 활용</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>COUNT(*)</b></td><td style="text-align:left;vertical-align:middle">전체 행 수를 세요. NULL 포함. 200행 전체. ← <u>정답1: 200</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>COUNT(DISTINCT 학과)</b></td><td style="text-align:left;vertical-align:middle">중복을 제거한 학과 수를 세요. 컴퓨터·전기·인터넷 = 3개. ← <u>정답2: 3</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>COUNT(DISTINCT 학과) 결과를 다시 COUNT</b></td><td style="text-align:left;vertical-align:middle">SELECT COUNT(COUNT(DISTINCT 학과) ...) 형태로 집계 결과를 COUNT하면 행이 1개이므로 1. ← <u>정답3: 1</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>집계 함수 중첩</b></td><td style="text-align:left;vertical-align:middle">SQL에서 집계 함수를 중첩할 때는 서브쿼리를 사용하거나 HAVING 절을 이용해야 해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>GROUP BY와 COUNT</b></td><td style="text-align:left;vertical-align:middle">GROUP BY 학과 후 COUNT(*) 하면 각 학과별 인원수(50, 100, 50)를 얻을 수 있어요.</td></tr></table></div></div>` },
  { id:'22_3_8', year:'2022', round:'3회', cat:'운영체제',
    qHtml:`<div class="q-text">아래 표를 참고하여 각 스케줄링 알고리즘의 명칭을 쓰시오.<br><br><div class="tbl-wrap"><table class="db-table" style="min-width:360px"><tr><th>스케줄링 방식</th><th>설명</th></tr><tr><td class="info-row">( ① )</td><td>CPU 실행 시간이 가장 짧은 프로세스를 먼저 처리 (비선점)</td></tr><tr><td class="info-row">( ② )</td><td>각 프로세스에 일정한 타임 퀀텀을 순환 할당하는 방식</td></tr><tr><td class="info-row">( ③ )</td><td>실행 중 더 짧은 잔여 시간을 가진 프로세스 도착 시 선점</td></tr></table></div>`,
    ansHtml:`<div class="answer-val">① SJF &nbsp;&nbsp; ② RR (Round Robin) &nbsp;&nbsp; ③ SRT</div><div class="keyword-detail">📌 <b>풀이</b><br>CPU 스케줄링 알고리즘 3가지예요. <b>SJF</b>는 실행 시간 최단 우선(비선점), <b>RR</b>은 타임 퀀텀씩 순환(선점, 공평), <b>SRT</b>는 잔여 시간 최단 우선(선점, SJF의 선점형)이에요.<br><br>📎 <b>CPU 스케줄링 알고리즘 비교</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>SJF (Shortest Job First)</b></td><td style="text-align:left;vertical-align:middle">CPU 실행 시간이 가장 짧은 프로세스를 먼저 처리해요. 비선점형으로 평균 대기시간을 최소화해요. 기아(Starvation) 문제 발생 가능. ← <u>정답①</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>RR (Round Robin)</b></td><td style="text-align:left;vertical-align:middle">각 프로세스에 동일한 타임 퀀텀을 주고 순환해요. 선점형으로 기아 없음. 타임 퀀텀 크기가 성능에 중요해요. ← <u>정답②</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>SRT (Shortest Remaining Time)</b></td><td style="text-align:left;vertical-align:middle">SJF의 선점형 버전이에요. 새 프로세스 도착 시 남은 실행 시간이 더 짧으면 교체해요. ← <u>정답③</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>FCFS</b></td><td style="text-align:left;vertical-align:middle">도착 순서대로 처리해요. 비선점형, 가장 단순. 호위 효과(Convoy Effect) 발생 가능.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>HRN</b></td><td style="text-align:left;vertical-align:middle">(대기시간+서비스시간)/서비스시간으로 우선순위 계산. SJF의 기아 문제를 보완해요.</td></tr><tr><td colspan="2" style="color:var(--c-text2);font-style:italic;border-top:1px dashed var(--c-border2)">📝 선점형: RR, SRT, MLQ / 비선점형: FCFS, SJF, HRN</td></tr></table></div></div>` },
  { id:'22_3_9', year:'2022', round:'3회', cat:'SW 개발/계획',
    qHtml:`<div class="q-text">아래는 UML에 관한 설명이다. 괄호 안에 알맞은 답을 쓰시오.<br><br>UML은 통합 모델링 언어로, 시스템을 모델로 표현해 주는 모델링 언어이다. 구성 요소로는 사물, ( ① ), 다이어그램으로 이루어져 있다. 구조 다이어그램 중 ( ② ) 다이어그램은 시스템에서 사용되는 객체 타입과 그들 간의 정적인 관계를 표현한다. 또한 ( ③ )은/는 클래스와 같은 모델 요소가 구현해야 하는 오퍼레이션 세트를 정의하는 모델 요소이다.</div>`,
    ansHtml:`<div class="answer-val">① 관계 &nbsp;&nbsp; ② 클래스 &nbsp;&nbsp; ③ 인터페이스</div><div class="keyword-detail">📌 <b>풀이</b><br>UML의 구성 요소는 <b>사물(Things)</b>, <b>관계(Relationships)</b>, <b>다이어그램(Diagrams)</b> 3가지예요. 클래스·인터페이스·컴포넌트·노드 등은 사물이고, 의존·연관·일반화·실체화는 관계예요.<br><br>📎 <b>UML 구성 요소 3가지</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>사물(Things)</b></td><td style="text-align:left;vertical-align:middle">UML 모델의 기본 구성 요소예요. 구조적 사물(클래스, 인터페이스, 컴포넌트, 노드), 행동 사물(유스케이스, 상호작용), 묶음 사물(패키지), 주해 사물(노트)이 있어요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>관계(Relationships)</b></td><td style="text-align:left;vertical-align:middle">사물 사이의 연결을 표현해요. 의존(Dependency), 연관(Association), 집약·합성, 일반화(Generalization), 실체화(Realization)가 있어요. ← <u>정답①</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>클래스(Class)</b></td><td style="text-align:left;vertical-align:middle">동일한 속성과 행위를 가진 객체들의 집합이에요. UML에서 사각형으로 표현하며 이름·속성·메서드를 가져요. ← <u>정답②</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>인터페이스(Interface)</b></td><td style="text-align:left;vertical-align:middle">구현 없이 행위(메서드 시그니처)만 정의해요. 실체화(Realization) 관계로 클래스와 연결돼요. ← <u>정답③</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>다이어그램(Diagrams)</b></td><td style="text-align:left;vertical-align:middle">사물과 관계를 시각적으로 표현한 것이에요. 구조 다이어그램(클래스, 컴포넌트 등)과 행위 다이어그램(유스케이스, 시퀀스 등)으로 분류해요.</td></tr></table></div></div>` },
  { id:'22_3_10', year:'2022', round:'3회', cat:'정보보안',
    qHtml:`<div class="q-text">아래에서 설명하는 보안 기술의 명칭을 쓰시오.<br><br>여러 개의 사이트에서 한 번의 로그인으로 다른 사이트들을 자동으로 접속·이용하는 방법이다. 하나의 사용자 정보를 기반으로 여러 시스템에 통합 인증을 적용하여, 한 시스템에서 인증하면 타 시스템은 인증 정보를 확인하고 자동 로그인 처리한다.</div>`,
    ansHtml:`<div class="answer-val">SSO (Single Sign-On)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>SSO(싱글 사인온)</b>는 한 번 로그인하면 별도 인증 없이 여러 시스템·서비스에 접근할 수 있는 기술이에요. 회사에서 사내 메일·인사·재무 시스템을 한 번 로그인으로 모두 쓰는 것이 예시예요.<br><br>📎 <b>같이 알아두면 좋은 키워드</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>SSO (Single Sign-On)</b></td><td style="text-align:left;vertical-align:middle">한 번 인증으로 여러 시스템에 접근해요. 동일 조직·도메인 내 통합 인증에 초점이에요. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>OAuth와의 차이</b></td><td style="text-align:left;vertical-align:middle">OAuth는 다른 서비스에 권한(인가)을 위임하는 프로토콜이에요. SSO는 동일 조직 내 여러 시스템에 통합 인증(인증)하는 것이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>SAML (Security Assertion Markup Language)</b></td><td style="text-align:left;vertical-align:middle">XML 기반 SSO 표준이에요. 기업 환경에서 많이 사용해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>LDAP (Lightweight Directory Access Protocol)</b></td><td style="text-align:left;vertical-align:middle">사용자 계정 정보를 중앙에서 관리하는 프로토콜이에요. SSO 구현에 자주 사용해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Kerberos</b></td><td style="text-align:left;vertical-align:middle">티켓 기반 인증 프로토콜이에요. 기업 내 SSO 구현의 대표적인 방식이에요. Windows Active Directory에서 사용해요.</td></tr></table></div></div>` },

  // ─── 2022년 2회 ───
  { id:'22_2_1', year:'2022', round:'2회', cat:'데이터베이스',
    qHtml:`<div class="q-text">아래에서 설명하는 관계 데이터 모델의 용어를 쓰시오.<br><br>· 관계 데이터의 연산을 표현하는 방법으로, 원하는 정보를 계산 수식으로 정의한다.<br>· 수학의 predicate calculus(술어 논리)에 기반을 두고 Codd가 제안하였다.<br>· 원하는 정보가 무엇인지만 정의하는 비절차적 특성을 지니며, 튜플 방식과 도메인 방식이 있다.</div>`,
    ansHtml:`<div class="answer-val">관계해석 (Relational Calculus)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>관계해석</b>은 "무엇을 원하는지(What)"만 기술하는 <b>비절차적</b> 언어예요. 수학의 술어 논리(Predicate Calculus)를 기반으로 해요. SQL이 관계해석을 기반으로 설계됐어요.<br><br>📎 <b>관계해석 vs 관계대수</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>관계해석(Relational Calculus)</b></td><td style="text-align:left;vertical-align:middle">"무엇을 원하는지(What)"를 기술하는 비절차적 언어예요. 수학의 술어 논리 기반. SQL이 이 개념을 구현했어요. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>관계대수(Relational Algebra)</b></td><td style="text-align:left;vertical-align:middle">"어떻게 가져올지(How)"를 기술하는 절차적 언어예요. σ, π, ⋈, ÷ 등의 연산자를 순서대로 적용해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>튜플 관계해석</b></td><td style="text-align:left;vertical-align:middle">튜플 변수를 사용해 조건을 표현해요. {t | P(t)} 형태로 조건 P를 만족하는 튜플 t를 구해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>도메인 관계해석</b></td><td style="text-align:left;vertical-align:middle">도메인 변수를 사용해 조건을 표현해요. 튜플 관계해석보다 세밀한 표현이 가능해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>관계완전성(Relational Completeness)</b></td><td style="text-align:left;vertical-align:middle">관계해석으로 표현 가능한 모든 질의를 관계대수로도 표현할 수 있어요. 두 언어는 표현력이 동등해요.</td></tr></table></div></div>` },
  { id:'22_2_2', year:'2022', round:'2회', cat:'SQL문',
    qHtml:`<div class="q-text">아래 테이블을 참고하여 다음 SQL의 실행 결과를 쓰시오.<br><br><div class="tbl-wrap"><table class="db-table"><tr><th>Index</th><th>col1</th><th>Col2</th></tr><tr><td>1</td><td>2</td><td>Null</td></tr><tr><td>2</td><td>3</td><td>6</td></tr><tr><td>3</td><td>5</td><td>5</td></tr><tr><td>4</td><td>6</td><td>3</td></tr><tr><td>5</td><td>Null</td><td>3</td></tr></table></div><div class="sql-box">SELECT COUNT(col2)
FROM TABLE
WHERE col1 IN (2,3) OR col2 IN (3,5);</div>`,
    ansHtml:`<div class="answer-val">4</div><div class="keyword-detail">📌 <b>풀이</b><br>이 SQL에서 <b>AND가 OR보다 먼저 계산</b>돼요. <code>(col1 IN(2,3)) OR (col2 IN(3,5))</code>로 해석해요. 조건 충족 행은 Index 1(col1=2), 2(col1=3), 3(col1=3,col2=5→col2 조건 충족), 5(col2=3). COUNT(col2)는 NULL인 Index 1행을 제외 → 4예요.<br><br>📎 <b>SQL COUNT와 NULL 처리</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>AND vs OR 우선순위</b></td><td style="text-align:left;vertical-align:middle">AND가 OR보다 먼저 계산돼요. 수학의 ×가 +보다 먼저인 것과 같아요. 헷갈리면 괄호()로 명시해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>IN 연산자</b></td><td style="text-align:left;vertical-align:middle"><code>col1 IN(2,3)</code>은 <code>col1=2 OR col1=3</code>과 동일해요. NULL 값은 IN 연산에서 항상 FALSE로 처리돼요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>COUNT(컬럼) vs COUNT(*)</b></td><td style="text-align:left;vertical-align:middle">COUNT(col2)는 col2가 NULL인 행을 제외하고 세요. COUNT(*)는 NULL 포함 모든 행을 세요. ← <u>이번 문제 핵심</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>NULL과 비교</b></td><td style="text-align:left;vertical-align:middle">NULL = NULL은 TRUE가 아니에요. NULL 여부는 반드시 <code>IS NULL</code> / <code>IS NOT NULL</code>로 확인해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>COALESCE</b></td><td style="text-align:left;vertical-align:middle">NULL을 다른 값으로 대체해요. <code>COALESCE(col2, 0)</code>은 col2가 NULL이면 0으로 대체해요.</td></tr></table></div></div>` },
  { id:'22_2_3', year:'2022', round:'2회', cat:'네트워크',
    qHtml:`<div class="q-text">아래에서 설명하는 네트워크 기술의 3글자 영문 약자를 쓰시오.<br><br>· 인터넷을 통해 디바이스 간 사설 네트워크 연결을 생성하여 퍼블릭 네트워크에서 데이터를 안전하게 전송한다.<br>· 사용자 IP 주소를 마스킹하고 데이터를 암호화하여 수신 권한 없는 사람이 읽을 수 없도록 한다.</div>`,
    ansHtml:`<div class="answer-val">VPN (Virtual Private Network)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>VPN</b>은 공용 인터넷을 마치 개인 전용 회선처럼 사용하는 기술이에요. 암호화된 터널을 만들어 데이터를 안전하게 전송해요. 재택근무 시 회사 내부망에 접속할 때 많이 사용돼요.<br><br>📎 <b>같이 알아두면 좋은 키워드</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>터널링(Tunneling)</b></td><td style="text-align:left;vertical-align:middle">데이터를 캡슐화해서 보호된 통로(터널)로 전송하는 기법이에요. VPN의 핵심 기술이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>IPSec VPN (3계층)</b></td><td style="text-align:left;vertical-align:middle">IP 패킷 자체를 암호화·인증해요. 모든 IP 트래픽을 보호하며 기업 VPN에 주로 사용해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>SSL/TLS VPN (응용 계층)</b></td><td style="text-align:left;vertical-align:middle">웹 브라우저로 접근 가능한 VPN이에요. 별도 클라이언트 없이 사용 가능해서 원격 근무에 편리해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>L2TP (2계층)</b></td><td style="text-align:left;vertical-align:middle">PPTP(MS)+L2F(Cisco) 결합. 자체 암호화 없어서 IPSec과 함께 사용해요(L2TP/IPSec).</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>사설 IP 대역</b></td><td style="text-align:left;vertical-align:middle">10.x.x.x, 172.16~31.x.x, 192.168.x.x가 사설 IP 대역이에요. VPN으로 이 대역에 외부에서 접근해요.</td></tr></table></div></div>` },
  { id:'22_2_4', year:'2022', round:'2회', cat:'정보보안',
    qHtml:`<div class="q-text">아래에서 설명하는 암호화 알고리즘을 각각 쓰시오.<br><br>(1) Xuejia Lai와 James Messey가 개발. PES → IPES를 거쳐 1991년 완성된 블록 암호 알고리즘. 64비트 블록, 128비트 키, 8라운드 구성. 현재 국제 데이터 암호화 알고리즘으로 사용.<br><br>(2) 미국 NSA에서 개발. Clipper 칩에 내장. 음성 암호화에 주로 사용. 64비트 입출력, 80비트 키, 32라운드 구성.</div>`,
    ansHtml:`<div class="answer-val">(1) IDEA &nbsp;&nbsp; (2) SKIPJACK</div><div class="keyword-detail">📌 <b>풀이</b><br><b>IDEA</b>는 Xuejia Lai와 James Massey가 개발한 대칭키 블록 암호예요. <b>SKIPJACK</b>은 미국 NSA가 개발한 대칭키 암호로 클리퍼 칩에 사용됐어요.<br><br>📎 <b>암호화 알고리즘 비교</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>IDEA (International Data Encryption Algorithm)</b></td><td style="text-align:left;vertical-align:middle">128비트 키, 64비트 블록 대칭키 암호예요. PGP(이메일 암호화)에서 사용됐어요. ← <u>정답1</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>SKIPJACK</b></td><td style="text-align:left;vertical-align:middle">미국 NSA가 개발한 80비트 키 대칭키 암호예요. 정부 통신용 클리퍼 칩(Clipper Chip)에 탑재됐어요. ← <u>정답2</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>DES</b></td><td style="text-align:left;vertical-align:middle">56비트 키 대칭키 암호. 현재 취약하여 AES로 대체됐어요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>AES</b></td><td style="text-align:left;vertical-align:middle">현재 표준 대칭키 암호. 128/192/256비트 키, 128비트 블록. Rijndael 알고리즘 기반이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>SEED / ARIA</b></td><td style="text-align:left;vertical-align:middle">한국 표준 대칭키 암호예요. SEED: 128비트 키·블록. ARIA: NSRI 개발.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>RSA</b></td><td style="text-align:left;vertical-align:middle">대표적 비대칭키(공개키) 암호예요. 소인수분해의 어려움을 기반으로 해요.</td></tr></table></div></div>` },
  { id:'22_2_5', year:'2022', round:'2회', cat:'네트워크',
    qHtml:`<div class="q-text">아래는 라우팅 프로토콜에 대한 설명이다. 각 설명에 해당하는 프로토콜의 명칭을 쓰시오.<br><br>(1) 라우터로 상호 접속된 여러 네트워크 집합(자율시스템, AS)에서 도메인 내부 경로 설정을 수행하는 프로토콜 분류<br>(2) 도메인 간 라우팅 시 보안과 제어를 목적으로 사용하는 외부 게이트웨이 프로토콜<br>(3) RIP보다 규모가 큰 네트워크에서도 사용 가능한, RIP의 단점을 개선한 링크 상태 기반 IGP<br>(4) AS 간 라우팅에 사용되는 외부 게이트웨이 프로토콜(EGP). 각 목적지에 대한 전체 경로 포함.</div>`,
    ansHtml:`<div class="answer-val">(1) IGP &nbsp;&nbsp; (2) EGP &nbsp;&nbsp; (3) OSPF</div><div class="keyword-detail">📌 <b>풀이</b><br>라우팅 프로토콜은 동일 자율시스템(AS) 내부인지, 외부인지로 나뉘어요. <b>IGP</b>는 AS 내부, <b>EGP(BGP)</b>는 AS 간 라우팅이에요. <b>OSPF</b>는 IGP 중 링크 상태 방식의 대표 프로토콜이에요.<br><br>📎 <b>라우팅 프로토콜 계층 구조</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>IGP (Interior Gateway Protocol)</b></td><td style="text-align:left;vertical-align:middle">동일 자율 시스템(AS) 내부의 라우팅에 사용해요. RIP, OSPF, EIGRP가 해당해요. ← <u>정답1</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>EGP (Exterior Gateway Protocol)</b></td><td style="text-align:left;vertical-align:middle">서로 다른 자율 시스템(AS) 간의 라우팅에 사용해요. BGP가 현재 표준이에요. ← <u>정답2</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>OSPF (Open Shortest Path First)</b></td><td style="text-align:left;vertical-align:middle">링크 상태 방식 IGP. Dijkstra 알고리즘으로 최단 경로 계산. 대규모 네트워크에 적합해요. ← <u>정답3</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>RIP (Routing Information Protocol)</b></td><td style="text-align:left;vertical-align:middle">거리 벡터 방식 IGP. 최대 홉 15. 소규모 네트워크에 적합해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>BGP (Border Gateway Protocol)</b></td><td style="text-align:left;vertical-align:middle">경로 벡터 방식 EGP. 인터넷 백본 라우팅 프로토콜이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>자율 시스템(AS)</b></td><td style="text-align:left;vertical-align:middle">단일 관리 체계 하에 있는 네트워크 집합이에요. KT, SKT, LG 같은 ISP가 각자의 AS를 운영해요.</td></tr></table></div></div>` },
  { id:'22_2_6', year:'2022', round:'2회', cat:'SW 개발/계획',
    qHtml:`<div class="q-text">아래는 소프트웨어 테스트의 종류에 대한 설명이다. 각 설명에 해당하는 테스트 명칭을 쓰시오.<br><br>(1) 상용화 전 최종 제품 검사. 잠재 고객이 일정 기간 무료 사용 후 오류를 보고하는 방식으로, 공식 출시 전 마지막 검증.<br><br>(2) 새로운 제품 개발 과정에서 이루어지는 첫 번째 테스트로, 개발 회사 내부에서 수행하며 단위·구성·시스템 테스트 등을 포함.</div>`,
    ansHtml:`<div class="answer-val">(1) 베타(Beta) 테스트 &nbsp;&nbsp; (2) 알파(Alpha) 테스트</div><div class="keyword-detail">📌 <b>풀이</b><br><b>알파 테스트</b>는 개발사 내부에서, <b>베타 테스트</b>는 실제 사용자(외부)가 테스트해요. 알파 → 베타 → 출시 순서로 진행돼요.<br><br>📎 <b>인수 테스트 유형 비교</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>알파(Alpha) 테스트</b></td><td style="text-align:left;vertical-align:middle">개발사 내부 직원 또는 한정된 사용자가 실제 개발 환경에서 테스트해요. 출시 전 마지막 내부 검증이에요. ← <u>정답2</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>베타(Beta) 테스트</b></td><td style="text-align:left;vertical-align:middle">상용화 전 최종 제품을 외부 잠재 고객에게 배포해서 테스트해요. 실제 사용 환경에서 다양한 피드백을 수집해요. ← <u>정답1</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>테스트 순서</b></td><td style="text-align:left;vertical-align:middle">알파(내부) → 베타(외부) → RC(Release Candidate) → 정식 출시 순으로 진행해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>인수 테스트(UAT)</b></td><td style="text-align:left;vertical-align:middle">User Acceptance Test. 발주자·사용자가 시스템이 요구사항을 만족하는지 최종 검증하는 테스트예요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>공개 베타 vs 비공개 베타</b></td><td style="text-align:left;vertical-align:middle">공개 베타: 누구나 참여 가능. 비공개 베타: 초대된 사람만 참여. 최근 게임·소프트웨어에서 많이 사용해요.</td></tr></table></div></div>` },
  { id:'22_2_7', year:'2022', round:'2회', cat:'SW 개발/계획',
    qHtml:`<div class="q-text">아래에서 설명하는 소프트웨어 테스트 유형의 명칭을 쓰시오.<br><br>오류를 제거하거나 수정한 시스템·컴포넌트·프로그램이 수정 과정에서 새로운 오류가 유입되지 않았는지 확인하는 반복 테스트이다. 수정·변경된 시스템이 기존 명세된 요구 사항을 여전히 충족하는지 검증하는 목적으로 수행된다.</div>`,
    ansHtml:`<div class="answer-val">회귀 테스트 (Regression Test)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>회귀 테스트</b>는 오류 수정이나 기능 추가 후, 기존에 정상 동작하던 기능이 여전히 올바르게 작동하는지 확인하는 테스트예요. "고쳤더니 다른 게 망가진 것" 방지가 목적이에요.<br><br>📎 <b>같이 알아두면 좋은 키워드</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>회귀 테스트(Regression Test)</b></td><td style="text-align:left;vertical-align:middle">변경(수정·추가·삭제) 후 기존 기능이 정상 동작하는지 재검증해요. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>CI/CD (지속적 통합/배포)</b></td><td style="text-align:left;vertical-align:middle">코드 변경 시 자동으로 회귀 테스트를 실행해요. Jenkins, GitHub Actions가 대표 CI/CD 도구예요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>테스트 자동화</b></td><td style="text-align:left;vertical-align:middle">회귀 테스트는 반복 실행이 필요하므로 자동화가 중요해요. JUnit, Selenium 등으로 자동화해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>스모크 테스트(Smoke Test)</b></td><td style="text-align:left;vertical-align:middle">빌드 후 핵심 기능이 동작하는지 간단히 확인하는 테스트예요. 회귀 테스트의 빠른 버전이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>산포 테스트(Sanity Test)</b></td><td style="text-align:left;vertical-align:middle">변경된 부분과 관련 기능만 빠르게 테스트해요. 전체 회귀 테스트보다 범위가 좁아요.</td></tr></table></div></div>` },
  { id:'22_2_8', year:'2022', round:'2회', cat:'데이터베이스',
    qHtml:`<div class="q-text">아래는 함수 종속성(Functional Dependency)에 대한 설명이다. 각 설명에 해당하는 함수 종속 유형을 쓰시오.<br><br><div class="tbl-wrap"><table class="db-table" style="min-width:360px"><tr><th>설명</th><th>유형</th></tr><tr><td>성적은 {학생, 학과}라는 기본 키 전체에 의해 결정된다</td><td class="info-row">( ① ) Functional Dependency</td></tr><tr><td>성적은 기본 키의 일부인 '학과'만으로도 식별 가능하다</td><td class="info-row">( ② ) Functional Dependency</td></tr><tr><td>X→Y, Y→Z일 때 X→Z가 성립되는 관계</td><td class="info-row">( ③ ) Functional Dependency</td></tr></table></div>`,
    ansHtml:`<div class="answer-val">① Full(완전) &nbsp;&nbsp; ② Partial(부분) &nbsp;&nbsp; ③ Transitive(이행)</div><div class="keyword-detail">📌 <b>풀이</b><br>함수 종속의 3가지 유형이에요. <b>완전 함수 종속</b>은 기본키 전체에 종속, <b>부분 함수 종속</b>은 기본키 일부에 종속(2NF 위반), <b>이행 함수 종속</b>은 A→B→C 관계(3NF 위반)예요.<br><br>📎 <b>함수 종속 유형과 정규형</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>완전 함수 종속(Full FD)</b></td><td style="text-align:left;vertical-align:middle">기본키 전체에만 종속돼요. {학번+과목} → 성적처럼 기본키 전체가 있어야 결정돼요. 2NF의 요구사항이에요. ← <u>정답①</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>부분 함수 종속(Partial FD)</b></td><td style="text-align:left;vertical-align:middle">복합 기본키의 일부에 종속돼요. {학번+과목} → 이름에서 이름은 학번만으로 결정돼요. 2NF 위반이에요. ← <u>정답②</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>이행 함수 종속(Transitive FD)</b></td><td style="text-align:left;vertical-align:middle">A→B이고 B→C이면 A→C가 성립해요. 학번→지도교수→학과처럼 비기본키를 통해 간접 종속되는 경우예요. 3NF 위반이에요. ← <u>정답③</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>정규화와의 관계</b></td><td style="text-align:left;vertical-align:middle">2NF: 부분 함수 종속 제거. 3NF: 이행 함수 종속 제거. BCNF: 결정자가 모두 후보키여야 함.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>암스트롱 공리</b></td><td style="text-align:left;vertical-align:middle">함수 종속의 추론 규칙이에요. 반사율·증가율·이행률 3가지 기본 규칙으로 모든 함수 종속을 유도할 수 있어요.</td></tr></table></div></div>` },
  { id:'22_2_9', year:'2022', round:'2회', cat:'SW 개발/계획',
    qHtml:`<div class="q-text">아래 모듈 구조에서 모듈 F의 Fan-in과 Fan-out을 구하시오.<br><br><div class="tbl-wrap"><table class="db-table" style="min-width:280px"><tr><th colspan="2">모듈 구조 설명</th></tr><tr><td colspan="2" style="text-align:left">· F를 호출하는 상위 모듈: A, B, C (3개)<br>· F가 호출하는 하위 모듈: G, H (2개)</td></tr></table></div>`,
    ansHtml:`<div class="answer-val">Fan-in: 3 &nbsp;&nbsp; Fan-out: 2</div><div class="keyword-detail">📌 <b>풀이</b><br>Fan-in은 해당 모듈을 호출하는 모듈의 수(위에서 들어오는 화살표 수), Fan-out은 해당 모듈이 호출하는 모듈의 수(아래로 나가는 화살표 수)예요. F를 A·B·C가 호출하면 Fan-in=3, F가 G·H를 호출하면 Fan-out=2예요.<br><br>📎 <b>같이 알아두면 좋은 키워드</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Fan-in</b></td><td style="text-align:left;vertical-align:middle">해당 모듈을 호출하는 상위 모듈의 수예요. Fan-in이 높으면 재사용성이 높다는 의미예요. ← <u>정답: 3</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Fan-out</b></td><td style="text-align:left;vertical-align:middle">해당 모듈이 호출하는 하위 모듈의 수예요. Fan-out이 높으면 복잡성이 높아서 분리를 고려해야 해요. ← <u>정답: 2</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>재사용성 지표</b></td><td style="text-align:left;vertical-align:middle">Fan-in이 높을수록 여러 곳에서 사용되는 공통 모듈이에요. 잘 설계된 공통 모듈은 Fan-in이 높아요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>복잡도 지표</b></td><td style="text-align:left;vertical-align:middle">Fan-out이 너무 높으면 모듈이 너무 많은 일을 하는 것이에요. 일반적으로 Fan-out은 7±2 이하를 권장해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>모듈화 설계 원칙</b></td><td style="text-align:left;vertical-align:middle">높은 응집도(Cohesion)와 낮은 결합도(Coupling)를 목표로 해요. Fan-in↑, Fan-out↓이 이상적이에요.</td></tr></table></div></div>` },

  // ─── 2022년 1회 ───
  { id:'22_1_1', year:'2022', round:'1회', cat:'기타 용어',
    qHtml:`<div class="q-text">아래 설명에 해당하는 RAID 단계를 숫자로 쓰시오.<br><br>· 스트라이핑(Striping) 구현 방식이다.<br>· I/O 로드 분산으로 매우 빠른 읽기·쓰기 속도를 제공한다.<br>· 데이터를 블록으로 분할하여 여러 디스크에 나누어 저장하지만, 중복 저장(패리티)이 없어 하나의 디스크 고장 시 데이터 복구 불가능하다.</div>`,
    ansHtml:`<div class="answer-val">RAID 0</div><div class="keyword-detail">📌 <b>풀이</b><br><b>RAID 0</b>은 여러 디스크에 데이터를 나눠 저장하는 <b>스트라이핑(Striping)</b>만 사용해요. 패리티(오류 복구 데이터)가 없어서 I/O 속도는 최고이지만, 디스크 하나가 고장나면 데이터 전체를 잃어요.<br><br>📎 <b>RAID 단계별 특징</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>RAID 0 (스트라이핑)</b></td><td style="text-align:left;vertical-align:middle">여러 디스크에 데이터를 분산 저장해요. 속도 최고, 패리티 없음 → 안정성 최저. 하나 고장 시 전체 손실. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>RAID 1 (미러링)</b></td><td style="text-align:left;vertical-align:middle">두 디스크에 동일한 데이터를 복사 저장해요. 안정성 최고, 저장 효율 50%. 하나 고장 시 나머지로 복구 가능.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>RAID 5 (분산 패리티)</b></td><td style="text-align:left;vertical-align:middle">스트라이핑 + 분산 패리티를 사용해요. 최소 3개 디스크 필요. 하나 고장 시 패리티로 복구 가능. 성능·안정성·효율 균형.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>RAID 6 (이중 패리티)</b></td><td style="text-align:left;vertical-align:middle">RAID 5에서 패리티를 두 개 사용해요. 2개 디스크 동시 고장까지 복구 가능.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>RAID 10 (1+0)</b></td><td style="text-align:left;vertical-align:middle">RAID 1(미러링) + RAID 0(스트라이핑) 조합이에요. 속도와 안정성을 모두 확보하지만 비용이 커요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>스트라이핑(Striping)</b></td><td style="text-align:left;vertical-align:middle">데이터를 블록 단위로 쪼개 여러 디스크에 분산 저장해요. 여러 디스크가 동시에 읽고 쓰므로 I/O 성능이 높아져요.</td></tr></table></div></div>` },
  { id:'22_1_2', year:'2022', round:'1회', cat:'데이터베이스',
    qHtml:`<div class="q-text">데이터베이스 트랜잭션 장애 복구 기법에 대한 설명이다. 각 설명에 해당하는 복구 기법을 쓰시오.<br><br>(1) 오류 발생 이전까지의 사항을 로그로 기록하여 이전 상태로 복귀한 후, 실패 발생 직전까지의 과정을 그대로 재실행하는 방식<br>(2) 작업을 취소하여 트랜잭션을 이전 상태로 되돌리는 방식</div>`,
    ansHtml:`<div class="answer-val">(1) Redo (재실행) &nbsp;&nbsp; (2) Undo (취소)</div><div class="keyword-detail">📌 <b>풀이</b><br>DB 장애 복구에서 <b>Redo</b>는 "다시 실행"(커밋된 트랜잭션을 재적용), <b>Undo</b>는 "취소"(미완료 트랜잭션의 변경을 되돌림)예요. 로그(Log) 파일을 기반으로 수행해요.<br><br>📎 <b>트랜잭션 복구 기법</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Redo (재실행)</b></td><td style="text-align:left;vertical-align:middle">커밋은 됐지만 DB에 반영 전 장애 발생 시, 로그를 순방향으로 재적용해서 최신 상태로 복구해요. ← <u>정답1</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Undo (취소)</b></td><td style="text-align:left;vertical-align:middle">미완료(COMMIT 안 된) 트랜잭션의 변경 사항을 로그를 역방향으로 되돌려요. ← <u>정답2</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>WAL (Write-Ahead Logging)</b></td><td style="text-align:left;vertical-align:middle">로그를 먼저 쓰고 DB에 반영하는 원칙이에요. 장애 시 로그로 복구할 수 있어요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>체크포인트(Checkpoint)</b></td><td style="text-align:left;vertical-align:middle">특정 시점에 메모리 내용을 DB에 강제로 기록해요. 복구 시 체크포인트 이후 로그만 처리하면 돼서 복구 시간을 단축해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>즉각 갱신 vs 지연 갱신</b></td><td style="text-align:left;vertical-align:middle">즉각 갱신: 트랜잭션 완료 전 즉시 DB 반영 → Undo 필요. 지연 갱신: 커밋 후 반영 → Undo 불필요, Redo만 필요.</td></tr></table></div></div>` },
  { id:'22_1_3', year:'2022', round:'1회', cat:'SQL문',
    qHtml:`<div class="q-text">아래 성적 테이블을 name(이름) 기준으로 내림차순 정렬하여 name과 score(점수)를 조회하는 SQL의 빈칸을 채우시오.<br><br><div class="sql-box">SELECT name, score FROM 성적 ( ① ) BY ( ② ) ( ③ )</div>`,
    ansHtml:`<div class="answer-val">① ORDER &nbsp;&nbsp; ② score &nbsp;&nbsp; ③ DESC</div><div class="keyword-detail">📌 <b>풀이</b><br>이 SQL은 성적 테이블에서 이름(name)과 점수(score)를 <b>점수 기준 내림차순</b>으로 조회해요. ORDER BY 절에 정렬 기준 컬럼과 방향(DESC)을 지정해요.<br><br>📎 <b>ORDER BY 관련 키워드</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>ORDER BY</b></td><td style="text-align:left;vertical-align:middle">결과를 특정 컬럼 기준으로 정렬해요. SELECT 문의 가장 마지막에 위치해요. ← <u>정답①</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>정렬 기준 컬럼</b></td><td style="text-align:left;vertical-align:middle">ORDER BY 뒤에 정렬할 컬럼명을 지정해요. 문제에서 점수(score)로 정렬해요. ← <u>정답②</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>DESC (내림차순)</b></td><td style="text-align:left;vertical-align:middle">DESCending. 큰 값→작은 값 순으로 정렬해요. ← <u>정답③</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>ASC (오름차순)</b></td><td style="text-align:left;vertical-align:middle">ASCending. 작은 값→큰 값 순으로 정렬해요. ORDER BY의 기본값이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>다중 컬럼 정렬</b></td><td style="text-align:left;vertical-align:middle"><code>ORDER BY 학과 ASC, 점수 DESC</code>처럼 여러 컬럼을 콤마로 나열해요. 앞 컬럼이 같을 때 뒤 컬럼으로 정렬해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>NULL 정렬</b></td><td style="text-align:left;vertical-align:middle">ASC일 때 NULL은 마지막에, DESC일 때 NULL은 처음에 오는 것이 기본이에요(DBMS마다 다름).</td></tr></table></div></div>` },
  { id:'22_1_4', year:'2022', round:'1회', cat:'데이터베이스',
    qHtml:`<div class="q-text">데이터베이스 이상현상(Anomaly) 중 삭제 이상(Deletion Anomaly)을 설명하시오.</div>`,
    ansHtml:`<div class="answer-val">데이터를 삭제할 때 원하지 않는 다른 데이터까지 함께 삭제되어버리는 현상</div><div class="keyword-detail">📌 <b>풀이</b><br>DB <b>이상현상(Anomaly)</b>은 정규화가 안 된 테이블에서 데이터를 조작할 때 발생하는 부작용이에요. 삭제 이상은 특정 데이터를 삭제하면 관련 없는 다른 데이터까지 없어지는 현상이에요. 예) 수강 정보 삭제 시 학생 정보까지 사라짐.<br><br>📎 <b>DB 이상현상(Anomaly) 3가지</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>삽입 이상(Insertion Anomaly)</b></td><td style="text-align:left;vertical-align:middle">데이터 삽입 시 불필요한 데이터를 함께 입력해야 하는 현상이에요. 예) 수강 이력이 없는 신입생을 등록하려면 임의의 과목을 넣어야 함.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>삭제 이상(Deletion Anomaly)</b></td><td style="text-align:left;vertical-align:middle">데이터 삭제 시 원치 않는 다른 데이터까지 함께 삭제되는 현상이에요. ← <u>이번 문제</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>갱신 이상(Update Anomaly)</b></td><td style="text-align:left;vertical-align:middle">데이터 수정 시 일부만 변경되어 데이터가 불일치하는 현상이에요. 예) 교수 정보 변경 시 여러 수강 행 중 일부만 수정됨.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>이상현상의 원인</b></td><td style="text-align:left;vertical-align:middle">불완전한 함수 종속(부분 함수 종속, 이행 함수 종속)에서 발생해요. 정규화로 테이블을 분리하면 해결돼요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>정규화로 해결</b></td><td style="text-align:left;vertical-align:middle">1NF→2NF→3NF→BCNF 단계로 진행하면서 테이블을 분리하면 이상현상이 제거돼요.</td></tr></table></div></div>` },
  { id:'22_1_5', year:'2022', round:'1회', cat:'정보보안',
    qHtml:`<div class="q-text">아래에서 설명하는 소프트웨어 분석 기법을 각각 쓰시오.<br><br>(1) 소스 코드를 실행하지 않고 코드의 의미를 분석하여 결함을 찾아내는 원시적 코드 분석 기법<br>(2) 소스 코드를 직접 실행하여 프로그램의 동작이나 반응을 추적하고, 메모리 누수·스레드 결함 등을 분석하는 기법</div>`,
    ansHtml:`<div class="answer-val">(1) 정적 분석 (Static Analysis) &nbsp;&nbsp; (2) 동적 분석 (Dynamic Analysis)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>정적 분석</b>은 코드를 실행하지 않고 검사하고, <b>동적 분석</b>은 실제로 실행하면서 검사해요. 마치 책을 읽으면서 오류를 찾는 것(정적) vs 실제로 운전하면서 오류를 찾는 것(동적)의 차이예요.<br><br>📎 <b>소프트웨어 분석 기법 비교</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>정적 분석(Static Analysis)</b></td><td style="text-align:left;vertical-align:middle">소스 코드를 실행하지 않고 코드 자체를 검사해요. 컴파일 오류·코딩 표준 위반·보안 취약점 등을 찾아요. SonarQube, PMD, FindBugs가 대표 도구예요. ← <u>정답1</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>동적 분석(Dynamic Analysis)</b></td><td style="text-align:left;vertical-align:middle">프로그램을 실제로 실행하면서 동작을 분석해요. 런타임 오류·메모리 누수·성능 병목 등을 찾아요. JUnit, Valgrind가 대표 도구예요. ← <u>정답2</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>정적 분석의 장단점</b></td><td style="text-align:left;vertical-align:middle">장점: 실행 없이 전체 코드 검사, 초기에 오류 발견 가능. 단점: 실행 시 발생하는 런타임 오류는 찾을 수 없어요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>동적 분석의 장단점</b></td><td style="text-align:left;vertical-align:middle">장점: 실제 실행 환경에서 오류 발견. 단점: 테스트 케이스가 커버하는 경우만 검사 가능해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>퍼징(Fuzzing)</b></td><td style="text-align:left;vertical-align:middle">무작위 입력으로 프로그램을 테스트하는 동적 분석 기법이에요. 예상치 못한 입력에 의한 보안 취약점을 찾아요.</td></tr></table></div></div>` },
  { id:'22_1_6', year:'2022', round:'1회', cat:'SW 개발/계획',
    qHtml:`<div class="q-text">아래는 소프트웨어 테스트 관련 용어의 설명이다. 각 설명에 해당하는 용어를 쓰시오.<br><br>(1) 자바 언어를 이용한 xUnit 기반 단위 테스트 프레임워크. 숨겨진 단위 테스트를 정형화하여 쉽게 수행할 수 있도록 지원한다.<br><br>(2) V-모델에서의 테스트 단계 순서: ( ① ) → ( ② ) → ( ③ ) → ( ④ )<br>① 세부 설계와 대응 &nbsp; ② 아키텍처 설계와 대응 &nbsp; ③ 시스템 설계와 대응 &nbsp; ④ 요구사항과 대응</div>`,
    ansHtml:`<div class="answer-val">(1) JUnit &nbsp;&nbsp; (2) 단위→통합→시스템→인수 테스트</div><div class="keyword-detail">📌 <b>풀이</b><br><b>JUnit</b>은 Java 언어용 xUnit 기반 단위 테스트 프레임워크예요. V-모델에서 테스트는 개발의 반대 순서인 단위→통합→시스템→인수 순으로 진행해요.<br><br>📎 <b>V-모델과 테스트 단계</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>JUnit</b></td><td style="text-align:left;vertical-align:middle">Java 언어용 xUnit 기반 단위 테스트 프레임워크예요. @Test 어노테이션으로 테스트 메서드를 정의해요. CI/CD에서 자동화 테스트에 많이 사용해요. ← <u>정답1</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>단위(Unit) 테스트</b></td><td style="text-align:left;vertical-align:middle">개별 모듈·함수·클래스가 올바르게 동작하는지 테스트해요. 세부 설계와 대응돼요. ← <u>정답2①</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>통합(Integration) 테스트</b></td><td style="text-align:left;vertical-align:middle">여러 모듈을 연결했을 때 인터페이스가 올바르게 동작하는지 테스트해요. 개략 설계와 대응돼요. ← <u>정답2②</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>시스템(System) 테스트</b></td><td style="text-align:left;vertical-align:middle">완성된 시스템이 요구사항을 만족하는지 테스트해요. 시스템 정의서와 대응돼요. ← <u>정답2③</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>인수(Acceptance) 테스트</b></td><td style="text-align:left;vertical-align:middle">사용자가 실제 환경에서 시스템을 검증해요. 알파(내부)·베타(외부) 테스트가 여기에 해당해요. ← <u>정답2④</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>xUnit 계열</b></td><td style="text-align:left;vertical-align:middle">JUnit(Java), NUnit(.NET), PyTest(Python), CppUnit(C++)처럼 언어별 단위 테스트 프레임워크 모음이에요.</td></tr></table></div></div>` },
  { id:'22_1_7', year:'2022', round:'1회', cat:'정보보안',
    qHtml:`<div class="q-text">아래에서 설명하는 보안 정보 관리 체계의 영문 약자를 쓰시오.<br><br>· 정보보호 관리체계로, 조직의 정보보안 관리 시스템을 체계적으로 수립·운영·유지하기 위한 종합적인 관리 체계이다.<br>· 국내에서는 한국인터넷진흥원(KISA)이 인증을 수행한다.</div>`,
    ansHtml:`<div class="answer-val">ISMS (Information Security Management System)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>ISMS(정보보호 관리체계)</b>는 조직의 정보보안을 체계적으로 관리하기 위한 인증 제도예요. 한국인터넷진흥원(KISA)에서 인증을 수행해요. 개인정보까지 포함하면 ISMS-P예요.<br><br>📎 <b>같이 알아두면 좋은 키워드</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>ISMS</b></td><td style="text-align:left;vertical-align:middle">정보보호 관리체계. 정보보호 정책·조직·위험 관리·사고 대응 등을 체계적으로 수립·운영해요. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>ISMS-P</b></td><td style="text-align:left;vertical-align:middle">ISMS + 개인정보보호 관리체계. 개인정보 처리 흐름까지 포함한 확장 인증이에요. 개인정보를 많이 처리하는 기업은 ISMS-P 인증을 받아야 해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>ISO/IEC 27001</b></td><td style="text-align:left;vertical-align:middle">정보보호 관리체계의 국제 표준이에요. ISMS의 국제 버전으로 이해하면 돼요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>KISA (한국인터넷진흥원)</b></td><td style="text-align:left;vertical-align:middle">ISMS·ISMS-P 인증을 수행하는 기관이에요. 사이버 보안, 인터넷 진흥 업무도 담당해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>인증 의무 대상</b></td><td style="text-align:left;vertical-align:middle">정보통신서비스 매출 100억 이상 또는 일일평균 이용자 100만 명 이상인 사업자는 ISMS 인증이 의무예요.</td></tr></table></div></div>` },
  { id:'22_1_8', year:'2022', round:'1회', cat:'데이터베이스',
    qHtml:`<div class="q-text">데이터베이스 키(Key)의 특성에 대한 설명이다. 각 빈칸에 들어갈 속성을 쓰시오.<br><br>(1) 슈퍼키(Super Key)는 ( ① )의 속성만을 갖는다.<br>(2) 후보키(Candidate Key)는 ( ① )와/과 ( ② )의 속성을 모두 갖는다.</div>`,
    ansHtml:`<div class="answer-val">① 유일성 (Uniqueness) &nbsp;&nbsp; ② 최소성 (Minimality)</div><div class="keyword-detail">📌 <b>풀이</b><br>슈퍼키는 <b>유일성만</b> 만족하고, 후보키는 <b>유일성 + 최소성</b>을 모두 만족해요. 기본키(PK)는 후보키 중 하나를 선택한 것이에요.<br><br>📎 <b>DB 키 속성과 종류</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>유일성(Uniqueness)</b></td><td style="text-align:left;vertical-align:middle">키 값으로 모든 튜플을 유일하게 식별할 수 있는 성질이에요. {학번+이름}도 유일하면 슈퍼키가 돼요. ← <u>정답①</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>최소성(Minimality)</b></td><td style="text-align:left;vertical-align:middle">키를 구성하는 속성 중 하나라도 제거하면 유일성이 깨지는 성질이에요. 후보키·기본키에만 요구돼요. ← <u>정답②</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>슈퍼키(Super Key)</b></td><td style="text-align:left;vertical-align:middle">유일성만 만족해요. {학번}, {학번+이름}, {학번+이름+학과} 모두 슈퍼키예요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>후보키(Candidate Key)</b></td><td style="text-align:left;vertical-align:middle">유일성 + 최소성을 모두 만족해요. {학번}은 후보키지만 {학번+이름}은 최소성 위반으로 후보키가 아니에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>기본키(PK)</b></td><td style="text-align:left;vertical-align:middle">후보키 중 하나를 선택한 것이에요. NULL 불가·중복 불가.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>대체키</b></td><td style="text-align:left;vertical-align:middle">후보키 중 PK로 선택받지 못한 나머지예요.</td></tr></table></div></div>` },
  { id:'22_1_9', year:'2022', round:'1회', cat:'정보보안',
    qHtml:`<div class="q-text">아래에서 설명하는 사이버 공격 기법의 명칭을 쓰시오.<br><br>APT 공격에서 주로 활용되는 기법으로, 공격 대상이 자주 방문하는 합법적인 웹사이트를 미리 감염시켜 놓은 뒤, 공격 대상이 해당 사이트를 방문할 때 악성코드를 자동으로 설치하는 방식이다.</div>`,
    ansHtml:`<div class="answer-val">워터링 홀 (Watering Hole)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>워터링 홀(Watering Hole)</b>은 사자가 물웅덩이에서 먹이를 기다리듯, 공격자가 표적이 자주 방문하는 합법적인 웹사이트를 미리 감염시켜두는 APT 공격 기법이에요.<br><br>📎 <b>같이 알아두면 좋은 키워드</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>워터링 홀(Watering Hole)</b></td><td style="text-align:left;vertical-align:middle">표적이 자주 방문하는 신뢰할 수 있는 웹사이트를 미리 악성코드로 감염시켜요. 방문만 해도 자동으로 악성코드가 설치돼요. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>APT (Advanced Persistent Threat)</b></td><td style="text-align:left;vertical-align:middle">특정 표적을 향한 장기적·은밀한 고도화 공격이에요. 워터링 홀은 APT의 초기 침투 단계에 사용해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>스피어피싱(Spear Phishing)</b></td><td style="text-align:left;vertical-align:middle">특정 개인·조직을 겨냥한 맞춤형 피싱 이메일이에요. 워터링 홀과 함께 APT 초기 침투의 대표적인 방법이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>드라이브-바이 다운로드</b></td><td style="text-align:left;vertical-align:middle">웹사이트 방문만으로 악성코드가 자동 설치되는 공격이에요. 워터링 홀 공격에서 자주 활용되는 기법이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>제로데이(Zero-day) 취약점</b></td><td style="text-align:left;vertical-align:middle">공개되지 않아 패치가 없는 보안 취약점이에요. 워터링 홀 공격에서 제로데이 취약점을 이용하면 방어가 매우 어려워요.</td></tr></table></div></div>` },

  // ─── 2021년 3회 ───
  { id:'21_3_1', year:'2021', round:'3회', cat:'정보보안',
    qHtml:`<div class="q-text">정보 보호 기술 AAA에 대한 설명이다. 각 설명에 해당하는 용어를 쓰시오.<br><br>1. 시스템 접근 전 사용자의 신원을 검증하는 기능<br>2. 검증된 사용자에게 권한과 서비스를 허용하는 기능<br>3. 사용자의 자원(시간·정보·위치 등) 사용 정보를 수집·관리하는 기능</div>`,
    ansHtml:`<div class="answer-val">1. Authentication (인증) &nbsp;&nbsp; 2. Authorization (인가) &nbsp;&nbsp; 3. Accounting (계정)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>AAA</b>는 네트워크 보안의 3가지 핵심 기능이에요. <b>인증(Authentication)</b>은 "네가 누구야?", <b>인가(Authorization)</b>는 "이거 해도 돼?", <b>계정(Accounting)</b>은 "무엇을 했어?"예요.<br><br>📎 <b>AAA 3요소 상세</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Authentication (인증)</b></td><td style="text-align:left;vertical-align:middle">사용자의 신원을 검증해요. 비밀번호·공개키·생체인식 등으로 "네가 누구인지" 확인해요. ← <u>정답1</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Authorization (인가)</b></td><td style="text-align:left;vertical-align:middle">인증된 사용자에게 접근 권한을 부여해요. "이 자원에 접근할 수 있는지"를 결정해요. ← <u>정답2</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Accounting (계정/감사)</b></td><td style="text-align:left;vertical-align:middle">사용자의 행동과 자원 사용을 기록해요. 로그 분석·감사·과금에 활용해요. ← <u>정답3</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>RADIUS</b></td><td style="text-align:left;vertical-align:middle">AAA를 구현하는 대표적인 프로토콜이에요. 무선 LAN·VPN 인증에 널리 사용해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>인증 vs 인가</b></td><td style="text-align:left;vertical-align:middle">인증(Authentication)은 신원 확인이고, 인가(Authorization)는 권한 확인이에요. 인증 후 인가가 이루어져요.</td></tr></table></div></div>` },
  { id:'21_3_2', year:'2021', round:'3회', cat:'정보보안',
    qHtml:`<div class="q-text">아래에서 설명하는 네트워크 공격 기법의 명칭을 쓰시오.<br><br>근거리 통신망(LAN)에서 특정 주소 변환 프로토콜 메시지를 이용하여 상대방의 데이터 패킷을 중간에서 가로채는 중간자(Man-in-the-Middle) 공격 기법이다. 데이터 링크 계층의 프로토콜을 이용하기 때문에 근거리 네트워크에서만 사용 가능하다.</div>`,

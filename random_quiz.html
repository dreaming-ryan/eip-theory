    ansHtml:`<div class="answer-val">6.5ms</div><div class="keyword-detail">📌 <b>풀이</b><br><b>SRT(Shortest Remaining Time)</b>는 새 프로세스 도착 시 남은 실행 시간을 비교해 더 짧은 것을 선점(교체)해요. 실행 순서: A(0~1)→B(1~5)→D(5~10)→A(10~17)→C(17~26). 대기: A=9, B=0, C=15, D=2. 평균=(9+0+15+2)/4=6.5ms예요.<br><br>📎 <b>CPU 스케줄링 성능 지표</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>대기 시간(Waiting Time)</b></td><td style="text-align:left;vertical-align:middle">프로세스가 준비 큐에서 기다린 시간이에요. 완료시간 - 도착시간 - 서비스시간으로 계산해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>반환 시간(Turnaround Time)</b></td><td style="text-align:left;vertical-align:middle">도착부터 완료까지의 총 시간이에요. 대기시간 + 서비스시간으로 계산해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>응답 시간(Response Time)</b></td><td style="text-align:left;vertical-align:middle">처음 CPU를 할당받기까지 기다린 시간이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>SRT vs SJF</b></td><td style="text-align:left;vertical-align:middle">SJF는 비선점(실행 중 교체 없음), SRT는 선점(더 짧은 것 도착 시 교체). SRT가 평균 대기시간을 더 줄일 수 있어요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>기아(Starvation)</b></td><td style="text-align:left;vertical-align:middle">짧은 작업이 계속 도착하면 긴 작업이 무한 대기하는 현상이에요. HRN 알고리즘으로 해결할 수 있어요.</td></tr></table></div></div>` },
  { id:'24_2_10', year:'2024', round:'2회', cat:'SW 개발/계획',
    qHtml:`<div class="q-text">아래 설명에 해당하는 모듈 간 결합도(Coupling) 유형을 쓰시오.<br><br>한 모듈이 다른 모듈의 내부 처리 논리 흐름을 제어하기 위해 제어 요소(플래그, 스위치 등)를 인자로 전달하는 결합도이다.<br><br>( &nbsp;&nbsp;&nbsp;&nbsp;&nbsp; ) Coupling</div>`,
    ansHtml:`<div class="answer-val">제어(Control) 결합도</div><div class="keyword-detail">📌 <b>풀이</b><br><b>제어 결합도</b>는 한 모듈이 다른 모듈에 플래그(flag)나 제어 신호를 전달해서 내부 처리 흐름을 통제하는 방식이에요. "mode=1이면 이렇게, mode=2이면 저렇게"처럼 플래그를 넘기는 경우예요.<br><br>📎 <b>결합도 7종 (강→약)</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>내용(Content)</b></td><td style="text-align:left;vertical-align:middle">다른 모듈 내부 변수·코드 직접 접근. 최악이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>공통(Common)</b></td><td style="text-align:left;vertical-align:middle">전역 변수 공유예요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>외부(External)</b></td><td style="text-align:left;vertical-align:middle">외부 환경(파일, 하드웨어) 공유예요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>제어(Control)</b></td><td style="text-align:left;vertical-align:middle">제어 신호(플래그)를 전달하여 다른 모듈의 내부 동작을 통제해요. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>스탬프(Stamp)</b></td><td style="text-align:left;vertical-align:middle">구조체를 통째로 전달하지만 일부만 사용해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>자료(Data)</b></td><td style="text-align:left;vertical-align:middle">순수 데이터(매개변수)만 전달해요. 가장 좋아요.</td></tr><tr><td colspan="2" style="color:var(--c-text2);font-style:italic;border-top:1px dashed var(--c-border2)">📝 암기법: 내공외제스자비 (내용→공통→외부→제어→스탬프→자료→비직접)</td></tr></table></div></div>` },

  // ─── 2024년 1회 ───
  { id:'24_1_1', year:'2024', round:'1회', cat:'SW 개발/계획',
    qHtml:`<div class="q-text">소프트웨어 설계의 응집도(Cohesion) 유형을 아래 보기에서 응집도가 높은 순서대로 나열하시오.<br><br>[보기] &nbsp; ㄱ.기능적(Functional) &nbsp; ㄴ.교환적(Communication) &nbsp; ㄷ.우연적(Coincidental) &nbsp; ㄹ.시간적(Temporal)</div>`,
    ansHtml:`<div class="answer-val">ㄱ → ㄴ → ㄹ → ㄷ (기능적 > 교환적 > 시간적 > 우연적)</div><div class="keyword-detail">📌 <b>풀이</b><br>응집도는 모듈 내부 요소들이 얼마나 밀접하게 관련돼 있는지예요. 높을수록 좋은 설계예요. 보기 중 기능적(ㄱ)이 가장 높고, 그 다음 교환적(ㄴ), 시간적(ㄹ), 우연적(ㄷ) 순이에요.<br><br>📎 <b>응집도 7종 (높음→낮음)</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>기능적(Functional)</b></td><td style="text-align:left;vertical-align:middle">모듈이 단 하나의 기능만 수행해요. 가장 이상적인 응집도예요. ← <u>ㄱ(최고)</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>순차적(Sequential)</b></td><td style="text-align:left;vertical-align:middle">한 기능의 출력이 다음 기능의 입력이 되는 파이프라인 구조예요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>교환적/통신적(Communication)</b></td><td style="text-align:left;vertical-align:middle">같은 데이터를 사용하거나 같은 결과물을 만드는 기능들의 묶음이에요. ← <u>ㄴ</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>절차적(Procedural)</b></td><td style="text-align:left;vertical-align:middle">반드시 특정 순서대로 수행해야 하는 기능들의 묶음이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>시간적(Temporal)</b></td><td style="text-align:left;vertical-align:middle">같은 시간대에 실행되는 기능들의 묶음이에요. (예: 초기화 모듈) ← <u>ㄹ</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>논리적(Logical)</b></td><td style="text-align:left;vertical-align:middle">비슷한 종류의 기능들을 모아놓은 것이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>우연적(Coincidental)</b></td><td style="text-align:left;vertical-align:middle">관련 없는 기능들이 우연히 한 모듈에 묶인 최악의 응집도예요. ← <u>ㄷ(최저)</u></td></tr><tr><td colspan="2" style="color:var(--c-text2);font-style:italic;border-top:1px dashed var(--c-border2)">📝 암기법: 기순교절시논우 (기능→순차→교환→절차→시간→논리→우연)</td></tr></table></div></div>` },
  { id:'24_1_2', year:'2024', round:'1회', cat:'네트워크',
    qHtml:`<div class="q-text">아래에서 설명하는 라우팅 프로토콜의 영문 약자를 쓰시오.<br><br>1. 대표적인 링크 상태(Link State) 라우팅 프로토콜이다.<br>2. 단일 자율 시스템(AS) 내에서 라우팅 정보를 교환하는 내부 게이트웨이 프로토콜(IGP)이다.<br>3. Dijkstra 알고리즘으로 모든 대상에 대한 최단 경로를 계산한다.</div>`,
    ansHtml:`<div class="answer-val">OSPF (Open Shortest Path First)</div><div class="keyword-detail">📌 <b>풀이</b><br>OSPF는 각 라우터가 네트워크 전체 지도(링크 상태)를 갖고 <b>다익스트라(Dijkstra) 알고리즘</b>으로 최단 경로를 계산하는 라우팅 프로토콜이에요. RIP보다 대규모 네트워크에 적합해요.<br><br>📎 <b>라우팅 프로토콜 비교</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>RIP</b></td><td style="text-align:left;vertical-align:middle">거리 벡터 방식. 최대 홉 수 15(16=무한대). 30초마다 전체 라우팅 테이블 전송. 소규모 네트워크에 적합해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>OSPF</b></td><td style="text-align:left;vertical-align:middle">링크 상태 방식. Dijkstra 최단 경로 알고리즘 사용. 변경 사항만 전송하여 효율적이에요. 대규모 네트워크에 적합해요. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>BGP</b></td><td style="text-align:left;vertical-align:middle">경로 벡터 방식. 서로 다른 자율 시스템(AS) 간 라우팅에 사용해요. 인터넷 백본 라우팅 프로토콜이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>IGP vs EGP</b></td><td style="text-align:left;vertical-align:middle">IGP(Interior Gateway Protocol)는 동일 AS 내부 라우팅(RIP, OSPF). EGP(Exterior)는 AS 간 라우팅(BGP)이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>거리 벡터 vs 링크 상태</b></td><td style="text-align:left;vertical-align:middle">거리 벡터: 이웃 라우터에게 전체 테이블 전송, 느린 수렴. 링크 상태: 전체 네트워크 지도 보유, 빠른 수렴이에요.</td></tr></table></div></div>` },
  { id:'24_1_3', year:'2024', round:'1회', cat:'데이터베이스',
    qHtml:`<div class="q-text">관계 대수 조인(Join) 연산의 종류에 대한 설명이다. 각 설명에 해당하는 조인 명칭을 쓰시오.<br><br>(1) 두 릴레이션의 속성값을 비교 연산자(=, >, < 등)로 비교하여 조건을 만족하는 튜플만 반환하는 조인<br>(2) (1)의 비교 연산자가 등호(=)인 특수한 경우<br>(3) (2)에서 중복된 속성을 제거한 조인</div>`,
    ansHtml:`<div class="answer-val">(1) 세타 조인 &nbsp;&nbsp; (2) 동등 조인 &nbsp;&nbsp; (3) 자연 조인</div><div class="keyword-detail">📌 <b>풀이</b><br>조인 종류는 포함 관계로 이해하면 쉬워요. <b>세타 조인</b>이 가장 넓고(모든 비교 연산자), 그 안에 <b>동등 조인</b>(= 연산자만), 그 안에 <b>자연 조인</b>(중복 컬럼 제거)이 포함돼요.<br><br>📎 <b>조인 종류 비교</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>세타 조인(Theta Join)</b></td><td style="text-align:left;vertical-align:middle">=, &lt;, &gt;, ≤, ≥, ≠ 등 모든 비교 연산자를 사용해요. 가장 넓은 개념이에요. ← <u>정답1</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>동등 조인(Equi Join)</b></td><td style="text-align:left;vertical-align:middle">세타 조인 중 = 연산자만 사용해요. 결과에 조인에 사용된 컬럼이 중복되어 나타나요. ← <u>정답2</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>자연 조인(Natural Join)</b></td><td style="text-align:left;vertical-align:middle">동등 조인에서 중복된 조인 컬럼을 제거한 것이에요. 같은 이름의 컬럼을 자동으로 조인 조건으로 사용해요. ← <u>정답3</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>포함 관계</b></td><td style="text-align:left;vertical-align:middle">세타 조인 ⊇ 동등 조인 ⊇ 자연 조인 순서로 점점 좁아져요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>INNER JOIN vs OUTER JOIN</b></td><td style="text-align:left;vertical-align:middle">INNER JOIN: 조건 일치 행만 반환. OUTER JOIN: 조건 불일치 행도 NULL로 포함해요.</td></tr></table></div></div>` },
  { id:'24_1_4', year:'2024', round:'1회', cat:'운영체제',
    qHtml:`<div class="q-text">할당된 프레임 수가 3개일 때, 아래 페이지 참조 순서에 대해 LRU 및 LFU 알고리즘을 각각 적용했을 때의 페이지 부재(Page Fault) 횟수를 구하시오.<br><br>페이지 참조 순서: 1, 2, 3, 1, 2, 4, 1, 2, 5, 7<br><br>(1) LRU: &nbsp;&nbsp; (2) LFU:</div>`,
    ansHtml:`<div class="answer-val">(1) LRU: 6회 &nbsp;&nbsp; (2) LFU: 6회</div><div class="keyword-detail">📌 <b>풀이</b><br><b>LRU</b>는 가장 오랫동안 사용되지 않은 페이지를, <b>LFU</b>는 사용 빈도가 가장 낮은 페이지를 교체해요. 이 문제에서 두 알고리즘 모두 프레임 3개 기준으로 시뮬레이션하면 6번 페이지 부재가 발생해요.<br><br>📎 <b>페이지 교체 알고리즘 비교</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>FIFO</b></td><td style="text-align:left;vertical-align:middle">가장 먼저 들어온 페이지를 먼저 교체해요. 구현이 단순하지만 Belady 이상(프레임 늘려도 페이지 부재 증가) 발생 가능해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>LRU (Least Recently Used)</b></td><td style="text-align:left;vertical-align:middle">가장 오랫동안 사용되지 않은 페이지를 교체해요. 최근에 사용된 것은 곧 다시 사용될 것이라는 가정이에요. ← <u>정답1</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>LFU (Least Frequently Used)</b></td><td style="text-align:left;vertical-align:middle">사용 빈도가 가장 낮은 페이지를 교체해요. 오래 전부터 자주 쓰인 페이지가 교체될 수 있는 단점이 있어요. ← <u>정답2</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>OPT (Optimal)</b></td><td style="text-align:left;vertical-align:middle">앞으로 가장 오래 사용되지 않을 페이지를 교체해요. 이론적 최적이지만 미래를 알 수 없어 실제 구현은 불가능해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>페이지 부재(Page Fault)</b></td><td style="text-align:left;vertical-align:middle">참조할 페이지가 메모리에 없을 때 발생해요. 부재가 적을수록 좋은 알고리즘이에요.</td></tr></table></div></div>` },
  { id:'24_1_5', year:'2024', round:'1회', cat:'데이터베이스',
    qHtml:`<div class="q-text">아래 테이블이 나타내고 있는 정규형(Normal Form)을 쓰시오.<br><br><div class="tbl-wrap"><table class="db-table"><tr><th>고객아이디</th><th>강좌명</th><th>강사번호</th></tr><tr><td>apple</td><td>영어회화</td><td>P001</td></tr><tr><td>banana</td><td>기초토익</td><td>P002</td></tr><tr><td>carrot</td><td>영어회화</td><td>P001</td></tr><tr><td>carrot</td><td>기초토익</td><td>P004</td></tr><tr><td>orange</td><td>영어회화</td><td>P003</td></tr><tr><td>orange</td><td>기초토익</td><td>P004</td></tr></table></div><div class="q-text" style="margin-top:8px">※ 기본 키: (고객아이디, 강좌명). 강사번호는 강좌명에만 함수 종속.</div>`,
    ansHtml:`<div class="answer-val">제 3정규형 (3NF)</div><div class="keyword-detail">📌 <b>풀이</b><br>이 테이블에서 학생ID → 강좌명 → 강사번호처럼 <b>이행적 함수 종속</b>(A→B→C)이 없는 상태예요. 1NF(원자값)와 2NF(부분 함수 종속 제거)를 만족하고 이행적 종속도 없으니 3NF예요. BCNF는 아니에요.<br><br>📎 <b>정규형(NF) 단계별 정리</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>1NF (제1정규형)</b></td><td style="text-align:left;vertical-align:middle">모든 속성값이 원자값(더 쪼갤 수 없음)이어야 해요. 반복 그룹이나 다중값 속성이 없어야 해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>2NF (제2정규형)</b></td><td style="text-align:left;vertical-align:middle">1NF를 만족하고 기본키의 부분 집합에 종속되는 부분 함수 종속을 제거해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>3NF (제3정규형)</b></td><td style="text-align:left;vertical-align:middle">2NF를 만족하고 이행적 함수 종속(A→B→C에서 A→C)을 제거해요. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>BCNF</b></td><td style="text-align:left;vertical-align:middle">3NF를 만족하고 모든 결정자가 후보키여야 해요. 3NF보다 강한 기준이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>이행적 함수 종속</b></td><td style="text-align:left;vertical-align:middle">A→B이고 B→C이면 A→C가 성립하는 것이에요. 3NF는 이 관계를 제거해요.</td></tr></table></div></div>` },
  { id:'24_1_6', year:'2024', round:'1회', cat:'정보보안',
    qHtml:`<div class="q-text">아래에서 설명하는 악성 프로그램을 보기에서 골라 쓰시오.<br><br>· 공격자의 존재를 숨기면서 시스템에 대한 지속적인 접근 권한을 유지하도록 설계된 악성 소프트웨어이다.<br>· 운영체제의 시스템 콜을 변조하거나 가상화 계층 등에서 동작하여 탐지를 우회한다.<br>· 안티바이러스 소프트웨어가 악성코드를 감지하지 못하도록 숨기는 것이 주요 목적이다.<br><br>[보기] &nbsp; ㄱ.Worm &nbsp; ㄴ.Trojan horse &nbsp; ㄷ.Backdoor &nbsp; ㄹ.Virus &nbsp; ㅁ.Ransomware &nbsp; ㅂ.Spyware &nbsp; ㅅ.Rootkit</div>`,
    ansHtml:`<div class="answer-val">ㅅ. Rootkit</div><div class="keyword-detail">📌 <b>풀이</b><br><b>루트킷(Rootkit)</b>은 시스템 깊숙이(커널 수준까지) 숨어들어 자신의 존재를 완전히 숨기는 악성 소프트웨어예요. "루트(root) 권한을 유지하는 킷(kit)"이에요. 바이러스 백신도 탐지하기 어렵고 제거도 매우 어려워요.<br><br>📎 <b>악성 소프트웨어 종류 비교</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>바이러스(Virus)</b></td><td style="text-align:left;vertical-align:middle">다른 파일에 기생하며 실행 시 감염을 퍼뜨려요. 숙주 파일 없이는 실행 불가해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>웜(Worm)</b></td><td style="text-align:left;vertical-align:middle">독립 실행되며 네트워크를 통해 스스로 전파해요. 숙주가 필요 없어요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>트로이 목마</b></td><td style="text-align:left;vertical-align:middle">정상 프로그램으로 위장해요. 백도어 생성·정보 탈취 등을 수행하며 자가 복제 능력은 없어요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>루트킷(Rootkit)</b></td><td style="text-align:left;vertical-align:middle">커널 수준에서 동작하며 자신의 존재를 숨겨요. 탐지·제거가 매우 어려워요. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>랜섬웨어</b></td><td style="text-align:left;vertical-align:middle">파일을 암호화한 후 금전을 요구해요. 2017년 WannaCry가 대표적이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>스파이웨어</b></td><td style="text-align:left;vertical-align:middle">사용자 정보(키보드 입력, 브라우저 이력 등)를 몰래 수집·전송해요.</td></tr></table></div></div>` },
  { id:'24_1_7', year:'2024', round:'1회', cat:'SW 개발/계획',
    qHtml:`<div class="q-text">아래에서 설명하는 테스트 커버리지를 보기에서 골라 쓰시오.<br><br>복합 조건식 내 각 조건이 전체 결정식의 결과에 독립적으로 영향을 미치는 경우만을 선별하여 테스트하는 기준이다. 특정 조건 하나를 참·거짓으로 바꿀 때 전체 결정식의 결과도 바뀌는 경우를 테스트한다.<br><br>[보기] &nbsp; ㄱ.구문 커버리지 &nbsp; ㄴ.결정 커버리지 &nbsp; ㄷ.조건 커버리지 &nbsp; ㄹ.변경 조건/결정 커버리지(MC/DC) &nbsp; ㅁ.다중 조건 커버리지 &nbsp; ㅂ.경로 커버리지 &nbsp; ㅅ.조건/결정 커버리지</div>`,
    ansHtml:`<div class="answer-val">ㄹ. 변경 조건/결정 커버리지 (MC/DC)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>MC/DC(Modified Condition/Decision Coverage)</b>는 각 조건이 독립적으로 전체 결정의 결과에 영향을 미치는 경우만 테스트해요. 항공기·자동차처럼 사람 목숨이 달린 시스템에서 의무적으로 요구돼요.<br><br>📎 <b>커버리지 종류 비교 (약→강)</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>문장(Statement)</b></td><td style="text-align:left;vertical-align:middle">모든 실행 줄 최소 1번 실행해요. 가장 약한 기준이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>결정(Decision)/분기(Branch)</b></td><td style="text-align:left;vertical-align:middle">각 결정문의 T/F를 각각 최소 1번씩 실행해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>조건(Condition)</b></td><td style="text-align:left;vertical-align:middle">개별 원자 조건식 각각의 T/F를 최소 1번씩 실행해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>조건/결정</b></td><td style="text-align:left;vertical-align:middle">결정 + 조건 커버리지를 동시에 만족해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>다중 조건(Multiple Condition)</b></td><td style="text-align:left;vertical-align:middle">모든 조건 조합을 테스트해요. 조건 n개 → 최대 2^n개 케이스로 비용이 커요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>MC/DC</b></td><td style="text-align:left;vertical-align:middle">각 조건이 독립적으로 결정에 영향을 미치는 경우만 선별해요. 항공(DO-178C)·자동차(ISO 26262)에서 의무 적용해요. ← <u>정답</u></td></tr></table></div></div>` },
  { id:'24_1_8', year:'2024', round:'1회', cat:'정보보안',
    qHtml:`<div class="q-text">아래에서 설명하는 사이버 공격 기법을 보기에서 골라 쓰시오.<br><br>1. 특정 표적을 선정하여 장기간에 걸쳐 지속적으로 공격을 감행한다.<br>2. 표적 내부 직원들이 사용하는 다양한 단말기를 공격 대상으로 삼는다.<br>3. Zero-day 취약점, 악성코드 등 다양한 공격 기술을 복합적으로 활용한다.<br>4. 일반적으로 침투→검색→수집→유출의 4단계로 진행된다.<br><br>[보기] &nbsp; ㄱ.사회공학기법 &nbsp; ㄴ.Adware &nbsp; ㄷ.MITM &nbsp; ㄹ.XDR &nbsp; ㅁ.Replace attack &nbsp; ㅂ.Key Logger attack &nbsp; ㅅ.APT</div>`,
    ansHtml:`<div class="answer-val">ㅅ. APT (Advanced Persistent Threat)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>APT(지능형 지속 공격)</b>은 특정 표적(기업, 정부기관)을 향해 장기간(수개월~수년) 은밀하게 수행하는 고도화된 사이버 공격이에요. 정찰→침투→확산→목표 달성 단계로 진행돼요.<br><br>📎 <b>같이 알아두면 좋은 키워드</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>APT 공격 단계</b></td><td style="text-align:left;vertical-align:middle">① 정찰(표적 정보 수집) → ② 초기 침투(스피어피싱, 워터링 홀) → ③ 내부 확산(권한 상승, 측면 이동) → ④ 목표 달성(데이터 유출, 파괴)으로 진행해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>스피어피싱(Spear Phishing)</b></td><td style="text-align:left;vertical-align:middle">APT 초기 침투에 자주 쓰여요. 특정 개인·조직을 표적으로 삼아 신뢰할 수 있는 것처럼 위장한 이메일을 보내 악성 코드를 설치해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>워터링 홀(Watering Hole)</b></td><td style="text-align:left;vertical-align:middle">표적이 자주 방문하는 합법적인 웹사이트를 감염시켜 방문 시 자동으로 악성 코드가 설치되도록 하는 기법이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>C&C 서버(Command & Control)</b></td><td style="text-align:left;vertical-align:middle">공격자가 감염된 시스템을 원격 제어하는 서버예요. 감염된 PC는 C&C 서버의 명령을 받아 정보를 유출하거나 추가 공격을 수행해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Zero-day 취약점</b></td><td style="text-align:left;vertical-align:middle">공개되지 않아 패치가 없는 보안 취약점이에요. APT 공격에서 자주 활용돼요.</td></tr></table></div></div>` },
  { id:'24_1_9', year:'2024', round:'1회', cat:'SQL문',
    qHtml:`<div class="q-text">다음 두 테이블에 대해 SQL문을 실행하였을 때, 나타나는 결과를 작성하시오. (속성명 + 값 출력)<br><br><div class="sql-box">SELECT B
FROM R1
WHERE C IN (SELECT C FROM R2 WHERE D = \'k\');</div><br><div class="tables-row"><div><div class="tbl-label">[ R1 ]</div><table class="db-table"><tr><th>A</th><th>B</th><th>C</th></tr><tr><td>1</td><td>a</td><td>x</td></tr><tr><td>2</td><td>b</td><td>x</td></tr><tr><td>1</td><td>c</td><td>w</td></tr><tr><td>3</td><td>d</td><td>w</td></tr></table></div><div><div class="tbl-label">[ R2 ]</div><table class="db-table"><tr><th>C</th><th>D</th><th>E</th></tr><tr><td>x</td><td>k</td><td>3</td></tr><tr><td>y</td><td>k</td><td>3</td></tr><tr><td>z</td><td>s</td><td>2</td></tr></table></div></div>`,
    ansHtml:`<div class="answer-val">B열: a, b</div><div class="keyword-detail">📌 <b>풀이</b><br>이 SQL은 중첩 서브쿼리 구조예요. 가장 안쪽부터 실행돼요. ① R2에서 D='k'인 C값 → {x, y}. ② R1에서 C가 x 또는 y인 행의 B값 조회 → a(C=x), b(C=x)예요.<br><br>📎 <b>서브쿼리 관련 키워드</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>중첩 서브쿼리</b></td><td style="text-align:left;vertical-align:middle">SELECT 안에 또 다른 SELECT가 있는 구조예요. 안쪽 서브쿼리부터 먼저 실행되고, 그 결과를 바깥 쿼리에서 사용해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>IN 연산자</b></td><td style="text-align:left;vertical-align:middle"><code>C IN (서브쿼리)</code>는 서브쿼리 결과 목록 중 하나와 일치하면 참이에요. <code>C = x OR C = y</code>와 동일해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>EXISTS</b></td><td style="text-align:left;vertical-align:middle">서브쿼리 결과가 하나라도 존재하면 참이에요. IN보다 대용량 데이터에서 성능이 좋을 때가 있어요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>스칼라 서브쿼리</b></td><td style="text-align:left;vertical-align:middle">SELECT 절에 사용되어 단일 값을 반환하는 서브쿼리예요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>상관 서브쿼리</b></td><td style="text-align:left;vertical-align:middle">바깥 쿼리의 컬럼을 안쪽 서브쿼리에서 참조하는 구조예요. 행마다 서브쿼리가 실행돼요.</td></tr></table></div></div>` },
  { id:'24_1_10', year:'2024', round:'1회', cat:'SQL문',
    qHtml:`<div class="q-text">다음 테이블에 대해 SQL문을 실행하였을 때, 나타나는 결과를 작성하시오.<br><br><div class="tables-row"><div><table class="db-table"><tr><th>EMPNO</th><th>SAL</th></tr><tr><td>100</td><td>1000</td></tr><tr><td>200</td><td>3000</td></tr><tr><td>300</td><td>1500</td></tr></table></div><div><div class="sql-box">SELECT COUNT(*)
FROM TABLE1
WHERE EMPNO &gt; 100 AND SAL &gt;= 3000 OR EMPNO = 200;</div></div></div>`,
    ansHtml:`<div class="answer-val">1</div><div class="keyword-detail">📌 <b>풀이</b><br>SQL에서 <b>AND가 OR보다 먼저 계산</b>돼요. 이 쿼리를 괄호로 표현하면 <code>(EMPNO &gt; 100 AND SAL &gt;= 3000) OR (EMPNO = 200 AND SAL &gt;= 3000)</code>이에요. EMPNO=200, SAL=3000인 행만 두 조건 모두 충족해서 COUNT=1이에요.<br><br>📎 <b>SQL 연산자 우선순위</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>AND vs OR 우선순위</b></td><td style="text-align:left;vertical-align:middle">AND가 OR보다 먼저 계산돼요. 수학에서 ×가 +보다 먼저인 것과 같아요. 헷갈리면 괄호()로 명시적으로 표현하세요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>COUNT(*) vs COUNT(컬럼)</b></td><td style="text-align:left;vertical-align:middle">COUNT(*)는 NULL 포함 모든 행. COUNT(컬럼)은 해당 컬럼이 NULL인 행 제외해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>HAVING vs WHERE</b></td><td style="text-align:left;vertical-align:middle">WHERE는 행(row) 필터링, HAVING은 그룹 함수(COUNT, SUM 등) 결과 필터링이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>연산자 우선순위 순서</b></td><td style="text-align:left;vertical-align:middle">NOT → AND → OR 순으로 우선순위가 높아요. NOT이 가장 먼저, OR이 가장 나중에 계산돼요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>NULL과 비교</b></td><td style="text-align:left;vertical-align:middle">NULL과의 비교는 항상 UNKNOWN이에요. NULL = NULL은 TRUE가 아니므로 IS NULL을 사용해야 해요.</td></tr></table></div></div>` },
  { id:'24_1_11', year:'2024', round:'1회', cat:'SW 개발/계획',
    qHtml:`<div class="q-text">아래에서 설명하는 디자인 패턴의 명칭을 쓰시오.<br><br>· 연관성 있는 여러 종류의 객체들을 묶어 추상화하고, 상황에 따라 구체화된 객체 집합을 일관된 방식으로 생성하는 생성 패턴이다.<br>· 구체적인 클래스에 의존하지 않고 서로 관련된 객체들의 조합을 만드는 인터페이스를 제공한다.<br>· 'Kit'라고도 불리며, 관련 객체군을 일관성 있게 생성할 때 유용하다.</div>`,
    ansHtml:`<div class="answer-val">Abstract Factory (추상 팩토리) 패턴</div><div class="keyword-detail">📌 <b>풀이</b><br><b>Abstract Factory 패턴</b>은 연관된 객체들의 "제품군(Family)"을 한꺼번에 생성하는 패턴이에요. "윈도우 스타일 UI"를 만들 때 버튼·스크롤바·텍스트박스를 일관되게 윈도우 스타일로 만드는 것처럼, 관련 객체들을 통째로 교체할 수 있어요.<br><br>📎 <b>GoF 생성(Creational) 패턴 5가지</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Singleton (싱글톤)</b></td><td style="text-align:left;vertical-align:middle">프로그램 전체에서 인스턴스가 딱 하나만 만들어지도록 보장해요. 설정 관리자, DB 연결 풀에 사용해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Factory Method</b></td><td style="text-align:left;vertical-align:middle">객체 생성 인터페이스는 상위 클래스가 정의하고, 실제 생성은 서브클래스가 결정해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Abstract Factory</b></td><td style="text-align:left;vertical-align:middle">연관된 여러 객체(제품군)를 일관되게 생성하는 인터페이스를 제공해요. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Builder</b></td><td style="text-align:left;vertical-align:middle">복잡한 객체를 단계적으로 생성해요. 같은 프로세스로 다른 표현을 만들 수 있어요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Prototype</b></td><td style="text-align:left;vertical-align:middle">기존 객체를 복사(clone)해서 새 객체를 만들어요. 생성 비용이 클 때 유용해요.</td></tr></table></div></div>` },

  // ─── 2023년 3회 ───
  { id:'23_3_1', year:'2023', round:'3회', cat:'정보보안',
    qHtml:`<div class="q-text">아래는 특정 표준 프로토콜에 대한 설명이다. 해당 프로토콜을 보기에서 골라 쓰시오.<br><br>· 사용자가 자격증명(ID·비밀번호)을 제3의 애플리케이션에 직접 제공하지 않고, 해당 서비스가 리소스에 접근할 수 있도록 권한을 위임하는 개방형 표준 프로토콜이다.<br>· 액세스 토큰(Access Token)을 발급하여 타사 애플리케이션에 리소스 접근 권한을 부여하는 메커니즘을 제공한다.<br>· 소셜 미디어 플랫폼(Facebook, Twitter 등)에서 제3자 앱에 사용자 데이터 접근 권한을 부여할 때 널리 활용된다.<br><br>[보기] &nbsp; ㄱ.NFT &nbsp; ㄴ.JWT &nbsp; ㄷ.SAML &nbsp; ㄹ.accessToken &nbsp; ㅁ.SSO &nbsp; ㅂ.OIDC &nbsp; ㅅ.Authentication &nbsp; ㅇ.OAuth &nbsp; ㅈ.Cookie &nbsp; ㅊ.Refresh Token</div>`,
    ansHtml:`<div class="answer-val">ㅇ. OAuth</div><div class="keyword-detail">📌 <b>풀이</b><br><b>OAuth</b>는 내 비밀번호를 알려주지 않고도 다른 서비스에 내 정보 접근을 허락하는 <b>인가(Authorization)</b> 프로토콜이에요. "구글 계정으로 로그인"할 때 구글이 비밀번호 대신 <b>Access Token</b>(한정된 권한 증명서)을 발급해주는 방식이에요.<br><br>📎 <b>같이 알아두면 좋은 키워드</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>OAuth 2.0</b></td><td style="text-align:left;vertical-align:middle">현재 표준 인가 프로토콜이에요. Access Token을 발급해서 권한을 위임해요. "구글·카카오 계정으로 로그인" 기능의 핵심이에요. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>인증(Authentication) vs 인가(Authorization)</b></td><td style="text-align:left;vertical-align:middle">인증은 "네가 누구야?"를 확인하는 것이고, 인가는 "네가 이거 해도 돼?"를 결정하는 것이에요. OAuth는 <b>인가</b>만 담당해요. 인증까지 하려면 OIDC를 추가해야 해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>OIDC (OpenID Connect)</b></td><td style="text-align:left;vertical-align:middle">OAuth 2.0 위에 인증(Authentication) 기능을 추가한 표준이에요. ID Token(JWT 형식)을 발급해서 사용자 신원도 확인할 수 있어요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Access Token</b></td><td style="text-align:left;vertical-align:middle">OAuth에서 발급하는 접근 권한 증명서예요. 이 토큰을 제시하면 허가된 리소스에 접근할 수 있어요. 만료 시간이 있어서 탈취되어도 영구적으로 사용하지 못해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>SSO (Single Sign-On)</b></td><td style="text-align:left;vertical-align:middle">한 번 로그인으로 여러 서비스를 이용할 수 있는 기술이에요. OAuth와 달리 동일 조직·도메인 내 시스템 간 통합 인증에 초점을 맞춰요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>JWT (JSON Web Token)</b></td><td style="text-align:left;vertical-align:middle">OAuth/OIDC에서 자주 사용하는 토큰 형식이에요. Header.Payload.Signature 세 부분으로 구성되며, 서버가 별도 저장 없이 토큰 자체로 검증할 수 있어요.</td></tr></table></div></div>` },
  { id:'23_3_2', year:'2023', round:'3회', cat:'운영체제',
    qHtml:`<div class="q-text">리눅스(Linux) 환경에서 test.txt 파일에 아래 조건의 접근 권한을 부여하는 명령어를 완성하시오. (8진수 표기 사용)<br><br>· 사용자(Owner): 읽기·쓰기·실행<br>· 그룹(Group): 읽기·실행<br>· 기타(Others): 실행<br><br>( (1) ) &nbsp; ( (2) ) &nbsp; test.txt</div>`,
    ansHtml:`<div class="answer-val">(1) chmod &nbsp;&nbsp; (2) 751</div><div class="keyword-detail">📌 <b>풀이</b><br>리눅스 파일 권한은 8진수로 표현해요. 읽기(r)=4, 쓰기(w)=2, 실행(x)=1이에요. <b>사용자(Owner)</b> rwx=4+2+1=<b>7</b>, <b>그룹(Group)</b> r-x=4+0+1=<b>5</b>, <b>기타(Other)</b> --x=0+0+1=<b>1</b> → chmod <b>751</b>이에요.<br><br>📎 <b>리눅스 파일 권한 체계</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>chmod (change mode)</b></td><td style="text-align:left;vertical-align:middle">파일의 접근 권한을 변경하는 명령어예요. <code>chmod 권한번호 파일명</code> 형식으로 사용해요. ← <u>정답1</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>8진수 권한 계산</b></td><td style="text-align:left;vertical-align:middle">r=4, w=2, x=1의 합으로 계산해요. rwx=7, rw-=6, r-x=5, r--=4, ---=0. 소유자·그룹·기타 순으로 3자리예요. 751 = rwx / r-x / --x ← <u>정답2</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>소유자·그룹·기타</b></td><td style="text-align:left;vertical-align:middle">파일 권한은 세 범주로 나뉘어요. 소유자(Owner): 파일을 만든 사람. 그룹(Group): 소유자와 같은 그룹의 사용자들. 기타(Other): 그 외 모든 사용자.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>chmod 644</b></td><td style="text-align:left;vertical-align:middle">일반 파일의 기본 권한이에요. 소유자: rw-(6), 그룹: r--(4), 기타: r--(4). 소유자는 읽고 쓸 수 있고, 나머지는 읽기만 가능해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>chmod 755</b></td><td style="text-align:left;vertical-align:middle">실행 파일·디렉토리의 기본 권한이에요. 소유자: rwx(7), 그룹: r-x(5), 기타: r-x(5). 소유자는 모든 것, 나머지는 읽기·실행 가능해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>심볼릭 표기법</b></td><td style="text-align:left;vertical-align:middle">숫자 대신 문자로도 표현해요. <code>chmod u+x 파일</code>은 소유자(u)에게 실행(x) 권한 추가. a=all, g=group, o=other예요.</td></tr></table></div></div>` },
  { id:'23_3_3', year:'2023', round:'3회', cat:'SQL문',
    qHtml:`<div class="q-text">아래 두 테이블 T1, T2에 대해 다음 SQL을 실행한 결과를 내림차순으로 작성하시오.<br><br><div class="tables-row"><div><div class="tbl-label">T1</div><table class="db-table"><tr><th>A</th></tr><tr><td>3</td></tr><tr><td>1</td></tr><tr><td>4</td></tr></table></div><div><div class="tbl-label">T2</div><table class="db-table"><tr><th>A</th></tr><tr><td>2</td></tr><tr><td>4</td></tr><tr><td>3</td></tr></table></div></div><div class="sql-box">SELECT A FROM T1
UNION
SELECT A FROM T2
ORDER BY A DESC;</div>`,
    ansHtml:`<div class="answer-val">4, 3, 2, 1 (내림차순)</div><div class="keyword-detail">📌 <b>풀이</b><br>SQL <b>UNION</b>은 두 SELECT 결과를 합치고 <b>중복을 제거</b>해요. T1={3,1,4}, T2={2,4,3}의 합집합은 {1,2,3,4}이고 ORDER BY A DESC(내림차순)로 정렬하면 4→3→2→1이에요.<br><br>📎 <b>집합 연산자 비교</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>UNION</b></td><td style="text-align:left;vertical-align:middle">두 SELECT 결과를 합치고 중복을 제거해요. 두 SELECT의 컬럼 수와 데이터 타입이 일치해야 해요. ← <u>이번 문제</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>UNION ALL</b></td><td style="text-align:left;vertical-align:middle">두 SELECT 결과를 합치지만 중복을 제거하지 않아요. UNION보다 빠르지만 중복 데이터가 포함될 수 있어요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>INTERSECT</b></td><td style="text-align:left;vertical-align:middle">두 SELECT 결과의 교집합(양쪽 모두 있는 것)을 반환해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>EXCEPT / MINUS</b></td><td style="text-align:left;vertical-align:middle">첫 번째 SELECT에는 있지만 두 번째에는 없는 것(차집합)을 반환해요. Oracle은 MINUS, SQL 표준은 EXCEPT를 사용해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>ORDER BY ASC / DESC</b></td><td style="text-align:left;vertical-align:middle">결과를 오름차순(ASC, 기본값) 또는 내림차순(DESC)으로 정렬해요. UNION 전체 결과에 적용할 때는 마지막 SELECT 뒤에 한 번만 써요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>중복 제거 원리</b></td><td style="text-align:left;vertical-align:middle">UNION의 중복 제거는 내부적으로 정렬 후 비교하는 방식이에요. 대용량 데이터에서는 UNION ALL이 더 빠를 수 있어요.</td></tr></table></div></div>` },
  { id:'23_3_4', year:'2023', round:'3회', cat:'정보보안',
    qHtml:`<div class="q-text">서버 접근 통제 유형에 대한 설명이다. 각 설명에 해당하는 접근 통제 모델을 영문 약자로 쓰시오.<br><br>(1) 규칙 기반 접근 통제로, 객체에 포함된 정보의 허용 등급과 주체의 접근 허가 권한에 근거하여 접근을 제한하는 방법<br>(2) 중앙 관리자가 사용자와 시스템의 상호관계를 통제하며, 조직 내 역할(Role)에 기초하여 자원 접근을 제한하는 방법<br>(3) 신분 기반 접근 통제로, 주체나 그룹의 신분에 근거하여 객체에 대한 접근을 제한하는 방법</div>`,
    ansHtml:`<div class="answer-val">(1) MAC &nbsp;&nbsp; (2) RBAC &nbsp;&nbsp; (3) DAC</div><div class="keyword-detail">📌 <b>풀이</b><br>접근통제 모델 3가지를 쉽게 기억해요. <b>MAC</b>은 군대처럼 보안 등급으로 강제 통제, <b>RBAC</b>은 회사처럼 역할(직무)에 따라 통제, <b>DAC</b>은 파일 소유자가 직접 권한을 부여하는 방식이에요.<br><br>📎 <b>접근통제 모델 비교</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>MAC (Mandatory Access Control)</b></td><td style="text-align:left;vertical-align:middle">강제적 통제예요. 시스템 관리자가 설정한 보안 등급(극비·비밀·일반)에 따라 접근이 강제돼요. 개인이 권한을 변경할 수 없어요. 군대·정부기관에서 사용해요. ← <u>정답1</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>RBAC (Role-Based Access Control)</b></td><td style="text-align:left;vertical-align:middle">역할(Role) 기반 통제예요. 직무(부장·과장·사원)에 따라 접근 권한을 부여해요. 역할만 변경하면 권한이 자동으로 바뀌어서 관리가 편리해요. ← <u>정답2</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>DAC (Discretionary Access Control)</b></td><td style="text-align:left;vertical-align:middle">임의적 통제예요. 파일 소유자가 직접 다른 사람에게 권한을 부여해요. 유연하지만 소유자 실수로 보안이 약해질 수 있어요. ← <u>정답3</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>ABAC (Attribute-Based Access Control)</b></td><td style="text-align:left;vertical-align:middle">속성 기반 통제예요. 사용자 속성(부서, 직급), 자원 속성(분류), 환경 속성(시간, 위치)을 조합해서 동적으로 접근을 제어해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>최소 권한 원칙</b></td><td style="text-align:left;vertical-align:middle">업무에 꼭 필요한 최소한의 권한만 부여하는 보안 원칙이에요. 불필요한 권한을 제거하면 공격 피해 범위를 줄일 수 있어요.</td></tr><tr><td colspan="2" style="color:var(--c-text2);font-style:italic;border-top:1px dashed var(--c-border2)">📝 암기법: MAC=군대(강제), RBAC=회사(역할), DAC=내 파일은 내가(임의)</td></tr></table></div></div>` },
  { id:'23_3_5', year:'2023', round:'3회', cat:'네트워크',
    qHtml:`<div class="q-text">아래에서 설명하는 통신 기술의 영문 약자를 쓰시오.<br><br>· 자료를 일정한 크기의 고정 길이 패킷(셀, 53바이트)으로 나누어 전송하는 방식이다.<br>· 가상 채널(Virtual Channel) 기반의 연결 지향 서비스로 통계적 다중화 방식을 사용한다.<br>· 처리가 단순하여 고속 네트워크에 적합하다.</div>`,
    ansHtml:`<div class="answer-val">ATM (Asynchronous Transfer Mode)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>ATM(비동기 전송 방식)</b>은 데이터를 53바이트 고정 크기의 "셀(Cell)"로 나눠서 전송하는 방식이에요. 셀 크기가 고정돼 있어서 처리 속도가 빠르고 실시간 음성·영상 서비스에 적합해요.<br><br>📎 <b>같이 알아두면 좋은 키워드</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>셀(Cell) 구조</b></td><td style="text-align:left;vertical-align:middle">53바이트 = 5바이트 헤더 + 48바이트 페이로드(데이터)예요. 크기가 고정돼 있어서 하드웨어에서 빠르게 처리할 수 있고 QoS 보장이 가능해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>고정 길이 vs 가변 길이</b></td><td style="text-align:left;vertical-align:middle">이더넷·IP 패킷은 가변 길이예요. ATM은 고정 길이(셀)를 사용해서 처리 예측성이 높아요. 단, 짧은 데이터도 53바이트로 패딩해야 해서 오버헤드가 생길 수 있어요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>비동기(Asynchronous)</b></td><td style="text-align:left;vertical-align:middle">셀이 고정된 시간 슬롯에 묶이지 않고 필요할 때 전송돼요. 동기(Synchronous) 방식의 낭비를 줄이면서도 고속 전송이 가능해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>QoS (Quality of Service)</b></td><td style="text-align:left;vertical-align:middle">ATM의 대표적 장점이에요. 음성·영상 등 실시간 서비스에 필요한 대역폭·지연·지터를 보장해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>B-ISDN</b></td><td style="text-align:left;vertical-align:middle">ATM 기반의 광대역 통합 서비스 디지털 네트워크예요. 음성·데이터·영상을 하나의 네트워크에서 통합 전송하는 것이 목표였어요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>현재 위치</b></td><td style="text-align:left;vertical-align:middle">ATM은 현재 IP 기반 고속 이더넷으로 대부분 대체됐어요. 하지만 정보처리기사 시험에서는 고정 길이 셀(53바이트), QoS, B-ISDN 연관 개념으로 자주 출제돼요.</td></tr></table></div></div>` },
  { id:'23_3_6', year:'2023', round:'3회', cat:'네트워크',
    qHtml:`<div class="q-text">공인 IP 주소와 포트 번호를 내부 사설 IP 주소로 변환하여 라우터를 통해 내·외부 네트워크 트래픽을 중계하는 기술의 명칭을 쓰시오.</div>`,
    ansHtml:`<div class="answer-val">NAT (Network Address Translation)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>NAT</b>은 집에서 쓰는 사설 IP(192.168.x.x)를 인터넷 연결을 위해 공인 IP로 변환해주는 기술이에요. 공유기가 바로 NAT를 수행해요. 한 개의 공인 IP로 여러 기기가 인터넷에 접속할 수 있어요.<br><br>📎 <b>같이 알아두면 좋은 키워드</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>사설 IP 대역</b></td><td style="text-align:left;vertical-align:middle">인터넷에서 직접 사용할 수 없는 내부 전용 IP예요. 10.x.x.x, 172.16~31.x.x, 192.168.x.x 세 가지 대역이에요. NAT를 통해 공인 IP로 변환해야 인터넷 통신이 가능해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>PAT (Port Address Translation)</b></td><td style="text-align:left;vertical-align:middle">NAT의 확장 형태예요. IP 주소뿐만 아니라 포트 번호까지 함께 변환해서 여러 기기가 하나의 공인 IP를 공유해요. NAPT 또는 IP Masquerading이라고도 해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>IPv4 주소 고갈</b></td><td style="text-align:left;vertical-align:middle">NAT가 필요한 근본 원인이에요. IPv4는 약 43억 개의 주소밖에 없어서 모든 기기에 공인 IP를 부여하기 어려워요. 사설 IP+NAT로 이 문제를 해결해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>IPv6</b></td><td style="text-align:left;vertical-align:middle">128비트 주소 체계로 사실상 무한한 주소를 제공해요. IPv6 환경에서는 NAT 없이도 모든 기기에 고유한 공인 IP를 부여할 수 있어요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>NAT의 보안 효과</b></td><td style="text-align:left;vertical-align:middle">내부 네트워크의 사설 IP 구조를 외부에서 직접 볼 수 없게 해요. 방화벽 역할은 아니지만 내부 토폴로지를 숨기는 부수적인 보안 효과가 있어요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>NAT 테이블</b></td><td style="text-align:left;vertical-align:middle">NAT 장치(공유기)는 내부 IP+포트 ↔ 외부 IP+포트 매핑 테이블을 관리해요. 응답 패킷이 오면 이 테이블을 참조해 올바른 내부 기기로 전달해요.</td></tr></table></div></div>` },
  { id:'23_3_7', year:'2023', round:'3회', cat:'데이터베이스',
    qHtml:`<div class="q-text">관계 대수에서 아래 각 연산에 해당하는 기호를 보기에서 골라 쓰시오.<br><br>1. join (조인)<br>2. project (프로젝션)<br>3. select (셀렉션)<br>4. division (나누기)<br><br>[보기] &nbsp; ㄱ. σ &nbsp; ㄴ. π &nbsp; ㄷ. ⋈ &nbsp; ㄹ. ÷</div>`,
    ansHtml:`<div class="answer-val">1. ⋈(ㄷ) &nbsp; 2. π(ㄴ) &nbsp; 3. σ(ㄱ) &nbsp; 4. ÷(ㄹ)</div><div class="keyword-detail">📌 <b>풀이</b><br>관계 대수 기호를 외울 때는 모양을 보세요. <b>⋈(보타이)</b>는 두 테이블 연결(조인), <b>π(파이)</b>는 열 선택(프로젝션), <b>σ(시그마)</b>는 행 선택(셀렉트), <b>÷(나누기)</b>는 "전부 해당하는" 조건이에요.<br><br>📎 <b>관계 대수 연산자 전체 정리</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>⋈(보타이) - Join (조인)</b></td><td style="text-align:left;vertical-align:middle">두 릴레이션을 공통 속성으로 연결해요. SQL의 JOIN에 해당해요. 세타 조인(모든 비교 연산자) ⊇ 동등 조인(=만) ⊇ 자연 조인(중복 제거) 순으로 포함 관계예요. ← <u>정답1</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>π(파이) - Project (프로젝션)</b></td><td style="text-align:left;vertical-align:middle">릴레이션에서 지정한 열(속성)만 추출하고 중복을 제거해요. SQL의 SELECT DISTINCT 컬럼명에 해당해요. ← <u>정답2</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>σ(시그마) - Select (셀렉트)</b></td><td style="text-align:left;vertical-align:middle">조건을 만족하는 행(튜플)만 선택해요. SQL의 WHERE 절에 해당해요. σ나이&gt;20(학생)은 나이가 20 초과인 학생만 추출해요. ← <u>정답3</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>÷(나누기) - Division (디비전)</b></td><td style="text-align:left;vertical-align:middle">S의 모든 튜플과 쌍이 이루어지는 R의 튜플만 추출해요. "모든 과목을 수강한 학생"처럼 "전부 포함하는" 조건을 표현할 때 사용해요. ← <u>정답4</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>∪ / − / ×</b></td><td style="text-align:left;vertical-align:middle">∪(합집합): SQL의 UNION. −(차집합): SQL의 EXCEPT/MINUS. ×(카티션 곱): 모든 행 조합, SQL의 CROSS JOIN. R이 m행, S가 n행이면 m×n행 결과.</td></tr></table></div></div>` },
  { id:'23_3_8', year:'2023', round:'3회', cat:'데이터베이스',
    qHtml:`<div class="q-text">아래는 데이터베이스 무결성에 관한 설명이다. 해당하는 무결성의 종류를 쓰시오.<br><br>· 관계형 데이터베이스에서 두 테이블 간의 일관성(데이터 무결성)을 유지하는 개념이다.<br>· 외래 키가 선언된 테이블의 외래 키 값은 참조 대상 테이블의 기본 키 값 또는 후보 키 값으로 반드시 존재해야 한다.</div>`,
    ansHtml:`<div class="answer-val">참조 무결성 (Referential Integrity)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>참조 무결성</b>은 두 테이블 사이의 참조 관계가 항상 정확해야 한다는 규칙이에요. 학생 테이블의 학과코드(FK)가 학과 테이블에 없는 값을 가지면 안 돼요. 마치 "존재하지 않는 회사에 다니는 직원"은 있을 수 없는 것처럼요.<br><br>📎 <b>무결성 제약조건 4종 비교</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>참조 무결성</b></td><td style="text-align:left;vertical-align:middle">FK의 값은 참조하는 테이블의 PK에 존재하거나 NULL이어야 해요. FOREIGN KEY 제약조건으로 구현해요. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>개체 무결성</b></td><td style="text-align:left;vertical-align:middle">PK는 NULL 불가·중복 불가예요. 각 행을 유일하게 식별하기 위해 필요해요. PRIMARY KEY 제약조건으로 구현해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>도메인 무결성</b></td><td style="text-align:left;vertical-align:middle">속성값은 반드시 해당 도메인(유효 범위) 안에 있어야 해요. CHECK·NOT NULL·데이터 타입으로 구현해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>CASCADE 옵션</b></td><td style="text-align:left;vertical-align:middle">참조 무결성 위반 시 처리 방법이에요. CASCADE: 부모 삭제 시 자식도 연쇄 삭제. RESTRICT: 자식이 있으면 삭제 거부. SET NULL: 자식 FK를 NULL로 변경.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>FK 제약조건 예시</b></td><td style="text-align:left;vertical-align:middle"><code>FOREIGN KEY (학과코드) REFERENCES 학과(학과코드)</code>처럼 정의해요. 학생 테이블의 학과코드는 반드시 학과 테이블에 존재해야 해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>NULL과 참조 무결성</b></td><td style="text-align:left;vertical-align:middle">FK 값이 NULL인 것은 참조 무결성을 위반하지 않아요. "학과가 아직 정해지지 않은 학생"처럼 미확정 상태를 표현할 수 있어요.</td></tr></table></div></div>` },
  { id:'23_3_9', year:'2023', round:'3회', cat:'SW 개발/계획',
    qHtml:`<div class="q-text">아래는 소프트웨어 테스트 기법에 대한 설명이다. 보기에서 해당하는 기법을 골라 쓰시오.<br><br>· 시스템 입력값과 출력값이 특정 그룹으로 분류되며, 동일 그룹 내의 값들은 시스템에 의해 동일하게 처리된다는 특성을 이용하는 기법이다.<br>· 하나의 값이 그 분할 내 모든 값을 대표한다고 간주하여, 모든 입력값을 시험할 필요 없이 효율적으로 테스트 케이스를 도출한다.<br>· 일반적으로 경계값 분석기법(Boundary Value Analysis)과 함께 사용된다.<br><br>[보기] &nbsp; ㄱ.Equivalence Partitioning &nbsp; ㄴ.Statement Coverage &nbsp; ㄷ.Boundary Value Analysis &nbsp; ㄹ.Branch Coverage &nbsp; ㅁ.Error Guessing &nbsp; ㅂ.Condition Coverage &nbsp; ㅅ.Cause Effect Graph</div>`,
    ansHtml:`<div class="answer-val">ㄱ. Equivalence Partitioning (동치 분할)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>동치 분할(Equivalence Partitioning)</b>은 입력값을 같은 결과를 내는 그룹으로 나누고, 각 그룹의 대표값 하나만 테스트해요. 90~100점은 모두 "A"를 반환하므로 95점 하나만 테스트하면 돼요.<br><br>📎 <b>블랙박스 테스트 기법 비교</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>동치 분할 (Equivalence Partitioning)</b></td><td style="text-align:left;vertical-align:middle">유사한 입력을 동등 클래스(그룹)로 나눠 대표값만 테스트해요. 테스트 케이스 수를 줄이면서 효율적으로 테스트해요. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>경계값 분석 (Boundary Value Analysis)</b></td><td style="text-align:left;vertical-align:middle">동치 분할의 보완 기법이에요. 구간 경계(최솟값-1, 최솟값, 최솟값+1 등)를 테스트해요. 오류가 경계 부근에서 많이 발생하기 때문이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>원인-결과 그래프 (Cause-Effect)</b></td><td style="text-align:left;vertical-align:middle">입력 조건(원인)과 출력(결과)의 관계를 논리 그래프로 표현해요. 결정 테이블로 변환하여 테스트 케이스를 도출해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>오류 예측 (Error Guessing)</b></td><td style="text-align:left;vertical-align:middle">경험과 직관으로 오류 발생 가능 부분을 테스트해요. 가장 비형식적이고 테스터의 역량에 의존하는 기법이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>비교 검사 (Comparison Testing)</b></td><td style="text-align:left;vertical-align:middle">동일한 입력에 대해 여러 버전의 소프트웨어 결과를 비교해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>블랙박스 vs 화이트박스</b></td><td style="text-align:left;vertical-align:middle">블랙박스(명세 기반): 내부 구조를 모르고 입출력만으로 테스트. 화이트박스(구조 기반): 내부 코드를 보고 경로·분기를 테스트.</td></tr></table></div></div>` },
  { id:'23_3_10', year:'2023', round:'3회', cat:'기타 용어',
    qHtml:`<div class="q-text">아래는 클라우드 서비스 유형에 관한 설명이다. 보기에서 각 설명에 해당하는 유형을 골라 쓰시오.<br><br>(1) 서버, 스토리지, 네트워크 등 IT 인프라 자원을 가상화하여 제공하는 서비스<br>(2) 개발·실행·관리에 필요한 플랫폼(운영체제, 미들웨어, 런타임 등)을 제공하여 사용자가 애플리케이션 개발에만 집중할 수 있도록 하는 서비스<br>(3) 이메일, 문서 편집 등 완성된 소프트웨어 애플리케이션을 인터넷을 통해 구독 형태로 제공하는 서비스<br><br>[보기] &nbsp; PaaS &nbsp; SaaS &nbsp; IaaS</div>`,
    ansHtml:`<div class="answer-val">(1) IaaS &nbsp;&nbsp; (2) PaaS &nbsp;&nbsp; (3) SaaS</div><div class="keyword-detail">📌 <b>풀이</b><br>클라우드 서비스를 식당에 비유해요. <b>IaaS</b>는 빈 주방(인프라)만 빌려주고, <b>PaaS</b>는 조리 기구까지 갖춰진 주방(플랫폼)을 제공하고, <b>SaaS</b>는 완성된 음식(서비스)을 제공해요.<br><br>📎 <b>클라우드 서비스 3종 비교</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>IaaS (Infrastructure as a Service)</b></td><td style="text-align:left;vertical-align:middle">서버·스토리지·네트워크 등 IT 인프라를 제공해요. 사용자가 OS·미들웨어·앱을 직접 설치·관리해요. AWS EC2, Azure VM, Google Compute Engine이 대표예요. ← <u>정답1</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>PaaS (Platform as a Service)</b></td><td style="text-align:left;vertical-align:middle">인프라 + 개발 환경·런타임·미들웨어를 제공해요. 개발자는 앱 개발에만 집중할 수 있어요. AWS Elastic Beanstalk, Google App Engine, Heroku가 대표예요. ← <u>정답2</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>SaaS (Software as a Service)</b></td><td style="text-align:left;vertical-align:middle">완성된 소프트웨어를 구독 방식으로 제공해요. 설치·유지보수가 불필요해요. Gmail, Office 365, Salesforce, Slack이 대표예요. ← <u>정답3</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>관리 책임 범위</b></td><td style="text-align:left;vertical-align:middle">IaaS: 인프라만 제공 → 나머지 사용자 관리. PaaS: 인프라+플랫폼 제공 → 앱·데이터만 사용자 관리. SaaS: 모든 것 제공 → 사용자는 사용만.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>온프레미스 (On-Premise)</b></td><td style="text-align:left;vertical-align:middle">자사 서버실에 직접 구축·운영하는 방식이에요. 클라우드와 반대 개념이에요. 보안·커스터마이징에 유리하지만 초기 비용이 크고 관리 부담이 있어요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>하이브리드 클라우드</b></td><td style="text-align:left;vertical-align:middle">온프레미스와 퍼블릭 클라우드를 혼합 사용하는 방식이에요. 민감한 데이터는 온프레미스, 일반 서비스는 클라우드로 운영해요.</td></tr></table></div></div>` },
  { id:'23_3_11', year:'2023', round:'3회', cat:'네트워크',
    qHtml:`<div class="q-text">아래에서 설명하는 라우팅 프로토콜의 명칭을 쓰시오.<br><br>· 최소 홉 수(Hop Count)를 기준으로 최단 경로를 결정하는 거리 벡터(Distance Vector) 기반 라우팅 프로토콜이다.<br>· 라우팅 테이블에 인접 라우터 정보를 저장하여 경로를 결정한다.<br>· 최대 홉 수가 15로 제한되어 소규모 네트워크에 주로 사용되는 내부 게이트웨이 프로토콜(IGP)이다.</div>`,
    ansHtml:`<div class="answer-val">RIP (Routing Information Protocol)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>RIP</b>는 <b>거리 벡터(Distance Vector)</b> 방식의 라우팅 프로토콜로, 홉 수(Hop Count, 라우터를 거치는 횟수)가 가장 적은 경로를 최단 경로로 선택해요. 최대 홉 수는 15이고, 16이면 도달 불가능으로 처리해요.<br><br>📎 <b>라우팅 프로토콜 비교</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>RIP (Routing Information Protocol)</b></td><td style="text-align:left;vertical-align:middle">거리 벡터 방식. 최대 홉 15. 30초마다 전체 라우팅 테이블을 이웃 라우터에게 전송해요. 소규모 네트워크에 적합해요. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>OSPF (Open Shortest Path First)</b></td><td style="text-align:left;vertical-align:middle">링크 상태 방식. Dijkstra 알고리즘으로 최단 경로 계산. 변경 사항만 전송해서 효율적이에요. 대규모 네트워크에 적합해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>BGP (Border Gateway Protocol)</b></td><td style="text-align:left;vertical-align:middle">경로 벡터 방식. 서로 다른 자율 시스템(AS) 간 라우팅에 사용해요. 인터넷 백본 라우팅 프로토콜이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>거리 벡터 vs 링크 상태</b></td><td style="text-align:left;vertical-align:middle">거리 벡터(RIP): 이웃에게 전체 테이블 전송, 느린 수렴, 루프 가능. 링크 상태(OSPF): 전체 네트워크 지도 보유, 빠른 수렴, 루프 없음.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>IGP vs EGP</b></td><td style="text-align:left;vertical-align:middle">IGP(Interior Gateway Protocol): 같은 자율 시스템(AS) 내 라우팅 — RIP, OSPF. EGP(Exterior): AS 간 라우팅 — BGP.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>홉 수(Hop Count)</b></td><td style="text-align:left;vertical-align:middle">패킷이 목적지에 도달하기까지 거치는 라우터의 수예요. RIP에서 경로 비용의 기준이에요. 최대 15홉으로 대규모 네트워크에는 한계가 있어요.</td></tr></table></div></div>` },

  { id:'23_2_1', year:'2023', round:'2회', cat:'SQL문',
    qHtml:`<div class="q-text">아래 [학생] 테이블에 다음 처리 조건에 맞는 쿼리문을 작성하시오.<br><br><div class="tbl-wrap"><div class="tbl-label">[학생] 테이블</div><table class="db-table"><tr><th>속성명</th><th>데이터 타입</th><th>비고</th></tr><tr><td>학번</td><td>INT</td><td>PRIMARY KEY</td></tr><tr><td>이름</td><td>VARCHAR(20)</td><td></td></tr><tr><td>학년</td><td>INT</td><td></td></tr><tr><td>과목</td><td>VARCHAR(20)</td><td></td></tr><tr><td>연락처</td><td>VARCHAR(20)</td><td></td></tr></table></div><br>· 학번이 1415245, 이름이 \'라이언\', 학년이 2, 과목이 \'수학\', 연락처가 \'010-1234-5678\'인 학생의 정보를 입력<br>· 인용 부호가 필요한 경우 작은따옴표( \' ) 사용<br>· 명령문 마지막 세미콜론(;)은 생략 가능</div>`,
    ansHtml:`<div class="answer-val">INSERT INTO 학생(학번, 이름, 학년, 과목, 연락처) VALUES(1415245, '라이언', 2, '수학', '010-1234-5678');</div><div class="keyword-detail">📌 <b>풀이</b><br><b>INSERT INTO</b>는 테이블에 새 행을 삽입하는 DML 명령어예요. 컬럼 목록을 지정하면 순서를 바꿔도 되지만, VALUES의 값 순서는 컬럼 목록 순서와 반드시 일치해야 해요.<br><br>📎 <b>INSERT 문 관련 키워드</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>INSERT INTO...VALUES</b></td><td style="text-align:left;vertical-align:middle">직접 값을 입력해요. 컬럼 목록 지정 시 값 순서와 일치해야 해요. ← <u>이번 문제</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>INSERT INTO...SELECT</b></td><td style="text-align:left;vertical-align:middle">다른 테이블에서 데이터를 가져와 삽입해요. 대량 데이터 이동에 유용해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>문자형 vs 숫자형</b></td><td style="text-align:left;vertical-align:middle">문자형은 작은따옴표('')로 감싸요. 숫자형은 따옴표 없이 입력해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>NULL 입력</b></td><td style="text-align:left;vertical-align:middle">VALUES에 NULL을 직접 입력하거나 컬럼 목록에서 해당 컬럼을 생략(DEFAULT가 NULL인 경우)해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>기본키 중복 오류</b></td><td style="text-align:left;vertical-align:middle">이미 존재하는 PK 값을 삽입하면 무결성 제약 위반 오류가 발생해요.</td></tr></table></div></div>` },
  { id:'23_2_2', year:'2023', round:'2회', cat:'SW 개발/계획',
    qHtml:`<div class="q-text">아래는 테스트 커버리지에 대한 설명이다. 보기에서 알맞은 항목을 골라 쓰시오.<br><br>· 프로그램 내 모든 결정 포인트의 각 개별 조건식에 대해 참(True)·거짓(False) 결과를 최소 한 번씩 수행하는 커버리지 기준이다.<br>· True/False에 충분한 영향을 줄 수 없는 경우가 발생할 수 있다는 한계점이 있다.<br><br>[보기] &nbsp; ㄱ.구문 커버리지 &nbsp; ㄴ.경로 커버리지 &nbsp; ㄷ.조건/결정 커버리지 &nbsp; ㄹ.변형 조건/결정 커버리지 &nbsp; ㅂ.다중 조건 커버리지 &nbsp; ㅅ.결정 커버리지 &nbsp; ㅇ.조건 커버리지</div>`,
    ansHtml:`<div class="answer-val">ㅇ. 조건(Condition) 커버리지</div><div class="keyword-detail">📌 <b>풀이</b><br><b>조건 커버리지</b>는 결정문 안의 각 원자 조건식이 T/F를 각각 최소 1번씩 가져야 해요. 결정문 전체의 T/F 양방향은 보장하지 않는 것이 함정이에요.<br><br>📎 <b>화이트박스 커버리지 비교</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>문장 커버리지</b></td><td style="text-align:left;vertical-align:middle">모든 실행 줄 최소 1번 실행. 가장 약한 기준이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>결정(분기) 커버리지</b></td><td style="text-align:left;vertical-align:middle">결정문 전체 T/F 각각 최소 1번.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>조건 커버리지</b></td><td style="text-align:left;vertical-align:middle">개별 조건식 각각의 T/F 최소 1번. 결정문 전체의 T/F는 미보장. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>조건/결정 커버리지</b></td><td style="text-align:left;vertical-align:middle">결정 + 조건 커버리지 동시 만족.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>MC/DC</b></td><td style="text-align:left;vertical-align:middle">각 조건이 독립적으로 결정에 영향을 미치는 경우만 선별. 항공·자동차 안전 필수예요.</td></tr><tr><td colspan="2" style="color:var(--c-text2);font-style:italic;border-top:1px dashed var(--c-border2)">📝 강도 순서: 문장 &lt; 결정 &lt; 조건 &lt; 조건/결정 &lt; 다중 조건 &lt; MC/DC</td></tr></table></div></div>` },
  { id:'23_2_3', year:'2023', round:'2회', cat:'정보보안',
    qHtml:`<div class="q-text">아래에서 설명하는 소프트웨어 보안 기법의 명칭을 쓰시오.<br><br>· 소프트웨어가 허가 없이 변경(워터마크 삭제 등)되었을 경우 정상적으로 수행되지 않도록 하는 기법이다.<br>· 프로그램에 변조검증코드(tamper-proofing code)를 삽입하여 변조 탐지 및 실행 차단을 수행한다.<br>· 역공학 기술의 일종으로 디지털 콘텐츠·전자상거래 등 다양한 분야에 적용된다.</div>`,
    ansHtml:`<div class="answer-val">템퍼프루핑 (Tamper Proofing)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>템퍼프루핑(Tamper Proofing)</b>은 소프트웨어가 불법으로 변조되면 스스로 실행을 거부하는 기술이에요. 게임에서 치트 엔진으로 메모리를 변경하면 게임이 강제 종료되는 것이에요. Tamper는 "변조하다"예요.<br><br>📎 <b>소프트웨어 보호 기술</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>코드 난독화(Obfuscation)</b></td><td style="text-align:left;vertical-align:middle">소스코드를 읽기 어렵게 변환해요. 역공학(리버스 엔지니어링)을 방해해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>템퍼프루핑(Tamper Proofing)</b></td><td style="text-align:left;vertical-align:middle">소프트웨어 변조 감지 시 실행을 거부하는 기술이에요. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>워터마킹(Watermarking)</b></td><td style="text-align:left;vertical-align:middle">소유권 증명을 위해 보이지 않는 식별 표식을 삽입해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>DRM (Digital Rights Management)</b></td><td style="text-align:left;vertical-align:middle">디지털 콘텐츠의 저작권을 보호하는 종합 시스템이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>소프트웨어 보안 3요소</b></td><td style="text-align:left;vertical-align:middle">기밀성(Confidentiality), 무결성(Integrity), 가용성(Availability)이에요. 템퍼프루핑은 무결성 보호에 해당해요.</td></tr></table></div></div>` },
  { id:'23_2_4', year:'2023', round:'2회', cat:'데이터베이스',
    qHtml:`<div class="q-text">데이터베이스 설계 순서를 아래 보기에서 올바른 순서대로 나열하시오.<br><br>[보기] &nbsp; 구현 &nbsp; 요구조건 분석 &nbsp; 개념적 설계 &nbsp; 물리적 설계 &nbsp; 논리적 설계</div>`,
    ansHtml:`<div class="answer-val">요구조건 분석 → 개념적 설계 → 논리적 설계 → 물리적 설계 → 구현</div><div class="keyword-detail">📌 <b>풀이</b><br>DB 설계는 5단계로 진행돼요. 뭘 만들지 파악(요구분석) → ERD로 개념 설계 → 테이블로 논리 설계 → DBMS에 맞게 물리 설계 → 실제 구현 순이에요.<br><br>📎 <b>DB 설계 5단계 상세</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>요구사항 분석</b></td><td style="text-align:left;vertical-align:middle">무엇이 필요한지 파악해요. 요구명세서를 작성해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>개념적 설계</b></td><td style="text-align:left;vertical-align:middle">현실 세계를 ERD(Entity-Relationship Diagram)로 표현해요. DBMS에 독립적이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>논리적 설계</b></td><td style="text-align:left;vertical-align:middle">ERD를 테이블(릴레이션) 스키마로 변환해요. 정규화를 수행해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>물리적 설계</b></td><td style="text-align:left;vertical-align:middle">특정 DBMS에 맞게 최적화해요. 인덱스·파티션·접근 경로 등을 설계해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>구현</b></td><td style="text-align:left;vertical-align:middle">DDL(CREATE TABLE 등)로 실제 DB를 생성해요.</td></tr></table></div></div>` },
  { id:'23_2_5', year:'2023', round:'2회', cat:'SW 개발/계획',
    qHtml:`<div class="q-text">아래 두 가지 설명에 해당하는 디자인 패턴을 각각 쓰시오.<br><br>1. 생성자가 여러 차례 호출되더라도 실제로 생성되는 객체는 하나이고, 최초 생성 이후의 호출은 처음 생성된 객체를 반환한다. DBCP(Database Connection Pool)와 같이 공통 객체를 하나만 유지해야 하는 상황에서 활용된다.<br><br>2. 객체에 연산을 추가하기 위해 해당 객체의 내부 상태에 접근할 수 있는 방법을 제공하는 패턴으로, 기존 코드를 변경하지 않고 새로운 기능을 추가할 수 있다.</div>`,
    ansHtml:`<div class="answer-val">1. Singleton (싱글톤) 패턴 &nbsp;&nbsp; 2. Visitor (방문자) 패턴</div><div class="keyword-detail">📌 <b>풀이</b><br><b>Singleton</b>은 인스턴스가 딱 하나만 만들어지도록 보장해요. <b>Visitor</b>는 객체 구조를 수정하지 않고 새 기능을 외부 방문자(Visitor) 클래스에서 추가하는 패턴이에요.<br><br>📎 <b>GoF 패턴 비교</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Singleton (생성 패턴)</b></td><td style="text-align:left;vertical-align:middle">프로그램 전체에서 인스턴스가 딱 하나만 생성되도록 보장해요. 설정 관리자, DB 연결 풀에 사용해요. ← <u>정답1</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Visitor (행위 패턴)</b></td><td style="text-align:left;vertical-align:middle">객체 구조를 건드리지 않고 외부 Visitor 클래스에서 새 기능을 추가해요. 컴파일러 AST 순회, 파일 시스템 탐색에 사용해요. ← <u>정답2</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Factory Method (생성 패턴)</b></td><td style="text-align:left;vertical-align:middle">객체 생성 인터페이스는 상위 클래스가 정의하고, 실제 생성은 서브클래스가 결정해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Observer (행위 패턴)</b></td><td style="text-align:left;vertical-align:middle">상태 변화를 여러 객체에 자동으로 통지해요. 이벤트 시스템, MVC에 사용해요.</td></tr></table></div></div>` },
  { id:'23_2_6', year:'2023', round:'2회', cat:'네트워크',
    qHtml:`<div class="q-text">아래 설명에 해당하는 오류 검출·정정 방식의 용어를 각각 쓰시오.<br><br>(1) 1비트 오류를 정정할 수 있는 선형 블록 부호로, Bell 연구소의 Hamming이 개발하였다.<br>(2) 부가적 정보(Redundancy)를 첨가하여 전송하고, 수신 측이 이를 이용해 오류를 검출·수정하는 방식이다.<br>(3) 오류 발생 시 송신 측에 재전송을 요구하는 방식으로, Parity, CRC, 블록 합 검사 등이 있다.<br>(4) 데이터 이동·전송 시 유실·손상 여부를 점검하는 기술 관련 용어이다.<br>(5) 전송 데이터에 체크값을 결정하는 방식이다.<br><br>[보기] &nbsp; EAC &nbsp; FEC &nbsp; Hamming &nbsp; CRC &nbsp; PDS &nbsp; Parity &nbsp; BEC</div>`,
    ansHtml:`<div class="answer-val">1. Hamming &nbsp; 2. FEC &nbsp; 3. BEC &nbsp; 4. Parity &nbsp; 5. CRC</div><div class="keyword-detail">📌 <b>풀이</b><br><b>FEC(전진 오류 수정)</b>는 받는 쪽이 스스로 오류를 고쳐요(재전송 불필요). <b>BEC(후진 오류 수정)</b>는 오류 발견 시 재전송을 요청해요. Hamming은 FEC, Parity·CRC는 BEC의 대표 기법이에요.<br><br>📎 <b>오류 제어 기법 정리</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Hamming Code</b></td><td style="text-align:left;vertical-align:middle">데이터 비트 사이에 패리티 비트를 배치해서 1비트 오류를 자동 감지·수정해요. FEC 방식의 대표 기법이에요. ← <u>정답1</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>FEC (Forward Error Correction)</b></td><td style="text-align:left;vertical-align:middle">수신 측이 재전송 없이 스스로 오류를 정정해요. 실시간 방송·음성 통화에 사용해요. ← <u>정답2</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>BEC (Backward Error Correction)</b></td><td style="text-align:left;vertical-align:middle">오류 발견 시 송신 측에 재전송을 요청해요. ARQ라고도 해요. ← <u>정답3</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Parity bit</b></td><td style="text-align:left;vertical-align:middle">데이터의 1의 개수가 홀/짝수가 되도록 1비트를 추가해요. 1비트 오류만 감지해요. ← <u>정답4</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>CRC (Cyclic Redundancy Check)</b></td><td style="text-align:left;vertical-align:middle">생성 다항식으로 이진 나눗셈해서 검사값(FCS)을 계산해요. 버스트 오류 감지에 강해요. ← <u>정답5</u></td></tr></table></div></div>` },
  { id:'23_2_7', year:'2023', round:'2회', cat:'정보보안',
    qHtml:`<div class="q-text">아래에서 설명하는 두 가지 암호화 알고리즘 분류를 각각 쓰시오.<br><br>대칭키 암호화 알고리즘: 아래 보기 중 해당하는 것을 모두 고르시오.<br>비대칭키 암호화 알고리즘: 아래 보기 중 해당하는 것을 모두 고르시오.<br><br>[보기] &nbsp; DES &nbsp; RSA &nbsp; AES &nbsp; ECC &nbsp; ARIA &nbsp; SEED</div>`,
    ansHtml:`<div class="answer-val">대칭키: DES, AES, ARIA, SEED &nbsp;&nbsp; 비대칭키: RSA, ECC</div><div class="keyword-detail">📌 <b>풀이</b><br><b>대칭키</b>는 암호화·복호화에 같은 키를 사용해서 빠르지만 키 관리가 어려워요. <b>비대칭키(공개키)</b>는 공개키로 암호화하고 개인키로 복호화해서 느리지만 키 교환이 안전해요.<br><br>📎 <b>암호화 알고리즘 분류</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>대칭키 암호화</b></td><td style="text-align:left;vertical-align:middle">암호화·복호화에 동일한 키를 사용해요. 빠르고 대용량 데이터에 적합해요. DES, AES, ARIA, SEED, 3DES 등이 있어요. ← <u>정답1</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>비대칭키(공개키) 암호화</b></td><td style="text-align:left;vertical-align:middle">공개키(암호화)와 개인키(복호화)를 쌍으로 사용해요. 느리지만 키 교환이 안전해요. RSA, ECC, DSA 등이 있어요. ← <u>정답2</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>하이브리드 암호화</b></td><td style="text-align:left;vertical-align:middle">대칭키로 데이터를 암호화하고, 비대칭키로 대칭키를 교환해요. HTTPS(TLS)가 이 방식이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>해시(Hash) 함수</b></td><td style="text-align:left;vertical-align:middle">단방향 변환이에요. 복호화 불가. MD5, SHA-256 등. 비밀번호 저장, 무결성 검증에 사용해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>AES vs RSA 용도</b></td><td style="text-align:left;vertical-align:middle">AES: 대용량 데이터 암호화(빠름). RSA: 키 교환, 디지털 서명(느리지만 안전).</td></tr></table></div></div>` },
  { id:'23_2_8', year:'2023', round:'2회', cat:'SQL문',
    qHtml:`<div class="q-text">학생 뷰(VIEW)를 삭제할 때, 해당 뷰를 참조하는 다른 뷰나 제약조건까지 모두 함께 삭제하려 한다. 아래 SQL의 빈칸에 들어갈 알맞은 키워드를 쓰시오.<br><br><div class="sql-box">DROP VIEW 학생 (         );</div></div>`,
    ansHtml:`<div class="answer-val">CASCADE</div><div class="keyword-detail">📌 <b>풀이</b><br><b>CASCADE</b>는 연쇄라는 뜻이에요. DROP VIEW ... CASCADE는 해당 뷰를 삭제할 때 그 뷰를 참조하는 다른 뷰나 제약조건도 함께 연쇄적으로 삭제해요.<br><br>📎 <b>같이 알아두면 좋은 키워드</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>CASCADE</b></td><td style="text-align:left;vertical-align:middle">해당 객체를 참조하는 모든 종속 객체를 연쇄적으로 삭제해요. DROP VIEW, DROP TABLE에서 사용해요. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>RESTRICT</b></td><td style="text-align:left;vertical-align:middle">참조하는 객체가 있으면 삭제를 거부해요. CASCADE의 반대 개념이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>ON DELETE CASCADE</b></td><td style="text-align:left;vertical-align:middle">FK 관계에서 부모 테이블의 행이 삭제될 때 자식 테이블의 관련 행도 자동 삭제돼요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>ON DELETE SET NULL</b></td><td style="text-align:left;vertical-align:middle">부모 행 삭제 시 자식의 FK 값을 NULL로 변경해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>뷰(View) 특징</b></td><td style="text-align:left;vertical-align:middle">실제 데이터를 저장하지 않는 가상 테이블이에요. 보안·편의성을 위해 사용하고, DROP VIEW로 삭제해요.</td></tr></table></div></div>` },
  { id:'23_2_9', year:'2023', round:'2회', cat:'기타 용어',
    qHtml:`<div class="q-text">임의의 크기를 가진 데이터(Key)를 고정된 크기의 데이터(Value)로 변환하여 저장하는 방식이 있다. 이 방식은 키에 대한 변환 값을 index로 사용하므로 평균 시간복잡도가 O(1)로 매우 빠르며, 데이터베이스 검색이나 테이블 검색 속도를 가속한다. 이 기법의 명칭을 쓰시오.</div>`,
    ansHtml:`<div class="answer-val">해시(Hash) 또는 해싱(Hashing)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>해싱(Hashing)</b>은 입력 데이터를 해시 함수로 고정 크기의 해시값(인덱스)으로 변환해서 저장하는 방식이에요. 우편함 번호처럼 이름을 함수에 넣으면 바로 몇 번 함에 있는지 알 수 있어요. 평균 탐색 O(1)이에요.<br><br>📎 <b>같이 알아두면 좋은 키워드</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>해시 함수(Hash Function)</b></td><td style="text-align:left;vertical-align:middle">임의 크기 데이터를 고정 크기 해시값으로 변환해요. 같은 입력은 항상 같은 출력을 보장해요(결정론적).</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>해시 충돌(Collision)</b></td><td style="text-align:left;vertical-align:middle">서로 다른 입력이 같은 해시값을 가질 때 발생해요. 충돌 해결이 해싱의 핵심 과제예요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>체이닝(Chaining)</b></td><td style="text-align:left;vertical-align:middle">충돌 시 같은 버킷에 연결 리스트로 연결해 저장해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>개방 주소법(Open Addressing)</b></td><td style="text-align:left;vertical-align:middle">충돌 시 다른 빈 슬롯을 찾아 저장해요. 선형 탐사, 이차 탐사, 이중 해싱 방법이 있어요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>해시 테이블 활용</b></td><td style="text-align:left;vertical-align:middle">Python의 dict, Java의 HashMap이 해시 테이블이에요. 평균 O(1) 탐색 속도를 제공해요.</td></tr></table></div></div>` },

  // ─── 2023년 1회 ───
  { id:'23_1_1', year:'2023', round:'1회', cat:'기타 용어',
    qHtml:`<div class="q-text">아래는 특정 웹 개발 기법에 대한 설명이다. 해당 기법의 풀네임 또는 약자를 쓰시오.<br><br>· 비동기적인 웹 애플리케이션 제작을 위해 JavaScript와 XML을 이용한 비동기적 정보 교환 기법이다.<br>· 필요한 데이터만 웹 서버에 요청해서 받은 후 클라이언트에서 처리한다.<br>· Google Map, Google Pages 등에서 사용한 기술에 기반하여 제작되었다.</div>`,
    ansHtml:`<div class="answer-val">AJAX (Asynchronous JavaScript and XML)</div><div class="keyword-detail">📌 <b>풀이</b><br>AJAX는 웹 페이지 전체를 새로고침하지 않고 필요한 데이터만 서버에서 가져오는 기술이에요. 카카오톡 웹에서 메시지를 보낼 때 페이지가 깜빡이지 않는 게 AJAX 덕분이에요. <b>비동기(Asynchronous)</b>가 핵심이에요.<br><br>📎 <b>같이 알아두면 좋은 키워드</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>XMLHttpRequest (XHR)</b></td><td style="text-align:left;vertical-align:middle">구버전 AJAX 구현 객체예요. open()·send() 메서드로 비동기 HTTP 요청을 보내고 onreadystatechange로 응답을 처리해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>fetch API</b></td><td style="text-align:left;vertical-align:middle">XMLHttpRequest보다 간결하고 Promise 기반으로 동작하는 최신 방식이에요. async/await와 함께 쓰면 읽기 쉬운 비동기 코드를 작성할 수 있어요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>동기 vs 비동기</b></td><td style="text-align:left;vertical-align:middle">동기: 요청 후 응답 올 때까지 대기. 비동기: 요청 후 다른 작업을 계속하다가 응답 오면 처리해요. AJAX의 핵심이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>JSON</b></td><td style="text-align:left;vertical-align:middle">AJAX에서 XML보다 더 많이 쓰이는 데이터 교환 형식이에요. 가볍고 JavaScript와 자연스럽게 연동돼요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>SPA (Single Page Application)</b></td><td style="text-align:left;vertical-align:middle">AJAX를 활용해 페이지 전환 없이 데이터만 갱신하는 웹앱이에요. React, Vue, Angular로 개발해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>REST API</b></td><td style="text-align:left;vertical-align:middle">AJAX로 서버와 통신할 때 가장 많이 사용하는 설계 방식이에요. GET·POST·PUT·DELETE 메서드로 자원을 조작해요.</td></tr></table></div></div>` },
  { id:'23_1_2', year:'2023', round:'1회', cat:'네트워크',
    qHtml:`<div class="q-text">아래 표의 각 통신 방식에 해당하는 용어를 쓰시오.<br><br><div class="tbl-wrap"><table class="db-table" style="min-width:380px"><tr><th>구분</th><th>내용</th></tr><tr><td class="info-row">( ① )</td><td>회선교환과 데이터그램의 장점을 결합. 처음 패킷으로 최적 경로를 고정하고 이후 고속 전송. ATM이 대표적.</td></tr><tr><td class="info-row">( ② )</td><td>IP 주소 기반 인터넷. 각 패킷을 미리 정해진 경로 없이 독립적으로 처리. 특정 교환기 고장 시 다른 경로로 우회 가능.</td></tr></table></div>`,
    ansHtml:`<div class="answer-val">① 가상회선 (Virtual Circuit) &nbsp;&nbsp; ② 데이터그램 (Datagram)</div><div class="keyword-detail">📌 <b>풀이</b><br>패킷 교환 방식 두 가지예요. <b>가상회선</b>은 전화처럼 먼저 경로를 확보한 뒤 모든 패킷이 같은 길로 가요(순서 보장). <b>데이터그램</b>은 우편처럼 각 패킷이 독립적으로 최적 경로를 찾아가요(순서 미보장).<br><br>📎 <b>패킷 교환 방식 비교</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>가상회선(Virtual Circuit)</b></td><td style="text-align:left;vertical-align:middle">연결 지향 방식이에요. 전송 전 논리적 경로를 설정하고 모든 패킷이 같은 경로로 전송돼요. 순서가 보장돼요. TCP와 유사해요. ← <u>정답①</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>데이터그램(Datagram)</b></td><td style="text-align:left;vertical-align:middle">비연결 방식이에요. 각 패킷이 독립적으로 최적 경로를 선택해요. 순서가 보장되지 않아요. UDP와 유사해요. ← <u>정답②</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>회선 교환(Circuit Switching)</b></td><td style="text-align:left;vertical-align:middle">통신 전에 전용 회선을 확보해요. 회선이 비어있어도 다른 사람이 사용 불가해요. 전화망이 대표적이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>TCP vs UDP</b></td><td style="text-align:left;vertical-align:middle">TCP: 가상회선 개념, 연결 지향, 순서·신뢰성 보장. UDP: 데이터그램 개념, 비연결, 빠르지만 신뢰성 없어요.</td></tr></table></div></div>` },
  { id:'23_1_3', year:'2023', round:'1회', cat:'네트워크',
    qHtml:`<div class="q-text">아래에서 설명하는 프로토콜의 명칭을 쓰시오.<br><br>· 2계층(데이터링크 계층)에서 구현되는 터널링 기술 중 하나다.<br>· L2F와 PPTP가 결합된 프로토콜로 VPN 및 인터넷 서비스 제공자(ISP)가 이용한다.<br>· IPsec과 함께 사용하면 PPTP보다 훨씬 안전하지만, 보안보다 익명화에 더 적합하다.</div>`,

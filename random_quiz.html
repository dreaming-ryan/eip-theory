    ansHtml:`<div class="answer-val">1234561, 124567 &nbsp; 또는 &nbsp; 1234567, 124561</div><div class="keyword-detail">📌 <b>풀이</b><br>분기 커버리지는 제어 흐름도의 모든 분기(참/거짓)를 최소 1번씩 지나야 해요. 분기점 ②(A>B?)와 ⑥(RES>1?)의 T/F 4가지를 모두 통과해야 해요.<br><br>📎 <b>커버리지 종류 비교 (약→강)</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>문장(Statement) 커버리지</b></td><td style="text-align:left;vertical-align:middle">가장 기본적인 기준으로, 모든 실행 가능한 코드 줄을 최소 1번 실행하면 충족돼요. 분기의 한 방향만 실행해도 통과될 수 있어서 약한 기준이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>결정(Decision)/분기(Branch) 커버리지</b></td><td style="text-align:left;vertical-align:middle">각 결정문(if, while, for 등)의 결과가 T와 F를 각각 최소 1번씩 가져야 해요. ← <u>이번 문제</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>조건(Condition) 커버리지</b></td><td style="text-align:left;vertical-align:middle">결정문 안의 개별 원자 조건식 각각이 T/F를 최소 1번씩 가져야 해요. 단, 결정문 전체의 T/F는 보장하지 않는 함정이 있어요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>조건/결정 커버리지</b></td><td style="text-align:left;vertical-align:middle">결정 커버리지와 조건 커버리지를 동시에 만족해야 해요. 두 기준의 약점을 보완해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>다중 조건 커버리지</b></td><td style="text-align:left;vertical-align:middle">결정문 내 모든 조건의 가능한 조합을 전부 테스트해요. 조건이 n개면 최대 2^n개 테스트 케이스가 필요해서 비용이 커요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>MC/DC</b></td><td style="text-align:left;vertical-align:middle">각 조건이 독립적으로 전체 결정에 영향을 미치는 경우만 선별해요. 항공(DO-178C)·자동차(ISO 26262) 등 안전 필수 시스템에서 의무 적용해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>경로(Path) 커버리지</b></td><td style="text-align:left;vertical-align:middle">프로그램의 가능한 모든 실행 경로를 테스트해요. 가장 강력하지만 루프가 있으면 경로가 무한해져 실제로는 적용이 불가능해요.</td></tr></table></div></div>` },
  { id:'25_2_6', year:'2025', round:'2회', cat:'운영체제',
    qHtml:`<div class="q-text">라운드로빈(RR) 스케줄링을 사용한다. 타임 퀀텀은 4ms이며 컨텍스트 스위칭 시간은 무시한다. 아래 표를 참고하여 모든 프로세스의 평균 대기시간을 구하시오.<br><br><div class="tbl-wrap"><table class="db-table"><tr><th>프로세스</th><th>도착 시간(ms)</th><th>실행 시간(ms)</th></tr><tr><td>P1</td><td>0</td><td>8</td></tr><tr><td>P2</td><td>1</td><td>4</td></tr><tr><td>P3</td><td>2</td><td>9</td></tr><tr><td>P4</td><td>3</td><td>5</td></tr></table></div>`,
    ansHtml:`<div class="answer-val">11.75ms</div><div class="keyword-detail">📌 <b>풀이</b><br>라운드로빈(RR)은 모든 프로세스가 타임 퀀텀(4ms)씩 돌아가며 CPU를 사용해요. 타임 퀀텀이 끝나면 다음 프로세스로 넘어가고, 완료 못 했으면 맨 뒤로 줄을 서요.<br><br>📎 <b>RR 스케줄링 핵심 개념</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>타임 퀀텀(Time Quantum)</b></td><td style="text-align:left;vertical-align:middle">각 프로세스가 CPU를 연속으로 사용할 수 있는 최대 시간이에요. 타임 퀀텀이 작으면 응답성이 좋아지지만 컨텍스트 스위칭이 자주 발생해요. 타임 퀀텀이 크면 FCFS와 유사해져요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>컨텍스트 스위칭</b></td><td style="text-align:left;vertical-align:middle">하나의 프로세스에서 다른 프로세스로 전환할 때 현재 상태(레지스터, PC 등)를 저장하고 새 프로세스의 상태를 불러오는 작업이에요. 오버헤드가 발생하므로 타임 퀀텀이 너무 작으면 비효율적이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>기아(Starvation) 없음</b></td><td style="text-align:left;vertical-align:middle">RR은 모든 프로세스가 공평하게 타임 퀀텀을 받으므로 무한 대기 상태가 발생하지 않아요. SJF나 Priority 스케줄링의 단점을 해결해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>대기시간 계산</b></td><td style="text-align:left;vertical-align:middle">각 프로세스의 대기시간 = 완료시간 - 도착시간 - 서비스(실행)시간이에요. 평균 대기시간 = 모든 프로세스 대기시간의 합 ÷ 프로세스 수예요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>반환시간(Turnaround Time)</b></td><td style="text-align:left;vertical-align:middle">프로세스가 도착한 시점부터 완전히 완료될 때까지의 총 시간이에요. 반환시간 = 대기시간 + 서비스시간이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>응답시간(Response Time)</b></td><td style="text-align:left;vertical-align:middle">프로세스가 처음으로 CPU를 할당받기까지 기다린 시간이에요. RR에서는 타임 퀀텀과 프로세스 수에 따라 결정돼요.</td></tr></table></div></div>` },
  { id:'25_2_7', year:'2025', round:'2회', cat:'SW 개발/계획',
    qHtml:`<div class="q-text">실제 객체에 대한 접근을 제어하거나 추가 기능을 부여하기 위해 해당 객체를 대신하는 대리 객체를 활용하는 구조 패턴이 있다. 실제 객체 생성을 지연시켜 자원을 절약하거나, 실제 객체를 감춰 정보 은닉을 강화하는 데 활용된다. 이 디자인 패턴의 명칭을 쓰시오.</div>`,
    ansHtml:`<div class="answer-val">Proxy (프록시) 패턴</div><div class="keyword-detail">📌 <b>풀이</b><br>Proxy(프록시) 패턴은 실제 객체(RealSubject) 앞에 대리 객체(Proxy)를 두는 패턴이에요. 연예인 매니저처럼, 모든 요청을 먼저 받아서 접근 제어·캐싱·로깅 등을 처리한 뒤 실제 객체에 전달해요.<br><br>📎 <b>Proxy 패턴 유형 상세</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>가상(Virtual) Proxy</b></td><td style="text-align:left;vertical-align:middle">생성 비용이 큰 객체의 생성을 실제로 필요할 때까지 지연시켜요(Lazy Loading). 예를 들어 고해상도 이미지를 처음에는 썸네일로 보여주다가 클릭 시 원본을 로드하는 것이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>보호(Protection) Proxy</b></td><td style="text-align:left;vertical-align:middle">실제 객체에 대한 접근 권한을 제어해요. 사용자의 권한에 따라 접근을 허용하거나 차단해요. 역할 기반 접근 제어(RBAC) 구현에 활용해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>원격(Remote) Proxy</b></td><td style="text-align:left;vertical-align:middle">원격 서버에 있는 객체를 로컬에 있는 것처럼 사용할 수 있게 해요. RPC(Remote Procedure Call), 웹 서비스 클라이언트 구현에 사용돼요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>캐싱(Caching) Proxy</b></td><td style="text-align:left;vertical-align:middle">동일한 요청의 결과를 캐시에 저장해두고 반복 요청 시 실제 객체 없이 빠르게 응답해요. 데이터베이스 쿼리 결과 캐싱, 웹 프록시 서버가 좋은 예시예요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>로깅(Logging) Proxy</b></td><td style="text-align:left;vertical-align:middle">실제 객체에 대한 모든 요청을 기록해요. 감사(Audit) 목적이나 디버깅에 유용해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>GoF 분류</b></td><td style="text-align:left;vertical-align:middle">구조(Structural) 패턴이에요. 클라이언트는 Proxy와 RealSubject를 동일한 인터페이스로 사용하므로, Proxy로 교체해도 클라이언트 코드를 수정할 필요가 없어요.</td></tr></table></div></div>` },
  { id:'25_2_8', year:'2025', round:'2회', cat:'기타 용어',
    qHtml:`<div class="q-text">웹 페이지 전체를 새로고침하지 않고 JavaScript와 XML(또는 JSON)을 활용하여 서버와 비동기적으로 데이터를 주고받아 필요한 부분만 갱신하는 웹 개발 기법이 있다. 이 기법을 이용하면 사용자가 페이지를 떠나지 않고도 서버와 상호작용할 수 있어 반응성이 향상된다. 이 기법의 명칭을 쓰시오.</div>`,
    ansHtml:`<div class="answer-val">AJAX (Asynchronous JavaScript and XML)</div><div class="keyword-detail">📌 <b>풀이</b><br>AJAX(Asynchronous JavaScript and XML)는 페이지 전체를 새로고침하지 않고 필요한 데이터만 서버에서 가져오는 기술이에요. 카카오톡 웹에서 메시지를 보낼 때 페이지가 새로고침되지 않고 메시지만 추가되는 게 AJAX 덕분이에요.<br><br>📎 <b>같이 알아두면 좋은 키워드</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>XMLHttpRequest(XHR)</b></td><td style="text-align:left;vertical-align:middle">AJAX를 구현하기 위한 기존 방식의 JavaScript 객체예요. open(), send() 메서드로 비동기 HTTP 요청을 보내고, onreadystatechange 이벤트로 응답을 처리해요. 현재는 fetch API로 대체되는 추세예요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>fetch API</b></td><td style="text-align:left;vertical-align:middle">XMLHttpRequest보다 간결하고 Promise 기반으로 동작하는 최신 비동기 HTTP 요청 방식이에요. async/await와 함께 사용하면 동기 코드처럼 읽기 좋은 비동기 코드를 작성할 수 있어요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>동기 vs 비동기</b></td><td style="text-align:left;vertical-align:middle">동기는 요청 후 응답이 올 때까지 다른 작업을 멈추고 기다려요. 비동기는 요청 후 다른 작업을 계속하다가 응답이 오면 처리해요. AJAX의 핵심이 비동기예요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>JSON</b></td><td style="text-align:left;vertical-align:middle">AJAX에서 서버와 데이터를 주고받을 때 XML보다 JSON이 더 많이 사용돼요. 가볍고 파싱이 쉬우며 JavaScript와 자연스럽게 연동돼요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>REST API</b></td><td style="text-align:left;vertical-align:middle">AJAX로 서버와 통신할 때 가장 많이 사용하는 아키텍처 스타일이에요. HTTP 메서드(GET, POST, PUT, DELETE)로 자원을 조작해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>SPA (Single Page Application)</b></td><td style="text-align:left;vertical-align:middle">AJAX를 활용해 초기에 한 번만 HTML을 받고, 이후 페이지 전환 없이 데이터만 갱신하는 웹 애플리케이션이에요. React, Vue, Angular로 개발해요.</td></tr></table></div></div>` },
  { id:'25_2_9', year:'2025', round:'2회', cat:'정보보안',
    qHtml:`<div class="q-text">TCP의 3-way Handshake 취약점을 이용한 아래 설명의 공격 기법을 쓰시오.<br><br>· 공격자가 서버에 다수의 SYN 패킷을 전송 후, 마지막 ACK 패킷을 의도적으로 보내지 않는다.<br>· 서버는 반열결(Half-Open) 상태를 계속 유지하다가 연결 대기 큐가 가득 차게 된다.<br>· 결국 정상적인 접속 요청을 처리하지 못해 서비스 거부(DoS) 상태가 발생한다.</div>`,
    ansHtml:`<div class="answer-val">SYN Flooding (SYN 플러딩)</div><div class="keyword-detail">📌 <b>풀이</b><br>SYN Flooding은 TCP 3-way Handshake의 허점을 노린 공격이에요. 공격자는 SYN만 대량으로 보내고 마지막 ACK를 안 보내요. 서버의 연결 대기 큐가 꽉 차서 정상 사용자가 접속 못 하게 돼요.<br><br>📎 <b>같이 알아두면 좋은 키워드</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>TCP 3-way Handshake</b></td><td style="text-align:left;vertical-align:middle">TCP 연결 수립 과정이에요. ① 클라이언트가 SYN 전송 → ② 서버가 SYN-ACK 응답(Half-Open 상태) → ③ 클라이언트가 ACK 전송 → 연결 완료. SYN Flooding은 ③단계 ACK를 보내지 않아 서버를 ②단계 상태로 묶어두는 공격이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>반쪽 연결(Half-Open Connection)</b></td><td style="text-align:left;vertical-align:middle">SYN-ACK를 보냈지만 ACK를 받지 못한 상태예요. 서버는 이 상태를 일정 시간(백로그 큐) 유지해요. SYN Flooding은 이 큐를 가득 채워요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>SYN Cookie</b></td><td style="text-align:left;vertical-align:middle">SYN Flooding 방어 기법이에요. 서버가 Half-Open 연결을 큐에 저장하지 않고 시퀀스 번호에 쿠키 값을 인코딩해요. 실제 ACK가 올 때 쿠키를 검증해서 연결을 완성해요. 큐 오버플로우를 방지할 수 있어요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>DoS vs DDoS</b></td><td style="text-align:left;vertical-align:middle">DoS(Denial of Service)는 단일 공격자가 서버 자원을 고갈시켜요. DDoS(Distributed DoS)는 수천~수만 대의 좀비 PC(봇넷)가 동시에 공격해요. 공격 트래픽이 매우 많아 방어가 어려워요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>방화벽 Rate Limiting</b></td><td style="text-align:left;vertical-align:middle">동일 IP에서 초당 SYN 패킷 수를 제한해요. 비정상적으로 많은 SYN을 보내는 IP를 차단해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Ping of Death · Smurf · Land Attack</b></td><td style="text-align:left;vertical-align:middle">SYN Flooding과 함께 자주 출제되는 DoS 공격이에요. Ping of Death는 초과 크기 ICMP 패킷, Smurf는 IP 위조+ICMP 브로드캐스트, Land Attack은 출발지=목적지 IP로 패킷 전송이에요.</td></tr></table></div></div>` },
  { id:'25_2_10', year:'2025', round:'2회', cat:'데이터베이스',
    qHtml:`<div class="q-text">관계 대수 연산 πTTL(employee)의 결과를 아래 employee 테이블을 참고하여 작성하시오. (π는 프로젝션 연산: 지정한 열만 추출, 중복 제거)<br><br><div class="tbl-wrap"><table class="db-table"><tr><th>EID</th><th>NAME</th><th>TTL</th></tr><tr><td>E001</td><td>홍길동</td><td>부장</td></tr><tr><td>E002</td><td>김철수</td><td>대리</td></tr><tr><td>E003</td><td>이영희</td><td>과장</td></tr><tr><td>E004</td><td>박민준</td><td>차장</td></tr><tr><td>E005</td><td>최수진</td><td>대리</td></tr></table></div>`,
    ansHtml:`<div class="answer-val">TTL 부장 / 대리 / 과장 / 차장</div><div class="keyword-detail">📌 <b>풀이</b><br>π(파이)는 프로젝션(Projection) 연산으로 테이블에서 지정한 컬럼만 꺼내고 <b>중복을 제거</b>해요. πTTL(employee)는 TTL 컬럼만 추출해요. 부장이 2명이어도 결과에는 1번만 나와요. SQL의 SELECT DISTINCT 컬럼 FROM 테이블과 같아요.<br><br>📎 <b>관계 대수 연산자 정리</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>σ(시그마) - 셀렉트(Select)</b></td><td style="text-align:left;vertical-align:middle">릴레이션에서 조건을 만족하는 행(튜플)만 선택해요. SQL의 WHERE 절에 해당해요. 예) σ나이&gt;20(학생)은 나이가 20 초과인 학생만 추출해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>π(파이) - 프로젝트(Project)</b></td><td style="text-align:left;vertical-align:middle">릴레이션에서 지정한 열(속성)만 추출하고 중복을 제거해요. SQL의 SELECT DISTINCT에 해당해요. ← <u>이번 문제</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>⋈(보타이) - 조인(Join)</b></td><td style="text-align:left;vertical-align:middle">두 릴레이션을 공통 속성을 기준으로 연결해요. SQL의 JOIN에 해당해요. 세타 조인·동등 조인·자연 조인 등 종류가 있어요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>÷(나누기) - 디비전(Division)</b></td><td style="text-align:left;vertical-align:middle">피제수 릴레이션(R)에서 제수 릴레이션(S)의 모든 튜플과 쌍이 이루어지는 튜플만 추출해요. "모든 과목을 수강한 학생"처럼 "전부 포함하는" 조건을 표현할 때 사용해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>∪(합집합 Union)</b></td><td style="text-align:left;vertical-align:middle">두 릴레이션의 모든 튜플을 합치고 중복을 제거해요. SQL의 UNION에 해당해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>−(차집합 Difference)</b></td><td style="text-align:left;vertical-align:middle">첫 번째 릴레이션에는 있지만 두 번째에는 없는 튜플만 추출해요. SQL의 EXCEPT/MINUS에 해당해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>×(카티션 곱)</b></td><td style="text-align:left;vertical-align:middle">두 릴레이션의 모든 행 조합을 만들어요. SQL의 CROSS JOIN에 해당해요. R이 m행, S가 n행이면 결과는 m×n행이에요.</td></tr></table></div></div>` },

  // ─── 2025년 1회 ───
  { id:'25_1_1', year:'2025', round:'1회', cat:'정보보안',
    qHtml:`<div class="q-text">TCP 세션이 정상적으로 수립된 이후, 공격자가 시퀀스 번호 등을 조작하여 합법적인 사용자의 세션을 탈취하고 인증 없이 해당 세션으로 통신을 이어가는 해킹 기법의 명칭을 쓰시오.</div>`,
    ansHtml:`<div class="answer-val">세션 하이재킹 (Session Hijacking)</div><div class="keyword-detail">📌 <b>풀이</b><br>로그인에 성공해서 이미 연결된 세션을 공격자가 가로채는 공격이에요. 비유하자면 내가 은행에서 이미 번호표 뽑고 창구 직원과 얘기 중인데, 공격자가 몰래 내 자리를 빼앗는 것과 같아요. TCP 시퀀스 번호를 예측하거나 쿠키를 훔쳐서 인증 없이 세션을 탈취해요.<br><br>📎 <b>같이 알아두면 좋은 키워드</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>TCP 시퀀스 번호</b></td><td style="text-align:left;vertical-align:middle">TCP는 패킷에 순서 번호를 붙여요. 공격자가 이 번호를 예측하면 정상 사용자인 척 패킷을 보내서 세션을 가로챌 수 있어요. 이것이 세션 하이재킹의 핵심 원리예요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>쿠키 탈취</b></td><td style="text-align:left;vertical-align:middle">웹 브라우저는 로그인 상태를 쿠키에 저장해요. XSS(Cross-Site Scripting) 공격으로 이 쿠키를 훔치면 재로그인 없이도 피해자의 계정으로 접속할 수 있어요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>HTTPS/TLS 암호화</b></td><td style="text-align:left;vertical-align:middle">통신 내용을 암호화하면 시퀀스 번호와 쿠키가 암호화되어 탈취가 어려워져요. 세션 하이재킹의 가장 효과적인 방어책이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>세션 고정(Session Fixation)</b></td><td style="text-align:left;vertical-align:middle">공격자가 미리 세션 ID를 피해자에게 강제로 사용하게 한 뒤, 피해자가 로그인하면 그 세션으로 접속하는 변형 공격이에요. 방어책은 로그인 성공 후 새 세션 ID를 발급하는 것이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>IP 스푸핑(IP Spoofing)</b></td><td style="text-align:left;vertical-align:middle">패킷의 출발지 IP를 위조하는 기법이에요. 세션 하이재킹 시 공격자 IP를 숨기기 위해 함께 사용돼요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>RST 패킷</b></td><td style="text-align:left;vertical-align:middle">TCP 연결을 강제 종료하는 패킷이에요. 공격자가 RST 패킷으로 기존 연결을 끊고 재연결 시 공격자 쪽으로 연결을 유도해요.</td></tr></table></div></div>` },
  { id:'25_1_2', year:'2025', round:'1회', cat:'데이터베이스',
    qHtml:`<div class="q-text">데이터베이스 무결성 제약조건의 종류를 아래 표의 빈칸 ㄱ~ㄷ에 보기에서 골라 쓰시오.<br><br><div class="tbl-wrap"><table class="db-table" style="min-width:360px"><tr><th>종류</th><th>설명</th></tr><tr><td class="info-row">ㄱ. ( ) 무결성</td><td>속성값은 해당 도메인에서 정의된 유효 범위 내에 있어야 한다</td></tr><tr><td class="info-row">ㄴ. ( ) 무결성</td><td>기본 키는 NULL이 될 수 없으며 중복 값을 가질 수 없다</td></tr><tr><td class="info-row">ㄷ. ( ) 무결성</td><td>외래 키 값은 참조 릴레이션의 기본 키 값이거나 NULL이어야 한다</td></tr></table></div><br>[보기] &nbsp; 개체 &nbsp; 참조 &nbsp; 도메인</div>`,
    ansHtml:`<div class="answer-val">ㄱ. 도메인 무결성 &nbsp;&nbsp; ㄴ. 개체 무결성 &nbsp;&nbsp; ㄷ. 참조 무결성</div><div class="keyword-detail">📌 <b>풀이</b><br>DB 무결성은 데이터가 항상 올바른 상태를 유지하도록 강제하는 규칙이에요. <b>도메인 무결성</b>은 "나이 컬럼에 음수 불가"처럼 값의 유효 범위 제한, <b>개체 무결성</b>은 "PK는 절대 NULL 불가·중복 불가", <b>참조 무결성</b>은 "FK가 참조하는 PK 값이 반드시 존재해야 함"이에요.<br><br>📎 <b>무결성 제약조건 4종 비교</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>도메인 무결성</b></td><td style="text-align:left;vertical-align:middle">속성값은 반드시 해당 도메인(유효 범위) 안에 있어야 해요. CHECK 제약조건·NOT NULL·데이터 타입으로 구현해요. ← <u>정답ㄱ</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>개체 무결성</b></td><td style="text-align:left;vertical-align:middle">기본키(PK)는 절대로 NULL이 될 수 없고 중복도 허용되지 않아요. PK가 NULL이면 어떤 행인지 구별이 불가능하기 때문이에요. PRIMARY KEY 제약조건으로 구현해요. ← <u>정답ㄴ</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>참조 무결성</b></td><td style="text-align:left;vertical-align:middle">FK의 값은 참조하는 테이블의 PK에 실제로 존재하거나 NULL이어야 해요. FOREIGN KEY 제약조건으로 구현하며 CASCADE·RESTRICT·SET NULL로 삭제 정책을 지정해요. ← <u>정답ㄷ</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>NULL 무결성</b></td><td style="text-align:left;vertical-align:middle">NOT NULL로 지정된 속성은 반드시 값이 있어야 해요. 도메인 무결성의 하위 개념으로 볼 수 있어요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>고유(Unique) 무결성</b></td><td style="text-align:left;vertical-align:middle">UNIQUE 제약조건으로 특정 속성에 중복 값이 들어오지 못하게 해요. PK와 달리 NULL은 허용돼요.</td></tr></table></div></div>` },
  { id:'25_1_3', year:'2025', round:'1회', cat:'네트워크',
    qHtml:`<div class="q-text">3글자 영문 약자로 구성된 오류 검출 기법으로, 미리 약속한 생성 다항식(예: x³+x+1)으로 데이터를 이진 나눗셈하여 나머지를 검사값으로 사용한다. 수신 측은 동일한 다항식으로 재계산하여 오류를 검출한다. 이 기법의 약자를 쓰시오.</div>`,
    ansHtml:`<div class="answer-val">CRC (Cyclic Redundancy Check)</div><div class="keyword-detail">📌 <b>풀이</b><br>CRC(순환 중복 검사)는 데이터를 미리 약속한 생성 다항식으로 나누어 나머지(FCS)를 붙여 보내는 오류 검출 방법이에요. 받는 쪽도 같은 방식으로 계산해서 나머지가 0이면 오류 없음, 아니면 오류로 판단해요. 오류를 스스로 고치지는 못하고 재전송을 요청(BEC)해요.<br><br>📎 <b>오류 제어 기법 비교</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Parity bit</b></td><td style="text-align:left;vertical-align:middle">가장 단순한 오류 검출 기법이에요. 데이터의 1의 개수가 홀수/짝수가 되도록 1비트를 추가해요. 1비트 오류만 검출 가능하고 2비트 오류는 검출 못 해요. 오류 정정 능력은 없어요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>CRC (Cyclic Redundancy Check)</b></td><td style="text-align:left;vertical-align:middle">생성 다항식을 이용한 이진 나눗셈으로 검사값(FCS)을 계산해요. 버스트 오류(연속된 여러 비트 오류) 감지에 강력해요. BEC 방식이에요. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Hamming Code</b></td><td style="text-align:left;vertical-align:middle">Richard Hamming이 개발했어요. 데이터 비트 사이에 여러 개의 패리티 비트를 배치해서 1비트 오류를 자동으로 감지하고 수정할 수 있어요. FEC 방식의 대표 기법이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>FEC (Forward Error Correction)</b></td><td style="text-align:left;vertical-align:middle">수신 측이 재전송 요청 없이 스스로 오류를 정정하는 방식이에요. 실시간 방송·음성 통화처럼 재전송이 불가능한 환경에 사용해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>BEC (Backward Error Correction)</b></td><td style="text-align:left;vertical-align:middle">오류 발견 시 송신 측에 재전송을 요청하는 방식이에요. ARQ(Automatic Repeat reQuest)라고도 해요. CRC·Parity는 BEC 기반이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>FCS (Frame Check Sequence)</b></td><td style="text-align:left;vertical-align:middle">CRC 계산 결과를 프레임 맨 끝에 붙여서 전송하는 오류 검출 필드예요.</td></tr></table></div></div>` },
  { id:'25_1_4', year:'2025', round:'1회', cat:'정보보안',
    qHtml:`<div class="q-text">가짜 바이러스 경고나 허위 시스템 오류 메시지로 공포심을 유발하여 사용자가 불필요한 소프트웨어를 구매하거나 설치하도록 유도하는 악성 소프트웨어가 있다. '겁주다'라는 의미의 영어 단어에서 유래한 이 소프트웨어를 보기에서 골라 쓰시오.<br><br>[보기] &nbsp; ㄱ.컴포넌트웨어 &nbsp; ㄴ.유즈웨어 &nbsp; ㄷ.셔블웨어 &nbsp; ㄹ.스캐어웨어 &nbsp; ㅁ.안티스파이웨어 &nbsp; ㅂ.네트웨어 &nbsp; ㅅ.그룹웨어 &nbsp; ㅇ.애드웨어</div>`,
    ansHtml:`<div class="answer-val">ㄹ. 스캐어웨어 (Scareware)</div><div class="keyword-detail">📌 <b>풀이</b><br>스캐어웨어(Scareware)는 "당신의 PC에 바이러스 200개!"처럼 거짓 경고창을 띄워 겁을 준 뒤 불필요한 유료 프로그램을 사게 만드는 악성 소프트웨어예요. Scare(겁주다) + ware(소프트웨어) 합성어예요.<br><br>📎 <b>악성 소프트웨어(Malware) 종류 비교</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>바이러스(Virus)</b></td><td style="text-align:left;vertical-align:middle">다른 정상 파일이나 프로그램에 기생해요. 감염된 파일이 실행될 때 바이러스 코드도 함께 실행되어 다른 파일로 감염을 퍼뜨려요. 숙주(호스트 파일) 없이는 스스로 실행 못 해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>웜(Worm)</b></td><td style="text-align:left;vertical-align:middle">숙주 없이 독립적으로 실행되고, 네트워크를 통해 스스로 복제·전파해요. 이메일 첨부파일·네트워크 취약점 등을 이용해요. 빠른 전파 속도가 특징이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>트로이 목마(Trojan Horse)</b></td><td style="text-align:left;vertical-align:middle">정상 프로그램(게임, 유틸리티)으로 위장해서 사용자가 직접 설치하게 유도해요. 설치 후 백도어를 열거나 개인정보를 탈취해요. 자가 복제 능력은 없어요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>랜섬웨어(Ransomware)</b></td><td style="text-align:left;vertical-align:middle">피해자의 파일을 암호화한 후 복호화 키를 대가로 금전(주로 가상화폐)을 요구해요. 2017년 WannaCry 사태가 대표적이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>스캐어웨어(Scareware)</b></td><td style="text-align:left;vertical-align:middle">Scare(겁주다)+ware 합성어. 허위 경고로 공포 유발 후 유료 소프트웨어 구매를 유도해요. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>루트킷(Rootkit)</b></td><td style="text-align:left;vertical-align:middle">시스템 깊숙이(커널 수준) 침투하여 자신의 존재를 숨기는 악성 소프트웨어예요. 탐지와 제거가 매우 어려워요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>스파이웨어(Spyware)</b></td><td style="text-align:left;vertical-align:middle">사용자 몰래 설치되어 키보드 입력·브라우저 이력·개인정보 등을 수집해서 공격자에게 전송해요.</td></tr></table></div></div>` },
  { id:'25_1_5', year:'2025', round:'1회', cat:'네트워크',
    qHtml:`<div class="q-text">IP 주소와 MAC 주소 간 변환을 담당하는 두 프로토콜에 대한 설명이다. 각각의 명칭을 쓰시오.<br><br>(1) 알고 있는 IP 주소를 바탕으로 해당 장치의 MAC 주소를 알아내는 프로토콜<br>(2) 자신의 MAC 주소를 이용해 IP 주소를 역으로 조회하는 프로토콜</div>`,
    ansHtml:`<div class="answer-val">(1) ARP &nbsp;&nbsp; (2) RARP</div><div class="keyword-detail">📌 <b>풀이</b><br>네트워크 통신에서 IP 주소와 MAC 주소를 서로 변환해야 할 때가 있어요. <b>ARP</b>는 "이 IP를 가진 장치의 MAC 주소가 뭐야?"라고 브로드캐스트로 물어보는 프로토콜이에요. <b>RARP</b>는 반대로 MAC은 알지만 IP를 모를 때 사용해요(현재는 DHCP로 대체).<br><br>📎 <b>같이 알아두면 좋은 키워드</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>ARP (Address Resolution Protocol)</b></td><td style="text-align:left;vertical-align:middle">IP 주소 → MAC 주소로 변환해요. 동일 네트워크 내에서 통신할 때 반드시 필요해요. ARP 요청은 브로드캐스트로, 응답은 유니캐스트로 받아요. 결과는 ARP 캐시에 저장돼요. ← <u>정답1</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>RARP (Reverse ARP)</b></td><td style="text-align:left;vertical-align:middle">MAC 주소 → IP 주소로 역변환해요. 디스크가 없는 워크스테이션이 부팅 시 자신의 IP를 알아내기 위해 사용했어요. 현재는 DHCP로 완전히 대체됐어요. ← <u>정답2</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>DHCP</b></td><td style="text-align:left;vertical-align:middle">네트워크에 접속한 장치에 IP 주소·서브넷 마스크·기본 게이트웨이·DNS 서버 등을 자동으로 할당해요. RARP보다 훨씬 많은 정보를 제공해서 RARP를 대체했어요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>ARP 캐시(ARP Table)</b></td><td style="text-align:left;vertical-align:middle">한 번 조회한 IP-MAC 매핑 정보를 임시로 저장하는 테이블이에요. 매번 ARP 요청을 보내지 않아도 돼서 효율적이에요. 일정 시간 후 자동 삭제돼요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>ARP 스푸핑(ARP Spoofing)</b></td><td style="text-align:left;vertical-align:middle">위조된 ARP 응답을 보내서 피해자의 ARP 테이블을 오염시키는 공격이에요. "게이트웨이 MAC 주소가 내 MAC이야"라고 거짓말해서 트래픽을 가로채요(중간자 공격).</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Gratuitous ARP</b></td><td style="text-align:left;vertical-align:middle">자신의 IP-MAC 매핑을 네트워크에 자발적으로 알리는 ARP예요. IP 충돌 감지나 ARP 캐시 갱신에 사용해요.</td></tr></table></div></div>` },
  { id:'25_1_6', year:'2025', round:'1회', cat:'SQL문',
    qHtml:`<div class="q-text">아래 두 테이블을 참고하여 주어진 SQL의 실행 결과를 작성하시오.<br><br><div class="tables-row"><div><div class="tbl-label">emp 테이블</div><table class="db-table"><tr><th>id</th><th>name</th></tr><tr><td>1</td><td>홍길동</td></tr><tr><td>2</td><td>이순신</td></tr><tr><td>3</td><td>강감찬</td></tr></table></div><div><div class="tbl-label">sal 테이블</div><table class="db-table"><tr><th>id</th><th>incentive</th></tr><tr><td>1</td><td>200</td></tr><tr><td>2</td><td>1000</td></tr><tr><td>3</td><td>300</td></tr></table></div></div><div class="sql-box">SELECT name, incentive FROM emp, sal
WHERE emp.id = sal.id AND incentive >= 500</div>`,
    ansHtml:`<div class="answer-val">name: 이순신 / incentive: 1000</div><div class="keyword-detail">📌 <b>풀이</b><br>이 SQL은 emp 테이블과 sal 테이블을 id 컬럼으로 연결(EQUI JOIN)한 뒤, incentive가 500 이상인 직원을 조회해요. 이순신(id=2, incentive=1000)이 조건을 만족해요.<br><br>📎 <b>SQL JOIN 관련 키워드</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>EQUI JOIN (동등 조인)</b></td><td style="text-align:left;vertical-align:middle">= 연산자로 두 테이블을 연결하는 가장 일반적인 조인이에요. WHERE 절에 테이블1.컬럼 = 테이블2.컬럼 조건을 명시해요. ← <u>이번 문제</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>INNER JOIN...ON</b></td><td style="text-align:left;vertical-align:middle">EQUI JOIN의 명시적 문법이에요. FROM A INNER JOIN B ON A.id = B.id 형태로 조인 조건을 ON 뒤에 써요. WHERE 절과 논리적으로 동일하지만 가독성이 좋아요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>NATURAL JOIN</b></td><td style="text-align:left;vertical-align:middle">두 테이블에서 이름이 같은 컬럼을 자동으로 조인 조건으로 사용해요. 중복 컬럼이 결과에 한 번만 나타나요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>LEFT OUTER JOIN</b></td><td style="text-align:left;vertical-align:middle">왼쪽 테이블의 모든 행을 포함하고, 오른쪽 테이블에 매칭되는 행이 없으면 NULL로 채워요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>NULL 처리</b></td><td style="text-align:left;vertical-align:middle">incentive = NULL인 경우 &gt;= 500 비교에서 NULL이 반환되어 조건이 거짓이 돼요. NULL과의 비교는 IS NULL / IS NOT NULL을 사용해야 해요.</td></tr></table></div></div>` },
  { id:'25_1_7', year:'2025', round:'1회', cat:'데이터베이스',
    qHtml:`<div class="q-text">관계형 데이터베이스의 기본 용어에 대한 설명이다. 각 설명에 해당하는 용어를 보기에서 골라 쓰시오.<br><br>(1) 릴레이션에서 속성(열)의 개수<br>(2) 릴레이션에서 튜플(행)의 개수<br>(3) 한 릴레이션의 속성이 다른 릴레이션의 기본 키를 참조할 때 그 참조하는 속성<br>(4) 특정 속성에 입력 가능한 값의 유형이나 범위를 정의하여 무결성을 보장하는 기준<br><br>[보기] &nbsp; ㄱ.domain &nbsp; ㄴ.primary &nbsp; ㄷ.degree &nbsp; ㄹ.candidate &nbsp; ㅁ.cardinality &nbsp; ㅂ.attribute &nbsp; ㅅ.foreign</div>`,
    ansHtml:`<div class="answer-val">(1) ㄷ. degree &nbsp; (2) ㅁ. cardinality &nbsp; (3) ㅅ. foreign &nbsp; (4) ㄱ. domain</div><div class="keyword-detail">📌 <b>풀이</b><br>학생 테이블에서 학번·이름·학과·학년 4개 열이 있고 5명 데이터가 있으면 — Degree(차수)=4(열 수), Cardinality(카디널리티)=5(행 수), 학과번호처럼 다른 테이블 PK 참조=Foreign Key, 나이처럼 가질 수 있는 값의 범위=Domain이에요.<br><br>📎 <b>DB 핵심 용어 정리</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>차수(Degree)</b></td><td style="text-align:left;vertical-align:middle">릴레이션에 포함된 속성(열/컬럼)의 개수예요. 테이블 스키마가 변경되지 않는 한 고정돼요. ← <u>정답1</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>카디널리티(Cardinality)</b></td><td style="text-align:left;vertical-align:middle">릴레이션에 포함된 튜플(행/레코드)의 개수예요. 데이터가 추가·삭제되면 변해요. ← <u>정답2</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>외래키(Foreign Key, FK)</b></td><td style="text-align:left;vertical-align:middle">다른 테이블의 기본키(PK)를 참조하는 속성이에요. 두 테이블 간의 관계를 정의하고 참조 무결성을 보장해요. ← <u>정답3</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>도메인(Domain)</b></td><td style="text-align:left;vertical-align:middle">각 속성이 가질 수 있는 원자값(Atomic Value)의 집합이에요. 학년의 도메인은 {1,2,3,4}, 성별은 {남,여}처럼 유효한 값의 범위를 정의해요. ← <u>정답4</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>후보키(Candidate Key)</b></td><td style="text-align:left;vertical-align:middle">유일성(모든 튜플 구별)과 최소성(불필요한 속성 없음)을 모두 만족하는 키예요. 기본키가 될 수 있는 후보들이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>슈퍼키(Super Key)</b></td><td style="text-align:left;vertical-align:middle">유일성만 만족하고 최소성은 불필요한 키예요. {학번}도 슈퍼키이고 {학번+이름}도 슈퍼키예요.</td></tr></table></div></div>` },
  { id:'25_1_8', year:'2025', round:'1회', cat:'네트워크',
    qHtml:`<div class="q-text">IP 주소 192.168.35.10, 서브넷 마스크 255.255.252.0인 PC가 브로드캐스트로 통신할 때, 동일 네트워크 대역에 속하여 수신 가능한 IP를 보기에서 모두 골라 쓰시오.<br><br>[보기]<br>ㄱ. 192.168.34.1 &nbsp; ㄴ. 192.168.32.19 &nbsp; ㄷ. 192.168.35.200<br>ㄹ. 192.168.33.138 &nbsp; ㅁ. 192.168.35.50</div>`,
    ansHtml:`<div class="answer-val">ㄱ, ㄴ, ㄷ, ㄹ, ㅁ (모두 해당)</div><div class="keyword-detail">📌 <b>풀이</b><br>서브넷 마스크 255.255.252.0=/22예요. 192.168.35.10을 AND 연산하면 네트워크 주소 192.168.32.0, 브로드캐스트 192.168.35.255예요. 보기의 모든 IP가 이 범위에 속해서 전부 동일 네트워크예요.<br><br>📎 <b>서브네팅 핵심 공식</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>CIDR 표기법</b></td><td style="text-align:left;vertical-align:middle">/22는 앞에서 22비트가 네트워크 부분임을 의미해요. 255.255.252.0을 2진수로 쓰면 22개의 1과 10개의 0이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>네트워크 주소 계산</b></td><td style="text-align:left;vertical-align:middle">IP 주소 AND 서브넷 마스크로 계산해요. 같은 네트워크인지 확인할 때 두 IP를 각각 서브넷 마스크와 AND 연산한 결과가 같으면 동일 네트워크예요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>/22 네트워크 범위</b></td><td style="text-align:left;vertical-align:middle">마지막 두 옥텟이 호스트 비트예요. 252=11111100이므로 가변 부분은 xx.xxxxxxxx → 192.168.32.0 ~ 192.168.35.255 범위예요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>사용 가능 호스트 수</b></td><td style="text-align:left;vertical-align:middle">2^10 - 2 = 1022개예요. 10은 호스트 비트 수(32-22=10), -2는 네트워크 주소(첫 번째)와 브로드캐스트(마지막)를 제외한 것이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>FLSM vs VLSM</b></td><td style="text-align:left;vertical-align:middle">FLSM(Fixed Length Subnet Mask)은 모든 서브넷을 같은 크기로 분할, VLSM(Variable Length)은 크기를 다르게 분할해서 IP 낭비를 줄여요.</td></tr></table></div></div>` },
  { id:'25_1_9', year:'2025', round:'1회', cat:'SW 개발/계획',
    qHtml:`<div class="q-text">소프트웨어 모듈 간 결합도(Coupling) 유형에 대한 설명이다. 각 설명에 해당하는 결합도를 보기에서 골라 쓰시오.<br><br>(1) 한 모듈이 다른 모듈의 내부 변수나 기능에 직접 접근하는 경우<br>(2) 모듈 간 인터페이스로 배열이나 자료구조가 전달되는 경우<br>(3) 모듈 밖에 선언된 전역 변수를 두 모듈이 공유·갱신하는 경우<br><br>[보기] &nbsp; ㄱ.자료 &nbsp; ㄴ.스탬프 &nbsp; ㄷ.제어 &nbsp; ㄹ.공통 &nbsp; ㅁ.내용 &nbsp; ㅂ.외부</div>`,
    ansHtml:`<div class="answer-val">(1) ㅁ. 내용 결합도 &nbsp;&nbsp; (2) ㄴ. 스탬프 결합도 &nbsp;&nbsp; (3) ㄹ. 공통 결합도</div><div class="keyword-detail">📌 <b>풀이</b><br>결합도는 모듈 간 의존도예요. 낮을수록 좋은 설계(독립적)이에요. <b>내용 결합도</b>는 A 모듈이 B 모듈의 내부 코드를 직접 참조하는 최악의 경우, <b>스탬프 결합도</b>는 필요 이상으로 큰 구조체를 통째로 넘기는 것, <b>공통 결합도</b>는 전역 변수를 여러 모듈이 함께 사용하는 것이에요.<br><br>📎 <b>결합도 7종 (강→약, 나쁨→좋음)</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>내용(Content) 결합도</b></td><td style="text-align:left;vertical-align:middle">한 모듈이 다른 모듈의 내부 변수·명령어·코드를 직접 참조·수정해요. 가장 나쁜 결합도로 유지보수가 매우 어려워요. ← <u>정답1</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>공통(Common) 결합도</b></td><td style="text-align:left;vertical-align:middle">두 모듈이 동일한 전역 변수나 공유 데이터를 함께 사용해요. 한 모듈의 변경이 다른 모듈에 예기치 않게 영향을 줘요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>외부(External) 결합도</b></td><td style="text-align:left;vertical-align:middle">두 모듈이 외부 환경(파일, 하드웨어, 프로토콜)을 함께 공유해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>제어(Control) 결합도</b></td><td style="text-align:left;vertical-align:middle">한 모듈이 다른 모듈의 내부 동작을 제어하는 플래그(flag)나 제어 신호를 전달해요. "mode=1이면 이렇게, mode=2이면 저렇게" 방식이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>스탬프(Stamp) 결합도</b></td><td style="text-align:left;vertical-align:middle">두 모듈이 자료 구조(구조체)를 공유하는데 해당 모듈이 구조체의 일부만 사용해요. 불필요한 데이터까지 넘겨서 낭비예요. ← <u>정답2</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>자료(Data) 결합도</b></td><td style="text-align:left;vertical-align:middle">두 모듈이 순수하게 필요한 데이터(매개변수)만 주고받아요. 가장 좋은 결합도예요.</td></tr><tr><td colspan="2" style="color:var(--c-text2);font-style:italic;border-top:1px dashed var(--c-border2)">📝 암기법: 내공외제스자비 (내용→공통→외부→제어→스탬프→자료→비직접)</td></tr></table></div></div>` },
  { id:'25_1_10', year:'2025', round:'1회', cat:'SW 개발/계획',
    qHtml:`<div class="q-text">서로 다른 인터페이스를 가진 클래스들을 함께 사용할 수 있도록, 기존 클래스(Adaptee)를 원하는 인터페이스(Target)에 맞게 변환하는 래퍼(Wrapper) 역할을 하는 구조 디자인 패턴의 명칭을 쓰시오.</div>`,
    ansHtml:`<div class="answer-val">Adapter (어댑터) 패턴</div><div class="keyword-detail">📌 <b>풀이</b><br>Adapter 패턴은 110V 기기를 220V 콘센트에 꽂을 때 쓰는 어댑터와 똑같은 개념이에요. 기존 클래스(Adaptee)의 인터페이스를 원하는 인터페이스(Target)로 변환해주는 중간 변환기를 만드는 패턴이에요. 레거시 코드를 수정하지 않고 재사용할 수 있어요.<br><br>📎 <b>GoF 구조(Structural) 패턴 7가지</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Adapter (어댑터)</b></td><td style="text-align:left;vertical-align:middle">호환되지 않는 인터페이스를 연결해요. 기존 코드를 수정하지 않고 새 인터페이스로 래핑해요. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Bridge (브리지)</b></td><td style="text-align:left;vertical-align:middle">추상화(Abstraction)와 구현(Implementation)을 분리하여 각각 독립적으로 확장할 수 있어요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Composite (컴포지트)</b></td><td style="text-align:left;vertical-align:middle">개별 객체와 복합 객체를 동일한 인터페이스로 다루는 트리 구조 패턴이에요. 파일(단일)과 폴더(복합)를 같은 방식으로 처리하는 파일 시스템이 좋은 예시예요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Decorator (데코레이터)</b></td><td style="text-align:left;vertical-align:middle">객체에 새로운 기능을 동적으로 추가해요. 상속 없이 기능을 확장할 수 있어요. Java의 InputStream → BufferedInputStream 감싸기가 예시예요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Facade (퍼사드)</b></td><td style="text-align:left;vertical-align:middle">복잡한 서브시스템을 단순한 인터페이스로 포장해요. 사용자는 내부 복잡성을 몰라도 되고 고수준 인터페이스만 사용해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Flyweight (플라이웨이트)</b></td><td style="text-align:left;vertical-align:middle">여러 객체에서 공통된 상태를 공유하여 메모리 사용을 줄여요. 게임에서 나무 수천 그루를 공유 객체로 표현하는 것이 예시예요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Proxy (프록시)</b></td><td style="text-align:left;vertical-align:middle">실제 객체 대신 대리 객체를 두어 접근을 제어해요. 지연 초기화·접근 제어·로깅·캐싱 등에 활용해요.</td></tr></table></div></div>` },

  { id:'24_3_1', year:'2024', round:'3회', cat:'운영체제',
    qHtml:`<div class="q-text">할당된 프레임 수가 3개일 때, 아래 페이지 참조 순서에 LRU 알고리즘을 적용했을 때의 페이지 부재(Page Fault) 횟수를 구하시오.<br><br>페이지 참조 순서: 7 0 1 2 0 3 0 4 2 3 0 3 2 1 2 0 1 7 0 1</div>`,
    ansHtml:`<div class="answer-val">12회</div><div class="keyword-detail">📌 <b>풀이</b><br><b>LRU(Least Recently Used)</b>는 가장 오랫동안 사용되지 않은 페이지를 교체해요. "오래된 것 먼저"로 기억하면 돼요. 프레임 3개 기준으로 참조 순서를 하나씩 시뮬레이션하면 총 12번 페이지 부재가 발생해요.<br><br>📎 <b>페이지 교체 알고리즘 비교</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>FIFO</b></td><td style="text-align:left;vertical-align:middle">가장 먼저 들어온 페이지를 교체해요. 가장 단순하지만 Belady 이상(프레임 늘려도 페이지 부재 증가)이 발생할 수 있어요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>LRU (Least Recently Used)</b></td><td style="text-align:left;vertical-align:middle">가장 오랫동안 사용되지 않은 페이지를 교체해요. 최근 사용된 것은 곧 다시 쓰일 것이라는 가정이에요. ← <u>이번 문제</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>LFU (Least Frequently Used)</b></td><td style="text-align:left;vertical-align:middle">사용 빈도가 가장 낮은 페이지를 교체해요. 오래됐지만 자주 쓰인 페이지가 교체될 수 있는 단점이 있어요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>OPT (Optimal)</b></td><td style="text-align:left;vertical-align:middle">앞으로 가장 오래 사용되지 않을 페이지를 교체해요. 이론적 최적이지만 미래를 알 수 없어 실제 구현 불가예요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Belady 이상</b></td><td style="text-align:left;vertical-align:middle">FIFO에서 프레임 수를 늘렸는데 오히려 페이지 부재 횟수가 증가하는 현상이에요. LRU·OPT에서는 발생하지 않아요.</td></tr></table></div></div>` },
  { id:'24_3_2', year:'2024', round:'3회', cat:'정보보안',
    qHtml:`<div class="q-text">아래 특징을 갖는 네트워크 공격의 명칭을 쓰시오.<br><br>· IP/ICMP 특성을 악용하여 특정 네트워크에 대량 데이터를 집중 전송해 불능 상태로 만드는 공격이다.<br>· 브로드캐스트 주소로 ICMP Echo Request를 전송하여 네트워크 내 모든 호스트가 공격 대상에게 Echo Reply를 보내도록 유도한다.<br>· 결과적으로 공격 대상에 대량의 패킷이 쏟아져 서비스 거부(DoS) 상태가 발생한다.</div>`,
    ansHtml:`<div class="answer-val">스머프 공격 (Smurf Attack)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>스머프 공격</b>은 IP 위조(Spoofing) + ICMP 브로드캐스트를 결합한 공격이에요. 공격자가 피해자 IP로 위조한 ICMP 핑 요청을 브로드캐스트 주소로 전송하면 네트워크의 모든 장치가 피해자에게 응답을 보내 트래픽이 폭주해요.<br><br>📎 <b>같이 알아두면 좋은 키워드</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>IP 스푸핑(Spoofing)</b></td><td style="text-align:left;vertical-align:middle">패킷의 출발지 IP를 피해자 IP로 위조해요. 스머프 공격의 핵심 기법이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>ICMP (Internet Control Message Protocol)</b></td><td style="text-align:left;vertical-align:middle">ping 명령에 사용되는 프로토콜이에요. 스머프 공격은 ICMP Echo Request를 대량으로 발생시켜요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>증폭 공격(Amplification)</b></td><td style="text-align:left;vertical-align:middle">작은 요청으로 큰 응답을 유발해요. 네트워크의 N대 장치가 모두 피해자에게 응답해서 N배 증폭 효과가 나요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Fraggle 공격</b></td><td style="text-align:left;vertical-align:middle">스머프와 유사하지만 ICMP 대신 UDP를 사용해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>DoS vs DDoS</b></td><td style="text-align:left;vertical-align:middle">DoS: 단일 공격자. DDoS: 좀비 PC(봇넷) 수천 대가 동시 공격. 스머프는 네트워크 장치들이 증폭 역할을 해요.</td></tr></table></div></div>` },
  { id:'24_3_3', year:'2024', round:'3회', cat:'SW 개발/계획',
    qHtml:`<div class="q-text">GoF 디자인 패턴의 세 가지 분류 중, 클래스나 객체 간 상호작용 방법과 책임 분배 방법을 정의하는 패턴 분류의 명칭을 쓰시오. (Chain of Responsibility, Command, Observer 등이 이에 속함)</div>`,
    ansHtml:`<div class="answer-val">행위(Behavioral) 패턴</div><div class="keyword-detail">📌 <b>풀이</b><br>GoF 디자인 패턴은 3가지로 분류돼요. <b>행위(Behavioral) 패턴</b>은 클래스나 객체들이 서로 어떻게 상호작용하고 책임을 분배하는지에 관한 패턴이에요. Chain of Responsibility, Command, Observer, Strategy 등이 포함돼요.<br><br>📎 <b>GoF 패턴 3분류</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>생성(Creational) 패턴</b></td><td style="text-align:left;vertical-align:middle">객체를 어떻게 만들까? 5가지: Singleton, Factory Method, Abstract Factory, Builder, Prototype이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>구조(Structural) 패턴</b></td><td style="text-align:left;vertical-align:middle">객체를 어떻게 조합할까? 7가지: Adapter, Bridge, Composite, Decorator, Facade, Flyweight, Proxy이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>행위(Behavioral) 패턴</b></td><td style="text-align:left;vertical-align:middle">객체가 어떻게 협력할까? 11가지: Observer, Strategy, Command, Iterator, Template Method, Chain of Responsibility, Visitor, State, Mediator, Memento, Interpreter이에요. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Chain of Responsibility</b></td><td style="text-align:left;vertical-align:middle">요청을 처리할 수 있는 객체를 찾을 때까지 체인을 따라 전달해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Strategy 패턴</b></td><td style="text-align:left;vertical-align:middle">알고리즘을 캡슐화해서 런타임에 교체 가능하게 해요.</td></tr></table></div></div>` },
  { id:'24_3_4', year:'2024', round:'3회', cat:'데이터베이스',
    qHtml:`<div class="q-text">아래 테이블에서 위반하고 있는 무결성 제약조건의 종류를 쓰시오.<br><br><div class="tbl-wrap"><table class="db-table"><tr><th>학번(PK)</th><th>이름</th><th>학과</th></tr><tr><td>20231001</td><td>김민수</td><td>컴퓨터공학</td></tr><tr><td style="color:var(--color-text-danger,#A32D2D);background:var(--color-background-danger,#FCEBEB)">NULL</td><td>이영희</td><td>정보통신</td></tr><tr><td>20231003</td><td>박준호</td><td>소프트웨어</td></tr></table></div><div class="q-text" style="margin-top:8px">→ 기본 키(학번) 컬럼에 NULL 값이 존재한다.</div>`,
    ansHtml:`<div class="answer-val">개체 무결성 (Entity Integrity)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>개체 무결성</b>은 기본키(PK)는 절대로 NULL이 될 수 없다는 규칙이에요. 테이블에서 학번(PK)이 NULL인 행이 있어서 개체 무결성을 위반해요. PK가 NULL이면 어떤 행인지 구별이 불가능하기 때문이에요.<br><br>📎 <b>무결성 제약조건 4종 비교</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>개체 무결성</b></td><td style="text-align:left;vertical-align:middle">PK는 NULL 불가·중복 불가예요. 각 행을 유일하게 식별하기 위해서예요. PRIMARY KEY 제약조건으로 구현해요. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>참조 무결성</b></td><td style="text-align:left;vertical-align:middle">FK의 값은 참조하는 테이블의 PK에 존재하거나 NULL이어야 해요. 존재하지 않는 부서에 직원 배속 불가 같은 경우예요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>도메인 무결성</b></td><td style="text-align:left;vertical-align:middle">속성값은 반드시 해당 도메인(유효 범위) 안에 있어야 해요. CHECK·NOT NULL·데이터 타입으로 구현해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>NULL 무결성</b></td><td style="text-align:left;vertical-align:middle">NOT NULL로 지정된 속성은 반드시 값이 있어야 해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>CASCADE 옵션</b></td><td style="text-align:left;vertical-align:middle">참조 무결성 위반 시 처리 방법이에요. CASCADE(연쇄 삭제), RESTRICT(삭제 거부), SET NULL(NULL로 변경)이 있어요.</td></tr></table></div></div>` },
  { id:'24_3_5', year:'2024', round:'3회', cat:'기타 용어',
    qHtml:`<div class="q-text">URL 구성 요소에 대한 설명이다. 각 설명에 해당하는 구성 요소를 보기에서 골라 URL에 등장하는 순서대로 번호를 쓰시오.<br><br><div class="tbl-wrap"><table class="db-table" style="min-width:400px"><tr><th>번호</th><th>구성 요소</th><th>설명</th></tr><tr><td>1</td><td>query</td><td>서버에 전달할 추가 데이터</td></tr><tr><td>2</td><td>path</td><td>서버 내 특정 자원을 가리키는 경로</td></tr><tr><td>3</td><td>scheme</td><td>리소스에 접근하는 프로토콜 (예: https)</td></tr><tr><td>4</td><td>authority</td><td>사용자 정보, 호스트명, 포트번호</td></tr><tr><td>5</td><td>fragment</td><td>문서 내 특정 위치를 가리키는 앵커</td></tr></table></div><br>URL 예시 : https://ryan:2457@www.dream.com:443/index?id=5&amp;page=1#bottom</div>`,
    ansHtml:`<div class="answer-val">3 4 2 1 5</div><div class="keyword-detail">📌 <b>풀이</b><br>URL은 웹 주소의 구조예요. <code>https://user@www.example.com:443/path?id=1#top</code>에서 <b>scheme → authority → path → query → fragment</b> 순서로 나타나요. 번호로는 3→4→2→1→5 순이에요.<br><br>📎 <b>URL 구성요소 전체 정리</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>scheme (3번)</b></td><td style="text-align:left;vertical-align:middle">프로토콜을 나타내요. https, http, ftp, mailto 등이에요. :// 앞부분이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>authority (4번)</b></td><td style="text-align:left;vertical-align:middle">호스트 정보예요. 사용자정보@호스트:포트로 구성돼요. www.example.com:443 같은 부분이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>path (2번)</b></td><td style="text-align:left;vertical-align:middle">서버 내 자원의 경로예요. /path/to/resource 형태예요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>query (1번)</b></td><td style="text-align:left;vertical-align:middle">?로 시작하는 추가 파라미터예요. ?key=value&key2=value2 형태예요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>fragment (5번)</b></td><td style="text-align:left;vertical-align:middle">#으로 시작하는 페이지 내 특정 위치(앵커)예요. SPA에서 라우팅에도 활용해요.</td></tr></table></div></div>` },
  { id:'24_3_6', year:'2024', round:'3회', cat:'SW 개발/계획',
    qHtml:`<div class="q-text">소프트웨어 테스트 커버리지 기준에 대한 설명이다. 각 설명에 해당하는 커버리지를 보기에서 골라 쓰시오.<br><br>1. 모든 실행 문장을 최소 한 번씩 수행했는지 측정<br>2. 모든 조건문에서 각 분기(참/거짓)를 최소 한 번씩 실행했는지 측정<br>3. 복합 조건문 내 개별 조건식 각각이 참·거짓으로 평가되는 경우를 모두 테스트했는지 측정<br><br>[보기] &nbsp; ㄱ.조건 &nbsp; ㄴ.경로 &nbsp; ㄷ.결정 &nbsp; ㄹ.분기 &nbsp; ㅁ.함수 &nbsp; ㅂ.문장 &nbsp; ㅅ.루프</div>`,
    ansHtml:`<div class="answer-val">1. 문장(Statement) 커버리지 &nbsp;&nbsp; 2. 분기(Branch) 커버리지 &nbsp;&nbsp; 3. 조건(Condition) 커버리지</div><div class="keyword-detail">📌 <b>풀이</b><br>커버리지는 테스트가 얼마나 코드를 실행했는지 측정하는 기준이에요. <b>문장</b>은 모든 줄 실행, <b>분기</b>는 if의 T/F 양방향, <b>조건</b>은 개별 조건식의 T/F 각각을 보장해요.<br><br>📎 <b>커버리지 종류 비교 (약→강)</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>문장(Statement) 커버리지</b></td><td style="text-align:left;vertical-align:middle">모든 실행 가능한 코드 줄을 최소 1번 실행하면 충족돼요. ← <u>정답1</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>결정(Decision)/분기(Branch) 커버리지</b></td><td style="text-align:left;vertical-align:middle">각 결정문의 결과가 T와 F를 각각 최소 1번씩 가져야 해요. ← <u>정답2</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>조건(Condition) 커버리지</b></td><td style="text-align:left;vertical-align:middle">결정문 안의 개별 원자 조건식 각각이 T/F를 최소 1번씩 가져야 해요. 결정문 전체의 T/F는 보장하지 않는 함정이 있어요. ← <u>정답3</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>조건/결정 커버리지</b></td><td style="text-align:left;vertical-align:middle">결정 + 조건 커버리지를 동시에 만족해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>MC/DC</b></td><td style="text-align:left;vertical-align:middle">각 조건이 독립적으로 전체 결정에 영향을 미치는 경우만 선별해요. 항공·자동차 안전 시스템에서 의무 적용해요.</td></tr><tr><td colspan="2" style="color:var(--c-text2);font-style:italic;border-top:1px dashed var(--c-border2)">📝 강도 순서: 문장 &lt; 결정/분기 &lt; 조건 &lt; 조건/결정 &lt; 다중 조건 &lt; MC/DC</td></tr></table></div></div>` },
  { id:'24_3_7', year:'2024', round:'3회', cat:'SW 개발/계획',
    qHtml:`<div class="q-text">UML 클래스 다이어그램의 관계를 보기에서 골라 각각 쓰시오.<br><br><div class="tbl-wrap"><table class="db-table" style="min-width:360px"><tr><th>관계 표현</th><th>설명</th></tr><tr><td class="info-row">(1) 실선 + 화살표</td><td>클래스 간 지속적 연결 관계, 한 클래스가 다른 클래스를 속성으로 참조</td></tr><tr><td class="info-row">(2) 실선 + 빈 삼각형 화살표</td><td>상위(부모)와 하위(자식) 클래스 간의 상속 관계</td></tr><tr><td class="info-row">(3) 점선 + 화살표</td><td>한 클래스가 다른 클래스를 일시적으로 사용 (파라미터, 지역변수 등)</td></tr></table></div><br>[보기] &nbsp; ㄱ.의존 &nbsp; ㄴ.연관 &nbsp; ㄷ.일반화</div>`,
    ansHtml:`<div class="answer-val">(1) ㄴ. 연관 &nbsp;&nbsp; (2) ㄷ. 일반화 &nbsp;&nbsp; (3) ㄱ. 의존</div><div class="keyword-detail">📌 <b>풀이</b><br>UML 클래스 다이어그램의 관계는 화살표 모양으로 구분해요. <b>연관</b>은 지속적 참조(실선+화살표), <b>일반화</b>는 상속(실선+빈 삼각형), <b>의존</b>은 일시적 사용(점선+화살표)이에요.<br><br>📎 <b>UML 클래스 다이어그램 관계 5가지</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>연관(Association)</b></td><td style="text-align:left;vertical-align:middle">한 클래스가 다른 클래스를 멤버 변수로 참조하는 지속적 관계예요. 실선+화살표로 표현해요. ← <u>정답1</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>일반화(Generalization)</b></td><td style="text-align:left;vertical-align:middle">상속(IS-A) 관계예요. 실선+속이 빈 삼각형으로 표현해요. ← <u>정답2</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>의존(Dependency)</b></td><td style="text-align:left;vertical-align:middle">한 클래스가 다른 클래스를 메서드 매개변수나 지역 변수로 일시적으로 사용해요. 점선+화살표로 표현해요. ← <u>정답3</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>집약(Aggregation)</b></td><td style="text-align:left;vertical-align:middle">Part-of 관계이지만 각 객체가 독립적인 생명주기를 가져요. 실선+빈 마름모로 표현해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>합성(Composition)</b></td><td style="text-align:left;vertical-align:middle">Part-of 관계이며 부분 객체의 생명주기가 전체 객체에 종속돼요. 실선+채워진 마름모로 표현해요.</td></tr></table></div></div>` },
  { id:'24_3_8', year:'2024', round:'3회', cat:'데이터베이스',
    qHtml:`<div class="q-text">데이터베이스 키(Key)에 대한 설명이다. 각 설명에 해당하는 키를 보기에서 골라 쓰시오.<br><br>(1) 다른 테이블의 기본 키를 참조하는 속성 또는 속성들의 집합<br>(2) 테이블에서 각 행을 유일하게 식별할 수 있는 속성들의 최소 집합<br>(3) 후보 키 중에서 기본 키로 선정되지 않은 나머지 후보 키<br>(4) 유일성은 만족하지만 최소성을 보장하지 않는 속성들의 집합<br><br>[보기] &nbsp; ㄱ.슈퍼키 &nbsp; ㄴ.외래키 &nbsp; ㄷ.대체키 &nbsp; ㄹ.후보키</div>`,
    ansHtml:`<div class="answer-val">(1) ㄴ. 외래키 &nbsp;&nbsp; (2) ㄹ. 후보키 &nbsp;&nbsp; (3) ㄷ. 대체키 &nbsp;&nbsp; (4) ㄱ. 슈퍼키</div><div class="keyword-detail">📌 <b>풀이</b><br>DB 키의 종류는 포함 관계로 이해하면 쉬워요. <b>슈퍼키</b>가 가장 넓고, 그 안에 <b>후보키</b>, 후보키 중 선택된 것이 <b>기본키(PK)</b>, 선택받지 못한 것이 <b>대체키</b>예요.<br><br>📎 <b>DB 키 종류 정리</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>슈퍼키(Super Key)</b></td><td style="text-align:left;vertical-align:middle">유일성(모든 튜플 구별)만 만족하면 돼요. 최소성(불필요한 속성 없음)은 불필요해요. {학번+이름}도 슈퍼키예요. ← <u>정답4</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>후보키(Candidate Key)</b></td><td style="text-align:left;vertical-align:middle">유일성과 최소성을 모두 만족해요. PK가 될 수 있는 후보들이에요. ← <u>정답2</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>기본키(Primary Key, PK)</b></td><td style="text-align:left;vertical-align:middle">후보키 중 하나를 선택한 것이에요. NULL 불가·중복 불가예요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>대체키(Alternate Key)</b></td><td style="text-align:left;vertical-align:middle">후보키 중 PK로 선택받지 못한 나머지예요. ← <u>정답3</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>외래키(Foreign Key, FK)</b></td><td style="text-align:left;vertical-align:middle">다른 테이블의 PK를 참조하는 속성이에요. 참조 무결성을 보장해요. ← <u>정답1</u></td></tr></table></div></div>` },
  { id:'24_3_9', year:'2024', round:'3회', cat:'네트워크',
    qHtml:`<div class="q-text">아래에서 설명하는 네트워크 기술의 3글자 영문 약자를 쓰시오.<br><br>· 공용 네트워크(인터넷)를 통해 사설 네트워크처럼 안전하게 통신할 수 있도록 하는 기술이다.<br>· 사용자의 실제 IP 주소를 숨기고 접속 위치 추적을 어렵게 만든다.<br>· IPsec, SSL, L2TP 등의 프로토콜이 있다.</div>`,
    ansHtml:`<div class="answer-val">VPN (Virtual Private Network)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>VPN</b>은 공용 인터넷을 마치 개인 전용 회선처럼 사용하는 기술이에요. 투명한 터널을 만들어 데이터를 암호화해서 보내요. 재택근무 시 회사 내부망에 접속할 때 많이 사용돼요.<br><br>📎 <b>같이 알아두면 좋은 키워드</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>터널링(Tunneling)</b></td><td style="text-align:left;vertical-align:middle">데이터를 캡슐화해서 보호된 통로(터널)로 전송하는 기법이에요. VPN의 핵심 기술이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>IPSec VPN</b></td><td style="text-align:left;vertical-align:middle">3계층(네트워크)에서 동작해요. 모든 IP 트래픽을 보호하며 기업 VPN에 주로 사용해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>SSL/TLS VPN</b></td><td style="text-align:left;vertical-align:middle">응용 계층에서 동작해요. 웹 브라우저로 접근 가능하고 원격 근무 환경에 편리해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>L2TP</b></td><td style="text-align:left;vertical-align:middle">2계층(데이터링크)에서 터널링해요. 자체 암호화 없어서 IPSec과 함께 사용해요(L2TP/IPSec).</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>사설 IP 대역</b></td><td style="text-align:left;vertical-align:middle">10.x.x.x, 172.16~31.x.x, 192.168.x.x가 사설 IP 대역이에요. VPN으로 이 대역에 외부에서 접근해요.</td></tr></table></div></div>` },
  { id:'24_3_10', year:'2024', round:'3회', cat:'네트워크',
    qHtml:`<div class="q-text">아래에서 설명하는 네트워크를 보기에서 골라 쓰시오.<br><br>· 중앙 관리 서버나 고정 인프라 없이 참여 노드들끼리 직접 연결되어 임시로 구성되는 네트워크이다.<br>· 무선 통신 기반으로 노드들이 라우터 역할도 수행한다.<br>· 긴급 구조, 군사 작전, 재난 현장 등 고정 인프라가 없는 환경에서 유용하다.<br><br>[보기] &nbsp; ㄱ.Infrastructure Network &nbsp; ㄴ.Firmware Network &nbsp; ㄷ.Peer-to-Peer Network &nbsp; ㄹ.Ad-hoc Network &nbsp; ㅁ.Mesh Network &nbsp; ㅂ.Sensor Network</div>`,
    ansHtml:`<div class="answer-val">ㄹ. Ad-hoc Network</div><div class="keyword-detail">📌 <b>풀이</b><br><b>Ad-hoc Network(애드혹 네트워크)</b>는 라우터나 기지국 같은 고정 인프라 없이 노드들이 직접 연결되는 임시 네트워크예요. 재난 현장·군사 작전 등 인프라가 없는 환경에서 유용해요. 라틴어로 "임시방편"이에요.<br><br>📎 <b>같이 알아두면 좋은 키워드</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Ad-hoc Network</b></td><td style="text-align:left;vertical-align:middle">고정 인프라(AP, 기지국) 없이 노드들이 직접 연결하는 자기 구성 네트워크예요. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>인프라스트럭처 모드</b></td><td style="text-align:left;vertical-align:middle">AP(공유기)를 통해 연결하는 일반적인 WiFi 방식이에요. Ad-hoc의 반대 개념이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>MANET (Mobile Ad-hoc NETwork)</b></td><td style="text-align:left;vertical-align:middle">이동성이 있는 Ad-hoc 네트워크예요. 노드가 이동하면서 네트워크 토폴로지가 동적으로 변해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>메시 네트워크(Mesh Network)</b></td><td style="text-align:left;vertical-align:middle">Ad-hoc의 발전형이에요. 각 노드가 라우터 역할도 해서 다중 경로 통신이 가능해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>IoT와 Ad-hoc</b></td><td style="text-align:left;vertical-align:middle">IoT 센서 네트워크에서 Ad-hoc 구조를 활용해요. 각 센서가 직접 통신하거나 중계 역할을 해요.</td></tr></table></div></div>` },

  // ─── 2024년 2회 ───
  { id:'24_2_1', year:'2024', round:'2회', cat:'데이터베이스',
    qHtml:`<div class="q-text">데이터베이스 성능 향상을 위해 의도적으로 중복 데이터를 저장하거나 테이블을 합치는 등의 방법을 사용하는 기법이 있다. 정규화의 반대 개념으로, 데이터 조회 성능을 높이는 대신 데이터 무결성이 저하될 수 있다. 이 기법의 명칭을 쓰시오.</div>`,
    ansHtml:`<div class="answer-val">반정규화 (Denormalization)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>반정규화(Denormalization)</b>는 정규화로 분리된 테이블을 다시 합치거나 중복 데이터를 추가하는 기법이에요. 너무 많이 분리된 테이블은 JOIN을 자주 해야 해서 조회 성능이 느려질 수 있어서, 성능을 위해 의도적으로 중복을 허용해요.<br><br>📎 <b>같이 알아두면 좋은 키워드</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>정규화(Normalization)</b></td><td style="text-align:left;vertical-align:middle">데이터 중복·이상현상 제거를 위해 테이블을 분리하는 과정이에요. 1NF→2NF→3NF→BCNF 단계로 진행해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>반정규화(Denormalization)</b></td><td style="text-align:left;vertical-align:middle">성능 향상을 위해 의도적으로 중복을 허용해요. 조회 속도는 빨라지지만 갱신 이상이 발생할 수 있어요. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>반정규화 기법</b></td><td style="text-align:left;vertical-align:middle">테이블 병합·분할, 중복 컬럼 추가, 파생 컬럼(미리 계산된 값) 추가, 중복 테이블 추가 등이 있어요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>이상현상(Anomaly)</b></td><td style="text-align:left;vertical-align:middle">정규화 안 된 테이블에서 발생해요. 삽입 이상(불필요한 데이터 강제 삽입), 삭제 이상(원치 않는 데이터 삭제), 갱신 이상(일부만 수정) 3가지예요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>OLTP vs OLAP</b></td><td style="text-align:left;vertical-align:middle">OLTP(트랜잭션 처리): 정규화 중시. OLAP(분석 처리): 반정규화로 조회 성능 최적화해요.</td></tr></table></div></div>` },
  { id:'24_2_2', year:'2024', round:'2회', cat:'SQL문',
    qHtml:`<div class="q-text">아래 테이블 구조를 참고하여 SQL 구문의 빈칸 ①~④를 채우시오.<br><br><div class="tbl-wrap"><table class="db-table" style="min-width:300px"><tr><th>테이블</th><th>컬럼</th></tr><tr><td>사원</td><td>사원번호(PK), 이름, 나이, 부서</td></tr><tr><td>부서</td><td>사원번호(PK), 이름, 주소, 나이</td></tr></table></div><div class="sql-box">INSERT INTO 사원 (사원번호, 이름, 주소, 부서)
  [①] (32431, '정실기', '서울', '영업');

INSERT INTO 부서 (사원번호, 이름, 나이, 부서)
  [②] 사원번호, 이름, 나이, 23 FROM 사원 WHERE 이름='정실기';

SELECT * [③] 사원;

UPDATE 사원 [④] 부서='퇴사' WHERE 사원번호=32431;</div>`,
    ansHtml:`<div class="answer-val">① VALUES &nbsp;&nbsp; ② SELECT &nbsp;&nbsp; ③ FROM &nbsp;&nbsp; ④ SET</div><div class="keyword-detail">📌 <b>풀이</b><br>SQL DML 4가지 중 <b>INSERT</b>는 데이터 삽입, <b>UPDATE</b>는 수정이에요. INSERT는 VALUES로 직접 입력하거나, SELECT...FROM으로 다른 테이블에서 가져올 수 있어요. UPDATE는 SET으로 변경 컬럼을 지정해요.<br><br>📎 <b>DML(데이터 조작어) 4가지</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>SELECT</b></td><td style="text-align:left;vertical-align:middle">데이터를 조회해요. SELECT 컬럼 FROM 테이블 WHERE 조건 형태예요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>INSERT INTO...VALUES</b></td><td style="text-align:left;vertical-align:middle">직접 값을 입력해요. ← <u>정답①</u> &nbsp; <b>INSERT INTO...SELECT...FROM</b>: 다른 테이블에서 가져와 삽입해요. ← <u>정답②③</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>UPDATE...SET</b></td><td style="text-align:left;vertical-align:middle">기존 데이터를 수정해요. SET으로 컬럼=값을 지정하고 WHERE로 조건을 명시해요. ← <u>정답④</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>DELETE FROM...WHERE</b></td><td style="text-align:left;vertical-align:middle">조건에 맞는 행을 삭제해요. WHERE 없으면 전체 삭제예요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>TRUNCATE vs DELETE</b></td><td style="text-align:left;vertical-align:middle">TRUNCATE: DDL, 전체 삭제, 롤백 불가. DELETE: DML, WHERE 조건 삭제, 롤백 가능해요.</td></tr></table></div></div>` },
  { id:'24_2_3', year:'2024', round:'2회', cat:'데이터베이스',
    qHtml:`<div class="q-text">아래 릴레이션을 참고하여 Cardinality와 Degree를 각각 구하시오.<br><br><div class="tbl-wrap"><table class="db-table"><tr><th>학번</th><th>이름</th><th>학과</th><th>학년</th></tr><tr><td>2021001</td><td>김민수</td><td>컴퓨터공학</td><td>3</td></tr><tr><td>2021002</td><td>이영희</td><td>정보통신</td><td>2</td></tr><tr><td>2022003</td><td>박준호</td><td>소프트웨어</td><td>1</td></tr><tr><td>2022004</td><td>최수진</td><td>컴퓨터공학</td><td>4</td></tr><tr><td>2023005</td><td>정재원</td><td>정보통신</td><td>1</td></tr></table></div>`,
    ansHtml:`<div class="answer-val">Cardinality(카디널리티): 5 &nbsp;&nbsp; Degree(차수): 4</div><div class="keyword-detail">📌 <b>풀이</b><br>학생 테이블에 학번·이름·학과·학년 4개 열, 5명의 데이터가 있어요. <b>Cardinality</b>는 행(튜플) 수=5, <b>Degree</b>는 열(속성) 수=4예요. 카드 한 장 한 장(데이터 수)=카디널리티, 속성의 정도(열 수)=Degree로 기억하세요.<br><br>📎 <b>DB 기본 용어 정리</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>카디널리티(Cardinality)</b></td><td style="text-align:left;vertical-align:middle">릴레이션의 튜플(행) 개수예요. 데이터가 추가·삭제되면 변해요. ← <u>정답: 5</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>차수(Degree)</b></td><td style="text-align:left;vertical-align:middle">릴레이션의 속성(열) 개수예요. 테이블 구조가 변경되지 않는 한 고정돼요. ← <u>정답: 4</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>튜플(Tuple)</b></td><td style="text-align:left;vertical-align:middle">행(Row), 레코드(Record)에 해당해요. 하나의 개체 정보를 담아요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>속성(Attribute)</b></td><td style="text-align:left;vertical-align:middle">열(Column), 필드(Field)에 해당해요. 각 속성은 도메인을 가져요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>인스턴스(Instance)</b></td><td style="text-align:left;vertical-align:middle">현재 시점에 저장된 모든 튜플들의 집합이에요. 카디널리티=인스턴스의 튜플 수예요.</td></tr></table></div></div>` },
  { id:'24_2_4', year:'2024', round:'2회', cat:'네트워크',
    qHtml:`<div class="q-text">아래에서 설명하는 보안 프로토콜의 영문 약자를 쓰시오.<br><br>· 네트워크 계층(Layer 3)에서 IP 패킷을 암호화하고 인증하는 보안 표준이다.<br>· 기업의 VPN 구현에 주로 활용된다.<br>· AH(Authentication Header)와 ESP(Encapsulating Security Payload) 두 가지 프로토콜로 구성된다.</div>`,
    ansHtml:`<div class="answer-val">IPSec (Internet Protocol Security)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>IPSec</b>은 IP 패킷 자체를 암호화하고 인증하는 네트워크 계층(Layer 3) 보안 표준이에요. VPN 구현에 핵심적으로 사용돼요. <b>AH</b>는 인증·무결성, <b>ESP</b>는 암호화+인증을 담당해요.<br><br>📎 <b>같이 알아두면 좋은 키워드</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>AH (Authentication Header)</b></td><td style="text-align:left;vertical-align:middle">인증과 무결성을 제공해요. 데이터가 변조되지 않았음을 보장하지만 암호화는 없어요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>ESP (Encapsulating Security Payload)</b></td><td style="text-align:left;vertical-align:middle">암호화와 인증을 모두 제공해요. 데이터 기밀성 보장이 필요할 때 사용해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>터널 모드 vs 전송 모드</b></td><td style="text-align:left;vertical-align:middle">터널 모드: IP 패킷 전체를 새 IP 헤더로 감싸요. VPN에서 사용. 전송 모드: IP 헤더는 그대로, 페이로드만 보호해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>IKE (Internet Key Exchange)</b></td><td style="text-align:left;vertical-align:middle">IPSec에서 암호화 키를 안전하게 교환하는 프로토콜이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>SSL/TLS VPN과 비교</b></td><td style="text-align:left;vertical-align:middle">IPSec VPN은 3계층에서 동작해 모든 트래픽 보호. SSL/TLS VPN은 응용 계층에서 동작해 웹 브라우저로 접근 가능해요.</td></tr></table></div></div>` },
  { id:'24_2_5', year:'2024', round:'2회', cat:'정보보안',
    qHtml:`<div class="q-text">아래에서 설명하는 암호화 알고리즘의 명칭을 쓰시오.<br><br>· 대칭키 암호화 알고리즘으로, 1997년 NIST가 DES의 취약점 보완을 위해 공모·선정하였다.<br>· 128·192·256비트의 가변 키 길이와 128비트의 고정 블록 크기를 지원한다.<br>· 현재 전 세계적으로 가장 널리 사용되는 표준 대칭키 암호화 알고리즘이다.</div>`,
    ansHtml:`<div class="answer-val">AES (Advanced Encryption Standard)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>AES</b>는 현재 전 세계에서 가장 많이 사용하는 대칭키 암호화 알고리즘이에요. DES의 56비트 키가 너무 짧아 취약하자 NIST가 2001년 Rijndael 알고리즘을 채택했어요. 128/192/256비트 키를 지원해요.<br><br>📎 <b>암호화 알고리즘 비교</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>DES</b></td><td style="text-align:left;vertical-align:middle">56비트 키 대칭키 암호. 현재 브루트포스로 해독 가능하여 취약해요. AES로 대체됐어요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>3DES (Triple DES)</b></td><td style="text-align:left;vertical-align:middle">DES를 3번 적용한 과도기적 보완책이에요. AES보다 느려요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>AES (Advanced Encryption Standard)</b></td><td style="text-align:left;vertical-align:middle">Rijndael 알고리즘 기반. 128/192/256비트 키 지원. 현재 대칭키 암호의 표준이에요. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>SEED</b></td><td style="text-align:left;vertical-align:middle">한국 표준 대칭키 암호예요. 128비트 블록·키를 사용해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>ARIA</b></td><td style="text-align:left;vertical-align:middle">국가보안기술연구소(NSRI)가 개발한 한국 표준 대칭키 암호예요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>RSA</b></td><td style="text-align:left;vertical-align:middle">대표적인 비대칭키(공개키) 암호예요. 소인수분해의 어려움을 기반으로 해요.</td></tr></table></div></div>` },
  { id:'24_2_6', year:'2024', round:'2회', cat:'네트워크',
    qHtml:`<div class="q-text">패킷 교환 방식은 크게 두 가지로 분류된다. 각 설명에 해당하는 방식을 쓰시오.<br><br>① 데이터 전송 전에 논리적 연결 경로를 미리 설정하고, 이 경로를 통해 순서대로 패킷을 전송하는 연결 지향형 방식<br><br>② 각 패킷이 독립적으로 최적 경로를 선택하며 전송되어 패킷마다 다른 경로로 전달될 수 있는 비연결형 방식</div>`,
    ansHtml:`<div class="answer-val">① 가상회선 (Virtual Circuit) &nbsp;&nbsp; ② 데이터그램 (Datagram)</div><div class="keyword-detail">📌 <b>풀이</b><br>패킷 교환 방식 두 가지예요. <b>가상회선</b>은 전화처럼 먼저 경로를 확보한 뒤 데이터를 전송해요(순서 보장). <b>데이터그램</b>은 우편처럼 각 패킷이 독립적으로 최적 경로를 찾아가요(순서 미보장).<br><br>📎 <b>패킷 교환 방식 비교</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>가상회선(Virtual Circuit)</b></td><td style="text-align:left;vertical-align:middle">연결 지향 방식이에요. 전송 전에 논리적 경로를 설정하고 모든 패킷이 같은 경로로 전송돼요. 순서가 보장돼요. TCP 유사. ← <u>정답①</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>데이터그램(Datagram)</b></td><td style="text-align:left;vertical-align:middle">비연결 방식이에요. 각 패킷이 독립적으로 최적 경로를 선택해요. 순서가 보장되지 않아요. UDP 유사. ← <u>정답②</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>회선 교환(Circuit Switching)</b></td><td style="text-align:left;vertical-align:middle">전화처럼 통신 전에 전용 회선을 확보해요. 회선이 비어있어도 다른 사람이 사용 불가해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>TCP vs UDP</b></td><td style="text-align:left;vertical-align:middle">TCP: 가상회선 개념, 연결 지향, 순서·신뢰성 보장. UDP: 데이터그램 개념, 비연결, 빠르지만 신뢰성 없어요.</td></tr></table></div></div>` },
  { id:'24_2_7', year:'2024', round:'2회', cat:'SW 개발/계획',
    qHtml:`<div class="q-text">아래 설명에 해당하는 응집도(Cohesion) 유형을 보기에서 골라 쓰시오.<br><br>모듈 내의 한 기능 요소의 출력 데이터가 다음 기능 요소의 입력 데이터로 이어지는 형태를 갖는 응집도 유형이다.<br><br>[보기] &nbsp; ㄱ.기능적 &nbsp; ㄴ.우연적 &nbsp; ㄷ.통신적 &nbsp; ㄹ.절차적 &nbsp; ㅁ.시간적 &nbsp; ㅂ.순차적 &nbsp; ㅅ.논리적</div>`,
    ansHtml:`<div class="answer-val">ㅂ. 순차적(Sequential) 응집도</div><div class="keyword-detail">📌 <b>풀이</b><br><b>순차적 응집도</b>는 한 기능의 출력이 다음 기능의 입력이 되는 파이프라인 구조예요. 공장 컨베이어 벨트처럼 앞 작업의 결과가 뒤 작업으로 전달돼요. 기능적 응집도 다음으로 높은 응집도예요.<br><br>📎 <b>응집도 7종 (높음→낮음)</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>기능적(Functional)</b></td><td style="text-align:left;vertical-align:middle">단일 기능만 수행해요. 가장 이상적이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>순차적(Sequential)</b></td><td style="text-align:left;vertical-align:middle">출력→입력으로 연결되는 파이프라인 구조예요. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>교환적(Communication)</b></td><td style="text-align:left;vertical-align:middle">같은 데이터를 사용하는 기능들의 묶음이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>절차적(Procedural)</b></td><td style="text-align:left;vertical-align:middle">순서만 있고 데이터 연관은 없어요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>시간적(Temporal)</b></td><td style="text-align:left;vertical-align:middle">같은 시간에 실행되는 기능들(초기화 모듈 등)이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>논리적(Logical)</b></td><td style="text-align:left;vertical-align:middle">비슷한 종류의 기능 모음이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>우연적(Coincidental)</b></td><td style="text-align:left;vertical-align:middle">관련 없는 기능의 묶음. 최악의 응집도예요.</td></tr><tr><td colspan="2" style="color:var(--c-text2);font-style:italic;border-top:1px dashed var(--c-border2)">📝 암기법: 기순교절시논우 (기능→순차→교환→절차→시간→논리→우연)</td></tr></table></div></div>` },
  { id:'24_2_8', year:'2024', round:'2회', cat:'SW 개발/계획',
    qHtml:`<div class="q-text">컬렉션 객체의 내부 구현 방식을 외부에 노출하지 않고, 내부 요소에 순차적으로 접근할 수 있는 인터페이스를 제공하는 행위 디자인 패턴을 보기에서 골라 쓰시오.<br><br><div class="tbl-wrap"><table class="db-table" style="min-width:280px"><tr><th>생성 패턴</th><th>구조 패턴</th><th>행위 패턴</th></tr><tr><td>Singleton</td><td>Adapter</td><td>Iterator</td></tr><tr><td>Factory Method</td><td>Bridge</td><td>Visitor</td></tr><tr><td>Abstract Factory</td><td>Composite</td><td>Observer</td></tr></table></div>`,
    ansHtml:`<div class="answer-val">Iterator (반복자) 패턴</div><div class="keyword-detail">📌 <b>풀이</b><br><b>Iterator 패턴</b>은 컬렉션(리스트, 배열 등)의 내부 구조를 몰라도 모든 요소를 순서대로 접근할 수 있게 해줘요. Java의 for-each 문이나 Python의 for 반복문이 내부적으로 Iterator를 사용해요.<br><br>📎 <b>GoF 행위(Behavioral) 패턴 주요 목록</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Iterator (반복자)</b></td><td style="text-align:left;vertical-align:middle">내부 구조 노출 없이 순차 접근을 제공해요. Java의 Iterator, Python의 __iter__가 구현체예요. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Observer (관찰자)</b></td><td style="text-align:left;vertical-align:middle">상태 변화를 여러 객체에 자동으로 통지해요. 이벤트 시스템, MVC 패턴의 Model-View 관계에 사용해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Strategy (전략)</b></td><td style="text-align:left;vertical-align:middle">알고리즘을 캡슐화하여 런타임에 교체 가능하게 해요. 결제 수단 선택, 정렬 알고리즘 선택 등에 사용해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Command (명령)</b></td><td style="text-align:left;vertical-align:middle">요청을 객체로 캡슐화해요. 실행 취소(Undo), 매크로 기능 구현에 유용해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Template Method</b></td><td style="text-align:left;vertical-align:middle">알고리즘의 뼈대는 상위 클래스가 정의하고, 세부 구현은 서브클래스가 담당해요.</td></tr></table></div></div>` },
  { id:'24_2_9', year:'2024', round:'2회', cat:'운영체제',
    qHtml:`<div class="q-text">아래 표를 참고하여 SRT(Shortest Remaining Time) 스케줄링의 평균 대기시간을 구하시오.<br><br><div class="tbl-wrap"><table class="db-table"><tr><th>프로세스</th><th>도착 시간</th><th>서비스 시간</th></tr><tr><td>A</td><td>0</td><td>8</td></tr><tr><td>B</td><td>1</td><td>4</td></tr><tr><td>C</td><td>2</td><td>9</td></tr><tr><td>D</td><td>3</td><td>5</td></tr></table></div>`,

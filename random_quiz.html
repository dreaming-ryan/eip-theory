<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>정보처리기사 실기 — 랜덤 퀴즈</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Noto+Serif+KR:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
:root {
  --c-bg:       #F7F5F0;
  --c-surface:  #FFFFFF;
  --c-border:   #E8E4DC;
  --c-border2:  #D6D0C4;
  --c-text:     #1C1A16;
  --c-text2:    #6B6456;
  --c-text3:    #A09589;
  --c-accent:   #8B2635;
  --c-accent-l: #F2E8EA;
  --c-accent-m: #C4616E;
  --c-tag-sw:   #5B3A8C;  --c-tag-sw-l: #EDE8F7;
  --c-tag-db:   #1A5F9E;  --c-tag-db-l: #E4EEF8;
  --c-tag-os:   #2E6B3A;  --c-tag-os-l: #E5F2E7;
  --c-tag-net:  #915E10;  --c-tag-net-l:#FBF0DC;
  --c-tag-sec:  #8B2635;  --c-tag-sec-l:#F5E8EA;
  --c-tag-sql:  #186460;  --c-tag-sql-l:#E3F2F1;
  --c-tag-etc:  #4E4840;  --c-tag-etc-l:#EFECEA;
  --r: 10px;
  --r-sm: 6px;
  --shadow: 0 2px 12px rgba(28,26,22,.07);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--c-bg);
  color: var(--c-text);
  line-height: 1.7;
  min-height: 100vh;
}

/* ── 헤더 ── */
.site-header {
  background: var(--c-surface);
  border-bottom: 1.5px solid var(--c-border);
  padding: 0 1.5rem;
  position: sticky; top: 0; z-index: 100;
}
.header-inner {
  max-width: 800px; margin: 0 auto;
  display: flex; align-items: center; justify-content: space-between;
  height: 56px;
}
.logo {
  display: flex; align-items: center; gap: 10px;
  font-family: 'Pretendard', 'Noto Serif KR', serif;
  font-size: 15px; font-weight: 700;
  color: var(--c-text); text-decoration: none;
}
.logo-badge {
  background: var(--c-accent); color: #fff;
  font-size: 10px; font-weight: 700; letter-spacing:.05em;
  padding: 2px 8px; border-radius: 20px;
}
.header-back {
  font-size: 13px; color: var(--c-text2);
  text-decoration: none;
  display: flex; align-items: center; gap: 4px;
  padding: 6px 12px; border-radius: var(--r-sm);
  transition: background .15s, color .15s;
}
.header-back:hover { background: var(--c-accent-l); color: var(--c-accent); }

/* ── 메인 레이아웃 ── */
.main-wrap {
  max-width: 800px;
  margin: 0 auto;
  padding: 2rem 1.5rem 4rem;
}

/* ── 상단 컨트롤 패널 ── */
.ctrl-panel {
  background: var(--c-surface);
  border: 1.5px solid var(--c-border);
  border-radius: var(--r);
  padding: 1.25rem 1.5rem;
  margin-bottom: 1.5rem;
  display: flex;
  flex-wrap: wrap;
  gap: 1rem;
  align-items: flex-end;
  box-shadow: var(--shadow);
}
.ctrl-group { display: flex; flex-direction: column; gap: 6px; }
.ctrl-label {
  font-size: 11px; font-weight: 700;
  color: var(--c-text3); letter-spacing: .08em;
  text-transform: uppercase;
}
.filter-tags { display: flex; flex-wrap: wrap; gap: 5px; }
.tag {
  padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 500;
  background: var(--c-bg); border: 1.5px solid var(--c-border2);
  color: var(--c-text2); cursor: pointer; transition: all .15s;
  white-space: nowrap;
}
.tag:hover { border-color: var(--c-accent); color: var(--c-accent); background: var(--c-accent-l); }
.tag.active { background: var(--c-accent); border-color: var(--c-accent); color: #fff; }
.ctrl-sep { width: 1px; background: var(--c-border); align-self: stretch; }

/* 변형 포함 토글 */
.variant-toggle {
  display: flex; align-items: center; gap: 8px;
  cursor: pointer; user-select: none;
}
.variant-toggle input { display: none; }
.toggle-track {
  width: 40px; height: 22px;
  background: var(--c-border2);
  border-radius: 11px;
  position: relative;
  transition: background .2s;
  flex-shrink: 0;
}
.toggle-track::after {
  content: ''; position: absolute;
  width: 16px; height: 16px;
  background: #fff; border-radius: 50%;
  top: 3px; left: 3px;
  transition: transform .2s;
  box-shadow: 0 1px 3px rgba(0,0,0,.2);
}
.variant-toggle input:checked + .toggle-track {
  background: var(--c-accent);
}
.variant-toggle input:checked + .toggle-track::after {
  transform: translateX(18px);
}
.toggle-text { font-size: 13px; font-weight: 500; color: var(--c-text2); }

/* ── 진행 상황 바 ── */
.progress-bar-wrap {
  background: var(--c-surface);
  border: 1.5px solid var(--c-border);
  border-radius: var(--r);
  padding: 1rem 1.5rem;
  margin-bottom: 1.5rem;
  box-shadow: var(--shadow);
}
.progress-row {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 8px;
}
.progress-label { font-size: 13px; font-weight: 600; color: var(--c-text2); }
.progress-count { font-size: 20px; font-weight: 700; color: var(--c-accent); }
.progress-count span { font-size: 13px; font-weight: 400; color: var(--c-text3); }
.progress-track {
  height: 6px; background: var(--c-border);
  border-radius: 3px; overflow: hidden;
}
.progress-fill {
  height: 100%; background: var(--c-accent);
  border-radius: 3px; transition: width .4s ease;
}

/* ── 퀴즈 카드 ── */
.quiz-card {
  background: var(--c-surface);
  border: 1.5px solid var(--c-border);
  border-radius: var(--r);
  box-shadow: var(--shadow);
  overflow: hidden;
  transition: box-shadow .2s;
}
.quiz-card:hover { box-shadow: 0 4px 24px rgba(28,26,22,.11); }

/* 카드 헤더 메타 */
.card-meta {
  display: flex; align-items: center; gap: 8px;
  padding: 12px 1.5rem 0;
  flex-wrap: wrap;
}
.meta-year {
  font-size: 12px; font-weight: 700; color: var(--c-text3);
}
.cat-tag {
  display: inline-block;
  padding: 2px 9px; border-radius: 4px;
  font-size: 11px; font-weight: 700; letter-spacing: .03em;
}
.cat-sw   { background: var(--c-tag-sw-l);  color: var(--c-tag-sw);  }
.cat-db   { background: var(--c-tag-db-l);  color: var(--c-tag-db);  }
.cat-os   { background: var(--c-tag-os-l);  color: var(--c-tag-os);  }
.cat-net  { background: var(--c-tag-net-l); color: var(--c-tag-net); }
.cat-sec  { background: var(--c-tag-sec-l); color: var(--c-tag-sec); }
.cat-sql  { background: var(--c-tag-sql-l); color: var(--c-tag-sql); }
.cat-etc  { background: var(--c-tag-etc-l); color: var(--c-tag-etc); }

.variant-badge-sm {
  background: linear-gradient(135deg,#8B2635,#C4616E);
  color: #fff; font-size: 10px; font-weight: 700;
  padding: 2px 8px; border-radius: 4px; letter-spacing:.04em;
}

/* 문제 본문 */
.card-body { padding: 1.25rem 1.5rem 0; }
.q-text {
  font-size: 15px; line-height: 1.8;
  color: var(--c-text);
}
.q-text .variant-q {
  font-size: 15px; line-height: 1.8;
}

/* ── 정답 영역 ── */
.ans-wrap {
  border-top: 1.5px dashed var(--c-border);
  overflow: hidden; max-height: 0;
  transition: max-height .35s ease;
}
.ans-wrap.open { max-height: 2000px; }
.ans-body { padding: 1.25rem 1.5rem; }
.answer-val {
  font-size: 16px; font-weight: 700;
  color: var(--c-accent); line-height: 1.6;
  margin-bottom: 1rem;
}
.variant-ans-val {
  font-size: 16px; font-weight: 700;
  color: var(--c-accent); line-height: 1.6;
  margin-bottom: 1rem;
}

/* keyword-detail 테이블 스타일 */
.keyword-detail { font-size: 13px; color: var(--c-text2); }
.tbl-wrap { overflow-x: auto; }
.db-table {
  width: 100%; border-collapse: collapse;
  font-size: 13px;
}
.db-table th, .db-table td {
  border: 1px solid var(--c-border);
  padding: 7px 10px;
  vertical-align: middle;
}
.db-table th {
  background: var(--c-bg); font-weight: 700;
  color: var(--c-text2); font-size: 12px;
}
.db-table tr.info-row td { background: #fafaf8; }
.variant-keyword {
  font-size: 13px; color: var(--c-text2);
}
.sql-box {
  background: #1e1e2e; color: #cdd6f4;
  font-family: 'Courier New', monospace; font-size: 13px;
  padding: 12px 14px; border-radius: var(--r-sm);
  margin: 8px 0; white-space: pre-wrap; overflow-x: auto;
}
.tables-row {
  display: flex; gap: 16px; flex-wrap: wrap;
  margin: 8px 0;
}
.tbl-label {
  font-size: 12px; font-weight: 700; color: var(--c-text3);
  margin-bottom: 4px;
}

/* ── 버튼 영역 ── */
.card-actions {
  padding: 0 1.5rem 1.25rem;
  display: flex; gap: 8px; flex-wrap: wrap;
  justify-content: flex-end;
  margin-top: 1.25rem;
}
.btn-reveal {
  flex: 0 0 auto;
  background: var(--c-accent); color: #fff;
  border: none; border-radius: var(--r-sm);
  padding: 10px 28px; font-size: 14px; font-weight: 700;
  cursor: pointer; transition: all .15s;
  font-family: inherit;
}
.btn-reveal:hover { background: #6e1d28; transform: translateY(-1px); }
.btn-reveal.revealed {
  background: var(--c-bg); color: var(--c-text3);
  border: 1.5px solid var(--c-border);
}
.btn-next {
  background: var(--c-surface);
  border: 1.5px solid var(--c-accent);
  color: var(--c-accent);
  border-radius: var(--r-sm);
  padding: 10px 20px; font-size: 14px; font-weight: 700;
  cursor: pointer; transition: all .15s;
  font-family: inherit;
}
.btn-next:hover { background: var(--c-accent-l); transform: translateY(-1px); }
.btn-skip {
  background: transparent;
  border: 1.5px solid var(--c-border2);
  color: var(--c-text3);
  border-radius: var(--r-sm);
  padding: 10px 16px; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all .15s;
  font-family: inherit;
}
.btn-skip:hover { border-color: var(--c-text2); color: var(--c-text2); }

/* ── 완료 화면 ── */
.done-card {
  background: var(--c-surface);
  border: 1.5px solid var(--c-border);
  border-radius: var(--r);
  box-shadow: var(--shadow);
  padding: 3rem 2rem;
  text-align: center;
  display: none;
}
.done-card.show { display: block; }
.done-emoji { font-size: 3rem; margin-bottom: 1rem; }
.done-title {
  font-family: 'Pretendard', 'Noto Serif KR', serif;
  font-size: 1.5rem; font-weight: 700;
  color: var(--c-text); margin-bottom: 0.5rem;
}
.done-desc { font-size: 14px; color: var(--c-text2); margin-bottom: 1.5rem; }
.btn-restart {
  background: var(--c-accent); color: #fff;
  border: none; border-radius: var(--r-sm);
  padding: 12px 32px; font-size: 15px; font-weight: 700;
  cursor: pointer; transition: all .15s;
  font-family: inherit;
}
.btn-restart:hover { background: #6e1d28; transform: translateY(-1px); }

/* ── 빈 결과 ── */
.empty-msg {
  text-align: center; padding: 3rem; color: var(--c-text3);
  font-size: 15px; display: none;
}
.empty-msg.show { display: block; }

/* ── 통계 배지 ── */
.stat-row {
  display: flex; gap: 8px; margin-top: 4px;
}
.stat-badge {
  font-size: 11px; font-weight: 700;
  padding: 2px 8px; border-radius: 4px;
  background: var(--c-accent-l); color: var(--c-accent);
}

/* ── 반응형 ── */
@media (max-width: 600px) {
  .ctrl-panel { padding: 1rem; }
  .card-body { padding: 1rem 1rem 0; }
  .ans-body { padding: 1rem; }
  .card-meta, .card-actions { padding-left: 1rem; padding-right: 1rem; }
  .ctrl-sep { display: none; }
  .btn-reveal, .btn-next, .btn-skip { padding: 10px 14px; }
}

/* ── 애니메이션 ── */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
.quiz-card { animation: fadeIn .3s ease both; }

</style>
</head>
<body>

<!-- ── 헤더 ── -->
<header class="site-header">
  <div class="header-inner">
    <a href="quiz.html" class="logo">
      <span class="logo-badge">기출</span>
      정보처리기사 실기 이론 기출문제
    </a>
    <a href="quiz.html" class="header-back">← 문제집으로</a>
  </div>
</header>

<!-- ── 메인 ── -->
<main class="main-wrap">

  <!-- 컨트롤 패널 -->
  <div class="ctrl-panel">
    <div class="ctrl-group">
      <div class="ctrl-label">연도 필터</div>
      <div class="filter-tags" id="filter-year">
        <span class="tag active" onclick="setYear('all',this)">전체</span>
        <span class="tag" onclick="setYear('2025',this)">2025</span>
        <span class="tag" onclick="setYear('2024',this)">2024</span>
        <span class="tag" onclick="setYear('2023',this)">2023</span>
        <span class="tag" onclick="setYear('2022',this)">2022</span>
        <span class="tag" onclick="setYear('2021',this)">2021</span>
        <span class="tag" onclick="setYear('2020',this)">2020</span>
      </div>
    </div>
    <div class="ctrl-sep"></div>
    <div class="ctrl-group">
      <div class="ctrl-label">카테고리 필터</div>
      <div class="filter-tags" id="filter-cat">
        <span class="tag active" onclick="setCat('all',this)">전체</span>
        <span class="tag" onclick="setCat('SW 개발/계획',this)">SW개발</span>
        <span class="tag" onclick="setCat('데이터베이스',this)">데이터베이스</span>
        <span class="tag" onclick="setCat('SQL문',this)">SQL</span>
        <span class="tag" onclick="setCat('네트워크',this)">네트워크</span>
        <span class="tag" onclick="setCat('정보보안',this)">정보보안</span>
        <span class="tag" onclick="setCat('운영체제',this)">운영체제</span>
        <span class="tag" onclick="setCat('기타 용어',this)">기타</span>
      </div>
    </div>
    <div class="ctrl-sep"></div>
    <div class="ctrl-group">
      <div class="ctrl-label">문제 유형</div>
      <label class="variant-toggle">
        <input type="checkbox" id="toggle-variant" onchange="rebuildPool()">
        <div class="toggle-track"></div>
        <span class="toggle-text">변형 기출 포함</span>
      </label>
    </div>
  </div>

  <!-- 진행 상황 -->
  <div class="progress-bar-wrap">
    <div class="progress-row">
      <div class="progress-label">학습 진행</div>
      <div class="progress-count"><span id="cnt-done">0</span> / <span id="cnt-total">0</span> <span>문제</span></div>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
    <div class="stat-row" style="margin-top:8px">
      <span class="stat-badge" id="stat-pool">총 0문제</span>
    </div>
  </div>

  <!-- 퀴즈 카드 -->
  <div id="quiz-card-wrap"></div>

  <!-- 완료 화면 -->
  <div class="done-card" id="done-card">
    <div class="done-emoji">🎉</div>
    <div class="done-title">모든 문제 완료!</div>
    <div class="done-desc" id="done-desc">설정한 조건의 문제를 모두 풀었어요.</div>
    <button class="btn-restart" onclick="restartAll()">다시 처음부터</button>
  </div>

  <!-- 빈 결과 -->
  <div class="empty-msg" id="empty-msg">
    해당 조건에 맞는 문제가 없어요. 필터를 변경해보세요.
  </div>

</main>

<script>
// ══════════════════════════════════════════════════════
//  전역 데이터 — quiz.html에서 fetch해서 채워집니다
// ══════════════════════════════════════════════════════
let questions = [];
let variantQuestions = {};

// ══════════════════════════════════════════════════════
//  quiz.html fetch → questions / variantQuestions 파싱
// ══════════════════════════════════════════════════════
function loadQuizData() {
  document.getElementById('quiz-card-wrap').innerHTML =
    '<div style="text-align:center;padding:3rem;color:var(--c-text3);font-size:14px">📂 문제 데이터를 불러오는 중…</div>';

  fetch('quiz.html')
    .then(function(r) {
      if (!r.ok) throw new Error('quiz.html 로드 실패: ' + r.status);
      return r.text();
    })
    .then(function(html) {
      // questions 배열 추출 및 파싱
      var qStart = html.indexOf('const questions = [');
      var qEnd   = html.indexOf('let allOpen', qStart);
      qEnd = html.lastIndexOf('];', qEnd) + 2;
      if (qStart === -1 || qEnd < 2) throw new Error('questions 배열을 찾을 수 없습니다.');
      var qBlock = html.slice(qStart, qEnd);
      questions = (new Function(qBlock + '\nreturn questions;'))();

      // variantQuestions 객체 추출 및 파싱
      var vqStart = html.indexOf('const variantQuestions = {');
      var vqEnd   = html.indexOf('document.', vqStart);
      vqEnd = html.lastIndexOf('};', vqEnd) + 2;
      if (vqStart === -1 || vqEnd < 2) throw new Error('variantQuestions 객체를 찾을 수 없습니다.');
      var vqBlock = html.slice(vqStart, vqEnd);
      variantQuestions = (new Function(vqBlock + '\nreturn variantQuestions;'))();

      console.log('로드 완료 — questions:', questions.length, '/ variantQ:', Object.keys(variantQuestions).length);
      rebuildPool();
    })
    .catch(function(err) {
      console.error('loadQuizData 오류:', err);
      document.getElementById('quiz-card-wrap').innerHTML =
        '<div style="text-align:center;padding:3rem;color:#c0392b;font-size:14px">' +
        '<b>⚠️ 문제 데이터를 불러오지 못했습니다.</b><br>' +
        '<small>' + err.message + '</small><br><br>' +
        '<button onclick="loadQuizData()" style="padding:8px 20px;background:#8B2635;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:13px">다시 시도</button>' +
        '</div>';
    });
}

let curYear = 'all';
let curCat  = 'all';
let includeVariant = false;
let pool = [];
let doneSet = new Set();
let curIdx  = 0;

// ══════════════════════════════════════════════════════
//  카테고리 → CSS 클래스
// ══════════════════════════════════════════════════════
function catClass(cat) {
  const m = {'SW 개발/계획':'sw','데이터베이스':'db','운영체제':'os',
              '네트워크':'net','정보보안':'sec','SQL문':'sql','기타 용어':'etc'};
  return 'cat-' + (m[cat] || 'etc');
}

// ══════════════════════════════════════════════════════
//  Fisher-Yates 셔플
// ══════════════════════════════════════════════════════
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ══════════════════════════════════════════════════════
//  풀 빌드
// ══════════════════════════════════════════════════════
function rebuildPool() {
  includeVariant = document.getElementById('toggle-variant').checked;

  let baseItems = questions.filter(q => {
    if (curYear !== 'all' && q.year !== curYear) return false;
    if (curCat  !== 'all' && q.cat  !== curCat)  return false;
    return true;
  }).map(q => ({ type:'original', q }));

  let varItems = [];
  if (includeVariant) {
    questions.forEach(q => {
      if (curYear !== 'all' && q.year !== curYear) return;
      if (curCat  !== 'all' && q.cat  !== curCat)  return;
      if (variantQuestions[q.id]) {
        varItems.push({ type:'variant', q });
      }
    });
  }

  pool = shuffle([...baseItems, ...varItems]);
  doneSet.clear();
  curIdx = 0;

  updateProgress();
  if (pool.length === 0) {
    document.getElementById('quiz-card-wrap').innerHTML = '';
    document.getElementById('done-card').classList.remove('show');
    document.getElementById('empty-msg').classList.add('show');
  } else {
    document.getElementById('empty-msg').classList.remove('show');
    document.getElementById('done-card').classList.remove('show');
    renderCard();
  }
}

// ══════════════════════════════════════════════════════
//  진행 상황 업데이트
// ══════════════════════════════════════════════════════
function updateProgress() {
  const done  = doneSet.size;
  const total = pool.length;
  const pct   = total > 0 ? Math.round(done / total * 100) : 0;
  document.getElementById('cnt-done').textContent  = done;
  document.getElementById('cnt-total').textContent = total;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('stat-pool').textContent =
    '총 ' + total + '문제' + (includeVariant ? ' (변형 포함)' : '');
}

// ══════════════════════════════════════════════════════
//  카드 렌더링
// ══════════════════════════════════════════════════════
function renderCard() {
  const wrap = document.getElementById('quiz-card-wrap');
  const done = document.getElementById('done-card');

  if (pool.length === 0) { wrap.innerHTML = ''; return; }
  if (curIdx >= pool.length) curIdx = 0;

  const item = pool[curIdx];
  const isVariant = item.type === 'variant';
  const q  = item.q;
  const vd = variantQuestions[q.id];

  const qHtml  = isVariant ? vd.qHtml  : q.qHtml;
  const ansHtml = isVariant ? vd.ansHtml : q.ansHtml;

  const posLabel  = (curIdx + 1) + ' / ' + pool.length;
  const badgeHtml = isVariant
    ? '<span class="variant-badge-sm">✦ 변형 기출</span>'
    : '';

  wrap.innerHTML = `
    <div class="quiz-card" id="qcard">
      <div class="card-meta">
        <span class="meta-year">${q.year} ${q.round}</span>
        <span class="cat-tag ${catClass(q.cat)}">${q.cat}</span>
        ${badgeHtml}
        <span style="margin-left:auto;font-size:12px;color:var(--c-text3)">${posLabel}</span>
      </div>
      <div class="card-body">
        ${qHtml}
      </div>
      <div class="card-actions">
        <button class="btn-reveal" id="btn-reveal" onclick="toggleAns()">▼ 정답 보기</button>
        <button class="btn-next" onclick="nextCard()">다음 문제 →</button>
        <button class="btn-skip" onclick="skipCard()">건너뛰기</button>
      </div>
      <div class="ans-wrap" id="ans-wrap">
        <div class="ans-body">
          ${ansHtml}
        </div>
      </div>
    </div>
  `;
  done.classList.remove('show');
}

// ══════════════════════════════════════════════════════
//  정답 토글
// ══════════════════════════════════════════════════════
function toggleAns() {
  const aw  = document.getElementById('ans-wrap');
  const btn = document.getElementById('btn-reveal');
  const isOpen = aw.classList.toggle('open');
  btn.textContent = isOpen ? '▲ 정답 닫기' : '▼ 정답 보기';
  btn.classList.toggle('revealed', isOpen);
  if (isOpen) {
    doneSet.add(curIdx + '_' + pool[curIdx].type);
    updateProgress();
  }
}

// ══════════════════════════════════════════════════════
//  다음 문제
// ══════════════════════════════════════════════════════
function nextCard() {
  doneSet.add(curIdx + '_' + pool[curIdx].type);
  updateProgress();
  curIdx++;
  if (curIdx >= pool.length) {
    document.getElementById('quiz-card-wrap').innerHTML = '';
    const done = document.getElementById('done-card');
    done.classList.add('show');
    document.getElementById('done-desc').textContent =
      '총 ' + pool.length + '문제를 모두 완료했어요! 다시 시작할 수 있어요.';
    return;
  }
  renderCard();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ══════════════════════════════════════════════════════
//  건너뛰기
// ══════════════════════════════════════════════════════
function skipCard() {
  curIdx++;
  if (curIdx >= pool.length) curIdx = 0;
  renderCard();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ══════════════════════════════════════════════════════
//  다시 시작
// ══════════════════════════════════════════════════════
function restartAll() {
  pool = shuffle(pool);
  doneSet.clear();
  curIdx = 0;
  updateProgress();
  document.getElementById('done-card').classList.remove('show');
  renderCard();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ══════════════════════════════════════════════════════
//  필터 세터
// ══════════════════════════════════════════════════════
function setYear(val, el) {
  document.querySelectorAll('#filter-year .tag')
    .forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  curYear = val;
  rebuildPool();
}
function setCat(val, el) {
  document.querySelectorAll('#filter-cat .tag')
    .forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  curCat = val;
  rebuildPool();
}

// ══════════════════════════════════════════════════════
//  키보드 단축키
// ══════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === ' ' || e.key === 'Enter') {
    e.preventDefault();
    const aw = document.getElementById('ans-wrap');
    if (aw && !aw.classList.contains('open')) { toggleAns(); }
    else { nextCard(); }
  } else if (e.key === 'ArrowRight') {
    nextCard();
  } else if (e.key === 'ArrowLeft') {
    if (curIdx > 0) { curIdx -= 2; nextCard(); }
  }
});

// ══════════════════════════════════════════════════════
//  초기화 — quiz.html에서 데이터 fetch 후 시작
// ══════════════════════════════════════════════════════
loadQuizData();
</script>
</body>
</html>

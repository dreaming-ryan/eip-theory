    ansHtml:`<div class="answer-val">NUI (Natural User Interface)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>NUI(자연스러운 사용자 인터페이스)</b>는 음성·제스처·터치 등 인간의 자연스러운 표현으로 기기를 제어하는 인터페이스예요. 시리(Siri), 빅스비, 키넥트(Kinect)가 대표적이에요.<br><br>📎 <b>UI 유형 비교</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>CLI (Command Line Interface)</b></td><td style="text-align:left;vertical-align:middle">텍스트 명령어로 컴퓨터를 제어해요. 리눅스 터미널, DOS 명령 프롬프트가 대표예요. 빠르고 강력하지만 학습 비용이 높아요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>GUI (Graphical User Interface)</b></td><td style="text-align:left;vertical-align:middle">아이콘·창·버튼 등 그래픽 요소로 제어해요. Windows, macOS가 대표예요. 직관적이어서 누구나 쉽게 사용할 수 있어요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>NUI (Natural User Interface)</b></td><td style="text-align:left;vertical-align:middle">음성·제스처·터치 등 자연스러운 방식으로 제어해요. Siri, Kinect, 스마트폰 터치가 대표예요. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>OUI (Organic User Interface)</b></td><td style="text-align:left;vertical-align:middle">물리적 형태가 변하는 유기적 인터페이스예요. 플렉시블 디스플레이, 변형 가능한 기기 등이 해당해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>VUI (Voice User Interface)</b></td><td style="text-align:left;vertical-align:middle">음성만으로 제어하는 인터페이스예요. NUI의 하위 개념으로 볼 수 있어요. Amazon Echo, Google Home이 대표예요.</td></tr></table></div></div>` },

  { id:'22_1_13', year:'2022', round:'1회', cat:'SW 개발/계획',
    qHtml:`<div class="q-text">아래 보기에서 블랙박스 테스트 기법을 모두 고르시오.<br><br><div class="tbl-wrap"><table class="db-table" style="min-width:360px"><tr><th>기호</th><th>테스트 기법</th></tr><tr><td>ㄱ</td><td>기초 경로 검사 (Base Path Testing)</td></tr><tr><td>ㄴ</td><td>루프 검사 (Loop Testing)</td></tr><tr><td>ㄷ</td><td>동등 분할 기법 (Equivalence Partitioning)</td></tr><tr><td>ㄹ</td><td>경계값 분석 (Boundary Value Analysis)</td></tr><tr><td>ㅁ</td><td>조건 검사 (Condition Testing)</td></tr><tr><td>ㅂ</td><td>오류 예측 검사 (Error Guessing)</td></tr></table></div>`,
    ansHtml:`<div class="answer-val">ㄷ, ㄹ, ㅂ (동등 분할, 경계값 분석, 오류 예측)</div><div class="keyword-detail">📌 <b>풀이</b><br>블랙박스 테스트는 내부 구조를 모르고 입출력 명세만으로 테스트해요. 동등 분할·경계값 분석·원인결과 그래프·오류 예측·비교 검사가 대표 기법이에요. 기초 경로·루프 검사·조건 검사는 화이트박스예요.<br><br>📎 <b>테스트 기법 분류</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>블랙박스(Black Box) 기법</b></td><td style="text-align:left;vertical-align:middle">내부 구현 모르고 입출력 명세만으로 테스트해요. 동등 분할, 경계값 분석, 원인-결과 그래프, 오류 예측, 비교 검사가 해당해요. ← <u>정답: ㄷ·ㄹ·ㅂ</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>화이트박스(White Box) 기법</b></td><td style="text-align:left;vertical-align:middle">내부 코드 구조를 보고 경로·분기를 테스트해요. 기초 경로 검사(ㄱ), 루프 검사(ㄴ), 조건 검사(ㅁ)가 해당해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>동등 분할(Equivalence Partitioning)</b></td><td style="text-align:left;vertical-align:middle">유사한 입력을 그룹으로 나눠 대표값만 테스트해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>경계값 분석(Boundary Value Analysis)</b></td><td style="text-align:left;vertical-align:middle">구간 경계 부근(최솟값-1, 최솟값, 최솟값+1 등)을 테스트해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>오류 예측(Error Guessing)</b></td><td style="text-align:left;vertical-align:middle">경험과 직관으로 오류 발생 가능 부분을 테스트해요.</td></tr></table></div></div>` },

  { id:'22_1_14', year:'2022', round:'1회', cat:'SW 개발/계획',
    qHtml:`<div class="q-text">아래는 V-모델에서 개발 단계와 테스트 단계의 대응 관계이다. 빈칸 ①②③④에 해당하는 테스트 단계를 쓰시오.<br><br><div class="tbl-wrap"><table class="db-table" style="min-width:360px"><tr><th>개발 단계</th><th>테스트 단계</th></tr><tr><td>세부 설계</td><td class="info-row">( ① )</td></tr><tr><td>아키텍처 설계</td><td class="info-row">( ② )</td></tr><tr><td>시스템 설계</td><td class="info-row">( ③ )</td></tr><tr><td>요구사항 분석</td><td class="info-row">( ④ )</td></tr></table></div>`,
    ansHtml:`<div class="answer-val">① 단위 테스트 &nbsp;&nbsp; ② 통합 테스트 &nbsp;&nbsp; ③ 시스템 테스트 &nbsp;&nbsp; ④ 인수 테스트</div><div class="keyword-detail">📌 <b>풀이</b><br>V-모델은 개발 단계와 테스트 단계가 1:1로 대응돼요. 세부 설계↔단위 테스트, 개략 설계↔통합 테스트, 시스템 정의↔시스템 테스트, 요구분석↔인수 테스트로 짝을 이루어요.<br><br>📎 <b>V-모델 테스트 단계 상세</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>단위(Unit) 테스트</b></td><td style="text-align:left;vertical-align:middle">개별 모듈·함수·컴포넌트를 독립적으로 테스트해요. 세부 설계서와 대응돼요. 스텁·드라이버를 사용해요. ← <u>정답①</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>통합(Integration) 테스트</b></td><td style="text-align:left;vertical-align:middle">모듈들을 결합해서 인터페이스가 올바르게 동작하는지 테스트해요. 개략 설계서와 대응돼요. ← <u>정답②</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>시스템(System) 테스트</b></td><td style="text-align:left;vertical-align:middle">완성된 시스템이 요구사항 명세를 만족하는지 테스트해요. 성능·보안·신뢰성 등 비기능 요구사항도 포함해요. ← <u>정답③</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>인수(Acceptance) 테스트</b></td><td style="text-align:left;vertical-align:middle">실제 사용자가 시스템을 검증해요. 알파 테스트(개발사 내부)·베타 테스트(외부 사용자)가 포함돼요. ← <u>정답④</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>하향식 vs 상향식 통합</b></td><td style="text-align:left;vertical-align:middle">하향식: 최상위 모듈부터 하향 테스트, 스텁 필요. 상향식: 하위 모듈부터 상향 테스트, 드라이버 필요.</td></tr></table></div></div>` },

  // ─── 2021년 3회 누락 ───
  { id:'21_3_10', year:'2021', round:'3회', cat:'SQL문',
    qHtml:`<div class="q-text">아래는 두 테이블에 대해 SQL CROSS JOIN을 실행한 결과 화면이다. 결과로 출력되는 행(Row)의 수를 쓰시오.<br><br><div class="tbl-wrap"><table class="db-table"><tr><th>A 테이블 (NAME)</th><th>조건</th></tr><tr><td>Smith</td><td>S로 시작하는 이름</td></tr><tr><td>Scott</td><td>S로 시작하는 이름</td></tr></table></div><div class="tbl-wrap" style="margin-top:8px"><table class="db-table"><tr><th>B 테이블 (NAME)</th><th>조건</th></tr><tr><td>James</td><td>T 포함 이름 아님</td></tr><tr><td>Martin</td><td>T 포함 이름</td></tr><tr><td>Turner</td><td>T 포함 이름</td></tr></table></div><div class="sql-box" style="margin-top:8px">SELECT A.NAME, B.NAME
FROM 테이블A A, 테이블B B
WHERE A.NAME LIKE 'S%'
AND B.NAME LIKE '%T%'</div>`,
    ansHtml:`<div class="answer-val">4</div><div class="keyword-detail">📌 <b>풀이</b><br>CROSS JOIN은 두 테이블의 모든 행 조합을 만들어요. T1에서 S로 시작하는 이름(Smith, Scott) 2개, T2에서 T를 포함하는 규칙(s%, %t%) 중 LIKE 조건을 적용하면 smith·scott+s%와 smith·scott+%t%에서 조건 충족 4개예요.<br><br>📎 <b>SQL CROSS JOIN과 LIKE</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>CROSS JOIN (교차 조인)</b></td><td style="text-align:left;vertical-align:middle">두 테이블의 모든 행 조합을 반환해요(카티션 곱). T1이 m행, T2가 n행이면 m×n행이 생겨요. ← <u>이번 문제</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>LIKE s% (A.NAME)</b></td><td style="text-align:left;vertical-align:middle">s로 시작하는 이름이에요. smith, scott이 해당해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>LIKE %t% (B.RULE → A.NAME)</b></td><td style="text-align:left;vertical-align:middle">t가 포함된 이름이에요. smi<b>t</b>h, sco<b>tt</b>이 해당해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>WHERE 조건 적용</b></td><td style="text-align:left;vertical-align:middle">A.NAME LIKE B.RULE 조건으로 필터링해요. smith+s%=✓, smith+%t%=✓, scott+s%=✓, scott+%t%=✓ → 4개.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>INNER JOIN과의 차이</b></td><td style="text-align:left;vertical-align:middle">CROSS JOIN은 조건 없이 모든 조합을 만들고, INNER JOIN은 ON 조건이 일치하는 조합만 반환해요.</td></tr></table></div></div>` },

  { id:'21_3_11', year:'2021', round:'3회', cat:'SW 개발/계획',
    qHtml:`<div class="q-text">아래에서 설명하는 UML 다이어그램의 명칭을 쓰시오.<br><br>· 문제 해결을 위한 도메인 구조를 나타내어, 보이지 않는 도메인 안의 개념과 같은 추상적인 개념을 기술하기 위해 사용한다.<br>· 소프트웨어의 설계 혹은 완성된 소프트웨어의 구현 설명을 목적으로도 사용할 수 있다.<br>· 이 다이어그램의 형식은 클래스(class)를 포함하여 속성(attribute)과 메서드(method)가 있다.</div>`,
    ansHtml:`<div class="answer-val">클래스 다이어그램 (Class Diagram)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>클래스 다이어그램</b>은 시스템의 정적 구조를 표현하는 UML 구조 다이어그램이에요. 클래스·속성·메서드·관계(상속·연관·의존 등)를 시각적으로 표현해요.<br><br>📎 <b>UML 다이어그램 분류</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>클래스 다이어그램</b></td><td style="text-align:left;vertical-align:middle">시스템의 정적 구조를 표현해요. 클래스·속성·메서드·관계를 나타내요. UML 다이어그램 중 가장 많이 출제돼요. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>구조 다이어그램 (6종)</b></td><td style="text-align:left;vertical-align:middle">클래스, 객체, 컴포넌트, 배치, 패키지, 복합체 구조 다이어그램이에요. 시스템의 정적 구조를 표현해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>행위 다이어그램 (7종)</b></td><td style="text-align:left;vertical-align:middle">유스케이스, 순서, 협력, 상태, 활동, 타이밍, 상호작용 개요 다이어그램이에요. 시스템의 동적 행위를 표현해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>유스케이스 다이어그램</b></td><td style="text-align:left;vertical-align:middle">시스템이 제공하는 기능과 사용자(Actor)의 관계를 표현해요. 요구사항 분석에 활용해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>순서 다이어그램</b></td><td style="text-align:left;vertical-align:middle">객체 간 메시지 교환 순서를 시간 순으로 표현해요. 동적 행위 다이어그램이에요.</td></tr></table></div></div>` },

  // ─── 2021년 3회 추가 누락 (이미지 확인분) ───
  { id:'21_3_12', year:'2021', round:'3회', cat:'SW 개발/계획',
    qHtml:`<div class="q-text">아래에서 설명하는 GoF 디자인 패턴의 명칭을 영문으로 쓰시오.<br><br>· 생성(Creational) 패턴에 속하는 객체지향 설계 패턴이다.<br>· 객체를 직접 생성하는 코드를 상위 클래스에 두지 않고, 어떤 클래스의 인스턴스를 만들지는 하위 클래스가 결정하도록 위임하는 구조이다.<br>· 이를 통해 상위 클래스는 구체적인 클래스 이름에 의존하지 않아도 된다.</div>`,
    ansHtml:`<div class="answer-val">Factory Method (팩토리 메서드 패턴)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>Factory Method 패턴</b>은 객체 생성 인터페이스를 상위 클래스에서 정의하고, 실제 어떤 객체를 생성할지는 서브클래스가 결정하는 패턴이에요. "생성의 책임을 서브클래스에 위임"하는 것이 핵심이에요.<br><br>📎 <b>GoF 생성(Creational) 패턴 5가지</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Singleton</b></td><td style="text-align:left;vertical-align:middle">프로그램 전체에서 인스턴스가 딱 하나만 생성되도록 보장해요. 설정 관리자, DB 연결 풀에 사용해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Factory Method</b></td><td style="text-align:left;vertical-align:middle">객체 생성 인터페이스는 상위 클래스가 정의하고, 실제 생성은 서브클래스가 결정해요. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Abstract Factory</b></td><td style="text-align:left;vertical-align:middle">연관된 여러 객체(제품군)를 한꺼번에 생성하는 인터페이스를 제공해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Builder</b></td><td style="text-align:left;vertical-align:middle">복잡한 객체를 단계적으로 생성해요. 생성 과정과 표현을 분리해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Prototype</b></td><td style="text-align:left;vertical-align:middle">기존 객체를 복사(clone)해서 새 객체를 만들어요. 생성 비용이 클 때 유용해요.</td></tr></table></div></div>` },

  { id:'21_3_13', year:'2021', round:'3회', cat:'데이터베이스',
    qHtml:`<div class="q-text">아래는 파일 구조(File Structures)에 대한 설명이다. 괄호 안에 공통으로 들어갈 알맞은 용어를 쓰시오.<br><br>보조기억장치에 레코드를 편성하는 방식 중 하나로, 레코드를 키(Key) 순으로 정렬한 뒤 각 레코드의 키 값만 따로 추출하여 ( )를 별도로 구성한다. 실제 레코드를 조회할 때는 이 ( )가 가리키는 저장 주소를 이용해 해당 레코드에 직접 접근할 수 있다. 파일 접근 방식에는 순차, ( ), 해싱 세 가지가 있다.</div>`,
    ansHtml:`<div class="answer-val">인덱스 (색인)</div><div class="keyword-detail">📌 <b>풀이</b><br>보조기억장치에서 레코드를 편성하는 방법 중 <b>인덱스(색인) 파일 구조</b>는 키 값과 레코드의 물리적 주소(포인터)를 따로 모아놓은 인덱스를 이용해서 레코드에 직접 접근하는 방식이에요.<br><br>📎 <b>파일 구조(레코드 접근 방식) 3가지</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>순차(Sequential) 접근</b></td><td style="text-align:left;vertical-align:middle">파일의 처음부터 끝까지 순서대로 탐색해요. 구현이 단순하지만 원하는 레코드를 찾기까지 시간이 걸려요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>인덱스(Index) 접근</b></td><td style="text-align:left;vertical-align:middle">키 값과 포인터로 구성된 인덱스 파일을 이용해 레코드에 직접 접근해요. 순차보다 빠르고 범위 검색에도 유리해요. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>해싱(Hashing) 접근</b></td><td style="text-align:left;vertical-align:middle">해시 함수로 레코드 저장 위치를 직접 계산해요. 평균 O(1)로 매우 빠르지만 범위 검색에 불리해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>B-Tree 인덱스</b></td><td style="text-align:left;vertical-align:middle">실제 DBMS에서 가장 많이 사용하는 인덱스 자료구조예요. O(log n) 탐색 속도를 보장해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>클러스터형 vs 비클러스터형</b></td><td style="text-align:left;vertical-align:middle">클러스터형 인덱스: 인덱스 순서대로 데이터를 물리적으로 정렬. 비클러스터형: 데이터 순서와 무관하게 포인터로 접근.</td></tr></table></div></div>` },

  { id:'21_3_14', year:'2021', round:'3회', cat:'기타 용어',
    qHtml:`<div class="q-text">아래에서 설명하는 사용자 인터페이스의 영문 약자를 쓰시오.<br><br>· 텍스트 기반 명령어 입력 방식에서 발전하여, 그래픽 요소(아이콘·창·버튼 등)를 화면에 표시하고 마우스 등의 포인팅 장치로 선택·클릭하여 작업을 수행하는 환경이다.<br>· 사용자가 컴퓨터와 시각적으로 상호작용할 수 있어 직관적인 조작이 가능하다.<br>· Windows, macOS 등이 대표적인 구현 사례이다.</div>`,
    ansHtml:`<div class="answer-val">GUI (Graphical User Interface)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>GUI(그래픽 사용자 인터페이스)</b>는 텍스트 명령어 대신 아이콘·창·버튼 등의 그래픽 요소로 컴퓨터를 제어하는 인터페이스예요. Windows, macOS가 대표적이에요.<br><br>📎 <b>UI 유형 비교</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>CLI (Command Line Interface)</b></td><td style="text-align:left;vertical-align:middle">텍스트 명령어로 제어해요. 리눅스 터미널, DOS 명령 프롬프트가 대표예요. 빠르고 강력하지만 학습 비용이 높아요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>GUI (Graphical User Interface)</b></td><td style="text-align:left;vertical-align:middle">아이콘·창·버튼 등 그래픽 요소로 제어해요. Windows, macOS가 대표예요. 직관적이어서 누구나 쉽게 사용할 수 있어요. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>NUI (Natural User Interface)</b></td><td style="text-align:left;vertical-align:middle">음성·제스처·터치 등 자연스러운 방식으로 제어해요. Siri, Kinect가 대표예요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>OUI (Organic User Interface)</b></td><td style="text-align:left;vertical-align:middle">물리적 형태가 변하는 유기적 인터페이스예요. 플렉시블 디스플레이, 변형 가능한 기기 등이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>WIMP</b></td><td style="text-align:left;vertical-align:middle">Windows·Icons·Menus·Pointer. GUI의 대표적인 구성 요소예요.</td></tr></table></div></div>` },

  { id:'21_3_15', year:'2021', round:'3회', cat:'SW 개발/계획',
    qHtml:`<div class="q-text">아래는 소프트웨어 통합 테스트 방식에 대한 설명이다. 빈칸 ①②에 들어갈 알맞은 용어를 쓰시오.<br><br>( ① ) 통합 테스트는 최하위 모듈을 먼저 검증한 후 점차 상위 계층으로 범위를 넓혀가며 테스트를 수행한다. 이때, 아직 구현되지 않은 상위 모듈 대신 호출 역할을 담당하는 임시 모듈인 ( ② )를 사용한다.<br><br>( ② )는 하위 모듈을 실제로 호출하고 결과를 전달받는 역할을 하여, 상위 모듈 없이도 하위 모듈을 독립적으로 검증할 수 있게 해준다.</div>`,
    ansHtml:`<div class="answer-val">1. 상향식 (Bottom-up) &nbsp;&nbsp; 2. 테스트 드라이버 (Test Driver)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>상향식(Bottom-up) 통합 테스트</b>는 최하위 모듈부터 상위 방향으로 테스트해요. 아직 구현되지 않은 상위 모듈을 대체하기 위해 <b>테스트 드라이버(Driver)</b>가 필요해요.<br><br>📎 <b>통합 테스트 방식 비교</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>상향식(Bottom-Up) 통합 테스트</b></td><td style="text-align:left;vertical-align:middle">하위 모듈부터 테스트하고 점차 상위로 통합해요. 테스트 드라이버가 필요해요. ← <u>정답1</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>하향식(Top-Down) 통합 테스트</b></td><td style="text-align:left;vertical-align:middle">상위 모듈부터 테스트하고 점차 하위로 통합해요. 테스트 스텁이 필요해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>테스트 드라이버(Test Driver)</b></td><td style="text-align:left;vertical-align:middle">상향식 테스트에서 아직 구현되지 않은 상위 모듈을 임시 대체해요. 하위 모듈을 호출하고 결과를 확인해요. ← <u>정답2</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>테스트 스텁(Test Stub)</b></td><td style="text-align:left;vertical-align:middle">하향식 테스트에서 아직 구현되지 않은 하위 모듈을 임시 대체해요. 미리 정해진 응답을 반환해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>빅뱅(Big Bang) 통합</b></td><td style="text-align:left;vertical-align:middle">모든 모듈을 한 번에 통합해서 테스트해요. 간단하지만 오류 위치 파악이 어려워요.</td></tr></table></div></div>` },

  // ─── 2022년 3회 추가 ───
  { id:'22_3_14', year:'2022', round:'3회', cat:'SQL문',
    qHtml:`<div class="q-text">아래와 같이 두 테이블을 생성하고 튜플을 삽입한 후, 1번·2번 SQL문의 실행 결과를 각각 쓰시오.<br><br><div class="sql-box">CREATE TABLE 부서 (
  부서코드 INT PRIMARY KEY,
  부서명  VARCHAR(20)
);
CREATE TABLE 직원 (
  직원코드 INT PRIMARY KEY,
  부서코드 INT,
  직원명  VARCHAR(20),
  FOREIGN KEY(부서코드) REFERENCES 부서(부서코드)
    ON DELETE CASCADE
);

INSERT INTO 부서 VALUES(10, '영업팀');
INSERT INTO 부서 VALUES(20, '개발팀');
INSERT INTO 부서 VALUES(30, '기획팀');

INSERT INTO 직원 VALUES(1000, 10, '오지은');
INSERT INTO 직원 VALUES(2000, 10, '황나영');
INSERT INTO 직원 VALUES(3000, 20, '김새희');
INSERT INTO 직원 VALUES(4000, 20, '이슬기');
INSERT INTO 직원 VALUES(5000, 20, '성예은');
INSERT INTO 직원 VALUES(6000, 30, '박서희');
INSERT INTO 직원 VALUES(7000, 30, '김지현');</div><br><div class="tbl-label" style="font-weight:600;margin-bottom:4px">1번. SQL문</div><div class="sql-box">SELECT DISTINCT COUNT(부서코드) FROM 직원
WHERE 부서코드 = 20;</div><br><div class="tbl-label" style="font-weight:600;margin-bottom:4px">2번. SQL문</div><div class="sql-box">DELETE FROM 부서 WHERE 부서코드 = 20;
SELECT DISTINCT COUNT(부서코드) FROM 직원;</div>`,
    ansHtml:`<div class="answer-val">1번: 3 &nbsp;&nbsp; 2번: 4</div><div class="keyword-detail">📌 <b>풀이</b><br>1번 SQL: 부서코드=20인 직원을 COUNT해요. 직원(김새희·이슬기·성예은) 3명이에요. 2번 SQL: 부서코드=10인 행 삭제 시 ON DELETE CASCADE로 해당 부서 직원도 함께 삭제돼요. 5명 중 4명 남아요.<br><br>📎 <b>SQL 실행 결과와 CASCADE</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>COUNT(부서코드)</b></td><td style="text-align:left;vertical-align:middle">부서코드가 NULL이 아닌 행만 세요. 부서코드=20인 직원 3명 → COUNT=3. ← <u>정답1: 3</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>ON DELETE CASCADE</b></td><td style="text-align:left;vertical-align:middle">부모 테이블(부서)의 행 삭제 시 자식 테이블(직원)의 관련 행도 자동 삭제돼요. 부서코드=10 삭제 → 해당 직원 1명도 삭제 → 직원 5-1=4명. ← <u>정답2: 4</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>ON DELETE RESTRICT</b></td><td style="text-align:left;vertical-align:middle">자식 행이 있으면 부모 행 삭제를 거부해요. CASCADE의 반대 동작이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>ON DELETE SET NULL</b></td><td style="text-align:left;vertical-align:middle">부모 행 삭제 시 자식의 FK를 NULL로 변경해요. 자식 행은 유지돼요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>참조 무결성</b></td><td style="text-align:left;vertical-align:middle">FK는 참조하는 PK가 존재하거나 NULL이어야 해요. CASCADE는 참조 무결성을 유지하는 방법 중 하나예요.</td></tr></table></div></div>` },

  // ─── 2023년 3회 누락 ───
  { id:'23_3_12', year:'2023', round:'3회', cat:'SW 개발/계획',
    qHtml:`<div class="q-text">아래에서 설명하는 UML 다이어그램의 명칭을 쓰시오.<br><br>· 시스템을 폴더 모양의 패키지 단위로 구분하고, 패키지 간의 의존 관계를 &lt;&lt;import&gt;&gt;·&lt;&lt;access&gt;&gt;·&lt;&lt;merge&gt;&gt; 등의 스테레오타입 표기로 나타낸다.<br>· 클래스·컴포넌트 등을 논리적 그룹으로 묶어 대규모 시스템의 전체 구조와 모듈 간 의존성을 한눈에 파악할 수 있게 해준다.</div>`,
    ansHtml:`<div class="answer-val">패키지 다이어그램 (Package Diagram)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>패키지 다이어그램</b>은 소프트웨어를 폴더 모양의 패키지 단위로 구분하고 패키지 간 의존 관계를 표현하는 UML 구조 다이어그램이에요. 대규모 시스템의 전체 구조를 한눈에 파악할 때 사용해요.<br><br>📎 <b>UML 구조 다이어그램 6종</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>패키지(Package) 다이어그램</b></td><td style="text-align:left;vertical-align:middle">폴더 모양의 패키지 단위로 시스템을 구분하고 패키지 간 의존 관계를 표현해요. &lt;&lt;import&gt;&gt;, &lt;&lt;access&gt;&gt;, &lt;&lt;merge&gt;&gt; 스테레오타입으로 관계를 명시해요. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>클래스(Class) 다이어그램</b></td><td style="text-align:left;vertical-align:middle">클래스·속성·메서드·관계(상속, 연관 등)를 표현해요. UML 다이어그램 중 가장 많이 출제되는 구조 다이어그램이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>컴포넌트(Component) 다이어그램</b></td><td style="text-align:left;vertical-align:middle">소프트웨어 컴포넌트(모듈, 라이브러리, 실행 파일) 간 의존 관계를 표현해요. 시스템의 물리적 구성을 보여줘요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>배치(Deployment) 다이어그램</b></td><td style="text-align:left;vertical-align:middle">소프트웨어 컴포넌트가 어떤 하드웨어(서버, PC, 모바일)에 배포되는지 표현해요. 인프라 구성 설계에 사용해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>객체(Object) 다이어그램</b></td><td style="text-align:left;vertical-align:middle">특정 시점의 객체 인스턴스 상태와 관계를 표현해요. 클래스 다이어그램의 실제 실행 시점 스냅샷이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>복합체 구조(Composite Structure)</b></td><td style="text-align:left;vertical-align:middle">클래스 내부의 구성 요소와 협력 관계를 표현해요. 복잡한 컴포넌트의 내부 설계에 사용해요.</td></tr></table></div></div>` },

  { id:'23_2_10', year:'2023', round:'2회', cat:'네트워크',
    qHtml:`<div class="q-text">아래는 HDLC 프로토콜의 프레임 유형과 동작 모드에 대한 설명이다. 보기에서 알맞은 답을 골라 각 빈칸을 채우시오.<br><br>· ( ① ) 프레임: 순서 번호(Seq)·응답 번호(Next)·P/F 필드를 가지며, 첫 번째 비트가 0. 실제 데이터 전송을 담당한다.<br>· ( ② ) 프레임: 첫 비트가 1, 두 번째 비트가 0. Type 2비트로 4가지 종류 구분. 데이터 전송이 아닌 응답·흐름 제어를 수행하며, Seq 없이 Next만 존재한다.<br>· ( ③ ) 프레임: 첫 번째·두 번째 비트가 모두 1. 순서 번호 없는 프레임으로, Type 2비트 + Modifier 3비트(총 5비트)로 종류를 구분한다.<br>· ( ④ ) 모드: 두 호스트가 모두 혼합국(combined station)으로 동작하여 양쪽에서 명령과 응답을 자유롭게 전송할 수 있다.<br>· ( ⑤ ) 모드: 비균형 모드로, 주국의 허락 없이 종국에서 데이터를 전송할 수 있다.<br><br>[보기] &nbsp; ㄱ. 연결제어 &nbsp; ㄴ. 감독 &nbsp; ㄷ. 정보 &nbsp; ㄹ. 양방향 응답 &nbsp; ㅁ. 익명 &nbsp; ㅂ. 비번호 &nbsp; ㅅ. 릴레이 &nbsp; ㅇ. 동기균형 &nbsp; ㅈ. 동기응답 &nbsp; ㅊ. 비동기균형 &nbsp; ㅋ. 비동기응답</div>`,
    ansHtml:`<div class="answer-val">① ㄷ (정보) &nbsp;&nbsp; ② ㄴ (감독) &nbsp;&nbsp; ③ ㅂ (비번호) &nbsp;&nbsp; ④ ㅊ (비동기균형)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>HDLC(High-level Data Link Control)</b>는 데이터링크 계층의 대표적인 프로토콜이에요. 프레임 유형과 동작 모드를 구분하는 것이 핵심이에요.<br><br>📎 <b>HDLC 핵심 개념</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>정보(I) 프레임</b></td><td style="text-align:left;vertical-align:middle">실제 데이터를 전송해요. 순서 번호와 확인 응답 번호를 포함해요. ← <u>정답①</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>감독(S) 프레임</b></td><td style="text-align:left;vertical-align:middle">흐름 제어와 오류 제어에 사용해요. 데이터 없이 제어 정보만 전송해요. ← <u>정답②</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>비번호(U) 프레임</b></td><td style="text-align:left;vertical-align:middle">링크 설정·해제 등 링크 관리에 사용해요. 순서 번호가 없어요. ← <u>정답③</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>비동기균형(ABM) 모드</b></td><td style="text-align:left;vertical-align:middle">양쪽 모두 주국·종국 역할을 동시에 수행해요. 가장 많이 사용되는 동작 모드예요. ← <u>정답④</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>HDLC 프레임 구조</b></td><td style="text-align:left;vertical-align:middle">플래그(01111110) → 주소 → 제어 → 데이터 → FCS → 플래그 순서예요.</td></tr></table></div></div>` },

  // ─── 2023년 2회 추가 ───
  { id:'23_2_11', year:'2023', round:'2회', cat:'SW 개발/계획',
    qHtml:`<div class="q-text">아래는 소프트웨어 테스트에서 사용하는 두 가지 임시 모듈에 대한 설명이다. 1번과 2번에 해당하는 용어를 각각 쓰시오.<br><br>1.<br>· 하향식 통합 테스트 시, 상위 모듈은 존재하지만 아직 구현되지 않은 하위 모듈을 대체하기 위해 임시로 제공되는 모듈이다.<br>· 특정 목적의 소프트웨어를 구현하는 것으로, 컴포넌트를 개발하거나 테스트할 때 활용된다.<br>· 서버-클라이언트 구조에서 서버만 구현된 상태로 테스트하고 싶을 때, 단순히 값만 반환하는 가상의 클라이언트 역할을 수행한다.<br><br>2.<br>· 상향식 통합 테스트 시, 상위 모듈 없이 하위 모듈만 존재하는 상황에서 하위 모듈 실행 중 자료 입출력을 제어하기 위한 제어 모듈(소프트웨어)이다.<br>· 서버-클라이언트 구조에서 클라이언트만 구현된 상태로 테스트하고 싶을 때, 접속·인증 등 간단한 기능만 하는 가상의 서버 역할을 수행한다.</div>`,
    ansHtml:`<div class="answer-val">1. 스텁 (Stub) &nbsp;&nbsp; 2. 드라이버 (Driver)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>스텁</b>은 하향식 통합 테스트에서 아직 구현되지 않은 하위 모듈을 임시로 대체해요. <b>드라이버</b>는 상향식 통합 테스트에서 아직 없는 상위 모듈을 임시로 대체해요.<br><br>📎 <b>통합 테스트 관련 용어</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>스텁(Stub)</b></td><td style="text-align:left;vertical-align:middle">하향식(Top-Down) 통합 테스트에서 사용해요. 아직 구현되지 않은 하위 모듈을 최소 기능으로 대체해요. ← <u>정답1</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>드라이버(Driver)</b></td><td style="text-align:left;vertical-align:middle">상향식(Bottom-Up) 통합 테스트에서 사용해요. 아직 구현되지 않은 상위 모듈을 임시로 대체해요. ← <u>정답2</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>하향식 통합 테스트</b></td><td style="text-align:left;vertical-align:middle">최상위 모듈부터 하위 모듈 방향으로 테스트해요. 스텁이 필요해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>상향식 통합 테스트</b></td><td style="text-align:left;vertical-align:middle">최하위 모듈부터 상위 방향으로 테스트해요. 드라이버가 필요해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>테스트 하네스(Test Harness)</b></td><td style="text-align:left;vertical-align:middle">테스트를 자동으로 수행하는 도구 모음이에요. 스텁·드라이버·테스트 케이스·테스트 스크립트를 포함해요.</td></tr></table></div></div>` },

  // ─── 2024년 3회 추가 ───
  { id:'24_3_11', year:'2024', round:'3회', cat:'SQL문',
    qHtml:`<div class="q-text">다음 SQL 구문의 실행 결과를 작성하시오.<br><br><div class="sql-box">SELECT count(*)
FROM employee AS e JOIN project AS p ON e.project_id = p.project_id
WHERE p.name IN (
    SELECT name FROM project p WHERE p.project_id IN (
        SELECT project_id FROM employee GROUP BY project_id HAVING count(*) &lt; 2

  '24_3_7': {

  '24_3_11': {
    qHtml: `<div class="variant-q">다음 SQL 구문의 실행 결과를 작성하시오.<br><br><div class="tables-row"><div><div class="tbl-label">[ employee ]</div><table class="db-table"><tr><th>no</th><th>name</th><th>dept_id</th></tr><tr><td>1</td><td>Alice</td><td>10</td></tr><tr><td>2</td><td>Bob</td><td>20</td></tr><tr><td>3</td><td>Carol</td><td>10</td></tr><tr><td>4</td><td>Dave</td><td>30</td></tr></table></div><div><div class="tbl-label">[ department ]</div><table class="db-table"><tr><th>dept_id</th><th>dept_name</th></tr><tr><td>10</td><td>개발</td></tr><tr><td>20</td><td>영업</td></tr><tr><td>30</td><td>개발</td></tr></table></div></div><div class="sql-box">SELECT COUNT(*) FROM employee AS e

  '24_2_2': {
    qHtml: `<div class="variant-q">아래 [학생] 테이블에서 학년별 평균 점수가 85점 이상인 학년과 평균 점수를 조회하는 SQL을 작성하시오. (WHERE 사용 금지, GROUP BY와 HAVING 필수, AVG·ROUND 함수 사용, 소수점 둘째 자리 반올림)<br><br><div class="tbl-wrap"><table class="db-table"><tr><th>학번</th><th>이름</th><th>학년</th><th>점수</th></tr><tr><td>1001</td><td>김민수</td><td>1</td><td>90</td></tr><tr><td>1002</td><td>이영희</td><td>2</td><td>75</td></tr><tr><td>1003</td><td>박준호</td><td>1</td><td>88</td></tr><tr><td>1004</td><td>최수진</td><td>2</td><td>95</td></tr><tr><td>1005</td><td>정재원</td><td>3</td><td>82</td></tr></table></div>`,

  '24_2_3': {
    qHtml: `<div class="variant-q">아래 릴레이션을 참고하여 다음을 구하시오.<br><br><div class="tbl-wrap"><table class="db-table"><tr><th>주문번호</th><th>고객명</th><th>상품코드</th><th>수량</th><th>단가</th></tr><tr><td>O001</td><td>김민수</td><td>P001</td><td>3</td><td>5000</td></tr><tr><td>O002</td><td>이영희</td><td>P002</td><td>1</td><td>12000</td></tr><tr><td>O003</td><td>박준호</td><td>P001</td><td>2</td><td>5000</td></tr></table></div><br>(1) 이 릴레이션의 카디널리티(Cardinality)를 구하시오.<br>(2) 이 릴레이션의 차수(Degree)를 구하시오.</div>`,

  '24_2_4': {

    ansHtml: `<div class="variant-ans-val">DHCP (Dynamic Host Configuration Protocol)</div><div class="variant-keyword">📌 <b>풀이</b><br>원본 문제의 IPSec(네트워크 계층 보안)과 달리 DHCP는 IP 자동 할당 프로토콜이에요. 포트 67(서버)/68(클라이언트), UDP 사용.<br><br>📎 DHCP 동작: Discover → Offer → Request → Acknowledge (DORA 순서). IP를 임대해주는 방식이라 임대 기간이 만료되면 갱신이 필요해요!</div>`
  },
  '24_2_5': {

  },

  '25_3_6': {
    qHtml: `<div class="variant-q">아래는 특정 정보보안 솔루션에 대한 설명이다. 해당 솔루션의 명칭을 쓰시오.<br><br>· 네트워크 경계에서 들어오고 나가는 트래픽을 모니터링하여 미리 정의된 규칙에 따라 패킷을 허용하거나 차단하는 보안 장치이다.<br>· 외부에서 내부로 유입되는 트래픽은 인증된 패킷만 통과시키고, 내부에서 외부로 나가는 패킷은 기본적으로 허용한다.<br>· 단, 응용 계층의 SQL 인젝션이나 XSS 같은 웹 기반 공격은 탐지하지 못한다는 한계가 있어 웹 방화벽(WAF)과 함께 사용한다.</div>`,
    ansHtml: `<div class="variant-ans-val">방화벽 (Firewall)</div><div class="variant-keyword">📌 <b>풀이</b><br>방화벽은 IP/포트/프로토콜 기반으로 패킷을 필터링하는 네트워크 보안 장비예요. 집의 문처럼 허가된 것만 들여보내요.<br><br>📎 원본 문제의 <b>OTP</b>는 인증(Authentication) 기술이고, 방화벽은 네트워크 접근 제어(Access Control) 솔루션이에요. 함께 나오는 개념: IDS(탐지), IPS(탐지+차단), WAF(웹 특화 방화벽)도 세트로 암기하세요!</div>`

  '25_3_7': {
    qHtml: `<div class="variant-q">아래는 특정 보안 프로토콜에 대한 설명이다. 해당 프로토콜의 명칭을 쓰시오.<br><br>· 인터넷상에서 데이터를 안전하게 주고받기 위해 전송 계층(Transport Layer)에서 암호화를 제공하는 보안 프로토콜이다.<br>· 웹 브라우저와 서버 간 통신에서 HTTPS 구현에 사용되며 기본 포트는 443번이다.<br>· 이전 버전인 SSL의 보안 취약점을 개선하여 현재 사실상의 표준이 되었으며, 데이터 무결성과 기밀성을 모두 보장한다.</div>`,
    ansHtml: `<div class="variant-ans-val">TLS (Transport Layer Security)</div><div class="variant-keyword">📌 <b>풀이</b><br>TLS는 SSL의 후속 버전으로 HTTPS의 핵심 보안 프로토콜이에요. HTTPS = HTTP + TLS로 이해하면 돼요.<br><br>📎 원본 문제의 <b>OAuth</b>는 인가(Authorization) 프로토콜이고, TLS는 전송 구간 암호화 프로토콜이에요. SSH(포트22·원격접속), TLS(포트443·HTTPS), IPSec(네트워크 계층 보안)을 계층별로 구분해서 암기하세요!</div>`

// ══════════════════════════════════════════════════════
//  상태 변수
// ══════════════════════════════════════════════════════
let curYear = 'all';
let curCat  = 'all';
let includeVariant = false;

// 현재 풀 (섞인 문제 목록)
let pool = [];
// 완료한 문제 인덱스 집합
let doneSet = new Set();
// 현재 풀에서 몇 번째 문제를 보고 있나
let curIdx  = 0;

// ══════════════════════════════════════════════════════
//  카테고리 → CSS 클래스
// ══════════════════════════════════════════════════════
function catClass(cat) {
  const m = {'SW 개발/계획':'sw','데이터베이스':'db','운영체제':'os',
              '네트워크':'net','정보보안':'sec','SQL문':'sql','기타 용어':'etc'};
  return 'cat-' + (m[cat] || 'etc');
}

// ══════════════════════════════════════════════════════
//  Fisher-Yates 셔플
// ══════════════════════════════════════════════════════
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ══════════════════════════════════════════════════════
//  풀 빌드 — 필터 적용 후 셔플
// ══════════════════════════════════════════════════════
function rebuildPool() {
  includeVariant = document.getElementById('toggle-variant').checked;

  // 1. 기출 원본 문제 필터링
  let baseItems = questions.filter(q => {
    if (curYear !== 'all' && q.year !== curYear) return false;
    if (curCat  !== 'all' && q.cat  !== curCat)  return false;
    return true;
  }).map(q => ({ type:'original', q }));

  // 2. 변형 기출 문제 (원본과 동일 필터 조건 적용)
  let varItems = [];
  if (includeVariant) {
    questions.forEach(q => {
      if (curYear !== 'all' && q.year !== curYear) return;
      if (curCat  !== 'all' && q.cat  !== curCat)  return;
      if (variantQuestions[q.id]) {
        varItems.push({ type:'variant', q });
      }
    });
  }

  pool = shuffle([...baseItems, ...varItems]);
  doneSet.clear();
  curIdx = 0;

  updateProgress();
  if (pool.length === 0) {
    document.getElementById('quiz-card-wrap').innerHTML = '';
    document.getElementById('done-card').classList.remove('show');
    document.getElementById('empty-msg').classList.add('show');
  } else {
    document.getElementById('empty-msg').classList.remove('show');
    document.getElementById('done-card').classList.remove('show');
    renderCard();
  }
}

// ══════════════════════════════════════════════════════
//  진행 상황 업데이트
// ══════════════════════════════════════════════════════
function updateProgress() {
  const done  = doneSet.size;
  const total = pool.length;
  const pct   = total > 0 ? Math.round(done / total * 100) : 0;
  document.getElementById('cnt-done').textContent  = done;
  document.getElementById('cnt-total').textContent = total;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('stat-pool').textContent =
    '총 ' + total + '문제' + (includeVariant ? ' (변형 포함)' : '');
}

// ══════════════════════════════════════════════════════
//  카드 렌더링
// ══════════════════════════════════════════════════════
function renderCard() {
  const wrap = document.getElementById('quiz-card-wrap');
  const done = document.getElementById('done-card');

  if (pool.length === 0) {
    wrap.innerHTML = '';
    return;
  }

  // 미완료 문제 중 현재 인덱스
  if (curIdx >= pool.length) curIdx = 0;

  const item = pool[curIdx];
  const isVariant = item.type === 'variant';
  const q  = item.q;
  const vd = variantQuestions[q.id];

  // 문제 HTML
  const qHtml   = isVariant ? vd.qHtml   : q.qHtml;
  const ansHtml  = isVariant ? vd.ansHtml : q.ansHtml;

  const posLabel = (curIdx + 1) + ' / ' + pool.length;
  const badgeHtml = isVariant
    ? '<span class="variant-badge-sm">✦ 변형 기출</span>'
    : '';

  const cardHtml = `
    <div class="quiz-card" id="qcard">
      <div class="card-meta">
        <span class="meta-year">${q.year} ${q.round}</span>
        <span class="cat-tag ${catClass(q.cat)}">${q.cat}</span>
        ${badgeHtml}
        <span style="margin-left:auto;font-size:12px;color:var(--c-text3)">${posLabel}</span>
      </div>
      <div class="card-body">
        ${qHtml}
      </div>
      <div class="card-actions">
        <button class="btn-reveal" id="btn-reveal" onclick="toggleAns()">▼ 정답 보기</button>
        <button class="btn-next" onclick="nextCard()">다음 문제 →</button>
        <button class="btn-skip" onclick="skipCard()">건너뛰기</button>
      </div>
      <div class="ans-wrap" id="ans-wrap">
        <div class="ans-body">
          ${ansHtml}
        </div>
      </div>
    </div>
  `;

  wrap.innerHTML = cardHtml;
  done.classList.remove('show');
}

// ══════════════════════════════════════════════════════
//  정답 토글
// ══════════════════════════════════════════════════════
function toggleAns() {
  const aw  = document.getElementById('ans-wrap');
  const btn = document.getElementById('btn-reveal');
  const isOpen = aw.classList.toggle('open');
  btn.textContent = isOpen ? '▲ 정답 닫기' : '▼ 정답 보기';
  btn.classList.toggle('revealed', isOpen);

  // 정답 보면 완료 처리
  if (isOpen) {
    doneSet.add(curIdx + '_' + pool[curIdx].type);
    updateProgress();
  }
}

// ══════════════════════════════════════════════════════
//  다음 문제
// ══════════════════════════════════════════════════════
function nextCard() {
  // 현재 문제 완료 처리 (정답 안 봐도 넘기면 완료)
  doneSet.add(curIdx + '_' + pool[curIdx].type);
  updateProgress();

  curIdx++;
  if (curIdx >= pool.length) {
    // 전부 완료
    document.getElementById('quiz-card-wrap').innerHTML = '';
    const done = document.getElementById('done-card');
    done.classList.add('show');
    document.getElementById('done-desc').textContent =
      '총 ' + pool.length + '문제를 모두 완료했어요! 다시 시작할 수 있어요.';
    return;
  }

  renderCard();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ══════════════════════════════════════════════════════
//  건너뛰기 (완료 처리 안 함)
// ══════════════════════════════════════════════════════
function skipCard() {
  curIdx++;
  if (curIdx >= pool.length) curIdx = 0;
  renderCard();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ══════════════════════════════════════════════════════
//  다시 시작
// ══════════════════════════════════════════════════════
function restartAll() {
  pool = shuffle(pool);
  doneSet.clear();
  curIdx = 0;
  updateProgress();
  document.getElementById('done-card').classList.remove('show');
  renderCard();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ══════════════════════════════════════════════════════
//  필터 세터
// ══════════════════════════════════════════════════════
function setYear(val, el) {
  document.querySelectorAll('#filter-year .tag')
    .forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  curYear = val;
  rebuildPool();
}
function setCat(val, el) {
  document.querySelectorAll('#filter-cat .tag')
    .forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  curCat = val;
  rebuildPool();
}

// ══════════════════════════════════════════════════════
//  키보드 단축키
// ══════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === ' ' || e.key === 'Enter') {
    e.preventDefault();
    const aw = document.getElementById('ans-wrap');
    if (aw && !aw.classList.contains('open')) { toggleAns(); }
    else { nextCard(); }
  } else if (e.key === 'ArrowRight') {
    nextCard();
  } else if (e.key === 'ArrowLeft') {
    if (curIdx > 0) { curIdx -= 2; nextCard(); }
  }
});

// ══════════════════════════════════════════════════════
//  초기화
// ══════════════════════════════════════════════════════
rebuildPool();
</script>
</body>

    ansHtml:`<div class="answer-val">NAT (Network Address Translation)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>NAT</b>는 사설 IP↔공인 IP를 변환해서 하나의 공인 IP로 여러 기기가 인터넷에 접속하게 해주는 기술이에요. 공유기가 NAT를 수행해요.<br><br>📎 <b>같이 알아두면 좋은 키워드</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>사설 IP 대역</b></td><td style="text-align:left;vertical-align:middle">10.x.x.x, 172.16~31.x.x, 192.168.x.x. 인터넷에서 직접 접근 불가해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>PAT (Port Address Translation)</b></td><td style="text-align:left;vertical-align:middle">포트 번호까지 변환해서 여러 기기가 하나의 공인 IP를 공유해요. NAPT라고도 해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>IPv4 주소 고갈 해결</b></td><td style="text-align:left;vertical-align:middle">NAT으로 사설 IP를 사용해서 공인 IP 소비를 줄여요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>NAT 테이블</b></td><td style="text-align:left;vertical-align:middle">내부 IP+포트 ↔ 외부 IP+포트 매핑을 관리해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>IPv6와 NAT</b></td><td style="text-align:left;vertical-align:middle">IPv6 환경에서는 충분한 주소로 NAT 없이도 모든 기기에 공인 IP를 부여할 수 있어요.</td></tr></table></div></div>` },
  { id:'20_4_7', year:'2020', round:'4회', cat:'기타 용어',
    qHtml:`<div class="q-text">아래에서 설명하는 기술의 명칭을 쓰시오.<br><br>· P2P 방식 기반의 분산 데이터 저장 기술로, 소규모 데이터들이 연결된 '블록'에 데이터를 저장한다.<br>· 누구도 임의로 수정할 수 없고 누구나 변경 결과를 열람할 수 있는 투명성이 특징이다.</div>`,
    ansHtml:`<div class="answer-val">블록체인 (Blockchain)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>블록체인</b>은 P2P 방식 기반의 분산 원장 기술이에요. 소규모 데이터들이 연결된 "블록"에 저장되고, 블록들이 체인처럼 연결돼요. 중앙 관리자 없이 참여 노드들이 합의 알고리즘으로 신뢰를 확보해요.<br><br>📎 <b>블록체인 핵심 개념</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>분산 원장(Distributed Ledger)</b></td><td style="text-align:left;vertical-align:middle">모든 참여 노드가 동일한 원장(데이터)을 보유해요. 중앙 서버가 없어도 신뢰성을 확보해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>합의 알고리즘</b></td><td style="text-align:left;vertical-align:middle">PoW(Proof of Work): 작업 증명, 비트코인. PoS(Proof of Stake): 지분 증명, 이더리움 2.0.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>해시 체인</b></td><td style="text-align:left;vertical-align:middle">각 블록은 이전 블록의 해시값을 포함해요. 한 블록 변조 시 이후 모든 블록이 무효화돼요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>스마트 계약</b></td><td style="text-align:left;vertical-align:middle">블록체인 위에서 자동으로 실행되는 프로그래밍 코드예요. 이더리움이 대표적이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>활용 분야</b></td><td style="text-align:left;vertical-align:middle">암호화폐(비트코인), 공급망 관리, 디지털 신원 인증, NFT, DeFi(탈중앙 금융)에 활용해요.</td></tr></table></div></div>` },
  { id:'20_4_8', year:'2020', round:'4회', cat:'데이터베이스',
    qHtml:`<div class="q-text">데이터베이스 이상현상(Anomaly)의 종류 3가지를 쓰시오.</div>`,
    ansHtml:`<div class="answer-val">삽입 이상, 삭제 이상, 갱신(수정) 이상</div><div class="keyword-detail">📌 <b>풀이</b><br>DB <b>이상현상(Anomaly)</b>은 정규화가 안 된 테이블에서 데이터를 조작할 때 발생하는 부작용이에요. 3가지 이상현상은 정규화를 통해 해결할 수 있어요.<br><br>📎 <b>DB 이상현상 3가지</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>삽입 이상(Insertion Anomaly)</b></td><td style="text-align:left;vertical-align:middle">데이터 삽입 시 불필요한 데이터를 함께 입력해야 하는 현상이에요. 수강 이력 없는 신입생 등록 시 임의 과목을 넣어야 하는 경우예요. ← <u>정답1</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>삭제 이상(Deletion Anomaly)</b></td><td style="text-align:left;vertical-align:middle">데이터 삭제 시 원치 않는 다른 데이터까지 함께 삭제되는 현상이에요. 수강 정보 삭제 시 학생 정보도 사라지는 경우예요. ← <u>정답2</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>갱신 이상(Update Anomaly)</b></td><td style="text-align:left;vertical-align:middle">데이터 수정 시 일부만 변경되어 데이터 불일치가 발생하는 현상이에요. 교수 정보 변경 시 일부 수강 행만 수정되는 경우예요. ← <u>정답3</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>원인</b></td><td style="text-align:left;vertical-align:middle">부분 함수 종속·이행 함수 종속에서 발생해요. 정규화(1NF→2NF→3NF)로 테이블을 분리하면 해결돼요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>정규화와의 관계</b></td><td style="text-align:left;vertical-align:middle">이상현상 제거가 정규화의 핵심 목적이에요. 정규화 수준이 높을수록 이상현상이 줄어요.</td></tr></table></div></div>` },
  { id:'20_4_9', year:'2020', round:'4회', cat:'운영체제',
    qHtml:`<div class="q-text">프로세스 상태 전이도에서 각 상태의 명칭을 쓰시오.<br><br><div class="tbl-wrap"><table class="db-table" style="min-width:300px"><tr><th>상태</th><th>설명</th></tr><tr class="info-row"><td>( ① )</td><td>CPU 할당을 기다리며 준비하고 있는 상태</td></tr><tr class="info-row"><td>( ② )</td><td>CPU를 할당받아 명령어를 수행 중인 상태</td></tr><tr class="info-row"><td>( ③ )</td><td>I/O 처리 등을 기다리며 CPU를 반납한 상태</td></tr></table></div>`,
    ansHtml:`<div class="answer-val">① 준비(Ready) &nbsp;&nbsp; ② 실행(Running) &nbsp;&nbsp; ③ 대기(Waiting/Blocked)</div><div class="keyword-detail">📌 <b>풀이</b><br>프로세스 상태 전이도에서 3가지 기본 상태예요. <b>준비(Ready)</b>는 CPU 할당 대기, <b>실행(Running)</b>은 CPU 사용 중, <b>대기(Waiting)</b>는 I/O 완료 대기예요.<br><br>📎 <b>프로세스 상태 전이</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>준비(Ready)</b></td><td style="text-align:left;vertical-align:middle">CPU 할당을 기다리는 상태예요. 스케줄러가 실행할 프로세스를 선택하면 실행 상태로 전이해요. ← <u>정답①</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>실행(Running)</b></td><td style="text-align:left;vertical-align:middle">CPU를 할당받아 명령어를 실행하는 상태예요. 타임 퀀텀 초과 시 준비 상태로 돌아가요. ← <u>정답②</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>대기(Waiting/Blocked)</b></td><td style="text-align:left;vertical-align:middle">I/O 완료·이벤트 발생을 기다리는 상태예요. I/O 완료 후 준비 상태로 전이해요. ← <u>정답③</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>생성(New) / 종료(Terminated)</b></td><td style="text-align:left;vertical-align:middle">생성: 프로세스 생성 초기 상태. 종료: 실행 완료 후 자원 반환 상태.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>스케줄러 역할</b></td><td style="text-align:left;vertical-align:middle">준비 큐의 프로세스 중 어떤 것을 실행 상태로 전환할지 결정해요. FCFS·SJF·RR 등 알고리즘이 있어요.</td></tr></table></div></div>` },
  { id:'20_4_10', year:'2020', round:'4회', cat:'정보보안',
    qHtml:`<div class="q-text">아래에서 설명하는 정보보안 개념의 명칭을 쓰시오.<br><br>권한을 가진 사용자가 요청할 때 애플리케이션이 원하는 서비스를 지속적으로 이용할 수 있도록 보장하는 특성이다. DoS/DDoS 공격은 이 특성을 침해하는 대표적인 공격이다.</div>`,
    ansHtml:`<div class="answer-val">가용성 (Availability)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>가용성(Availability)</b>은 정보보안의 3대 요소(CIA) 중 하나로, 권한을 가진 사용자가 필요할 때 언제든지 서비스를 이용할 수 있도록 보장하는 성질이에요.<br><br>📎 <b>정보보안 3대 요소 (CIA)</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>기밀성(Confidentiality)</b></td><td style="text-align:left;vertical-align:middle">허가된 사용자만 정보에 접근할 수 있도록 보장해요. 암호화·접근 제어로 구현해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>무결성(Integrity)</b></td><td style="text-align:left;vertical-align:middle">정보가 허가되지 않은 방법으로 변경되지 않도록 보장해요. 해시·디지털 서명으로 구현해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>가용성(Availability)</b></td><td style="text-align:left;vertical-align:middle">권한을 가진 사용자가 필요할 때 서비스를 이용할 수 있도록 보장해요. 이중화·DDoS 방어로 구현해요. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>DoS/DDoS와 가용성</b></td><td style="text-align:left;vertical-align:middle">DoS·DDoS 공격은 가용성을 목표로 해요. 서비스를 마비시켜 정상 사용자의 접근을 차단해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>CIA 확장(CIAA)</b></td><td style="text-align:left;vertical-align:middle">Authenticity(진본성)·Accountability(책임 추적성)를 추가한 확장 모델이에요.</td></tr></table></div></div>` },
  { id:'20_4_11', year:'2020', round:'4회', cat:'SQL문',
    qHtml:`<div class="q-text">아래 조건을 만족하면서 학과별 튜플 수를 구하는 SQL 문을 작성하시오.<br><br>조건: WHERE 사용 금지 · GROUP BY 필수 · 별칭(AS) 사용 · 집계 함수 사용<br><br><div class="tbl-wrap"><table class="db-table"><tr><th>학과</th><th>학생</th></tr><tr><td>전기</td><td>이순신</td></tr><tr><td>컴퓨터</td><td>안중근</td></tr><tr><td>컴퓨터</td><td>윤봉길</td></tr><tr><td>전자</td><td>이봉창</td></tr><tr><td>전자</td><td>강우규</td></tr></table></div>`,
    ansHtml:`<div class="answer-val">SELECT 학과, COUNT(학과) AS 학과별튜플수 FROM 학생 GROUP BY 학과;</div><div class="keyword-detail">📌 <b>풀이</b><br>GROUP BY로 학과별로 그룹화하고 COUNT로 각 학과의 튜플 수를 세요. WHERE 사용 금지이므로 개별 행 필터 없이 GROUP BY만 사용해요.<br><br>📎 <b>GROUP BY 관련 키워드</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>GROUP BY</b></td><td style="text-align:left;vertical-align:middle">지정 컬럼을 기준으로 그룹화해요. 같은 학과끼리 묶어서 COUNT를 계산해요. ← <u>이번 문제</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>COUNT(학과)</b></td><td style="text-align:left;vertical-align:middle">학과 컬럼이 NULL이 아닌 행을 세요. 학과별 학생 수를 구해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>AS 별칭</b></td><td style="text-align:left;vertical-align:middle">AS 학과별튜플수처럼 결과 컬럼에 이름을 붙여요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>HAVING</b></td><td style="text-align:left;vertical-align:middle">GROUP BY 후 그룹 조건을 추가로 필터링해요. 예) HAVING COUNT(학과) &gt; 10.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>집계 함수</b></td><td style="text-align:left;vertical-align:middle">COUNT·SUM·AVG·MAX·MIN. GROUP BY와 함께 사용해서 그룹별 집계를 계산해요.</td></tr></table></div></div>` },
  { id:'20_4_12', year:'2020', round:'4회', cat:'운영체제',
    qHtml:`<div class="q-text">아래에서 설명하는 운영체제의 명칭을 쓰시오.<br><br>· 데니스 리치와 켄 톰슨 등이 벨 연구소에서 개발한 운영체제이다.<br>· 90% 이상 C언어로 구현되어 하드웨어 이식이 용이하며, 계층적 트리 구조 파일 시스템을 지원한다.</div>`,
    ansHtml:`<div class="answer-val">유닉스 (UNIX)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>UNIX</b>는 1969년 벨 연구소에서 데니스 리치·켄 톰슨이 개발한 운영체제예요. 90% 이상 C언어로 구현되어 이식성이 뛰어나고, 다중 사용자·다중 태스킹을 지원해요.<br><br>📎 <b>UNIX 관련 키워드</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>UNIX 특징</b></td><td style="text-align:left;vertical-align:middle">다중 사용자·다중 작업, 이식성 우수(C언어로 구현), 계층적 파일 시스템, 파이프·필터 개념 도입. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Linux</b></td><td style="text-align:left;vertical-align:middle">UNIX 계열 오픈소스 OS예요. Linus Torvalds가 개발했어요. 서버·임베디드 시스템에 널리 사용해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>macOS</b></td><td style="text-align:left;vertical-align:middle">UNIX 기반 Apple OS예요. Darwin 커널(UNIX 계열) 위에 Apple 인터페이스를 올린 구조예요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>쉘(Shell)</b></td><td style="text-align:left;vertical-align:middle">사용자와 커널 사이의 인터페이스예요. 명령어를 해석해서 커널에 전달해요. bash·zsh·sh가 대표적이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>파이프(Pipe)</b></td><td style="text-align:left;vertical-align:middle">UNIX의 핵심 개념이에요. 한 명령의 출력을 다른 명령의 입력으로 전달해요. ls | grep .txt처럼요.</td></tr></table></div></div>` },

  // ─── 2020년 3회 ───
  { id:'20_3_1', year:'2020', round:'3회', cat:'SW 개발/계획',
    qHtml:`<div class="q-text">소프트웨어 리팩토링(Refactoring)의 목적에 대해 서술하시오.</div>`,
    ansHtml:`<div class="answer-val">복잡한 코드를 단순화하고 가독성을 높여 유지보수성을 향상시키며, 유연하고 생산성 높은 시스템을 만드는 것</div><div class="keyword-detail">📌 <b>풀이</b><br><b>리팩토링(Refactoring)</b>은 외부 동작은 변경하지 않으면서 내부 코드 구조를 개선하는 작업이에요. 마치 집 내부를 리모델링하는 것처럼, 겉으로 보이는 기능은 그대로지만 내부가 더 깔끔해져요.<br><br>📎 <b>리팩토링 관련 키워드</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>리팩토링 목적</b></td><td style="text-align:left;vertical-align:middle">코드 가독성·유지보수성 향상, 중복 제거, 설계 개선이에요. 외부 동작은 변경하지 않아요. ← <u>이번 문제</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>코드 스멜(Code Smell)</b></td><td style="text-align:left;vertical-align:middle">리팩토링이 필요한 신호예요. 중복 코드·긴 메서드·큰 클래스·분산된 변경 등이 대표적이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>TDD와의 관계</b></td><td style="text-align:left;vertical-align:middle">TDD(Test-Driven Development)에서 Red→Green→<b>Refactor</b> 사이클로 코드를 지속적으로 개선해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>마틴 파울러(Martin Fowler)</b></td><td style="text-align:left;vertical-align:middle">『리팩토링』 저자예요. 다양한 리팩토링 기법을 체계화했어요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>지속적 리팩토링</b></td><td style="text-align:left;vertical-align:middle">한 번에 큰 리팩토링보다 소규모로 자주 수행하는 것이 권장돼요. 테스트 코드가 리팩토링의 안전망이에요.</td></tr></table></div></div>` },
  { id:'20_3_2', year:'2020', round:'3회', cat:'네트워크',
    qHtml:`<div class="q-text">아래에서 설명하는 라우팅 프로토콜의 명칭을 쓰시오.<br><br>· 대표적인 내부 라우팅 프로토콜로 Dijkstra 알고리즘을 사용한다.<br>· 링크 상태(Link State) 기반으로 대규모 네트워크에 적합하다.</div>`,
    ansHtml:`<div class="answer-val">OSPF (Open Shortest Path First)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>OSPF</b>는 링크 상태(Link State) 방식의 내부 라우팅 프로토콜(IGP)이에요. Dijkstra 알고리즘으로 최단 경로를 계산하고 변경 사항만 전송해서 효율적이에요.<br><br>📎 <b>라우팅 프로토콜 비교</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>OSPF</b></td><td style="text-align:left;vertical-align:middle">링크 상태 방식 IGP. Dijkstra 알고리즘. 변경 사항만 전송. 대규모 네트워크 적합. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>RIP</b></td><td style="text-align:left;vertical-align:middle">거리 벡터 방식 IGP. 최대 홉 15. 30초마다 전체 테이블 전송. 소규모 네트워크 적합.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>BGP</b></td><td style="text-align:left;vertical-align:middle">경로 벡터 방식 EGP. AS 간 라우팅. 인터넷 백본 프로토콜이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>링크 상태 vs 거리 벡터</b></td><td style="text-align:left;vertical-align:middle">링크 상태: 전체 네트워크 지도 보유, 빠른 수렴, 정확. 거리 벡터: 이웃에게만 정보 전달, 느린 수렴, 루프 가능.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>수렴(Convergence)</b></td><td style="text-align:left;vertical-align:middle">네트워크 변경 후 모든 라우터가 동일한 라우팅 정보를 가지는 상태예요. 수렴 시간이 짧을수록 좋아요.</td></tr></table></div></div>` },
  { id:'20_3_3', year:'2020', round:'3회', cat:'SW 개발/계획',
    qHtml:`<div class="q-text">소프트웨어 형상 관리 활동 중, 형상 항목의 버전 관리를 위해 변경 여부와 변경 활동을 통제하는 활동의 명칭을 쓰시오.</div>`,
    ansHtml:`<div class="answer-val">형상 통제 (Configuration Control)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>형상 통제</b>는 형상 관리의 2단계로, 형상 항목의 버전 관리를 위해 변경 여부와 변경 활동을 통제하는 활동이에요. 변경 요청을 검토·승인·거부하고 이력을 관리해요.<br><br>📎 <b>형상 관리 4단계</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>형상 식별</b></td><td style="text-align:left;vertical-align:middle">형상 관리 대상 항목을 선정하고 식별 번호를 부여해요. 기준선(Baseline)을 설정해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>형상 통제</b></td><td style="text-align:left;vertical-align:middle">변경 요청을 검토·승인·거부하고 변경 이력을 관리해요. CCB(형상통제위원회)가 담당해요. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>형상 감사</b></td><td style="text-align:left;vertical-align:middle">변경된 항목이 기준선에 맞게 구현됐는지 검증해요. 기능·물리적 형상 감사가 있어요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>형상 기록(상태 기록)</b></td><td style="text-align:left;vertical-align:middle">형상 항목의 현재 상태와 변경 이력을 문서로 기록해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>기준선(Baseline)</b></td><td style="text-align:left;vertical-align:middle">공식적으로 승인된 형상 항목의 상태예요. 이후 변경은 형상 통제 절차를 거쳐야 해요.</td></tr></table></div></div>` },
  { id:'20_3_4', year:'2020', round:'3회', cat:'네트워크',
    qHtml:`<div class="q-text">아래에서 설명하는 통신 규약의 명칭을 쓰시오.<br><br>· 컴퓨터가 메시지를 전달하고 정상 도착 여부를 확인하며, 도착하지 않았을 경우 재전송하는 일련의 방법을 정의한 것이다.<br>· 서로 다른 시스템이나 기기들 간의 데이터 교환을 원활히 하기 위한 표준 통신 규약이다.</div>`,
    ansHtml:`<div class="answer-val">프로토콜 (Protocol)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>프로토콜</b>은 컴퓨터·기기 간 통신을 위해 미리 약속한 규칙의 집합이에요. 구문(Syntax)·의미(Semantics)·순서(Timing) 3가지 요소로 구성돼요.<br><br>📎 <b>프로토콜 관련 키워드</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>프로토콜(Protocol)</b></td><td style="text-align:left;vertical-align:middle">통신을 위해 미리 약속한 규칙이에요. 메시지 전달·정상 도착 확인·재전송 등을 정의해요. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>구문(Syntax)</b></td><td style="text-align:left;vertical-align:middle">데이터의 형식·부호화·신호 레벨을 정의해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>의미(Semantics)</b></td><td style="text-align:left;vertical-align:middle">오류 제어·조작을 위한 제어 정보를 정의해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>순서(Timing)</b></td><td style="text-align:left;vertical-align:middle">속도 조절과 메시지 처리 순서를 정의해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>표준 프로토콜 예시</b></td><td style="text-align:left;vertical-align:middle">TCP/IP: 인터넷. HTTP: 웹. FTP: 파일 전송. SMTP: 이메일. DNS: 도메인 이름 해석.</td></tr></table></div></div>` },
  { id:'20_3_5', year:'2020', round:'3회', cat:'네트워크',
    qHtml:`<div class="q-text">TCP/IP에서 IP 패킷 처리 시 발생하는 오류를 알리는 프로토콜의 영문 약자를 쓰시오. (이 프로토콜 패킷을 연속 전송하여 서버 자원을 고갈시키는 Flooding 공격에도 활용된다.)</div>`,
    ansHtml:`<div class="answer-val">ICMP (Internet Control Message Protocol)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>ICMP</b>는 IP 통신 중 발생하는 오류를 보고하거나 네트워크 상태를 진단하는 프로토콜이에요. <code>ping</code>과 <code>traceroute</code> 명령이 ICMP를 사용해요. ICMP 패킷 연속 전송으로 DoS 공격(Ping Flood)도 가능해요.<br><br>📎 <b>ICMP 관련 키워드</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>ICMP (Internet Control Message Protocol)</b></td><td style="text-align:left;vertical-align:middle">IP의 오류 보고·제어 메시지 전달 프로토콜이에요. 네트워크 계층에서 동작해요. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>ping 명령</b></td><td style="text-align:left;vertical-align:middle">ICMP Echo Request를 보내고 Echo Reply를 받아 호스트 생존 여부와 응답 시간을 확인해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>traceroute / tracert</b></td><td style="text-align:left;vertical-align:middle">ICMP를 이용해 목적지까지 거치는 라우터 경로를 추적해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Ping Flood</b></td><td style="text-align:left;vertical-align:middle">ICMP 패킷을 대량으로 전송해서 네트워크를 마비시키는 DoS 공격이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Ping of Death</b></td><td style="text-align:left;vertical-align:middle">비정상적으로 큰 ICMP 패킷을 전송해서 시스템을 마비시키는 공격이에요.</td></tr></table></div></div>` },
  { id:'20_3_6', year:'2020', round:'3회', cat:'SW 개발/계획',
    qHtml:`<div class="q-text">아래 제어 흐름 그래프에서 분기 커버리지(Branch Coverage)를 만족하기 위한 테스트 경로 두 가지를 쓰시오.<br><br><div class="tbl-wrap"><table class="db-table" style="min-width:280px"><tr><th colspan="2">제어 흐름 (노드 1~7)</th></tr><tr><td colspan="2" style="text-align:left">1→2→3(분기A참)→4→5→6(분기B참)→7→1<br>분기A 거짓: 3→5. 분기B 거짓: 6→1(종료)</td></tr></table></div>`,
    ansHtml:`<div class="answer-val">경로1: 1→2→3→4→5→6→1 &nbsp;&nbsp; 경로2: 1→2→4→5→6→7</div><div class="keyword-detail">📌 <b>풀이</b><br>분기(결정) 커버리지는 제어 흐름도의 모든 분기(참/거짓)를 최소 1번씩 통과해야 해요. 두 경로를 통해 분기점 A(참·거짓)·B(참·거짓)를 모두 커버해요.<br><br>📎 <b>커버리지 종류 비교 (약→강)</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>문장(Statement) 커버리지</b></td><td style="text-align:left;vertical-align:middle">모든 실행 가능한 코드 줄을 최소 1번 실행해요. 가장 기본·약한 기준이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>결정(Decision)/분기(Branch) 커버리지</b></td><td style="text-align:left;vertical-align:middle">각 결정문(if·while 등)의 T/F를 각각 최소 1번씩 통과해야 해요. ← <u>이번 문제</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>조건(Condition) 커버리지</b></td><td style="text-align:left;vertical-align:middle">결정문 안 개별 원자 조건식 각각이 T/F를 최소 1번씩 가져야 해요. 결정문 전체 T/F는 보장하지 않아요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>MC/DC</b></td><td style="text-align:left;vertical-align:middle">각 조건이 독립적으로 전체 결정에 영향을 미치는 경우만 선별해요. 항공·자동차 안전 시스템에서 의무 적용해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>경로(Path) 커버리지</b></td><td style="text-align:left;vertical-align:middle">가능한 모든 실행 경로를 테스트해요. 루프가 있으면 경로가 무한해져서 실제 적용이 어려워요.</td></tr><tr><td colspan="2" style="color:var(--c-text2);font-style:italic;border-top:1px dashed var(--c-border2)">📝 강도 순서: 문장 &lt; 분기 &lt; 조건 &lt; 조건/결정 &lt; 다중 조건 &lt; MC/DC</td></tr></table></div></div>` },
  { id:'20_3_7', year:'2020', round:'3회', cat:'SQL문',
    qHtml:`<div class="q-text">아래 성적 테이블에서 과목별 점수 평균이 90점 이상인 과목이름, 최소점수, 최대점수를 구하는 SQL 문을 작성하시오.<br><br>조건: WHERE 사용 금지 · GROUP BY·HAVING 필수 · 별칭(AS) 사용<br><br><div class="tbl-wrap"><table class="db-table"><tr><th>과목코드</th><th>과목이름</th><th>점수</th></tr><tr><td>1000</td><td>컴퓨터과학</td><td>95</td></tr><tr><td>2000</td><td>운영체제</td><td>85</td></tr><tr><td>1000</td><td>컴퓨터과학</td><td>85</td></tr><tr><td>2000</td><td>운영체제</td><td>80</td></tr></table></div>`,
    ansHtml:`<div class="answer-val">SELECT 과목이름, MIN(점수) AS 최소점수, MAX(점수) AS 최대점수 FROM 성적 GROUP BY 과목이름 HAVING AVG(점수) &gt;= 90</div><div class="keyword-detail">📌 <b>풀이</b><br>GROUP BY로 과목별 그룹화하고 HAVING으로 그룹 평균 조건을 필터링해요. WHERE 사용 금지이므로 집계 조건은 반드시 HAVING을 사용해요.<br><br>📎 <b>GROUP BY / HAVING 관련 키워드</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>GROUP BY</b></td><td style="text-align:left;vertical-align:middle">지정 컬럼을 기준으로 그룹화해요. 집계 함수(COUNT·SUM·AVG·MAX·MIN)와 함께 사용해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>HAVING</b></td><td style="text-align:left;vertical-align:middle">GROUP BY 이후 집계 결과에 조건을 적용해요. WHERE에는 집계 함수 사용 불가해요. ← <u>이번 문제 핵심</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>WHERE vs HAVING</b></td><td style="text-align:left;vertical-align:middle">WHERE: 개별 행 필터(GROUP BY 전). HAVING: 그룹 결과 필터(GROUP BY 후).</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>AS (별칭)</b></td><td style="text-align:left;vertical-align:middle">컬럼이나 테이블에 별칭(Alias)을 붙여요. MIN(점수) AS 최소점수처럼 사용해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>집계 함수 NULL</b></td><td style="text-align:left;vertical-align:middle">AVG·SUM·MIN·MAX는 NULL을 제외하고 계산해요. COUNT(*)만 NULL 포함.</td></tr></table></div></div>` },
  { id:'20_3_8', year:'2020', round:'3회', cat:'SQL문',
    qHtml:`<div class="q-text">학생 테이블에서 이름이 '민수'인 튜플을 삭제하는 SQL 문을 작성하시오. (문자열은 작은따옴표 사용)</div>`,
    ansHtml:`<div class="answer-val">DELETE FROM 학생 WHERE 이름 = '민수';</div><div class="keyword-detail">📌 <b>풀이</b><br><b>DELETE</b>는 조건에 맞는 행을 삭제하는 DML 명령어예요. WHERE 절로 삭제 조건을 지정해요. 문자열은 작은따옴표를 사용해요.<br><br>📎 <b>데이터 삭제 SQL 비교</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>DELETE FROM...WHERE</b></td><td style="text-align:left;vertical-align:middle">DML. 조건 행만 삭제. 롤백 가능. ← <u>이번 문제</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>TRUNCATE TABLE</b></td><td style="text-align:left;vertical-align:middle">DDL. 전체 행 삭제. 롤백 불가. DROP 후 재생성처럼 동작. DELETE보다 빠름.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>DROP TABLE</b></td><td style="text-align:left;vertical-align:middle">DDL. 테이블 자체(구조+데이터) 삭제.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>WHERE 절 없는 DELETE</b></td><td style="text-align:left;vertical-align:middle">전체 행이 삭제돼요. TRUNCATE보다 느리지만 롤백 가능.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>문자열 비교</b></td><td style="text-align:left;vertical-align:middle">SQL에서 문자열은 작은따옴표('')로 감싸요.</td></tr></table></div></div>` },
  { id:'20_3_9', year:'2020', round:'3회', cat:'데이터베이스',
    qHtml:`<div class="q-text">관계 대수에서 릴레이션 B의 조건에 맞는 것들만 릴레이션 A에서 튜플을 꺼내 프로젝션하는 연산에 해당하는 기호를 쓰시오.</div>`,
    ansHtml:`<div class="answer-val">÷ (나누기, Division)</div><div class="keyword-detail">📌 <b>풀이</b><br>관계 대수의 <b>디비전(÷)</b>은 "B의 모든 값과 짝이 이루어지는 A의 튜플"을 찾아요. "모든 과목을 수강한 학생"처럼 "전부 포함하는" 조건을 표현할 때 사용해요.<br><br>📎 <b>관계 대수 연산자 정리</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>÷ (디비전, Division)</b></td><td style="text-align:left;vertical-align:middle">S의 모든 튜플과 쌍이 되는 R의 튜플만 추출해요. "전부 포함하는" 조건 표현에 사용. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>σ (셀렉트)</b></td><td style="text-align:left;vertical-align:middle">조건을 만족하는 행 선택. SQL의 WHERE.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>π (프로젝트)</b></td><td style="text-align:left;vertical-align:middle">지정한 열만 추출·중복 제거. SQL의 SELECT DISTINCT.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>⋈ (조인)</b></td><td style="text-align:left;vertical-align:middle">두 릴레이션을 공통 속성으로 연결. SQL의 JOIN.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>∪ / − / ×</b></td><td style="text-align:left;vertical-align:middle">∪(합집합), −(차집합), ×(카티션 곱, CROSS JOIN).</td></tr></table></div></div>` },
  { id:'20_3_10', year:'2020', round:'3회', cat:'기타 용어',
    qHtml:`<div class="q-text">식별자 표기 시 접두어에 자료형을 붙이는 표기법의 명칭을 쓰시오. (예: szGoodMan에서 sz는 문자열 자료형을 나타냄)</div>`,
    ansHtml:`<div class="answer-val">헝가리안 표기법 (Hungarian Notation)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>헝가리안 표기법</b>은 변수명 앞에 자료형을 나타내는 접두어를 붙이는 식별자 명명 규칙이에요. <code>szName</code>에서 <code>sz</code>는 null 종료 문자열을 의미해요.<br><br>📎 <b>식별자 표기법 비교</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>헝가리안 표기법</b></td><td style="text-align:left;vertical-align:middle">접두어에 자료형을 붙여요. szName(문자열), nAge(정수), bFlag(불리언). ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>카멜 케이스(camelCase)</b></td><td style="text-align:left;vertical-align:middle">첫 단어는 소문자, 이후 단어는 대문자 시작. goodMan, userName. Java 변수·메서드에 주로 사용.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>파스칼 케이스(PascalCase)</b></td><td style="text-align:left;vertical-align:middle">모든 단어를 대문자로 시작. GoodMan, UserName. Java 클래스명에 주로 사용.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>스네이크 케이스(snake_case)</b></td><td style="text-align:left;vertical-align:middle">단어를 언더스코어(_)로 연결. good_man, user_name. Python·데이터베이스 컬럼에 주로 사용.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>케밥 케이스(kebab-case)</b></td><td style="text-align:left;vertical-align:middle">단어를 하이픈(-)으로 연결. good-man, user-name. CSS·URL에 주로 사용.</td></tr></table></div></div>` },
  { id:'20_3_11', year:'2020', round:'3회', cat:'SQL문',
    qHtml:`<div class="q-text">학생 테이블에 주소 속성을 추가하는 SQL 문의 빈칸을 채우시오.<br><br><div class="sql-box">( ① ) TABLE 학생 ( ② ) 주소 VARCHAR(20);</div>`,
    ansHtml:`<div class="answer-val">① ALTER &nbsp;&nbsp; ② ADD</div><div class="keyword-detail">📌 <b>풀이</b><br><b>ALTER TABLE</b>은 기존 테이블 구조를 변경하는 DDL 명령어예요. <b>ADD</b>로 컬럼을 추가, MODIFY로 컬럼을 변경, DROP COLUMN으로 컬럼을 삭제해요.<br><br>📎 <b>DDL ALTER TABLE 활용</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>ALTER TABLE...ADD</b></td><td style="text-align:left;vertical-align:middle">새 컬럼을 추가해요. <code>ALTER TABLE 학생 ADD 주소 VARCHAR(20)</code>. ← <u>정답①②</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>ALTER TABLE...MODIFY</b></td><td style="text-align:left;vertical-align:middle">기존 컬럼의 데이터 타입·크기·제약조건을 변경해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>ALTER TABLE...DROP COLUMN</b></td><td style="text-align:left;vertical-align:middle">기존 컬럼을 삭제해요. 해당 컬럼의 모든 데이터도 함께 삭제돼요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>ALTER TABLE...RENAME</b></td><td style="text-align:left;vertical-align:middle">컬럼 이름을 변경해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>DDL vs DML</b></td><td style="text-align:left;vertical-align:middle">DDL(CREATE·ALTER·DROP·TRUNCATE): 구조 정의, 자동 COMMIT. DML(SELECT·INSERT·UPDATE·DELETE): 데이터 조작.</td></tr></table></div></div>` },

  // ─── 2020년 2회 ───
  { id:'20_2_1', year:'2020', round:'2회', cat:'데이터베이스',
    qHtml:`<div class="q-text">비상사태 또는 업무 중단 시점부터 서비스가 복구되어 정상 가동될 때까지의 시간을 의미하는 용어의 영문 약자를 쓰시오.</div>`,
    ansHtml:`<div class="answer-val">RTO (Recovery Time Objective, 재해 복구 시간 목표)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>RTO(복구 시간 목표)</b>는 장애 발생 후 서비스가 정상 복구될 때까지의 최대 허용 시간이에요. "얼마나 빨리 복구해야 하는가?"를 정의해요.<br><br>📎 <b>RTO / RPO 비교</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>RTO (Recovery Time Objective)</b></td><td style="text-align:left;vertical-align:middle">재해 발생 후 시스템이 정상 복구되기까지의 최대 허용 시간이에요. RTO가 짧을수록 빠른 복구 체계가 필요해요. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>RPO (Recovery Point Objective)</b></td><td style="text-align:left;vertical-align:middle">재해 발생 시 허용할 수 있는 최대 데이터 손실 시간이에요. RPO=1시간이면 1시간 전 백업까지만 손실 허용.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>BCP (Business Continuity Plan)</b></td><td style="text-align:left;vertical-align:middle">업무 연속성 계획. 재해 발생 시에도 핵심 업무를 지속할 수 있도록 하는 계획이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>DRS (Disaster Recovery System)</b></td><td style="text-align:left;vertical-align:middle">재해 복구 시스템이에요. 핫사이트(즉시 전환), 웜사이트(수 시간), 콜드사이트(수 일) 유형이 있어요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>고가용성(HA)</b></td><td style="text-align:left;vertical-align:middle">High Availability. 시스템이 오랫동안 중단 없이 운영되도록 하는 설계예요. 이중화·클러스터링으로 구현해요.</td></tr></table></div></div>` },
  { id:'20_2_2', year:'2020', round:'2회', cat:'기타 용어',
    qHtml:`<div class="q-text">XMLHttpRequest 객체를 이용해 전체 페이지를 새로고침하지 않고 페이지 일부 데이터만 비동기적으로 로드하는 웹 개발 기법의 명칭을 쓰시오.</div>`,
    ansHtml:`<div class="answer-val">AJAX (Asynchronous JavaScript and XML)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>AJAX</b>는 웹 페이지 전체를 새로고침하지 않고 필요한 데이터만 서버에서 가져오는 비동기 웹 통신 기술이에요. XMLHttpRequest 객체를 이용해서 페이지 일부만 동적으로 갱신해요.<br><br>📎 <b>같이 알아두면 좋은 키워드</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>XMLHttpRequest (XHR)</b></td><td style="text-align:left;vertical-align:middle">AJAX를 구현하는 JavaScript 객체예요. 비동기 HTTP 요청을 보내고 응답을 처리해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>fetch API</b></td><td style="text-align:left;vertical-align:middle">최신 비동기 HTTP 요청 방식이에요. Promise 기반으로 XHR보다 간결하게 작성할 수 있어요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>비동기(Asynchronous)</b></td><td style="text-align:left;vertical-align:middle">요청 후 응답을 기다리지 않고 다른 작업을 계속하다가 응답이 오면 처리해요. AJAX의 핵심이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>SPA (Single Page Application)</b></td><td style="text-align:left;vertical-align:middle">AJAX를 활용해 페이지 전환 없이 데이터만 갱신하는 웹앱이에요. React·Vue·Angular로 개발해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>JSON</b></td><td style="text-align:left;vertical-align:middle">AJAX에서 XML 대신 주로 사용하는 경량 데이터 형식이에요.</td></tr></table></div></div>` },
  { id:'20_2_3', year:'2020', round:'2회', cat:'SW 개발/계획',
    qHtml:`<div class="q-text">절차보다 사람 중심으로 변화에 유연·신속하게 적응하면서 효율적으로 시스템을 개발하는 신속 적응적 경량 개발 방법론의 명칭을 쓰시오. (워터폴 방법론에 대비되는 개념)</div>`,
    ansHtml:`<div class="answer-val">애자일(Agile) 방법론</div><div class="keyword-detail">📌 <b>풀이</b><br><b>애자일(Agile)</b>은 절차보다 사람 중심으로, 변화에 유연하게 적응하면서 반복·점진적으로 소프트웨어를 개발하는 방법론이에요. 2001년 애자일 선언문으로 공식화됐어요.<br><br>📎 <b>애자일 관련 키워드</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>애자일 4대 가치</b></td><td style="text-align:left;vertical-align:middle">개인과 상호작용 > 프로세스·도구. 작동하는 소프트웨어 > 포괄적 문서. 고객과의 협력 > 계약 협상. 변화에 대응 > 계획 준수.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Scrum</b></td><td style="text-align:left;vertical-align:middle">애자일의 대표 프레임워크예요. Sprint(2~4주 반복), Sprint Backlog, Daily Standup, Retrospective로 구성해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>XP (eXtreme Programming)</b></td><td style="text-align:left;vertical-align:middle">페어 프로그래밍·TDD·지속적 통합 등의 실천 기법을 강조해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Kanban</b></td><td style="text-align:left;vertical-align:middle">칸반 보드로 작업 흐름을 시각화해요. WIP(진행 중 작업) 제한으로 흐름을 최적화해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>워터폴(Waterfall) 비교</b></td><td style="text-align:left;vertical-align:middle">워터폴: 순차적·계획 중심·변경 어려움. 애자일: 반복적·적응 중심·변경 수용. 요구사항이 불명확할수록 애자일이 유리해요.</td></tr></table></div></div>` },
  { id:'20_2_4', year:'2020', round:'2회', cat:'SQL문',
    qHtml:`<div class="q-text">아래 학생 테이블에서 3·4학년인 학번, 이름을 조회하는 SQL 문을 IN 연산자를 사용하여 작성하시오.<br><br><div class="tbl-wrap"><table class="db-table"><tr><th>학번</th><th>이름</th><th>학년</th></tr><tr><td>3000</td><td>허이름</td><td>3</td></tr><tr><td>4000</td><td>조이름</td><td>4</td></tr></table></div>`,
    ansHtml:`<div class="answer-val">SELECT 학번, 이름 FROM 학생 WHERE 학년 IN (3, 4);</div><div class="keyword-detail">📌 <b>풀이</b><br><b>IN 연산자</b>는 여러 값 중 하나에 해당하면 참이에요. <code>학년 IN (3, 4)</code>는 <code>학년=3 OR 학년=4</code>와 동일하지만 더 간결해요.<br><br>📎 <b>SQL IN 연산자와 관련 키워드</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>IN 연산자</b></td><td style="text-align:left;vertical-align:middle">여러 값 목록 중 하나와 일치하면 참이에요. = ANY와 동일해요. ← <u>이번 문제</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>NOT IN</b></td><td style="text-align:left;vertical-align:middle">IN의 반대예요. 목록에 없는 값만 반환해요. NULL이 포함된 경우 주의해야 해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>BETWEEN</b></td><td style="text-align:left;vertical-align:middle">범위 조건이에요. <code>학년 BETWEEN 3 AND 4</code>는 3 이상 4 이하예요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>EXISTS</b></td><td style="text-align:left;vertical-align:middle">서브쿼리 결과가 존재하면 참이에요. IN보다 대용량에서 효율적일 수 있어요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>NULL과 IN</b></td><td style="text-align:left;vertical-align:middle">NULL은 IN/NOT IN 연산에서 특별히 처리돼요. NOT IN에 NULL이 있으면 항상 FALSE가 나와서 주의해야 해요.</td></tr></table></div></div>` },
  { id:'20_2_5', year:'2020', round:'2회', cat:'데이터베이스',
    qHtml:`<div class="q-text">트랜잭션 Rollback에 대해 설명하시오.</div>`,
    ansHtml:`<div class="answer-val">트랜잭션 처리 중 오류 발생 시, 이전 특정 시점(Savepoint/Checkpoint) 상태로 되돌려주는 TCL 명령어</div><div class="keyword-detail">📌 <b>풀이</b><br><b>ROLLBACK</b>은 트랜잭션 처리 중 오류 발생 시 이전 상태로 되돌리는 TCL 명령어예요. COMMIT하지 않은 모든 변경을 취소해요.<br><br>📎 <b>TCL (Transaction Control Language)</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>ROLLBACK</b></td><td style="text-align:left;vertical-align:middle">트랜잭션의 변경 사항을 취소하고 이전 상태로 되돌려요. COMMIT 전에만 가능해요. ← <u>이번 문제</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>COMMIT</b></td><td style="text-align:left;vertical-align:middle">트랜잭션의 변경 사항을 DB에 영구 반영해요. COMMIT 후에는 ROLLBACK 불가해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>SAVEPOINT</b></td><td style="text-align:left;vertical-align:middle">트랜잭션 내에 중간 저장점을 만들어요. ROLLBACK TO SAVEPOINT명으로 특정 시점으로만 되돌릴 수 있어요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>TCL vs DDL</b></td><td style="text-align:left;vertical-align:middle">DDL(CREATE·DROP·TRUNCATE)은 자동 COMMIT이 적용되어 ROLLBACK이 불가해요. DML(INSERT·UPDATE·DELETE)만 ROLLBACK 가능해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>트랜잭션 격리</b></td><td style="text-align:left;vertical-align:middle">ROLLBACK은 현재 트랜잭션의 변경만 취소해요. 다른 트랜잭션에는 영향을 주지 않아요.</td></tr></table></div></div>` },
  { id:'20_2_6', year:'2020', round:'2회', cat:'정보보안',
    qHtml:`<div class="q-text">무결성·인증을 보장하는 인증 헤더(AH)와 기밀성을 보장하는 암호화(ESP)로 구성된 네트워크 계층 보안 프로토콜의 영문 약자를 쓰시오.</div>`,
    ansHtml:`<div class="answer-val">IPSec (Internet Protocol Security)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>IPSec</b>은 네트워크 계층(Layer 3)에서 IP 패킷을 암호화하고 인증하는 보안 프로토콜이에요. <b>AH</b>는 인증·무결성, <b>ESP</b>는 암호화+인증을 담당해요.<br><br>📎 <b>IPSec 구성 요소</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>AH (Authentication Header)</b></td><td style="text-align:left;vertical-align:middle">인증과 무결성을 제공해요. 데이터 변조 여부를 검증하지만 암호화는 없어요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>ESP (Encapsulating Security Payload)</b></td><td style="text-align:left;vertical-align:middle">암호화와 인증을 모두 제공해요. 데이터 기밀성 보장이 필요할 때 사용해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>터널 모드 vs 전송 모드</b></td><td style="text-align:left;vertical-align:middle">터널 모드: IP 패킷 전체를 새 IP 헤더로 감싸요. VPN에서 사용. 전송 모드: IP 헤더는 그대로, 페이로드만 보호해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>IKE (Internet Key Exchange)</b></td><td style="text-align:left;vertical-align:middle">IPSec에서 암호화 키를 안전하게 교환하는 프로토콜이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>VPN과의 관계</b></td><td style="text-align:left;vertical-align:middle">IPSec은 VPN 구현에 핵심적으로 사용돼요. SSL/TLS VPN은 응용 계층에서 동작해요.</td></tr></table></div></div>` },
  { id:'20_2_7', year:'2020', round:'2회', cat:'정보보안',
    qHtml:`<div class="q-text">응용 프로그램의 보안 취약점을 이용하여 악의적인 SQL 구문을 삽입·실행시켜 데이터베이스에 무단으로 접근하고 정보를 탈취하거나 조작하는 공격 기법의 명칭을 쓰시오.</div>`,
    ansHtml:`<div class="answer-val">SQL Injection (SQL 삽입 공격)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>SQL Injection</b>은 악의적인 SQL 구문을 입력값에 삽입해서 DB를 무단으로 조작하는 공격이에요. 로그인 폼에 <code>' OR '1'='1</code>처럼 입력해서 인증을 우회할 수 있어요.<br><br>📎 <b>같이 알아두면 좋은 키워드</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>SQL Injection 공격 원리</b></td><td style="text-align:left;vertical-align:middle">입력값 검증 없이 SQL 쿼리에 직접 사용하면 공격자가 쿼리를 변조할 수 있어요. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>파라미터화 쿼리(Prepared Statement)</b></td><td style="text-align:left;vertical-align:middle">가장 효과적인 SQL Injection 방어책이에요. 입력값을 쿼리와 분리해서 처리해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>입력값 검증(Input Validation)</b></td><td style="text-align:left;vertical-align:middle">특수문자('·"·;·--)를 필터링하거나 이스케이프 처리해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>ORM (Object-Relational Mapping)</b></td><td style="text-align:left;vertical-align:middle">파라미터화 쿼리를 자동으로 사용해서 SQL Injection을 방지해요. Hibernate·JPA·SQLAlchemy가 대표예요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>최소 권한 원칙</b></td><td style="text-align:left;vertical-align:middle">DB 계정에 필요한 최소한의 권한만 부여해요. 공격 성공 시 피해를 최소화해요.</td></tr></table></div></div>` },
  { id:'20_2_8', year:'2020', round:'2회', cat:'운영체제',
    qHtml:`<div class="q-text">아래 조건에 맞게 a.txt 파일에 권한을 부여하는 명령어를 8진법으로 한 줄로 작성하시오.<br><br>· 사용자(Owner): 읽기·쓰기·실행 (rwx=7)<br>· 그룹(Group): 읽기·실행 (r-x=5)<br>· 기타(Others): 실행 (--x=1)</div>`,
    ansHtml:`<div class="answer-val">chmod 751 a.txt</div><div class="keyword-detail">📌 <b>풀이</b><br>리눅스 파일 권한을 8진수로 설정해요. 사용자(Owner) rwx=4+2+1=<b>7</b>, 그룹(Group) r-x=4+0+1=<b>5</b>, 기타(Other) --x=0+0+1=<b>1</b> → chmod <b>751</b>이에요.<br><br>📎 <b>리눅스 파일 권한 체계</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>chmod 751</b></td><td style="text-align:left;vertical-align:middle">사용자: rwx(7), 그룹: r-x(5), 기타: --x(1). ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>8진수 계산</b></td><td style="text-align:left;vertical-align:middle">r=4, w=2, x=1의 합. rwx=7, rw-=6, r-x=5, r--=4, --x=1, ---=0.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>chmod 644</b></td><td style="text-align:left;vertical-align:middle">일반 파일 기본 권한. 소유자: rw-(6), 그룹: r--(4), 기타: r--(4).</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>chmod 755</b></td><td style="text-align:left;vertical-align:middle">실행 파일·디렉토리 기본 권한. 소유자: rwx(7), 그룹: r-x(5), 기타: r-x(5).</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>심볼릭 표기법</b></td><td style="text-align:left;vertical-align:middle">chmod u+x파일처럼 문자로도 표현해요. u=소유자, g=그룹, o=기타, a=전체.</td></tr></table></div></div>` },
  { id:'20_2_9', year:'2020', round:'2회', cat:'SW 개발/계획',
    qHtml:`<div class="q-text">소프트웨어 개발 과정에서 변경 사항을 관리하는 기법의 명칭을 쓰시오. (CVS, SVN, Git 등이 대표적인 도구이다.)</div>`,
    ansHtml:`<div class="answer-val">형상 관리 (Configuration Management, SCM)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>형상 관리(SCM)</b>는 소프트웨어 개발 과정에서 변경 사항을 체계적으로 관리하고 버전을 추적하는 기법이에요. CVS·SVN·Git이 대표 도구예요.<br><br>📎 <b>형상 관리 절차와 도구</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>형상 식별</b></td><td style="text-align:left;vertical-align:middle">관리 대상 항목(소스 코드·문서·설정 파일 등)을 식별하고 번호를 부여해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>형상 통제(변경 관리)</b></td><td style="text-align:left;vertical-align:middle">변경 요청을 검토·승인·거부하고 변경 이력을 관리해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>형상 감사</b></td><td style="text-align:left;vertical-align:middle">변경된 항목이 기준선(Baseline)에 맞게 구현됐는지 검증해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>형상 기록(상태 기록)</b></td><td style="text-align:left;vertical-align:middle">형상 항목의 현재 상태와 변경 이력을 문서화해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Git / SVN / CVS</b></td><td style="text-align:left;vertical-align:middle">Git: 분산식, 브랜치 강력. SVN: 중앙 집중식. CVS: 구버전 중앙 집중식. Git이 현재 표준이에요.</td></tr></table></div></div>` },
  { id:'20_2_10', year:'2020', round:'2회', cat:'SW 개발/계획',
    qHtml:`<div class="q-text">한 객체의 상태가 바뀌면 그 객체에 의존하는 다른 객체들에게 자동으로 알림이 가고 내용이 갱신되는 일대다(1:N) 의존성을 가진 행위 패턴의 영문 풀네임을 쓰시오.</div>`,
    ansHtml:`<div class="answer-val">Observer Pattern (옵서버 패턴)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>Observer 패턴</b>은 한 객체(Subject)의 상태가 변하면 그 객체에 의존하는 모든 객체(Observer)에게 자동으로 알림이 가고 내용이 갱신되는 1:N 의존성 패턴이에요.<br><br>📎 <b>Observer 패턴 상세</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Subject (주체)</b></td><td style="text-align:left;vertical-align:middle">상태를 가지고 있고, 변화 시 Observer에게 알리는 역할이에요. Observable이라고도 해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Observer (관찰자)</b></td><td style="text-align:left;vertical-align:middle">Subject의 변화를 통보받아 자신의 상태를 갱신해요. Listener·Handler라고도 해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>느슨한 결합(Loose Coupling)</b></td><td style="text-align:left;vertical-align:middle">Subject와 Observer는 인터페이스로만 연결돼요. 서로 독립적으로 변경·확장할 수 있어요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Pub/Sub 모델</b></td><td style="text-align:left;vertical-align:middle">Observer 패턴의 확장이에요. 발행자(Publisher)와 구독자(Subscriber) 사이에 메시지 브로커가 있어요. Kafka·RabbitMQ가 대표예요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>이벤트 시스템</b></td><td style="text-align:left;vertical-align:middle">JavaScript의 addEventListener, Java의 EventListener가 Observer 패턴의 구현이에요.</td></tr></table></div></div>` },
  { id:'20_2_11', year:'2020', round:'2회', cat:'SQL문',
    qHtml:`<div class="q-text">학생 테이블의 NAME 속성에 'IDX_NAME'이라는 이름으로 인덱스를 생성하는 SQL 문을 작성하시오.</div>`,
    ansHtml:`<div class="answer-val">CREATE INDEX IDX_NAME ON 학생(NAME);</div><div class="keyword-detail">📌 <b>풀이</b><br><b>인덱스(Index)</b>는 검색 속도를 높이기 위한 자료구조예요. <code>CREATE INDEX 인덱스명 ON 테이블(컬럼)</code> 형태로 생성해요.<br><br>📎 <b>인덱스 관련 키워드</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>CREATE INDEX</b></td><td style="text-align:left;vertical-align:middle">인덱스를 생성하는 DDL 명령어예요. <code>CREATE INDEX IDX_NAME ON 학생(NAME)</code>처럼 사용해요. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>B-Tree 인덱스</b></td><td style="text-align:left;vertical-align:middle">가장 많이 사용하는 인덱스 자료구조예요. O(log n) 탐색 속도를 보장하고 범위 검색에도 효율적이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>클러스터형 인덱스</b></td><td style="text-align:left;vertical-align:middle">인덱스 순서대로 데이터를 물리적으로 정렬해요. 테이블당 1개만 가능.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>비클러스터형 인덱스</b></td><td style="text-align:left;vertical-align:middle">데이터 순서와 무관하게 포인터로 접근해요. 테이블당 여러 개 가능.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>인덱스 단점</b></td><td style="text-align:left;vertical-align:middle">쓰기(INSERT·UPDATE·DELETE) 성능이 저하돼요. 인덱스 자체도 저장 공간을 차지해요. 자주 변경되는 컬럼에는 신중히 적용해야 해요.</td></tr></table></div></div>` },

  // ─── 2020년 1회 ───
  { id:'20_1_1', year:'2020', round:'1회', cat:'SW 개발/계획',
    qHtml:`<div class="q-text">동일한 테스트 케이스를 반복 적용하면 더 이상 새로운 결함을 발견하지 못하게 되는 테스트 원리의 명칭을 서술하시오.</div>`,
    ansHtml:`<div class="answer-val">살충제 패러독스 (Pesticide Paradox)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>살충제 패러독스</b>는 동일한 테스트 케이스를 반복 적용하면 더 이상 새로운 결함을 발견하지 못하게 되는 현상이에요. 살충제를 계속 뿌리면 내성이 생기는 것처럼, 테스트도 주기적으로 케이스를 보완해야 해요.<br><br>📎 <b>소프트웨어 테스트 7원리</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>살충제 패러독스</b></td><td style="text-align:left;vertical-align:middle">동일 테스트 케이스 반복 시 더 이상 새 결함 발견 불가. 주기적으로 테스트 케이스를 보완·갱신해야 해요. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>테스팅은 결함 존재를 보여줌</b></td><td style="text-align:left;vertical-align:middle">테스트는 결함이 없음을 증명하지 못해요. 결함이 존재함을 보여줄 뿐이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>완벽한 테스팅 불가능</b></td><td style="text-align:left;vertical-align:middle">입력·사전 조건의 조합이 무한해서 완전한 테스트는 불가능해요. 위험 분석으로 우선순위를 정해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>결함 집중(Defect Clustering)</b></td><td style="text-align:left;vertical-align:middle">결함은 소수의 특정 모듈에 집중되는 경향이 있어요. 파레토 법칙(80-20 법칙)이 적용돼요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>테스팅은 조기 시작</b></td><td style="text-align:left;vertical-align:middle">테스트는 개발 초기부터 시작해야 해요. 결함을 일찍 발견할수록 수정 비용이 낮아져요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>테스팅은 정황(Context) 의존적</b></td><td style="text-align:left;vertical-align:middle">테스트는 소프트웨어의 특성·목적·환경에 따라 다르게 수행해야 해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>오류 부재의 궤변</b></td><td style="text-align:left;vertical-align:middle">결함이 없더라도 사용자 요구사항을 만족하지 못하면 품질이 낮은 소프트웨어예요.</td></tr></table></div></div>` },
  { id:'20_1_2', year:'2020', round:'1회', cat:'기타 용어',
    qHtml:`<div class="q-text">대규모로 저장된 데이터 안에서 체계적이고 자동적으로 통계적 규칙이나 패턴을 찾아내는 기술의 명칭을 서술하시오.</div>`,
    ansHtml:`<div class="answer-val">데이터 마이닝 (Data Mining)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>데이터 마이닝</b>은 대규모 데이터에서 통계·AI 기법으로 숨겨진 패턴·규칙·관계를 자동으로 발견하는 기술이에요. 마치 광산(Mine)에서 금을 캐듯 데이터에서 가치 있는 정보를 추출해요.<br><br>📎 <b>데이터 마이닝 기법</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>분류(Classification)</b></td><td style="text-align:left;vertical-align:middle">미리 정의된 클래스로 데이터를 분류해요. 스팸 메일 분류, 질병 진단이 예시예요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>군집화(Clustering)</b></td><td style="text-align:left;vertical-align:middle">유사한 데이터끼리 그룹으로 묶어요. 고객 세분화, 문서 분류가 예시예요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>연관 규칙(Association Rule)</b></td><td style="text-align:left;vertical-align:middle">함께 발생하는 데이터 간 관계를 찾아요. "맥주를 사면 기저귀도 산다"처럼요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>패턴 인식(Pattern Recognition)</b></td><td style="text-align:left;vertical-align:middle">데이터에서 반복되는 패턴을 찾아요. 얼굴 인식, 손글씨 인식이 예시예요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>빅데이터와의 관계</b></td><td style="text-align:left;vertical-align:middle">빅데이터(대용량 데이터)를 처리하고 분석하는 핵심 기법이에요. Hadoop·Spark 등의 플랫폼과 함께 사용해요.</td></tr></table></div></div>` },
  { id:'20_1_3', year:'2020', round:'1회', cat:'네트워크',
    qHtml:`<div class="q-text">프로토콜(Protocol)의 기본 요소 3가지를 쓰시오.</div>`,
    ansHtml:`<div class="answer-val">구문(Syntax), 의미(Semantics), 순서(Timing)</div><div class="keyword-detail">📌 <b>풀이</b><br>프로토콜의 3대 요소예요. <b>구문(Syntax)</b>은 데이터 형식, <b>의미(Semantics)</b>는 제어 정보·오류 처리 방법, <b>순서(Timing)</b>는 속도 조절·순서 관리를 정의해요.<br><br>📎 <b>프로토콜 3대 요소 상세</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>구문(Syntax)</b></td><td style="text-align:left;vertical-align:middle">데이터의 형식·부호화·신호 레벨을 정의해요. 어떻게 표현할지(What)를 다뤄요. ← <u>정답1</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>의미(Semantics)</b></td><td style="text-align:left;vertical-align:middle">오류 제어·조작을 위한 제어 정보를 정의해요. 어떤 의미인지·무엇을 할지(How)를 다뤄요. ← <u>정답2</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>순서(Timing)</b></td><td style="text-align:left;vertical-align:middle">속도 조절과 메시지 처리 순서를 정의해요. 언제(When)를 다뤄요. ← <u>정답3</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>프로토콜 예시</b></td><td style="text-align:left;vertical-align:middle">TCP/IP: 인터넷 표준 프로토콜. HTTP: 웹 통신. SMTP: 이메일 전송. FTP: 파일 전송. 각각 자신만의 구문·의미·순서 규칙을 가져요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>인터페이스 vs 프로토콜</b></td><td style="text-align:left;vertical-align:middle">인터페이스: 시스템 내부 연결 규칙. 프로토콜: 시스템 간(네트워크) 통신 규칙이에요.</td></tr></table></div></div>` },
  { id:'20_1_4', year:'2020', round:'1회', cat:'기타 용어',
    qHtml:`<div class="q-text">W3C에서 개발하였으며, SGML의 복잡함과 웹 브라우저 간 호환 문제를 해결하기 위해 개발된 다목적 마크업 언어의 영문 약자를 쓰시오.</div>`,
    ansHtml:`<div class="answer-val">XML (eXtensible Markup Language)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>XML</b>은 사용자가 직접 태그를 정의할 수 있는 마크업 언어예요. SGML을 단순화해서 웹 브라우저 간 호환성을 높였어요. 데이터의 의미와 구조를 함께 표현할 수 있어요.<br><br>📎 <b>마크업 언어 비교</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>XML (eXtensible Markup Language)</b></td><td style="text-align:left;vertical-align:middle">사용자 정의 태그. 데이터의 의미와 구조를 함께 표현해요. 웹 서비스(SOAP·WSDL)·설정 파일에 사용해요. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>HTML (HyperText Markup Language)</b></td><td style="text-align:left;vertical-align:middle">웹 페이지 표현에 특화된 마크업 언어예요. 정해진 태그만 사용하며 데이터 의미 표현 한계가 있어요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>SGML (Standard Generalized Markup Language)</b></td><td style="text-align:left;vertical-align:middle">XML의 부모 표준이에요. 복잡해서 XML이 단순화 버전으로 만들어졌어요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>JSON</b></td><td style="text-align:left;vertical-align:middle">XML보다 가볍고 파싱이 쉬운 데이터 교환 형식이에요. REST API에서 XML을 대체하는 추세예요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>DTD / XML Schema</b></td><td style="text-align:left;vertical-align:middle">XML 문서의 구조와 규칙을 정의하는 방법이에요. 유효성 검사에 사용해요.</td></tr></table></div></div>` },
  { id:'20_1_5', year:'2020', round:'1회', cat:'기타 용어',
    qHtml:`<div class="q-text">속성-값(Attribute-Value) 쌍으로 이루어진 데이터 객체를 전달하기 위한 개방형 표준 포맷으로, AJAX에서 많이 사용되며 XML을 대체하는 주요 데이터 포맷의 영문 약자를 쓰시오.</div>`,
    ansHtml:`<div class="answer-val">JSON (JavaScript Object Notation)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>JSON</b>은 속성-값(key-value) 쌍으로 이루어진 경량 데이터 교환 형식이에요. JavaScript에서 유래했지만 현재 모든 언어에서 사용해요. AJAX·REST API에서 XML 대신 주로 사용해요.<br><br>📎 <b>같이 알아두면 좋은 키워드</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>JSON 구조</b></td><td style="text-align:left;vertical-align:middle">{ "key": "value" } 형태의 객체, [ ] 형태의 배열로 구성해요. 문자열·숫자·불리언·null·객체·배열 6가지 타입을 지원해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>XML vs JSON</b></td><td style="text-align:left;vertical-align:middle">XML: 태그 기반, 무겁고 장황. JSON: 간결하고 파싱이 쉬움. REST API에서 JSON이 주류가 됐어요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>AJAX와 JSON</b></td><td style="text-align:left;vertical-align:middle">AJAX로 서버와 비동기 통신 시 JSON 형식으로 데이터를 주고받아요. JavaScript의 JSON.parse()·JSON.stringify()로 처리해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>REST API</b></td><td style="text-align:left;vertical-align:middle">JSON을 응답 형식으로 사용하는 웹 API 설계 방식이에요. HTTP 메서드(GET·POST·PUT·DELETE)로 자원을 조작해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>YAML</b></td><td style="text-align:left;vertical-align:middle">JSON과 유사한 데이터 직렬화 형식이에요. 사람이 읽기 더 쉬워서 설정 파일에 많이 사용해요.</td></tr></table></div></div>` },
  { id:'20_1_6', year:'2020', round:'1회', cat:'SQL문',
    qHtml:`<div class="q-text">STUDENT 테이블에 컴퓨터과 50명, 인터넷과 100명, 사무자동화과 50명의 정보가 있을 때, 각 SQL 실행 결과의 튜플 수를 쓰시오. (단, DEPT 칼럼은 학과명이다)<br><br><div class="sql-box">1) SELECT DEPT FROM STUDENT;
2) SELECT DISTINCT DEPT FROM STUDENT;
3) SELECT COUNT(DISTINCT DEPT) FROM STUDENT WHERE DEPT = '컴퓨터과';</div>`,
    ansHtml:`<div class="answer-val">1) 200 &nbsp;&nbsp; 2) 3 &nbsp;&nbsp; 3) 1</div><div class="keyword-detail">📌 <b>풀이</b><br>STUDENT 테이블에 컴퓨터과 50명, 인터넷과 100명, 사무자동화과 50명. <b>1)</b> 전체=200. <b>2)</b> DISTINCT로 중복 학과 제거→3개 학과. <b>3)</b> COUNT(학과)로 집계한 결과를 다시 COUNT→1.<br><br>📎 <b>SQL COUNT 활용</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>COUNT(*)</b></td><td style="text-align:left;vertical-align:middle">전체 행 수를 세요. 200명 전체. ← <u>정답1: 200</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>COUNT(DISTINCT 학과)</b></td><td style="text-align:left;vertical-align:middle">중복을 제거한 학과 수를 세요. 컴퓨터·인터넷·사무자동화 = 3개. ← <u>정답2: 3</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>중첩 집계 COUNT</b></td><td style="text-align:left;vertical-align:middle">집계 결과를 다시 COUNT하면 행이 1개이므로 1이에요. ← <u>정답3: 1</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>DISTINCT</b></td><td style="text-align:left;vertical-align:middle">중복을 제거하고 유일한 값만 반환해요. COUNT(DISTINCT 컬럼)처럼 집계 함수와 함께 사용해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>GROUP BY vs DISTINCT</b></td><td style="text-align:left;vertical-align:middle">GROUP BY: 그룹별 집계. DISTINCT: 중복 제거. 같은 결과를 내는 경우도 있지만 용도가 달라요.</td></tr></table></div></div>` },
  { id:'20_1_7', year:'2020', round:'1회', cat:'운영체제',
    qHtml:`<div class="q-text">HRN(Highest Response ratio Next) 스케줄링 기법의 우선순위 계산식을 쓰시오.</div>`,
    ansHtml:`<div class="answer-val">(대기 시간 + 서비스 시간) / 서비스 시간</div><div class="keyword-detail">📌 <b>풀이</b><br><b>HRN(Highest Response ratio Next)</b>은 SJF의 기아(Starvation) 문제를 보완한 CPU 스케줄링 알고리즘이에요. 대기 시간이 길수록 우선순위가 높아져서 무한 대기를 방지해요.<br><br>📎 <b>CPU 스케줄링 우선순위 계산</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>HRN 우선순위 공식</b></td><td style="text-align:left;vertical-align:middle">(대기 시간 + 서비스 시간) / 서비스 시간. 값이 클수록 먼저 실행돼요. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>HRN vs SJF</b></td><td style="text-align:left;vertical-align:middle">SJF: 실행 시간 짧은 것 우선 → 긴 작업은 기아 발생 가능. HRN: 대기 시간을 반영해서 기아를 방지해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>기아(Starvation)</b></td><td style="text-align:left;vertical-align:middle">우선순위가 낮은 프로세스가 영원히 실행되지 못하는 현상이에요. 에이징(Aging)으로 해결해요(대기 시간에 따라 우선순위 상승).</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>비선점형 스케줄링</b></td><td style="text-align:left;vertical-align:middle">HRN은 비선점형이에요. 한 번 CPU를 할당받으면 완료될 때까지 빼앗기지 않아요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>처리량(Throughput)</b></td><td style="text-align:left;vertical-align:middle">단위 시간당 완료된 프로세스 수예요. 스케줄링 알고리즘 성능 지표 중 하나예요.</td></tr></table></div></div>` },
  { id:'20_1_8', year:'2020', round:'1회', cat:'데이터베이스',
    qHtml:`<div class="q-text">트랜잭션의 4가지 특성(ACID) 중 일관성·지속성을 제외한 나머지 2가지 특성을 쓰시오.</div>`,
    ansHtml:`<div class="answer-val">원자성 (Atomicity), 독립성 (Isolation)</div><div class="keyword-detail">📌 <b>풀이</b><br>트랜잭션 ACID 4가지 중 일관성·지속성을 제외한 2가지예요. <b>원자성</b>은 All or Nothing, <b>독립성(격리성)</b>은 동시 실행 트랜잭션이 서로 영향을 주지 않아야 해요.<br><br>📎 <b>트랜잭션 ACID 4가지</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>원자성(Atomicity)</b></td><td style="text-align:left;vertical-align:middle">All or Nothing. 모든 연산이 완전히 실행되거나 전혀 실행되지 않아야 해요. ← <u>정답1</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>일관성(Consistency)</b></td><td style="text-align:left;vertical-align:middle">트랜잭션 전후로 DB가 항상 일관된 상태를 유지해야 해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>독립성/격리성(Isolation)</b></td><td style="text-align:left;vertical-align:middle">동시에 실행되는 트랜잭션들이 서로 영향을 주지 않아야 해요. ← <u>정답2</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>지속성(Durability)</b></td><td style="text-align:left;vertical-align:middle">성공적으로 커밋된 트랜잭션의 결과는 영구 보존돼야 해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>격리 수준(Isolation Level)</b></td><td style="text-align:left;vertical-align:middle">READ UNCOMMITTED → READ COMMITTED → REPEATABLE READ → SERIALIZABLE 순으로 격리 수준이 높아져요. 높을수록 동시성이 낮아져요.</td></tr></table></div></div>` },
  { id:'20_1_9', year:'2020', round:'1회', cat:'정보보안',
    qHtml:`<div class="q-text">공격자가 패킷의 출발지 주소를 목적지 주소와 동일하게 설정하여 공격 대상 컴퓨터의 실행 속도를 마비시키는 서비스 거부 공격의 명칭을 쓰시오.</div>`,
    ansHtml:`<div class="answer-val">랜드 어택 (Land Attack)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>랜드 어택(Land Attack)</b>은 패킷의 출발지 IP와 목적지 IP를 같은 값으로 설정해서 전송하는 DoS 공격이에요. 수신 시스템이 자기 자신에게 응답을 반복 전송하는 루프에 빠져 자원이 고갈돼요.<br><br>📎 <b>DoS 공격 유형 비교</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>랜드 어택(Land Attack)</b></td><td style="text-align:left;vertical-align:middle">출발지 IP = 목적지 IP로 패킷 전송. 시스템이 자기 자신에게 응답 루프에 빠져 자원이 고갈돼요. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>SYN Flooding</b></td><td style="text-align:left;vertical-align:middle">TCP 3-way Handshake에서 SYN만 대량 전송하고 ACK를 보내지 않아요. 서버의 연결 대기 큐를 가득 채워요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Ping of Death</b></td><td style="text-align:left;vertical-align:middle">비정상적으로 크기가 큰 ICMP 패킷을 전송해서 시스템을 마비시켜요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>스머프(Smurf) 공격</b></td><td style="text-align:left;vertical-align:middle">IP 스푸핑 + ICMP 브로드캐스트 조합이에요. 네트워크의 모든 장치가 피해자에게 응답을 보내 트래픽이 폭주해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>DoS vs DDoS</b></td><td style="text-align:left;vertical-align:middle">DoS: 단일 공격자. DDoS: 좀비 PC(봇넷) 수천 대 동시 공격. DDoS는 방어가 훨씬 어려워요.</td></tr></table></div></div>` },
  { id:'20_1_10', year:'2020', round:'1회', cat:'SW 개발/계획',
    qHtml:`<div class="q-text">공통 모듈 구현에서 모듈 간의 ( ① )은/는 줄이고, ( ② )은/는 높이는 것을 권장한다. ①②에 해당하는 용어를 쓰시오.</div>`,
    ansHtml:`<div class="answer-val">① 결합도 (Coupling) &nbsp;&nbsp; ② 응집도 (Cohesion)</div><div class="keyword-detail">📌 <b>풀이</b><br>좋은 모듈 설계는 <b>낮은 결합도</b>(모듈 간 의존 최소화)와 <b>높은 응집도</b>(모듈 내 관련성 최대화)를 목표로 해요. "밖은 약하게, 안은 강하게"로 기억하세요.<br><br>📎 <b>모듈 설계 원칙</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>결합도(Coupling) ↓</b></td><td style="text-align:left;vertical-align:middle">모듈 간 의존도예요. 낮을수록 독립적이고 유지보수가 쉬워요. 내용>공통>외부>제어>스탬프>자료 순으로 낮아져요. ← <u>정답①</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>응집도(Cohesion) ↑</b></td><td style="text-align:left;vertical-align:middle">모듈 내부 요소들의 관련성이에요. 높을수록 단일 기능에 집중해요. 기능>순차>교환>절차>시간>논리>우연 순으로 높아져요. ← <u>정답②</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>관계 기억법</b></td><td style="text-align:left;vertical-align:middle">"결합도는 낮게(Low Coupling), 응집도는 높게(High Cohesion)" - 좋은 모듈의 두 가지 조건이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>정보 은닉(Information Hiding)</b></td><td style="text-align:left;vertical-align:middle">모듈 내부 구현을 외부에 숨겨요. 낮은 결합도를 달성하는 핵심 원칙이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>단일 책임 원칙(SRP)</b></td><td style="text-align:left;vertical-align:middle">SOLID의 첫 번째 원칙. 클래스(모듈)는 단 하나의 변경 이유를 가져야 해요. 높은 응집도와 연결돼요.</td></tr></table></div></div>` },

  // ─── 2020년 1회 추가 누락 문항 ───
  { id:'20_1_11', year:'2020', round:'1회', cat:'정보보안',
    qHtml:`<div class="q-text">아래에서 설명하는 암호화 해시 함수의 명칭을 쓰시오.<br><br>· RFC 1321로 지정되어 있으며, 주로 프로그램이나 파일이 원본 그대로인지 확인하는 무결성 검사에 사용된다.<br>· 1991년 로널드 라이베스트(Ronald Rivest)가 기존 MD4를 대체하기 위해 개발한 128비트 암호화 해시 함수이다.</div>`,
    ansHtml:`<div class="answer-val">MD5 (Message-Digest Algorithm 5)</div><div class="keyword-detail">📌 <b>풀이</b><br><b>MD5</b>는 임의 길이 메시지를 128비트 해시값으로 변환하는 해시 함수예요. 파일 무결성 검증에 사용됐지만 충돌 취약점이 발견되어 현재는 보안 목적으로 사용하지 않아요.<br><br>📎 <b>해시 함수 비교</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>MD5 (Message-Digest 5)</b></td><td style="text-align:left;vertical-align:middle">128비트 해시값 출력. RFC 1321. 현재 충돌 취약점 발견으로 보안용으로는 부적합. 파일 무결성 검증에는 여전히 사용해요. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>SHA-1 (Secure Hash Algorithm 1)</b></td><td style="text-align:left;vertical-align:middle">160비트 해시값 출력. MD5보다 안전하지만 역시 충돌 공격이 발견되어 현재 권장하지 않아요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>SHA-256 / SHA-512</b></td><td style="text-align:left;vertical-align:middle">현재 권장 해시 함수예요. SHA-256은 256비트, SHA-512는 512비트 해시값을 출력해요. 비밀번호 저장·블록체인에 사용해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>해시 함수 특성</b></td><td style="text-align:left;vertical-align:middle">단방향(복호화 불가), 동일 입력→동일 출력, 출력 길이 고정, 눈사태 효과(입력 1비트 변화→출력 전혀 달라짐)예요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>충돌(Collision)</b></td><td style="text-align:left;vertical-align:middle">서로 다른 입력이 같은 해시값을 갖는 현상이에요. MD5·SHA-1에서 충돌 공격이 가능해서 취약해요.</td></tr></table></div></div>` },

  { id:'20_1_12', year:'2020', round:'1회', cat:'SW 개발/계획',
    qHtml:`<div class="q-text">아래는 릴리스 노트(Release Note)의 작성 항목에 대한 설명이다. 해당하는 항목의 명칭을 쓰시오.<br><br>· 문서 이름(릴리스 노트 이름), 제품 이름, 버전 번호, 릴리스 날짜, 참고 날짜, 노트 버전 등의 정보를 포함한다.</div>`,
    ansHtml:`<div class="answer-val">헤더 (Header)</div><div class="keyword-detail">📌 <b>풀이</b><br>릴리스 노트의 <b>헤더(Header)</b>는 문서 이름·제품명·버전·날짜·회사명·저작권 등 기본 식별 정보를 담은 첫 번째 항목이에요.<br><br>📎 <b>릴리스 노트 주요 항목</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>헤더(Header)</b></td><td style="text-align:left;vertical-align:middle">문서 이름, 제품명, 버전, 작성 날짜, 회사명, 저작권 등 기본 식별 정보예요. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>개요(Overview)</b></td><td style="text-align:left;vertical-align:middle">소프트웨어의 변경 사항에 대한 간략한 설명이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>목적(Purpose)</b></td><td style="text-align:left;vertical-align:middle">해당 릴리스의 목적과 주요 변경 내용을 설명해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>문제 요약(Issue Summary)</b></td><td style="text-align:left;vertical-align:middle">수정된 버그·개선 사항을 요약해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>수정/개선 내용</b></td><td style="text-align:left;vertical-align:middle">구체적인 버그 수정 내용과 개선 사항을 상세히 기술해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>사용자 영향도</b></td><td style="text-align:left;vertical-align:middle">이번 릴리스가 사용자에게 미치는 영향을 설명해요.</td></tr></table></div></div>` },

  { id:'20_1_13', year:'2020', round:'1회', cat:'SW 개발/계획',
    qHtml:`<div class="q-text">아래 조건에서 프로젝트 개발 기간(개월)과 계산식을 구하시오.<br><br>· 총 코드 라인 수(LoC): 30,000 라인<br>· 개발자 수: 5명<br>· 개발자 1인당 월평균 개발 라인 수: 300 라인</div>`,

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>정보처리기사 실기 — 랜덤 퀴즈</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Noto+Serif+KR:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
:root {
  --c-bg:       #F7F5F0;
  --c-surface:  #FFFFFF;
  --c-border:   #E8E4DC;
  --c-border2:  #D6D0C4;
  --c-text:     #1C1A16;
  --c-text2:    #6B6456;
  --c-text3:    #A09589;
  --c-accent:   #8B2635;
  --c-accent-l: #F2E8EA;
  --c-accent-m: #C4616E;
  --c-tag-sw:   #5B3A8C;  --c-tag-sw-l: #EDE8F7;
  --c-tag-db:   #1A5F9E;  --c-tag-db-l: #E4EEF8;
  --c-tag-os:   #2E6B3A;  --c-tag-os-l: #E5F2E7;
  --c-tag-net:  #915E10;  --c-tag-net-l:#FBF0DC;
  --c-tag-sec:  #8B2635;  --c-tag-sec-l:#F5E8EA;
  --c-tag-sql:  #186460;  --c-tag-sql-l:#E3F2F1;
  --c-tag-etc:  #4E4840;  --c-tag-etc-l:#EFECEA;
  --r: 10px;
  --r-sm: 6px;
  --shadow: 0 2px 12px rgba(28,26,22,.07);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--c-bg);
  color: var(--c-text);
  line-height: 1.7;
  min-height: 100vh;
}

/* ── 헤더 ── */
.site-header {
  background: var(--c-surface);
  border-bottom: 1.5px solid var(--c-border);
  padding: 0 1.5rem;
  position: sticky; top: 0; z-index: 100;
}
.header-inner {
  max-width: 800px; margin: 0 auto;
  display: flex; align-items: center; justify-content: space-between;
  height: 56px;
}
.logo {
  display: flex; align-items: center; gap: 10px;
  font-family: 'Pretendard', 'Noto Serif KR', serif;
  font-size: 15px; font-weight: 700;
  color: var(--c-text); text-decoration: none;
}
.logo-badge {
  background: var(--c-accent); color: #fff;
  font-size: 10px; font-weight: 700; letter-spacing:.05em;
  padding: 2px 8px; border-radius: 20px;
}
.header-back {
  font-size: 13px; color: var(--c-text2);
  text-decoration: none;
  display: flex; align-items: center; gap: 4px;
  padding: 6px 12px; border-radius: var(--r-sm);
  transition: background .15s, color .15s;
}
.header-back:hover { background: var(--c-accent-l); color: var(--c-accent); }

/* ── 메인 레이아웃 ── */
.main-wrap {
  max-width: 800px;
  margin: 0 auto;
  padding: 2rem 1.5rem 4rem;
}

/* ── 상단 컨트롤 패널 ── */
.ctrl-panel {
  background: var(--c-surface);
  border: 1.5px solid var(--c-border);
  border-radius: var(--r);
  padding: 1.25rem 1.5rem;
  margin-bottom: 1.5rem;
  display: flex;
  flex-wrap: wrap;
  gap: 1rem;
  align-items: flex-end;
  box-shadow: var(--shadow);
}
.ctrl-group { display: flex; flex-direction: column; gap: 6px; }
.ctrl-label {
  font-size: 11px; font-weight: 700;
  color: var(--c-text3); letter-spacing: .08em;
  text-transform: uppercase;
}
.filter-tags { display: flex; flex-wrap: wrap; gap: 5px; }
.tag {
  padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 500;
  background: var(--c-bg); border: 1.5px solid var(--c-border2);
  color: var(--c-text2); cursor: pointer; transition: all .15s;
  white-space: nowrap;
}
.tag:hover { border-color: var(--c-accent); color: var(--c-accent); background: var(--c-accent-l); }
.tag.active { background: var(--c-accent); border-color: var(--c-accent); color: #fff; }
.ctrl-sep { width: 1px; background: var(--c-border); align-self: stretch; }

/* 변형 포함 토글 */
.variant-toggle {
  display: flex; align-items: center; gap: 8px;
  cursor: pointer; user-select: none;
}
.variant-toggle input { display: none; }
.toggle-track {
  width: 40px; height: 22px;
  background: var(--c-border2);
  border-radius: 11px;
  position: relative;
  transition: background .2s;
  flex-shrink: 0;
}
.toggle-track::after {
  content: ''; position: absolute;
  width: 16px; height: 16px;
  background: #fff; border-radius: 50%;
  top: 3px; left: 3px;
  transition: transform .2s;
  box-shadow: 0 1px 3px rgba(0,0,0,.2);
}
.variant-toggle input:checked + .toggle-track {
  background: var(--c-accent);
}
.variant-toggle input:checked + .toggle-track::after {
  transform: translateX(18px);
}
.toggle-text { font-size: 13px; font-weight: 500; color: var(--c-text2); }

/* ── 진행 상황 바 ── */
.progress-bar-wrap {
  background: var(--c-surface);
  border: 1.5px solid var(--c-border);
  border-radius: var(--r);
  padding: 1rem 1.5rem;
  margin-bottom: 1.5rem;
  box-shadow: var(--shadow);
}
.progress-row {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 8px;
}
.progress-label { font-size: 13px; font-weight: 600; color: var(--c-text2); }
.progress-count { font-size: 20px; font-weight: 700; color: var(--c-accent); }
.progress-count span { font-size: 13px; font-weight: 400; color: var(--c-text3); }
.progress-track {
  height: 6px; background: var(--c-border);
  border-radius: 3px; overflow: hidden;
}
.progress-fill {
  height: 100%; background: var(--c-accent);
  border-radius: 3px; transition: width .4s ease;
}

/* ── 퀴즈 카드 ── */
.quiz-card {
  background: var(--c-surface);
  border: 1.5px solid var(--c-border);
  border-radius: var(--r);
  box-shadow: var(--shadow);
  overflow: hidden;
  transition: box-shadow .2s;
}
.quiz-card:hover { box-shadow: 0 4px 24px rgba(28,26,22,.11); }

/* 카드 헤더 메타 */
.card-meta {
  display: flex; align-items: center; gap: 8px;
  padding: 12px 1.5rem 0;
  flex-wrap: wrap;
}
.meta-year {
  font-size: 12px; font-weight: 700; color: var(--c-text3);
}
.cat-tag {
  display: inline-block;
  padding: 2px 9px; border-radius: 4px;
  font-size: 11px; font-weight: 700; letter-spacing: .03em;
}
.cat-sw   { background: var(--c-tag-sw-l);  color: var(--c-tag-sw);  }
.cat-db   { background: var(--c-tag-db-l);  color: var(--c-tag-db);  }
.cat-os   { background: var(--c-tag-os-l);  color: var(--c-tag-os);  }
.cat-net  { background: var(--c-tag-net-l); color: var(--c-tag-net); }
.cat-sec  { background: var(--c-tag-sec-l); color: var(--c-tag-sec); }
.cat-sql  { background: var(--c-tag-sql-l); color: var(--c-tag-sql); }
.cat-etc  { background: var(--c-tag-etc-l); color: var(--c-tag-etc); }

.variant-badge-sm {
  background: linear-gradient(135deg,#8B2635,#C4616E);
  color: #fff; font-size: 10px; font-weight: 700;
  padding: 2px 8px; border-radius: 4px; letter-spacing:.04em;
}

/* 문제 본문 */
.card-body { padding: 1.25rem 1.5rem; }
.q-text {
  font-size: 15px; line-height: 1.8;
  color: var(--c-text);
}
.q-text .variant-q {
  font-size: 15px; line-height: 1.8;
}

/* ── 정답 영역 ── */
.ans-wrap {
  border-top: 1.5px dashed var(--c-border);
  overflow: hidden; max-height: 0;
  transition: max-height .35s ease;
}
.ans-wrap.open { max-height: 2000px; }
.ans-body { padding: 1.25rem 1.5rem; }
.answer-val {
  font-size: 16px; font-weight: 700;
  color: var(--c-accent); line-height: 1.6;
  margin-bottom: 1rem;
}
.variant-ans-val {
  font-size: 16px; font-weight: 700;
  color: var(--c-accent); line-height: 1.6;
  margin-bottom: 1rem;
}

/* keyword-detail 테이블 스타일 */
.keyword-detail { font-size: 13px; color: var(--c-text2); }
.tbl-wrap { overflow-x: auto; }
.db-table {
  width: 100%; border-collapse: collapse;
  font-size: 13px;
}
.db-table th, .db-table td {
  border: 1px solid var(--c-border);
  padding: 7px 10px;
  vertical-align: middle;
}
.db-table th {
  background: var(--c-bg); font-weight: 700;
  color: var(--c-text2); font-size: 12px;
}
.db-table tr.info-row td { background: #fafaf8; }
.variant-keyword {
  font-size: 13px; color: var(--c-text2);
}
.sql-box {
  background: #1e1e2e; color: #cdd6f4;
  font-family: 'Courier New', monospace; font-size: 13px;
  padding: 12px 14px; border-radius: var(--r-sm);
  margin: 8px 0; white-space: pre-wrap; overflow-x: auto;
}
.tables-row {
  display: flex; gap: 16px; flex-wrap: wrap;
  margin: 8px 0;
}
.tbl-label {
  font-size: 12px; font-weight: 700; color: var(--c-text3);
  margin-bottom: 4px;
}

/* ── 버튼 영역 ── */
.card-actions {
  padding: 0 1.5rem 1.25rem;
  display: flex; gap: 8px; flex-wrap: wrap;
}
.btn-reveal {
  flex: 1; min-width: 120px;
  background: var(--c-accent); color: #fff;
  border: none; border-radius: var(--r-sm);
  padding: 10px 20px; font-size: 14px; font-weight: 700;
  cursor: pointer; transition: all .15s;
  font-family: inherit;
}
.btn-reveal:hover { background: #6e1d28; transform: translateY(-1px); }
.btn-reveal.revealed {
  background: var(--c-bg); color: var(--c-text3);
  border: 1.5px solid var(--c-border);
}
.btn-next {
  background: var(--c-surface);
  border: 1.5px solid var(--c-accent);
  color: var(--c-accent);
  border-radius: var(--r-sm);
  padding: 10px 20px; font-size: 14px; font-weight: 700;
  cursor: pointer; transition: all .15s;
  font-family: inherit;
}
.btn-next:hover { background: var(--c-accent-l); transform: translateY(-1px); }
.btn-skip {
  background: transparent;
  border: 1.5px solid var(--c-border2);
  color: var(--c-text3);
  border-radius: var(--r-sm);
  padding: 10px 16px; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all .15s;
  font-family: inherit;
}
.btn-skip:hover { border-color: var(--c-text2); color: var(--c-text2); }

/* ── 완료 화면 ── */
.done-card {
  background: var(--c-surface);
  border: 1.5px solid var(--c-border);
  border-radius: var(--r);
  box-shadow: var(--shadow);
  padding: 3rem 2rem;
  text-align: center;
  display: none;
}
.done-card.show { display: block; }
.done-emoji { font-size: 3rem; margin-bottom: 1rem; }
.done-title {
  font-family: 'Noto Serif KR', serif;
  font-size: 1.5rem; font-weight: 700;
  color: var(--c-text); margin-bottom: 0.5rem;
}
.done-desc { font-size: 14px; color: var(--c-text2); margin-bottom: 1.5rem; }
.btn-restart {
  background: var(--c-accent); color: #fff;
  border: none; border-radius: var(--r-sm);
  padding: 12px 32px; font-size: 15px; font-weight: 700;
  cursor: pointer; transition: all .15s;
  font-family: inherit;
}
.btn-restart:hover { background: #6e1d28; transform: translateY(-1px); }

/* ── 빈 결과 ── */
.empty-msg {
  text-align: center; padding: 3rem; color: var(--c-text3);
  font-size: 15px; display: none;
}
.empty-msg.show { display: block; }

/* ── 이전/다음 탐색 미니 버튼 ── */
.nav-row {
  display: flex; justify-content: center; gap: 12px;
  margin-top: 1.25rem;
}

/* ── 통계 배지 ── */
.stat-row {
  display: flex; gap: 8px; margin-top: 4px;
}
.stat-badge {
  font-size: 11px; font-weight: 700;
  padding: 2px 8px; border-radius: 4px;
  background: var(--c-accent-l); color: var(--c-accent);
}

/* ── 반응형 ── */
@media (max-width: 600px) {
  .ctrl-panel { padding: 1rem; }
  .card-body, .ans-body { padding: 1rem; }
  .card-meta, .card-actions { padding-left: 1rem; padding-right: 1rem; }
  .ctrl-sep { display: none; }
  .btn-reveal, .btn-next, .btn-skip { padding: 10px 14px; }
}

/* ── 애니메이션 ── */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
.quiz-card { animation: fadeIn .3s ease both; }

</style>
</head>
<body>

<!-- ── 헤더 ── -->
<header class="site-header">
  <div class="header-inner">
    <a href="quiz.html" class="logo">
      <span class="logo-badge">기출</span>
      정보처리기사 실기 이론 기출문제
    </a>
    <a href="quiz.html" class="header-back">← 문제집으로</a>
  </div>
</header>

<!-- ── 메인 ── -->
<main class="main-wrap">

  <!-- 컨트롤 패널 -->
  <div class="ctrl-panel">
    <div class="ctrl-group">
      <div class="ctrl-label">연도 필터</div>
      <div class="filter-tags" id="filter-year">
        <span class="tag active" onclick="setYear('all',this)">전체</span>
        <span class="tag" onclick="setYear('2025',this)">2025</span>
        <span class="tag" onclick="setYear('2024',this)">2024</span>
        <span class="tag" onclick="setYear('2023',this)">2023</span>
        <span class="tag" onclick="setYear('2022',this)">2022</span>
        <span class="tag" onclick="setYear('2021',this)">2021</span>
        <span class="tag" onclick="setYear('2020',this)">2020</span>
      </div>
    </div>
    <div class="ctrl-sep"></div>
    <div class="ctrl-group">
      <div class="ctrl-label">카테고리 필터</div>
      <div class="filter-tags" id="filter-cat">
        <span class="tag active" onclick="setCat('all',this)">전체</span>
        <span class="tag" onclick="setCat('SW 개발/계획',this)">SW개발</span>
        <span class="tag" onclick="setCat('데이터베이스',this)">데이터베이스</span>
        <span class="tag" onclick="setCat('SQL문',this)">SQL</span>
        <span class="tag" onclick="setCat('네트워크',this)">네트워크</span>
        <span class="tag" onclick="setCat('정보보안',this)">정보보안</span>
        <span class="tag" onclick="setCat('운영체제',this)">운영체제</span>
        <span class="tag" onclick="setCat('기타 용어',this)">기타</span>
      </div>
    </div>
    <div class="ctrl-sep"></div>
    <div class="ctrl-group">
      <div class="ctrl-label">문제 유형</div>
      <label class="variant-toggle">
        <input type="checkbox" id="toggle-variant" onchange="rebuildPool()">
        <div class="toggle-track"></div>
        <span class="toggle-text">변형 기출 포함</span>
      </label>
    </div>
  </div>

  <!-- 진행 상황 -->
  <div class="progress-bar-wrap">
    <div class="progress-row">
      <div class="progress-label">학습 진행</div>
      <div class="progress-count"><span id="cnt-done">0</span> / <span id="cnt-total">0</span> <span>문제</span></div>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
    <div class="stat-row" style="margin-top:8px">
      <span class="stat-badge" id="stat-pool">총 0문제</span>
    </div>
  </div>

  <!-- 퀴즈 카드 -->
  <div id="quiz-card-wrap"></div>

  <!-- 완료 화면 -->
  <div class="done-card" id="done-card">
    <div class="done-emoji">🎉</div>
    <div class="done-title">모든 문제 완료!</div>
    <div class="done-desc" id="done-desc">설정한 조건의 문제를 모두 풀었어요.</div>
    <button class="btn-restart" onclick="restartAll()">다시 처음부터</button>
  </div>

  <!-- 빈 결과 -->
  <div class="empty-msg" id="empty-msg">
    해당 조건에 맞는 문제가 없어요. 필터를 변경해보세요.
  </div>

</main>

<script>
// ══════════════════════════════════════════════════════
//  데이터 — quiz.html에서 직접 가져온 실제 데이터
// ══════════════════════════════════════════════════════
const questions = [
  // ─── 2025년 3회 ───
  { id:'25_3_1', year:'2025', round:'3회', cat:'SW 개발/계획',
    qHtml:`<div class="q-text">UML 다이어그램의 종류 중, 소프트웨어 시스템을 네임스페이스 단위로 분류하고 각 단위 간의 의존 관계를 나타내는 구조 다이어그램이 있다. 이 다이어그램은 하나의 단위 안에 여러 클래스나 중첩된 하위 단위를 포함할 수 있으며, 단위 간 관계는 «import», «access», «merge» 등의 스테레오타입으로 표현된다. 실제 디렉터리 폴더 구조와 유사한 방식으로 모듈 간 의존성을 설계할 때 활용된다. 이 다이어그램의 명칭을 쓰시오.</div>`,
    ansHtml:`<div class="answer-val">패키지(Package) 다이어그램</div><div class="keyword-detail">📌 <b>풀이</b><br>소프트웨어를 폴더처럼 묶어서 관리하는 단위를 <b>패키지(Package)</b>라고 해요. 패키지 다이어그램은 이런 패키지들 사이에 어떤 관계(의존)가 있는지를 한눈에 보여주는 UML 구조 다이어그램이에요. 패키지 안에 클래스나 컴포넌트를 넣어 대규모 시스템의 전체 구조를 표현할 때 사용해요.<br><br>📎 <b>UML 구조 다이어그램 6종</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>클래스(Class) 다이어그램</b></td><td style="text-align:left;vertical-align:middle">시스템의 정적 구조를 표현해요. 클래스·속성·메서드·관계(상속, 연관 등)를 한눈에 보여줘요. UML 다이어그램 중 가장 많이 출제돼요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>패키지(Package) 다이어그램</b></td><td style="text-align:left;vertical-align:middle">시스템을 폴더 모양의 패키지 단위로 구분하고 패키지 간 의존 관계를 표현해요. &lt;&lt;import&gt;&gt;·&lt;&lt;access&gt;&gt;·&lt;&lt;merge&gt;&gt; 스테레오타입으로 관계를 명시해요. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>컴포넌트(Component) 다이어그램</b></td><td style="text-align:left;vertical-align:middle">소프트웨어 컴포넌트(모듈, 라이브러리, 실행 파일 등) 간의 의존 관계를 표현해요. 시스템의 물리적 구성을 보여줘요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>배치(Deployment) 다이어그램</b></td><td style="text-align:left;vertical-align:middle">소프트웨어가 어떤 하드웨어(서버, PC, 모바일)에 배포되는지 표현해요. 인프라 설계 시 사용해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>객체(Object) 다이어그램</b></td><td style="text-align:left;vertical-align:middle">특정 시점에 객체(인스턴스)들의 상태와 관계를 표현해요. 클래스 다이어그램의 스냅샷이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>복합체 구조(Composite Structure)</b></td><td style="text-align:left;vertical-align:middle">클래스 내부의 구조와 협력 관계를 표현해요. 복잡한 컴포넌트의 내부 설계에 사용해요.</td></tr></table></div></div>` },
  { id:'25_3_2', year:'2025', round:'3회', cat:'SW 개발/계획',
    qHtml:`<div class="q-text">화이트박스 테스트의 커버리지 기준 중 하나로, 하나의 결정문 안에 포함된 각각의 원자 조건식(Atomic Condition)이 참(True)과 거짓(False) 결과를 모두 한 번 이상 만족해야 한다는 기준이 있다. 단, 이 기준은 개별 조건식의 양방향 실행만을 요구하며, 결정문 전체의 최종 결과(참/거짓)가 반드시 양쪽으로 실행될 것을 보장하지는 않는다. 아래 보기에서 이에 해당하는 커버리지를 고르시오.<br><br>[보기] &nbsp; ㄱ.경로(Path) &nbsp; ㄴ.결정(Decision) &nbsp; ㄷ.조건/결정(Condition/Decision) &nbsp; ㄹ.변경 조건/결정(MC/DC) &nbsp; ㅁ.다중 조건(Multiple Condition) &nbsp; ㅂ.문장(Statement) &nbsp; ㅅ.분기(Branch) &nbsp; ㅇ.조건(Condition) &nbsp; ㅈ.루프(Loop)</div>`,
    ansHtml:`<div class="answer-val">ㅇ. 조건(Condition) 커버리지</div><div class="keyword-detail">📌 <b>풀이</b><br>조건 커버리지는 <b>결정문 안에 있는 개별 조건식 하나하나</b>가 참(T)·거짓(F)을 최소 한 번씩 가져야 한다는 기준이에요. 예를 들어 <code>if (A &gt; 0 &amp;&amp; B &lt; 5)</code>가 있다면, A &gt; 0이 T/F 각각, B &lt; 5도 T/F 각각 실행되면 만족해요. 단, 전체 if문의 결과(T/F)까지 보장하지는 않아요.<br><br>📎 <b>화이트박스 커버리지 5종 비교</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>문장(Statement) 커버리지</b></td><td style="text-align:left;vertical-align:middle">모든 실행 가능한 코드 줄을 최소 1번 수행해요. 가장 약한 기준이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>결정(Decision) 커버리지</b></td><td style="text-align:left;vertical-align:middle">각 결정문(if, while 등)의 결과가 T와 F를 각각 최소 1번씩 가져야 해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>조건(Condition) 커버리지</b></td><td style="text-align:left;vertical-align:middle">결정문 안의 개별 원자 조건식 각각이 T/F를 최소 1번씩 가져야 해요. 단, 결정문 전체의 T/F는 보장하지 않는 함정이 있어요. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>조건/결정 커버리지</b></td><td style="text-align:left;vertical-align:middle">결정 커버리지와 조건 커버리지를 동시에 만족해야 해요. 두 기준의 약점을 보완해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>다중 조건(Multiple Condition)</b></td><td style="text-align:left;vertical-align:middle">결정문 내 모든 조건의 가능한 조합을 전부 테스트해요. 조건이 n개면 최대 2^n개 테스트 케이스가 필요해서 비용이 커요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>MC/DC</b></td><td style="text-align:left;vertical-align:middle">각 조건이 독립적으로 전체 결정에 영향을 미치는 경우만 선별해요. 항공(DO-178C)·자동차(ISO 26262) 등 안전 필수 시스템에서 의무 적용해요.</td></tr><tr><td colspan="2" style="color:var(--c-text2);font-style:italic;border-top:1px dashed var(--c-border2)">📝 강도 순서: 문장 &lt; 결정(분기) &lt; 조건 &lt; 조건/결정 &lt; 다중 조건 &lt; MC/DC</td></tr></table></div></div>` },
  { id:'25_3_3', year:'2025', round:'3회', cat:'SW 개발/계획',
    qHtml:`<div class="q-text">테스트케이스(Test Case)는 특정 테스트 목적을 달성하기 위해 정의된 입력값, 실행 조건, 기대 결과의 집합이다. 아래 테스트케이스 구성요소 표의 빈칸 ①②③에 들어갈 항목을 보기에서 골라 쓰시오.<br><br><div class="tbl-wrap"><table class="db-table" style="min-width:360px"><tr><th>구성요소</th><th>역할</th></tr><tr><td>식별자(ID)</td><td>각 테스트케이스를 구분하는 고유 번호</td></tr><tr class="info-row"><td>① ( )</td><td>테스트 대상 기능, 입력 범위, 실행 상황 등을 명시</td></tr><tr class="info-row"><td>② ( )</td><td>테스트 실행 시 실제로 입력하는 값</td></tr><tr class="info-row"><td>③ ( )</td><td>시스템이 정상 동작할 때 출력되어야 하는 결과값</td></tr><tr><td>수행 단계</td><td>테스트를 진행하는 절차 및 순서</td></tr><tr><td>성공/실패 기준</td><td>테스트 통과 여부를 판단하는 기준</td></tr></table></div><br>[보기] &nbsp; ㄱ.테스트 조건 &nbsp; ㄴ.테스트 환경 &nbsp; ㄷ.테스트 유형 &nbsp; ㄹ.테스트 데이터 &nbsp; ㅁ.예상 결과 &nbsp; ㅂ.수행 단계 &nbsp; ㅅ.성공/실패 기준</div>`,
    ansHtml:`<div class="answer-val">① ㄱ. 테스트 조건 &nbsp;&nbsp; ② ㄹ. 테스트 데이터 &nbsp;&nbsp; ③ ㅁ. 예상 결과</div><div class="keyword-detail">📌 <b>풀이</b><br>테스트케이스는 "이런 상황에서(조건) → 이 값을 넣었을 때(데이터) → 이런 결과가 나와야 한다(예상 결과)"는 세 가지 요소로 구성돼요. 마치 수학 시험에서 "주어진 조건으로 → 계산해서 → 정답을 확인"하는 것과 같아요.<br><br>📎 <b>테스트 관련 핵심 용어</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>테스트 조건(Test Condition)</b></td><td style="text-align:left;vertical-align:middle">무엇을 테스트할지 정의하는 요소예요. "로그인 기능이 올바르게 동작하는가"처럼 테스트의 목적과 범위를 명시해요. ← <u>정답①</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>테스트 데이터(Test Data)</b></td><td style="text-align:left;vertical-align:middle">테스트 실행 시 입력할 실제 값이에요. 유효한 값, 경계값, 잘못된 값 등 다양하게 준비해요. ← <u>정답②</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>예상 결과(Expected Result)</b></td><td style="text-align:left;vertical-align:middle">테스트를 올바르게 실행했을 때 나와야 하는 결과예요. 실제 결과와 비교해서 성공·실패를 판단해요. ← <u>정답③</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>테스트 오라클(Test Oracle)</b></td><td style="text-align:left;vertical-align:middle">예상 결과가 맞는지 판단하는 기준이에요. 참 오라클(모든 입력 검증), 샘플링 오라클(일부만 검증), 휴리스틱 오라클(경험 기반) 등으로 분류해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>테스트 하네스(Test Harness)</b></td><td style="text-align:left;vertical-align:middle">테스트를 자동으로 수행하는 도구 모음이에요. 스텁(Stub)·드라이버(Driver)·테스트 케이스·테스트 스크립트 등을 포함해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>스텁(Stub) vs 드라이버(Driver)</b></td><td style="text-align:left;vertical-align:middle">스텁은 하향식 통합 테스트에서 아직 구현되지 않은 하위 모듈을 임시 대체해요. 드라이버는 상향식 통합 테스트에서 상위 모듈을 임시 대체해요.</td></tr></table></div></div>` },
  { id:'25_3_4', year:'2025', round:'3회', cat:'운영체제',
    qHtml:`<div class="q-text">아래는 유닉스/리눅스 환경에서 자주 쓰이는 셸(Shell) 명령어에 대한 기능 설명이다. 각 번호에 해당하는 명령어를 보기에서 골라 쓰시오.<br><br>① 현재 사용자가 작업 중인 디렉터리의 절대 경로를 화면에 출력한다.<br>② 지정한 디렉터리 내의 파일 및 하위 디렉터리 목록을 나열한다.<br>③ 현재 위치를 지정한 디렉터리로 변경한다.<br>④ 원본 파일을 지정한 경로에 복제한다.<br><br>[보기] &nbsp; ls &nbsp;&nbsp; cd &nbsp;&nbsp; cp &nbsp;&nbsp; pwd</div>`,
    ansHtml:`<div class="answer-val">① pwd &nbsp;&nbsp; ② ls &nbsp;&nbsp; ③ cd &nbsp;&nbsp; ④ cp</div><div class="keyword-detail">📌 <b>풀이</b><br>리눅스 명령어는 영어 단어의 줄임말이에요. 뜻을 알면 외우기 훨씬 쉬워요! <b>pwd</b>=현재 경로 출력, <b>ls</b>=목록 보기, <b>cd</b>=폴더 이동, <b>cp</b>=파일 복사예요.<br><br>📎 <b>자주 출제되는 리눅스 명령어</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>pwd</b></td><td style="text-align:left;vertical-align:middle"><u>P</u>rint <u>W</u>orking <u>D</u>irectory. 현재 작업 중인 폴더의 전체 경로를 출력해요. ← <u>정답①</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>ls</b></td><td style="text-align:left;vertical-align:middle"><u>L</u>i<u>s</u>t. 현재 폴더 안에 있는 파일과 폴더 목록을 보여줘요. <code>ls -l</code>은 상세 정보, <code>ls -a</code>는 숨김 파일까지 보여줘요. ← <u>정답②</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>cd</b></td><td style="text-align:left;vertical-align:middle"><u>C</u>hange <u>D</u>irectory. 다른 폴더로 이동해요. <code>cd ..</code>는 상위 폴더, <code>cd ~</code>는 홈 폴더로 이동해요. ← <u>정답③</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>cp</b></td><td style="text-align:left;vertical-align:middle"><u>C</u>o<u>p</u>y. 파일을 복사해요. <code>cp 원본 대상</code> 형식으로 사용해요. ← <u>정답④</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>mv</b></td><td style="text-align:left;vertical-align:middle"><u>M</u>o<u>v</u>e. 파일을 이동하거나 이름을 변경해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>rm</b></td><td style="text-align:left;vertical-align:middle"><u>R</u>e<u>m</u>ove. 파일을 삭제해요. <code>rm -r</code>은 폴더 전체 삭제예요. 복구가 안 되니 주의해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>chmod</b></td><td style="text-align:left;vertical-align:middle"><u>Ch</u>ange <u>mod</u>e. 파일 권한을 변경해요. 읽기(r=4)·쓰기(w=2)·실행(x=1)을 8진수로 지정해요. 예) <code>chmod 755</code></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>grep</b></td><td style="text-align:left;vertical-align:middle">파일 내에서 특정 문자열을 검색해요. <code>grep "검색어" 파일명</code> 형식으로 사용해요.</td></tr></table></div></div>` },
  { id:'25_3_5', year:'2025', round:'3회', cat:'네트워크',
    qHtml:`<div class="q-text">데이터 통신에서 오류를 처리하는 방식은 크게 두 가지로 나뉜다. 아래 설명의 빈칸 ①~⑤에 들어갈 알맞은 용어를 보기에서 골라 쓰시오.<br><br>( ① ) 코드는 데이터 전송 시 여러 개의 검사 비트를 함께 실어 보내어, 수신 측이 재전송 없이 스스로 오류를 검출하고 수정할 수 있도록 설계된 코드이다. 이처럼 수신 측에서 자체적으로 오류를 수정하는 방식을 ( ② )라 하며, 반대로 오류가 감지되면 송신 측에 재전송을 요청하는 방식을 ( ③ )라 한다. ( ③ )에서 활용되는 오류 검출 기법으로는 ( ④ ) 검사와 ( ⑤ ) 검사가 있다. ( ④ ) 검사는 1비트 검사 비트를 추가하는 가장 단순한 방식이며, ( ⑤ ) 검사는 사전에 합의한 생성 다항식으로 오류를 검출하는 방식이다.<br><br>[보기] &nbsp; ㉠ CRC &nbsp; ㉡ FEC &nbsp; ㉢ BEC &nbsp; ㉣ NAK &nbsp; ㉤ Parity &nbsp; ㉥ MD5 &nbsp; ㉦ BCD &nbsp; ㉧ Hamming</div>`,
    ansHtml:`<div class="answer-val">① Hamming &nbsp; ② FEC &nbsp; ③ BEC &nbsp; ④ Parity &nbsp; ⑤ CRC</div><div class="keyword-detail">📌 <b>풀이</b><br>데이터를 전송할 때 오류가 생길 수 있어요. <b>FEC(전진 오류 수정)</b>는 받는 쪽이 스스로 고치고(재전송 불필요), <b>BEC(후진 오류 수정)</b>는 오류 발견 시 보낸 쪽에 재전송을 요청해요. Hamming은 FEC, Parity·CRC는 BEC의 대표 기법이에요.<br><br>📎 <b>오류 제어 기법 정리</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Hamming Code</b></td><td style="text-align:left;vertical-align:middle">Richard Hamming이 개발한 FEC 기법이에요. 데이터 비트 사이에 여러 개의 패리티 비트를 배치해서 1비트 오류를 자동으로 감지하고 수정해요. ← <u>정답①</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>FEC (Forward Error Correction)</b></td><td style="text-align:left;vertical-align:middle">전진 오류 수정이에요. 수신 측이 재전송 요청 없이 스스로 오류를 정정해요. 실시간 방송·음성 통화처럼 재전송이 불가능한 환경에 사용해요. ← <u>정답②</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>BEC (Backward Error Correction)</b></td><td style="text-align:left;vertical-align:middle">후진 오류 수정이에요. 오류 발견 시 송신 측에 재전송을 요청해요. ARQ(Automatic Repeat reQuest)라고도 해요. ← <u>정답③</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Parity bit</b></td><td style="text-align:left;vertical-align:middle">가장 단순한 오류 검출 기법이에요. 1의 개수가 홀수/짝수가 되도록 1비트를 추가해요. 1비트 오류만 감지 가능하고 정정 능력은 없어요. ← <u>정답④</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>CRC (Cyclic Redundancy Check)</b></td><td style="text-align:left;vertical-align:middle">생성 다항식을 이용한 이진 나눗셈으로 검사값(FCS)을 계산해요. 버스트 오류(연속된 여러 비트 오류) 감지에 강력해요. BEC 방식이에요. ← <u>정답⑤</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>ARQ (Automatic Repeat reQuest)</b></td><td style="text-align:left;vertical-align:middle">BEC의 재전송 요청 방식 총칭이에요. Stop-and-Wait ARQ, Go-Back-N ARQ, Selective Repeat ARQ 세 종류가 있어요.</td></tr></table></div></div>` },
  { id:'25_3_6', year:'2025', round:'3회', cat:'정보보안',
    qHtml:`<div class="q-text">아래는 특정 인증 기술의 동작 원리와 특징을 설명한 것이다. 해당 기술의 명칭을 쓰시오.<br><br>· 인증에 사용된 값은 검증 즉시 폐기되어 동일한 값으로 재인증할 수 없다.<br>· 서버와 인증 매체(토큰 또는 앱)는 시각 동기화 방식이나 카운터 기반 방식을 통해 매 인증마다 새로운 값을 독립적으로 생성한다.<br>· 내부 검증은 해시 함수를 이용하므로 서버는 평문 비밀번호를 저장하지 않아도 유효성을 확인할 수 있다.<br>· 재전송 공격(Replay Attack)에 강하여 금융·공공 등 높은 보안 수준이 요구되는 서비스에서 널리 활용된다.</div>`,
    ansHtml:`<div class="answer-val">OTP (One-Time Password, 일회용 패스워드)</div><div class="keyword-detail">📌 <b>풀이</b><br>OTP는 <b>한 번 쓰고 버리는 비밀번호</b>예요. 은행 앱에서 "인증번호 6자리"를 발급받아서 딱 한 번만 쓰는 것이 바로 OTP예요. 사용 즉시 폐기되기 때문에 누군가 중간에 훔쳐도 다시 쓸 수 없어요.<br><br>📎 <b>같이 알아두면 좋은 키워드</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>TOTP (Time-based OTP)</b></td><td style="text-align:left;vertical-align:middle">시간 기반 일회용 패스워드예요. 현재 시각을 시드(seed)로 사용해서 30초마다 새로운 번호를 생성해요. Google Authenticator, Microsoft Authenticator가 대표적이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>HOTP (HMAC-based OTP)</b></td><td style="text-align:left;vertical-align:middle">카운터 기반 일회용 패스워드예요. 버튼을 누를 때마다(사용 횟수에 따라) 새로운 번호를 생성해요. 시간 동기화가 필요 없어요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>재전송 공격(Replay Attack)</b></td><td style="text-align:left;vertical-align:middle">한 번 사용한 인증 정보를 다시 사용하는 공격이에요. OTP는 매번 새로운 값을 생성하므로 재전송 공격을 근본적으로 차단해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>2FA (이중 인증)</b></td><td style="text-align:left;vertical-align:middle">비밀번호(알고 있는 것) + OTP(가지고 있는 것)처럼 두 가지 방식을 함께 사용하는 인증이에요. 비밀번호가 유출되어도 OTP가 없으면 접속 못 해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>SMS OTP의 취약점</b></td><td style="text-align:left;vertical-align:middle">문자 메시지로 전송되는 OTP는 SIM 스와핑(전화번호 도용) 공격이나 SS7 프로토콜 취약점으로 탈취될 수 있어요. 앱 기반 OTP가 더 안전해요.</td></tr></table></div></div>` },
  { id:'25_3_7', year:'2025', round:'3회', cat:'정보보안',
    qHtml:`<div class="q-text">아래는 서로 다른 서비스 간에 사용자 인증 없이 접근 권한만을 위임하는 표준 프로토콜에 대한 설명이다. 해당 프로토콜의 명칭을 쓰시오.<br><br>· 사용자는 제3의 서비스에 자신의 계정 자격증명(ID·비밀번호)을 직접 제공하지 않으며, 사전에 승인한 범위(Scope) 내에서만 접근이 허용된다.<br>· 이 프로토콜은 인증(Authentication)이 아닌 인가(Authorization)를 목적으로 하며, 권한 부여 완료 후 Access Token을 발급한다.<br>· 발급된 토큰을 통해 외부 애플리케이션이 해당 사용자의 리소스에 API 방식으로 접근할 수 있다.<br>· 소셜 계정으로 외부 서비스에 로그인하는 방식이 대표적인 활용 사례이다.</div>`,
    ansHtml:`<div class="answer-val">OAuth</div><div class="keyword-detail">📌 <b>풀이</b><br>OAuth는 <b>내 비밀번호를 알려주지 않고도</b> 다른 서비스에 내 정보 접근을 허락하는 방식이에요. 예를 들어 "구글 계정으로 로그인"할 때 구글에 직접 비밀번호를 주는 게 아니라, 구글이 "이 앱에 이것만 허락해요"라는 <b>토큰</b>을 발급해주는 거예요.<br><br>📎 <b>같이 알아두면 좋은 키워드</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>OAuth 2.0</b></td><td style="text-align:left;vertical-align:middle">현재 표준 인가 프로토콜이에요. Access Token을 발급해서 권한을 위임해요. 소셜 로그인("구글로 로그인", "카카오로 로그인") 구현에 사용돼요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>인증(Authentication) vs 인가(Authorization)</b></td><td style="text-align:left;vertical-align:middle">인증은 "네가 누구야?"를 확인하는 것, 인가는 "네가 이거 해도 돼?"를 결정하는 것이에요. OAuth는 <b>인가</b>만 담당해요. 인증까지 하려면 OIDC를 추가해야 해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>OIDC (OpenID Connect)</b></td><td style="text-align:left;vertical-align:middle">OAuth 2.0 위에 인증(Authentication) 기능을 추가한 표준이에요. ID Token(JWT 형식)을 발급해서 사용자 신원도 확인할 수 있어요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Access Token</b></td><td style="text-align:left;vertical-align:middle">OAuth에서 발급하는 접근 권한 증명서예요. 이 토큰을 제시하면 허가된 리소스에 접근할 수 있어요. 만료 시간이 있어서 탈취되어도 영구적으로 사용하지 못해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>SSO (Single Sign-On)</b></td><td style="text-align:left;vertical-align:middle">한 번 로그인으로 여러 서비스를 이용할 수 있는 기술이에요. OAuth와 달리 동일 조직/도메인 내 시스템 간 통합 인증에 초점을 맞춰요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>JWT (JSON Web Token)</b></td><td style="text-align:left;vertical-align:middle">OAuth/OIDC에서 자주 사용하는 토큰 형식이에요. Header.Payload.Signature 세 부분으로 구성되며, 서버가 별도 저장 없이 토큰 자체로 검증할 수 있어요.</td></tr></table></div></div>` },
  { id:'25_3_8', year:'2025', round:'3회', cat:'정보보안',
    qHtml:`<div class="q-text">정보보안의 접근통제(Access Control) 모델에 대한 설명이다. 각 설명에 해당하는 모델을 보기에서 골라 쓰시오.<br><br>ㄱ. 시스템 전체에 적용되는 보안 정책을 중앙에서 설정하며, 개별 사용자가 임의로 권한을 변경할 수 없다. 주체와 객체 모두에 보안 등급(예: Top Secret, Confidential)이 부여되고, 이 등급의 비교를 통해 접근 허용 여부가 결정된다.<br>ㄴ. 조직 내 구성원에게 부여된 직무나 역할(Role)을 기반으로 접근 권한을 할당한다. 권한이 역할에 묶여 있어, 담당 업무가 바뀔 경우 역할만 변경하면 되므로 권한 관리가 단순해진다.<br>ㄷ. 데이터나 자원의 소유자(Owner)가 접근 권한의 부여와 회수를 직접 결정한다. 소유자의 재량에 따라 제어 수준이 달라진다.<br><br>[보기] &nbsp; DAC &nbsp; MAC &nbsp; RBAC</div>`,
    ansHtml:`<div class="answer-val">ㄱ. MAC &nbsp;&nbsp; ㄴ. RBAC &nbsp;&nbsp; ㄷ. DAC</div><div class="tbl-wrap" style="margin-top:10px"><table class="db-table" style="min-width:320px"><tr><th>모델</th><th>풀네임</th><th>핵심 특징</th></tr><tr><td>MAC</td><td>Mandatory Access Control</td><td>강제적 통제. 보안 등급으로 관리, 개인이 권한 못 바꿈</td></tr><tr><td>RBAC</td><td>Role-Based Access Control</td><td>역할(직급) 기반. 회사 조직도처럼 직무별 권한 관리</td></tr><tr><td>DAC</td><td>Discretionary Access Control</td><td>임의적 통제. 파일 소유자가 직접 다른 사람에게 권한 부여</td></tr></table></div><div class="keyword-detail" style="margin-top:10px">📌 <b>쉽게 기억하는 법</b><br>· <b>MAC</b>: 군대처럼 위에서 강제로 정한 등급대로만 접근 (비밀문서 열람 등급)<br>· <b>RBAC</b>: 회사처럼 "부장은 이 파일, 사원은 저 파일"로 역할에 따라 접근<br>· <b>DAC</b>: 내 파일은 내가 관리. "친구한테 읽기 권한 줄게"처럼 소유자가 결정<br><br>📎 <b>추가 접근통제 개념</b><br>· <b>ABAC</b>(Attribute-Based AC): 속성(시간·위치·부서 등) 기반으로 동적 접근 제어<br>· <b>최소 권한 원칙</b>: 업무에 꼭 필요한 최소한의 권한만 부여</div<div class="keyword-detail">📌 <b>풀이</b><br>접근통제 모델 3가지를 쉽게 기억해요. <b>MAC</b>은 군대처럼 보안 등급으로 강제 통제, <b>RBAC</b>은 회사처럼 역할(부장/사원)에 따라 통제, <b>DAC</b>은 내 파일은 내가 관리하는 방식이에요.<br><br>📎 <b>접근통제 모델 비교</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>MAC (Mandatory)</b></td><td style="text-align:left;vertical-align:middle">강제적 통제예요. 시스템 관리자가 설정한 보안 등급에 따라 접근이 강제돼요. 개인이 권한을 변경할 수 없어요. 군대·정부기관에서 사용해요. ← <u>정답ㄱ</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>RBAC (Role-Based)</b></td><td style="text-align:left;vertical-align:middle">역할(Role) 기반 통제예요. 직무(부장·과장·사원)에 따라 접근 권한을 부여해요. 역할만 변경하면 권한이 자동으로 바뀌어서 관리가 편리해요. ← <u>정답ㄴ</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>DAC (Discretionary)</b></td><td style="text-align:left;vertical-align:middle">임의적 통제예요. 파일 소유자가 직접 다른 사람에게 권한을 부여해요. 유연하지만 소유자 실수로 보안이 약해질 수 있어요. ← <u>정답ㄷ</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>ABAC (Attribute-Based)</b></td><td style="text-align:left;vertical-align:middle">속성 기반 통제예요. 사용자·자원·환경 속성을 조합해서 동적으로 접근을 제어해요. 가장 유연한 모델이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>최소 권한 원칙</b></td><td style="text-align:left;vertical-align:middle">업무에 꼭 필요한 최소한의 권한만 부여하는 보안 원칙이에요. 불필요한 권한을 제거하면 공격 피해 범위를 줄일 수 있어요.</td></tr><tr><td colspan="2" style="color:var(--c-text2);font-style:italic;border-top:1px dashed var(--c-border2)">📝 암기법: MAC=군대(강제), RBAC=회사(역할), DAC=내 파일은 내가(임의)</td></tr></table></div></div>` },
  { id:'25_3_9', year:'2025', round:'3회', cat:'데이터베이스',
    qHtml:`<div class="q-text">관계 대수의 나누기 연산(Division, ÷)은 피제수 릴레이션(R)에서 제수 릴레이션(S)의 모든 튜플과 대응되는 튜플만을 결과로 반환한다. 아래 두 릴레이션 R, S를 참고하여 R ÷ S의 결과를 테이블 형태로 작성하시오.<br><br><div class="tables-row"><div><div class="tbl-label">릴레이션 R</div><table class="db-table"><tr><th>A</th><th>B</th></tr><tr><td>a1</td><td>b1</td></tr><tr><td>a1</td><td>b2</td></tr><tr><td>a2</td><td>b1</td></tr></table></div><div><div class="tbl-label">릴레이션 S</div><table class="db-table"><tr><th>B</th></tr><tr><td>b1</td></tr><tr><td>b2</td></tr></table></div></div>`,
    ansHtml:`<div class="answer-val">A 열에 a1 한 행</div><div class="tbl-wrap" style="margin-top:8px"><div class="tbl-label">R ÷ S 결과</div><table class="db-table"><tr><th>A</th></tr><tr class="highlight-row"><td>a1</td></tr></table></div><div class="keyword-detail">📌 <b>풀이</b><br>나누기 연산(÷)은 "<b>S의 모든 값과 짝이 되는 R의 튜플</b>"을 찾아요. 마치 "모든 과목을 수강한 학생"을 찾는 것과 같아요. a1→(a1,b1)과 (a1,b2) 모두 R에 있음→포함, a2→(a2,b2)가 없음→제외. 결과는 a1 하나!<br><br>📎 <b>관계 대수 연산자 정리</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>σ(시그마) - Select</b></td><td style="text-align:left;vertical-align:middle">조건을 만족하는 행(튜플)만 선택해요. SQL의 WHERE 절에 해당해요. 예) σ나이&gt;20(학생)</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>π(파이) - Project</b></td><td style="text-align:left;vertical-align:middle">지정한 열(속성)만 추출하고 중복을 제거해요. SQL의 SELECT DISTINCT에 해당해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>⋈(보타이) - Join</b></td><td style="text-align:left;vertical-align:middle">두 릴레이션을 공통 속성을 기준으로 연결해요. SQL의 JOIN에 해당해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>÷(나누기) - Division</b></td><td style="text-align:left;vertical-align:middle">S의 모든 튜플과 쌍이 이루어지는 R의 튜플만 추출해요. "전부 해당하는" 조건을 표현할 때 사용해요. ← <u>이번 문제</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>∪ / ∩ / −</b></td><td style="text-align:left;vertical-align:middle">∪(합집합): 두 릴레이션 합치고 중복 제거. SQL의 UNION. ∩(교집합): 양쪽 모두 있는 튜플. −(차집합): 첫 번째에만 있는 튜플. SQL의 EXCEPT.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>×(카티션 곱)</b></td><td style="text-align:left;vertical-align:middle">두 릴레이션의 모든 행 조합을 만들어요. R이 m행, S가 n행이면 결과는 m×n행이에요. SQL의 CROSS JOIN에 해당해요.</td></tr></table></div></div>` },
  { id:'25_3_10', year:'2025', round:'3회', cat:'데이터베이스',
    qHtml:`<div class="q-text">관계형 데이터베이스의 기본 용어에 대한 설명이다. 각 설명에 해당하는 용어를 보기에서 골라 쓰시오.<br><br>ㄱ. 릴레이션을 구성하는 각 행(Row)을 가리키며, 하나의 개체에 대한 속성값들의 집합이다.<br>ㄴ. 특정 시점에 릴레이션에 저장된 모든 데이터의 집합으로, 현재의 데이터 상태를 나타낸다.<br>ㄷ. 릴레이션에 존재하는 행의 총 개수를 나타내는 값이다.<br><br>[보기] &nbsp; 스키마(Schema) &nbsp; 속성(Attribute) &nbsp; 튜플(Tuple) &nbsp; 차수(Degree) &nbsp; 인스턴스(Instance) &nbsp; 카디널리티(Cardinality)</div>`,
    ansHtml:`<div class="answer-val">ㄱ. 튜플(Tuple) &nbsp;&nbsp; ㄴ. 인스턴스(Instance) &nbsp;&nbsp; ㄷ. 카디널리티(Cardinality)</div><div class="tbl-wrap" style="margin-top:10px"><table class="db-table" style="min-width:300px"><tr><th>DB 용어</th><th>일반 용어</th><th>쉬운 설명</th></tr><tr><td>튜플(Tuple)</td><td>행(Row)</td><td>테이블의 가로 한 줄 = 하나의 데이터</td></tr><tr><td>속성(Attribute)</td><td>열(Column)</td><td>테이블의 세로 한 줄 = 데이터의 항목</td></tr><tr><td>카디널리티</td><td>행의 수</td><td>테이블에 저장된 데이터 개수</td></tr><tr><td>차수(Degree)</td><td>열의 수</td><td>속성(컬럼)의 개수</td></tr><tr><td>인스턴스</td><td>현재 데이터</td><td>지금 이 순간 테이블에 담긴 실제 데이터</td></tr><tr><td>스키마</td><td>구조 설계도</td><td>테이블의 이름·속성·타입 등 틀을 정의한 것</td></tr></table></div><div class="keyword-detail" style="margin-top:10px">📌 <b>쉽게 기억하는 법</b><br>학생 테이블을 생각해보세요. 학번·이름·학년이라는 <b>열(속성)</b>이 3개 있고, 실제 학생 데이터 <b>행(튜플)</b>이 100명이면 → 차수=3, 카디널리티=100이에요.<br><br>📎 <b>추가 DB 기본 용어</b><br>· <b>릴레이션(Relation)</b>: 관계형 DB에서 테이블을 부르는 공식 명칭<br>· <b>도메인(Domain)</b>: 각 속성이 가질 수 있는 값의 범위 (예: 학년은 1~4)<br>· <b>기본키(PK)</b>: 각 튜플을 유일하게 식별하는 속성</div<div class="keyword-detail">📌 <b>풀이</b><br>DB 용어를 실생활로 이해해요. 학생 명단에서 학생 한 명의 정보 한 줄이 <b>튜플</b>, 지금 이 순간 테이블에 담긴 전체 데이터가 <b>인스턴스</b>, 학생 수(행 수)가 <b>카디널리티</b>예요.<br><br>📎 <b>DB 기본 용어 정리</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>튜플(Tuple)</b></td><td style="text-align:left;vertical-align:middle">릴레이션에서 행(Row)에 해당해요. 레코드(Record)라고도 해요. ← <u>정답ㄱ</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>인스턴스(Instance)</b></td><td style="text-align:left;vertical-align:middle">특정 시점에 릴레이션에 실제로 저장된 튜플들의 집합이에요. 스키마(구조)는 변하지 않아도 인스턴스(데이터)는 계속 변해요. ← <u>정답ㄴ</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>카디널리티(Cardinality)</b></td><td style="text-align:left;vertical-align:middle">릴레이션에 포함된 튜플(행)의 개수예요. 데이터가 추가·삭제되면 변해요. ← <u>정답ㄷ</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>차수(Degree)</b></td><td style="text-align:left;vertical-align:middle">릴레이션에 포함된 속성(열)의 개수예요. 테이블 구조가 바뀌지 않는 한 고정돼요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>속성(Attribute)</b></td><td style="text-align:left;vertical-align:middle">릴레이션에서 열(Column)에 해당해요. 필드(Field)라고도 해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>스키마(Schema)</b></td><td style="text-align:left;vertical-align:middle">릴레이션의 구조 정의예요. 외부·개념·내부 스키마 3단계로 나뉘어요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>도메인(Domain)</b></td><td style="text-align:left;vertical-align:middle">각 속성이 가질 수 있는 원자값의 집합이에요. 나이는 양의 정수, 성별은 {남, 여}처럼 정의돼요.</td></tr></table></div></div>` },
  { id:'25_3_11', year:'2025', round:'3회', cat:'SQL문',
    qHtml:`<div class="q-text">아래 두 테이블 T1, T2를 대상으로 다음 SQL 문을 실행하면 어떤 값이 반환되는지 쓰시오.<br><br><div class="tables-row"><div><div class="tbl-label">테이블 T1</div><table class="db-table"><tr><th>CODE</th><th>NAME</th></tr><tr><td>3258</td><td>smith</td></tr><tr><td>4324</td><td>allen</td></tr><tr><td>5432</td><td>scott</td></tr></table></div><div><div class="tbl-label">테이블 T2</div><table class="db-table"><tr><th>NO</th><th>RULE</th></tr><tr><td>12</td><td>s%</td></tr><tr><td>32</td><td>%t%</td></tr></table></div></div><div class="sql-box">SELECT COUNT(*) CNT
FROM T1 A CROSS JOIN T2 B
WHERE A.NAME LIKE B.RULE;</div>`,
    ansHtml:`<div class="answer-val">4</div><div class="tbl-wrap" style="margin-top:10px"><div class="tbl-label">CROSS JOIN 결과 (T1×T2, 총 6행) 및 LIKE 조건 평가</div><table class="db-table" style="min-width:380px"><tr><th>A.NAME</th><th>B.RULE</th><th>LIKE 결과</th></tr><tr class="highlight-row"><td>smith</td><td>s%</td><td>✓ s로 시작</td></tr><tr class="highlight-row"><td>smith</td><td>%t%</td><td>✓ t 포함 (smi<b>t</b>h)</td></tr><tr class="fail-row"><td>allen</td><td>s%</td><td>✗ s로 시작 안 함</td></tr><tr class="fail-row"><td>allen</td><td>%t%</td><td>✗ t 포함 안 됨</td></tr><tr class="highlight-row"><td>scott</td><td>s%</td><td>✓ s로 시작</td></tr><tr class="highlight-row"><td>scott</td><td>%t%</td><td>✓ t 포함 (sco<b>tt</b>)</td></tr></table></div><div class="keyword-detail" style="margin-top:10px">📌 <b>풀이</b><br>CROSS JOIN은 두 테이블의 모든 조합을 만들어요. T1에 3행, T2에 2행이 있으면 3×2=6가지 조합이 생겨요. 거기에 LIKE 조건을 적용하면 4개가 남아요.<br><br>📎 <b>LIKE 와일드카드 정리</b><br>· <b>%</b>: 글자 수에 상관없이 아무 문자 (0개 이상) — <code>s%</code>는 "s로 시작하는 모든 것"<br>· <b>_</b>: 정확히 1글자 대체 — <code>s_</code>는 "s + 딱 1글자"<br><br>📎 <b>JOIN 종류 비교</b><br>· <b>INNER JOIN</b>: 두 테이블에서 조건이 일치하는 행만 연결<br>· <b>LEFT/RIGHT JOIN</b>: 한쪽 테이블은 모두, 다른 쪽은 맞는 것만<br>· <b>CROSS JOIN</b>: 조건 없이 모든 조합 (카티션 곱) ← 이번 문제<br>· <b>FULL OUTER JOIN</b>: 양쪽 모두 포함</div<div class="keyword-detail">📌 <b>풀이</b><br>CROSS JOIN은 두 테이블의 모든 조합을 만들어요. T1에 3행, T2에 2행이 있으면 3×2=6가지 조합이 생겨요. 거기에 LIKE 조건을 적용하면 4개가 남아요.<br><br>📎 <b>SQL JOIN 및 LIKE 키워드</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>CROSS JOIN</b></td><td style="text-align:left;vertical-align:middle">두 테이블의 모든 행 조합을 반환해요(카티션 곱). 조인 조건이 없어요. T1이 3행, T2가 2행이면 3×2=6행이 생겨요. ← <u>이번 문제</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>LIKE 와일드카드 %</b></td><td style="text-align:left;vertical-align:middle">0개 이상의 임의 문자열과 일치해요. <code>s%</code>는 "s로 시작하는 모든 것", <code>%t%</code>는 "t를 포함하는 모든 것"이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>LIKE 와일드카드 _</b></td><td style="text-align:left;vertical-align:middle">정확히 1글자와 일치해요. <code>s_</code>는 "s + 딱 1글자"예요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>INNER JOIN</b></td><td style="text-align:left;vertical-align:middle">두 테이블에서 조인 조건이 일치하는 행만 연결해요. 가장 많이 사용하는 조인이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>LEFT OUTER JOIN</b></td><td style="text-align:left;vertical-align:middle">왼쪽 테이블의 모든 행을 포함하고, 오른쪽에 매칭이 없으면 NULL로 채워요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>FULL OUTER JOIN</b></td><td style="text-align:left;vertical-align:middle">양쪽 테이블의 모든 행을 포함하고, 매칭이 없는 쪽은 NULL로 채워요.</td></tr></table></div></div>` },
  { id:'25_3_12', year:'2025', round:'3회', cat:'SQL문',
    qHtml:`<div class="q-text">아래 테이블 A를 대상으로 다음 SQL 문을 실행했을 때의 결과값을 쓰시오.<br><br><div class="tbl-wrap"><div class="tbl-label">[A테이블]</div><table class="db-table"><tr><th>col1</th><th>col2</th></tr><tr><td>2</td><td>null</td></tr><tr><td>2</td><td>8</td></tr><tr><td>3</td><td>3</td></tr><tr><td>null</td><td>5</td></tr><tr><td>4</td><td>5</td></tr></table></div><div class="sql-box" style="margin-top:10px">SELECT COUNT(col2)
FROM A
WHERE col1 IN (2, 3) OR col2 IN (3, 5)</div>`,
    ansHtml:`<div class="answer-val">4</div><div class="tbl-wrap" style="margin-top:10px"><div class="tbl-label">WHERE 조건 충족 행</div><table class="db-table"><tr><th>col1</th><th>col2</th><th>COUNT 포함 여부</th></tr><tr class="fail-row"><td>2</td><td>null</td><td>✓ 조건 충족 / col2=null → COUNT 제외</td></tr><tr class="highlight-row"><td>2</td><td>8</td><td>✓ col1=2 → COUNT 포함</td></tr><tr class="highlight-row"><td>3</td><td>3</td><td>✓ col1=3, col2=3 → COUNT 포함</td></tr><tr class="highlight-row"><td>null</td><td>5</td><td>✓ col2=5 → COUNT 포함</td></tr><tr class="highlight-row"><td>4</td><td>5</td><td>✓ col2=5 → COUNT 포함</td></tr></table></div><div class="keyword-detail" style="margin-top:10px">📌 <b>풀이 핵심 2가지</b><br>① <b>AND가 OR보다 먼저 계산돼요!</b> <code>(col1 IN(2,3)) OR (col2 IN(3,5))</code> 순서로 평가해요.<br>② <b>COUNT(컬럼명)은 NULL을 빼고 세요!</b> COUNT(*)는 NULL도 포함하지만, COUNT(col2)는 col2가 null인 행은 제외해요.<br><br>📎 <b>집계 함수 NULL 처리 정리</b><br>· <b>COUNT(*)</b>: NULL 포함해서 행 수 카운트<br>· <b>COUNT(컬럼)</b>: 해당 컬럼이 NULL인 행은 제외<br>· <b>SUM / AVG</b>: NULL 값은 계산에서 제외<br>· <b>MAX / MIN</b>: NULL 값은 무시<br><br>📎 <b>IN 연산자</b>: <code>col1 IN (2,3)</code>은 <code>col1=2 OR col1=3</code>과 같아요. NULL은 IN 연산에서 항상 FALSE로 처리돼요.</div<div class="keyword-detail">📌 <b>풀이</b><br>이 문제의 핵심은 두 가지예요. ① <b>AND가 OR보다 먼저 계산</b>돼요. ② <b>COUNT(컬럼명)은 NULL을 제외</b>하고 세요. 조건 충족 5행 중 col2=NULL인 1행을 빼면 COUNT=4예요.<br><br>📎 <b>COUNT 함수와 NULL 처리</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>COUNT(*) vs COUNT(컬럼)</b></td><td style="text-align:left;vertical-align:middle">COUNT(*)는 NULL 포함 모든 행을 세요. COUNT(col2)는 col2가 NULL인 행은 제외해요. ← <u>이번 문제 핵심</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>AND vs OR 우선순위</b></td><td style="text-align:left;vertical-align:middle">AND가 OR보다 먼저 계산돼요(수학의 ×와 + 관계처럼). 헷갈리면 괄호()로 명시적으로 표현하세요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>IN 연산자</b></td><td style="text-align:left;vertical-align:middle"><code>col1 IN (2,3)</code>은 <code>col1=2 OR col1=3</code>과 같아요. NULL은 IN 연산에서 항상 FALSE로 처리돼요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>SUM / AVG의 NULL 처리</b></td><td style="text-align:left;vertical-align:middle">SUM과 AVG도 NULL 값을 계산에서 제외해요. AVG(col)는 NULL이 아닌 행의 평균만 계산해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>IS NULL / IS NOT NULL</b></td><td style="text-align:left;vertical-align:middle">NULL 여부 비교 시 = NULL이 아니라 <code>IS NULL</code> / <code>IS NOT NULL</code>을 사용해야 해요. NULL = NULL은 TRUE가 아니에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>COALESCE 함수</b></td><td style="text-align:left;vertical-align:middle">NULL 값을 다른 값으로 대체할 때 사용해요. <code>COALESCE(col2, 0)</code>은 col2가 NULL이면 0으로 대체해요.</td></tr></table></div></div>` },

  // ─── 2025년 2회 ───
  { id:'25_2_1', year:'2025', round:'2회', cat:'데이터베이스',
    qHtml:`<div class="q-text">데이터베이스 물리 설계 단계에서 레코드에 접근하는 방법은 순차 접근, ( ) 접근, 해싱 접근 등으로 나뉜다. 이 중 아래 표의 빈칸에 해당하는 접근 방법을 쓰시오.<br><br><div class="tbl-wrap"><table class="db-table" style="min-width:320px"><tr><th>접근 방법</th><th>설명</th></tr><tr><td>순차 접근</td><td>레코드를 처음부터 하나씩 순서대로 검사</td></tr><tr class="info-row"><td>( &nbsp;&nbsp;&nbsp;&nbsp; ) 접근</td><td>&lt;키 값, 포인터&gt; 쌍으로 구성되어 키 기준으로 빠르게 검색</td></tr><tr><td>해싱 접근</td><td>해시 함수로 주소를 직접 계산하여 레코드에 접근</td></tr></table></div></div>`,
    ansHtml:`<div class="answer-val">인덱스(Index) 또는 색인</div><div class="keyword-detail">📌 <b>풀이</b><br>DB에서 레코드를 찾는 방법 3가지 중 가운데가 <b>인덱스(Index/색인) 접근</b>이에요. 책의 목차처럼 키 값과 위치(포인터)를 따로 모아 두어서, 원하는 레코드를 처음부터 찾지 않고 바로 접근할 수 있어요.<br><br>📎 <b>레코드 접근 방식 3가지 비교</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>순차(Sequential) 접근</b></td><td style="text-align:left;vertical-align:middle">파일의 처음부터 끝까지 순서대로 레코드를 탐색해요. 구현이 단순하고 저장 공간 효율이 좋지만 원하는 레코드를 찾기까지 시간이 오래 걸릴 수 있어요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>인덱스(Index) 접근</b></td><td style="text-align:left;vertical-align:middle">키 값과 해당 레코드의 물리적 주소(포인터)를 쌍으로 저장한 별도의 인덱스 파일을 이용해요. 순차보다 빠르고 범위 검색에도 유리해요. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>해싱(Hashing) 접근</b></td><td style="text-align:left;vertical-align:middle">해시 함수에 키 값을 넣어 저장 위치를 직접 계산해요. 평균 O(1)의 매우 빠른 탐색 속도를 보여요. 단, 해시 충돌 문제가 있고 범위 검색에는 불리해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>B-Tree 인덱스</b></td><td style="text-align:left;vertical-align:middle">실제 DBMS에서 가장 많이 사용하는 인덱스 자료구조예요. 트리 구조로 균형을 유지하여 O(log n)의 탐색 속도를 보장해요. 범위 검색에도 효율적이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>B+Tree 인덱스</b></td><td style="text-align:left;vertical-align:middle">B-Tree의 변형으로 리프 노드에만 실제 데이터를 저장하고 리프 노드들을 연결 리스트로 이어요. 범위 검색에서 특히 유리하며 MySQL InnoDB 등 대부분의 RDBMS에서 사용해요.</td></tr></table></div></div>` },
  { id:'25_2_2', year:'2025', round:'2회', cat:'데이터베이스',
    qHtml:`<div class="q-text">관계형 데이터베이스 릴레이션에서 열(Column)에 해당하는 개념으로, 각 열은 고유한 이름을 가지며 특정 도메인(Domain) 내의 값을 갖는다. 파일 구조의 필드(Field)에 대응되며, 릴레이션을 구성하는 행(Tuple)의 구성 요소가 되는 개념을 보기에서 골라 쓰시오.<br><br>[보기] &nbsp; ㄱ.Cardinality &nbsp; ㄴ.Domain &nbsp; ㄷ.Attribute &nbsp; ㄹ.Degree &nbsp; ㅁ.Schema &nbsp; ㅂ.Tuple</div>`,
    ansHtml:`<div class="answer-val">ㄷ. Attribute (속성)</div><div class="keyword-detail">📌 <b>풀이</b><br>릴레이션(테이블)에서 열(Column)에 해당하는 것이 바로 <b>속성(Attribute)</b>이에요. 학생 테이블의 "학번, 이름, 학과, 학년"이 모두 속성이에요. 각 속성은 가질 수 있는 값의 범위인 도메인이 정해져 있어요.<br><br>📎 <b>DB 용어 대응표</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>속성(Attribute)</b></td><td style="text-align:left;vertical-align:middle">릴레이션에서 열(Column)에 해당해요. 필드(Field)라고도 해요. 각 속성은 고유한 이름과 도메인을 가져요. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>튜플(Tuple)</b></td><td style="text-align:left;vertical-align:middle">릴레이션에서 행(Row)에 해당해요. 레코드(Record)라고도 해요. 하나의 개체에 대한 모든 속성 값의 집합이에요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>차수(Degree)</b></td><td style="text-align:left;vertical-align:middle">릴레이션의 속성(열) 개수예요. 테이블 스키마가 변경되지 않는 한 고정돼요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>카디널리티(Cardinality)</b></td><td style="text-align:left;vertical-align:middle">릴레이션의 튜플(행) 개수예요. 데이터가 추가·삭제되면 변해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>인스턴스(Instance)</b></td><td style="text-align:left;vertical-align:middle">특정 시점에 릴레이션에 실제로 저장된 튜플들의 집합이에요. 스키마(구조)는 변하지 않아도 인스턴스(데이터)는 계속 변해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>스키마(Schema)</b></td><td style="text-align:left;vertical-align:middle">릴레이션의 구조 정의예요. 속성 이름·데이터 타입·제약조건 등을 포함해요. 외부·개념·내부 스키마 3단계로 나뉘어요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>도메인(Domain)</b></td><td style="text-align:left;vertical-align:middle">각 속성이 가질 수 있는 원자값의 집합이에요. 나이 속성의 도메인은 양의 정수, 성별은 {남, 여}처럼 정의돼요.</td></tr></table></div></div>` },
  { id:'25_2_3', year:'2025', round:'2회', cat:'정보보안',
    qHtml:`<div class="q-text">원격 서버에 안전하게 접속하기 위해 사용하는 보안 프로토콜로, 공개키 기반 인증 방식을 사용하며 암호화된 데이터 전송을 지원한다. 기본 포트 번호는 22번이며, 평문으로 데이터를 전송하는 Telnet의 보안 취약점을 보완한 대안으로 널리 사용된다. 이 프로토콜의 명칭을 쓰시오.</div>`,
    ansHtml:`<div class="answer-val">SSH (Secure Shell)</div><div class="keyword-detail">📌 <b>풀이</b><br>예전 Telnet은 원격 접속 시 데이터가 암호화되지 않아 도청 위험이 컸어요. <b>SSH(Secure Shell)</b>는 이를 대체한 안전한 원격 접속 프로토콜이에요. 공개키 기반으로 인증하고 모든 통신을 암호화해요.<br><br>📎 <b>같이 알아두면 좋은 키워드</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Telnet</b></td><td style="text-align:left;vertical-align:middle">가장 오래된 원격 접속 프로토콜이에요. 기본 포트 23번, 텍스트 기반으로 동작해요. 모든 데이터(아이디·비밀번호 포함)가 평문으로 전송되어 스니핑 공격에 취약해요. 현재는 SSH로 대체됐어요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>SSH (Secure Shell)</b></td><td style="text-align:left;vertical-align:middle">포트 22번. 공개키 암호화로 인증하고 대칭키 암호화로 데이터를 전송해요. 비밀번호 인증도 지원하지만 키 기반 인증이 더 안전해요. ← <u>정답</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>공개키 인증 방식</b></td><td style="text-align:left;vertical-align:middle">클라이언트는 개인키(private key)를 보관하고, 서버에 공개키(public key)를 등록해요. 접속 시 서버가 공개키로 암호화한 것을 클라이언트가 개인키로 복호화해 인증해요. 비밀번호 없이 로그인 가능해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>SCP (Secure Copy)</b></td><td style="text-align:left;vertical-align:middle">SSH 기반의 파일 복사 명령어예요. <code>scp 파일명 사용자@서버:경로</code> 형식으로 사용해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>SFTP (SSH File Transfer Protocol)</b></td><td style="text-align:left;vertical-align:middle">SSH를 기반으로 한 파일 전송 프로토콜이에요. FTP의 보안 버전으로 SSH 포트 22를 사용해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>SSH 터널링</b></td><td style="text-align:left;vertical-align:middle">SSH를 이용해서 다른 프로토콜의 통신을 암호화된 SSH 채널을 통해 전송하는 기법이에요. 보안이 약한 프로토콜도 SSH 터널 안에서 안전하게 전송할 수 있어요.</td></tr></table></div></div>` },
  { id:'25_2_4', year:'2025', round:'2회', cat:'운영체제',
    qHtml:`<div class="q-text">CPU 스케줄링 알고리즘에 대한 설명이다. (1)과 (2)에 해당하는 알고리즘 명칭을 각각 쓰시오.<br><br>(1) CPU 실행 시간(Burst Time)이 가장 짧은 프로세스를 먼저 처리하는 비선점형 방식이다.<br><br>(2) (1)의 선점형 구현으로, 더 짧은 잔여 실행 시간을 가진 프로세스가 도착하면 즉시 CPU를 선점한다.</div>`,
    ansHtml:`<div class="answer-val">(1) SJF (Shortest Job First) &nbsp;&nbsp; (2) SRT (Shortest Remaining Time)</div><div class="keyword-detail">📌 <b>풀이</b><br>SJF는 마치 편의점 계산대에서 물건이 적은 사람 먼저 계산해주는 것처럼, CPU 실행 시간이 짧은 프로세스를 먼저 실행해요(비선점). SRT는 그 선점형 버전으로, 새 프로세스 도착 시 남은 시간이 더 짧으면 교체해요.<br><br>📎 <b>CPU 스케줄링 알고리즘 비교</b><div class="tbl-wrap" style="margin-top:8px"><table class="db-table" style="width:100%;table-layout:fixed"><colgroup><col style="width:35%"><col style="width:65%"></colgroup><tr><th style="text-align:center">키워드</th><th style="text-align:center">설명</th></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>FCFS</b></td><td style="text-align:left;vertical-align:middle">준비 큐에 도착한 순서대로 처리해요. 비선점형으로 가장 단순하지만 긴 작업이 먼저 오면 짧은 작업이 오래 기다리는 "호위 효과(Convoy Effect)"가 발생해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>SJF (Shortest Job First)</b></td><td style="text-align:left;vertical-align:middle">CPU 실행 시간이 가장 짧은 프로세스를 먼저 처리해요. 비선점형으로 평균 대기시간을 최소화해요. 단, CPU 실행 시간을 미리 알 수 없고 긴 프로세스는 기아(Starvation) 상태가 될 수 있어요. ← <u>정답1</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>SRT (Shortest Remaining Time)</b></td><td style="text-align:left;vertical-align:middle">SJF의 선점형 버전이에요. 새 프로세스가 도착할 때마다 남은 실행 시간을 비교해서 더 짧은 것을 실행해요. 평균 대기시간은 최소화되지만 컨텍스트 스위칭 오버헤드가 증가해요. ← <u>정답2</u></td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>HRN (Highest Response ratio Next)</b></td><td style="text-align:left;vertical-align:middle">SJF의 기아 문제를 해결한 비선점 알고리즘이에요. 우선순위 = (대기시간 + 서비스시간) / 서비스시간으로 계산해요. 대기 시간이 길수록 우선순위가 높아져 기아를 방지해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>RR (Round Robin)</b></td><td style="text-align:left;vertical-align:middle">선점형. 각 프로세스에 동일한 타임 퀀텀을 부여하고 순환해요. 공평하고 기아가 없어요. 타임 퀀텀 크기가 성능에 중요해요.</td></tr><tr><td style="font-weight:600;color:var(--c-text);text-align:center;vertical-align:middle"><b>Priority Scheduling</b></td><td style="text-align:left;vertical-align:middle">우선순위가 높은 프로세스를 먼저 실행해요. 선점/비선점 모두 가능해요. 낮은 우선순위 프로세스의 기아 문제가 있어요.</td></tr></table></div></div>` },
